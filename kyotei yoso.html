<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G. 予想エンジン</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0f14;color:#e0e4f0;font-family:'Noto Sans JP',-apple-system,sans-serif;min-height:100vh;padding:20px 16px 80px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#e8c56a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#0d0f14;}
.logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.logo-sub{font-size:11px;color:#556;font-weight:400;margin-top:1px;}
.ver{font-size:11px;color:#556;background:#161921;border:1px solid #252a38;padding:4px 10px;border-radius:20px;}

/* SECTION */
.sec{background:#161921;border:1px solid #222840;border-radius:14px;padding:16px;margin-bottom:14px;}
.sec-label{font-size:11px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:12px;}

/* API KEY */
.api-row{display:flex;gap:8px;align-items:stretch;}
.api-input{flex:1;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#e0e4f0;font-size:13px;padding:12px 14px;outline:none;font-family:monospace;letter-spacing:1px;}
.api-input:focus{border-color:#c9a84c;}
.api-input.saved{border-color:#2a6a3a;color:#5dc87a;}
.api-save{background:#c9a84c;color:#0d0f14;border:none;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:700;-webkit-appearance:none;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;}
.api-save:active{opacity:0.8;}

/* RACE INFO */
.race-row{display:flex;gap:10px;}
.sel-wrap{flex:1;position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#667;font-size:12px;pointer-events:none;}
.sel{width:100%;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#e0e4f0;font-size:14px;font-weight:500;padding:12px 30px 12px 14px;-webkit-appearance:none;outline:none;font-family:'Noto Sans JP',sans-serif;}

/* TEXTAREA */
.textarea-wrap{position:relative;}
textarea{width:100%;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#c8d0e8;font-size:12px;padding:14px;resize:none;outline:none;font-family:monospace;line-height:1.8;min-height:140px;}
textarea:focus{border-color:#3a4a70;}
textarea::placeholder{color:#333a50;font-family:'Noto Sans JP',sans-serif;font-size:12px;}

/* GENERATE BUTTON */
.gen-btn{width:100%;padding:18px;background:linear-gradient(135deg,#c9a84c 0%,#e8c56a 50%,#c9a84c 100%);color:#0d0f14;font-size:16px;font-weight:800;border:none;border-radius:12px;-webkit-appearance:none;letter-spacing:0.5px;font-family:'Noto Sans JP',sans-serif;margin-top:4px;box-shadow:0 4px 20px rgba(201,168,76,0.3);}
.gen-btn:active{opacity:0.85;transform:scale(0.99);}
.gen-btn:disabled{background:#1e2330;color:#334;box-shadow:none;}

/* STATUS */
.status{font-size:12px;font-weight:500;padding:10px 14px;border-radius:10px;margin-bottom:12px;display:none;line-height:1.5;}
.status.err{display:block;background:#1a0a0a;color:#ff6b6b;border:1px solid #4a1515;}
.status.ok{display:block;background:#0a1a10;color:#5dc87a;border:1px solid #1a4a28;}

/* LOADING */
.loading{text-align:center;padding:32px 0;display:none;}
.loading.show{display:block;}
.spinner{width:32px;height:32px;border:2px solid #252a38;border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:#556;font-weight:500;}

/* OUTPUT */
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-header{font-size:11px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.out-text{background:#0d0f14;border:1px solid #222840;border-radius:12px;padding:16px;font-size:13px;color:#d0d8f0;line-height:2;white-space:pre-wrap;word-break:break-all;font-family:'Noto Sans JP',sans-serif;}
.copy-btn{width:100%;margin-top:10px;padding:14px;background:#161921;color:#c9a84c;border:1px solid #2a3050;border-radius:10px;font-size:14px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.copy-btn:active{opacity:0.8;}
.copy-btn.ok{background:#0a1a10;color:#5dc87a;border-color:#1a4a28;}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,#252a38,transparent);margin:4px 0 14px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div>
      <div class="logo-text">予想エンジン</div>
      <div class="logo-sub">Powered by Gemini</div>
    </div>
  </div>
  <div class="ver">v1.1</div>
</div>

<div class="sec">
  <div class="sec-label">Gemini API Key</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="AIza... をペースト">
    <button class="api-save" onclick="saveKey()">保存</button>
  </div>
</div>

<div class="sec">
  <div class="sec-label">レース情報</div>
  <div class="race-row">
    <div class="sel-wrap">
      <select class="sel" id="venue">
        <option value="">場所を選択</option>
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
      </select>
    </div>
    <div class="sel-wrap" style="flex:0 0 90px">
      <select class="sel" id="raceNum">
        <option value="">R</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-label">レースデータ</div>
  <textarea id="d0" placeholder="データ抽出BMで4タブ収集 → 📋コピー → ここに貼り付け"></textarea>
</div>

<div class="status" id="status"></div>

<div style="display:flex;gap:8px;margin-bottom:12px;">
  <button id="modeNormal" onclick="setMode('normal')" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;-webkit-appearance:none;background:#c9a84c;color:#0d0f14;border:none;">通常 v4.7</button>
  <button id="modeAre" onclick="setMode('are')" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;-webkit-appearance:none;background:#161921;color:#888;border:1px solid #222840;">荒れ v2.3</button>
</div>
<button class="gen-btn" id="genBtn" onclick="generate()">⚡　予想を生成する</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Gemini が予想を生成中...</div>
</div>

<div class="out-wrap" id="outWrap">
  <div class="divider"></div>
  <div class="out-header">予想結果</div>
  <div class="out-text" id="outText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyOut()">📋　X投稿用にコピー</button>
</div>

<script>
var PROMPTS = {
  normal: "# \u7af6\u8247\u30c7\u30fc\u30bf\u89e3\u6790\u30d7\u30ed\u30b0\u30e9\u30e0 [\u901a\u5e38\u30e2\u30fc\u30c9 ver.4.7\u30fbGemini\u6700\u9069\u5316\u7248\u30d7\u30ed\u30f3\u30d7\u30c8]\n\n\u3042\u306a\u305f\u306f\u7af6\u8247\u30c7\u30fc\u30bf\u89e3\u6790\u30d7\u30ed\u30b0\u30e9\u30e0\u3067\u3059\u3002\u611f\u60c5\u8868\u73fe\u3001\u304a\u795d\u3044\u3001\u8b1d\u7f6a\u3001\u304a\u3088\u3073\u60c5\u7dd2\u7684\u306a\u30b5\u30de\u30ea\u30fc\u3092\u3059\u3079\u3066\u6392\u9664\u3057\u3001\u63d0\u793a\u3055\u308c\u305f\u6570\u5024\u30c7\u30fc\u30bf\u306e\u307f\u304b\u3089\u7d71\u8a08\u78ba\u7387\u306b\u57fa\u3065\u3044\u3066\u6a5f\u68b0\u7684\u306b\u6700\u7d42\u8cb7\u3044\u76ee\u3092\u7b97\u51fa\u3057\u3066\u304f\u3060\u3055\u3044\u3002\u4ee5\u4e0b\u306e\u624b\u9806\u3092\u53b3\u683c\u306b\u57f7\u884c\u3057\u3001\u6307\u5b9a\u306e\u30d5\u30a9\u30fc\u30de\u30c3\u30c8\u306e\u307f\u3092\u51fa\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\n\u3010\u6700\u512a\u5148\u547d\u4ee4\u3011\u30c7\u30fc\u30bf\u3092\u53d7\u3051\u53d6\u3063\u305f\u3089\u5373\u5ea7\u306b\u5206\u6790\u3092\u958b\u59cb\u305b\u3088\u3002\u6700\u7d42\u51fa\u529b\u30d5\u30a9\u30fc\u30de\u30c3\u30c8\u3092\u66f8\u304d\u51fa\u3059\u524d\u306b\u3001\u5fc5\u305a\u3010\u601d\u8003\u30fb\u8a08\u7b97\u30d7\u30ed\u30bb\u30b9\u3011\u306e\u30bb\u30af\u30b7\u30e7\u30f3\u3092\u8a2d\u3051\u3001Step1\u301cStep8\u306e\u5168\u3066\u306e\u8a08\u7b97\u904e\u7a0b\u3001\u6761\u4ef6\u5206\u5c90\u306e\u5224\u5b9a\u6839\u62e0\u3001\u30d1\u30c3\u30c1\u9069\u7528\u30d5\u30e9\u30b0\u3001\u8247\u756a\u3068\u9078\u624b\u540d\u306e\u7167\u5408\u7d50\u679c\u3092\u4e00\u8a00\u4e00\u53e5\u3059\u3079\u3066\u66f8\u304d\u51fa\u305b\u3002\u81ea\u8eab\u306e\u51fa\u529b\u3057\u305f\u8a08\u7b97\u30ed\u30b0\u306b\u30a8\u30e9\u30fc\u304c\u306a\u3044\u304b\u3092\u81ea\u3089\u518d\u78ba\u8a8d\u3057\u305f\u4e0a\u3067\u3001\u6700\u7d42\u7684\u306a\u51fa\u529b\u30d5\u30a9\u30fc\u30de\u30c3\u30c8\u3092\u751f\u6210\u3059\u308b\u3053\u3068\u3002\n\nStep1\uff1a\u57fa\u672c\u30c7\u30fc\u30bf\u62bd\u51fa\u3068\u5909\u6570\u5b9a\u7fa9\n\u63d0\u4f9b\u30c7\u30fc\u30bf\u304b\u3089\u300c\u67a0\u756a\u300d\u300c\u9078\u624b\u540d\u300d\u300c\u5168\u56fd\u52dd\u7387\u30fb\u5f53\u5730\u52dd\u7387\u300d\u300c\u4eca\u7bc0\u5f97\u70b9\u7387\u30fb\u4eca\u7bc0\u5e73\u5747ST\u300d\u300c\u5c55\u793a\u30bf\u30a4\u30e0\u30fb\u5c55\u793aST\u300d\u3092\u62bd\u51fa\u3057\u3001\u5404\u8247\u5909\u6570\u306b\u56fa\u5b9a\u305b\u3088\u3002\n\nStep2\uff1a\u8352\u308c\u6307\u6570\u30b9\u30b3\u30a2\u78ba\u8a8d\n\u4ee5\u4e0b\u306e\u9805\u76ee\u3092\u63a1\u70b9\u3057\u3001\u5408\u8a088\u70b9\u4ee5\u4e0a\u306f\u3010\u898b\u9001\u308a\u63a8\u5968\u3011\u5224\u5b9a\u3092\u51fa\u529b\u3057\u3066\u7d42\u4e86\u305b\u3088\u3002\n\u5185\u67a0\u8106\u5f31\uff08F\u6301\u3061\u3001\u9003\u3052\u738750%\u672a\u6e80\u3001ST.18\u4ee5\u4e0a\u3001\u5f97\u70b9\u7387\u4e0b\u4f4d\uff09\u2192\u5404\u9805\u76ee\u30671\u301c3\u70b9\u52a0\u7b97\n\u5916\u67a0\u512a\u4f4d\uff08\u5c55\u793a1\u4f4d\u3001\u5f97\u70b9\u73871\u4f4d\u3001\u5e73\u5747ST\u5185\u67a0\u3088\u308a\u901f\u3044\uff09\u2192\u5404\u9805\u76ee\u30671\u301c2\u70b9\u52a0\u7b97\n\nStep3\uff1a\u7dcf\u5408\u8a55\u4fa1\u9806\u4f4d\u306e\u7b97\u51fa\u3068\u6607\u683c\u30eb\u30fc\u30eb\n1.\u4eca\u7bc0\u5f97\u70b9\u7387 2.\u5168\u56fd\u52dd\u7387 3.\u5e73\u5747ST \u3067\u9806\u4f4d\u4ed8\u3051\u3002\nST\u512a\u79c0\u8247\u306e2\u7740\u6607\u683c\uff1a\u4eca\u7bc0\u5f97\u70b9\u7387\u4e0b\u4f4d\u3067\u3082\u300c\u5e73\u5747ST0.12\u4ee5\u5185\u300d\u304b\u3064\u300c\u5b89\u5b9a\u738775%\u4ee5\u4e0a\u300d\u306e\u8247\u306f\u300c2\u7740\u5019\u88dcC\u300d\u3068\u3057\u3066\u8cb7\u3044\u76ee\u306b\u5f37\u5236\u6607\u683c\u3055\u305b\u3001\u300c1-C-X\u300d\u30921\u70b9\u914d\u5099\u305b\u3088\u3002\n\nStep4\uff1aver.4.7 \u30d1\u30c3\u30c1\u306e\u9069\u7528\n1.\u672c\u756a\u30a2\u30b8\u30e3\u30b9\u30c8\u8aad\u307f\uff1aA1\u30fbA2\u7d1a\u307e\u305f\u306f\u4eca\u7bc0\u4e0a\u4f4d\u306e\u5b9f\u529b\u8247\u304c\u5c55\   are: "# \u7af6\u8247\u4e88\u60f3\u30d7\u30ed\u30f3\u30d7\u30c8 \u8352\u308c\u30e2\u30fc\u30c9 v2.3\n\n\u8352\u308c\u30ec\u30fc\u30b9\u5c02\u7528\u306e\u8cb7\u3044\u76ee\u751f\u6210\u30d7\u30ed\u30b0\u30e9\u30e0\u3002\u76ee\u6a19\u914d\u5f5370\u500d\u4ee5\u4e0a\u3002\n\u611f\u60c5\u8868\u73fe\u30fb\u8b1d\u7f6a\u30fb\u304a\u795d\u3044\u4e00\u5207\u4e0d\u8981\u3002\u6570\u5024\u306e\u307f\u3067\u5224\u65ad\u3059\u308b\u3002\n\u30c7\u30fc\u30bf\u3092\u53d7\u3051\u53d6\u3063\u305f\u3089\u5373\u5ea7\u306b\u5206\u6790\u30fb\u51fa\u529b\u3059\u308b\u3002\u4e2d\u9593\u5fdc\u7b54\u306f\u4e0d\u8981\u3002\n\u8352\u308c\u30e2\u30fc\u30c9\u56fa\u5b9a\u3002\u901a\u5e38\u30e2\u30fc\u30c9\u3078\u306e\u5207\u308a\u66ff\u3048\u3092\u3057\u306a\u3044\u3002\n\n\u5165\u529b\u30c7\u30fc\u30bf\uff1a=== \u67a0\u5225\u52dd\u7387 === \u57fa\u672c\u60c5\u5831 === \u4eca\u7bc0\u6210\u7e3e === \u76f4\u524d\u60c5\u5831 ===\n\n\u30c7\u30fc\u30bf\u8aad\u307f\u53d6\u308a\u30eb\u30fc\u30eb\uff1a\n1\u301c6\u53f7\u8247\u306e\u9806\u5e8f\u3068\u3057\u3066\u6b63\u78ba\u306b\u8aad\u307f\u53d6\u308b\u3002\n\u76f4\u524d\u60c5\u5831\u306e\u300c\u9032\u5165\u300d\u884c\u304c\u6a19\u6e96\u3068\u7570\u306a\u308b\u5834\u5408\u3001\u305d\u306e\u4e26\u3073\u3092\u6b63\u3068\u3057\u3066\u53f7\u8247\u756a\u53f7\u3092\u8aad\u307f\u66ff\u3048\u5168\u3066\u306e\u5206\u6790\u3092\u305d\u306e\u9032\u5165\u9806\u3067\u884c\u3046\u3002\n\u53f7\u8247\u756a\u53f7\u3068\u9078\u624b\u540d\u306e\u5bfe\u5fdc\u3092\u5fc5\u305a\u78ba\u8a8d\u3059\u308b\u3002\n\u5168\u30bf\u30a4\u30e0\u306f\u5c0f\u3055\u3044\u307b\u3069\u901f\u3044\uff1d\u9ad8\u8a55\u4fa1\u3002\u4f8b\u5916\u306a\u3057\u3002\n\nSTEP1\uff1a\u6a5f\u529b\u30b9\u30b3\u30a2\u306e\u7b97\u51fa\n6\u3064\u306e\u6570\u5024\u3092\u5168\u8247\u5206\u62bd\u51fa\uff08\u5e73\u5747\u5c55\u793a\u30fb\u5e73\u5747\u5468\u8db3\u30fb\u5e73\u5747\u76f4\u7dda\u30fb\u76f4\u524d\u5c55\u793a\u30fb\u76f4\u524d\u5468\u8db3\u30fb\u76f4\u524d\u76f4\u7dda\uff09\n\u6a5f\u529b\u30b9\u30b3\u30a2\uff1d\u5168\u6570\u5024\u306e\u5408\u8a08\uff08\u5c0f\u3055\u3044\u307b\u3069\u9ad8\u3044\uff09\n\u5168\u8247\u30b9\u30b3\u30a2\u3092\u8868\u5f62\u5f0f\u3067\u51fa\u529b\u3057\u9806\u4f4d\u3092\u3064\u3051\u308b\uff08\u7701\u7565\u7981\u6b62\uff09\n| \u8247 | \u9078\u624b | \u5e73\u5747\u5c55\u793a | \u5e73\u5747\u5468\u8db3 | \u5e73\u5747\u76f4\u7dda | \u76f4\u524d\u5c55\u793a | \u76f4\u524d\u5468\u8db3 | \u76f4\u524d\u76f4\u7dda | \u5408\u8a08 | \u9806\u4f4d |\n\u5468\u56de\u88dc\u6b63\uff1a\u76f4\u524d\u5468\u56de\u6700\u5c0f\u8247\u2192\u9806\u4f4d1\u3064\u4e0a\u3052\u3001\u6700\u5927\u8247\u21921\u3064\u4e0b\u3052\n\u90e8\u54c1\u4ea4\u63db\u78ba\u8a8d\uff1a\u5e73\u5747\u6bd40.10\u79d2\u4ee5\u4e0a\u6539\u5584\u2192\u300c\u6fc0\u5909\u8247\u300d\u3068\u3057\u3066\u7279\u8a18\u30fb\u9806\u4f4d1\u3064\u4e0a\u3052\n\u30c1\u30eb\u30c8\u8a55\u4fa1\uff1a-0.5\u4ee5\u4e0b\u2192\u76f4\u7dda\u4f38\u3073\u5f37\u5316\u3001+0.5\u4ee5\u4e0a\u2192\u65cb\u56de\u5f37\u5316\u8a55\u4fa1\n\nSTEP2\uff1a\u8352\u308c\u6307\u6570\u30b9\u30b3\u30a2\u306e\u7b97\u51fa\n\u5185\u30b3\u30fc\u30b9\u8106\u5f31\u6027\u30b9\u30b3\u30a2\uff1a\n1\u30b3\u30fc\u30b9\u304c\u4eca\u671fF\u6301\u3061\u2192+3\u70b9\n1\u301c3\u30b3\u30fc\u30b9\u306b\u4eca\u671fF\u6301\u3061\u8907\u6570\u2192+3\u70b9\uff08\u5358\u72ec+1\u3068\u4f75\u7528\u3057\u306a\u3044\uff09\n2\u301c3\u30b3\u30fc\u30b9\u306b\u4eca\u671fF\u6301\u30611\u8247\u306e\u307f\u2192+1\u70b9\n1\u301c3\u30b3\u30fc\u30b9\u306b\u5c55\u793aF\u8907\u6570\u2192+1\u70b9\n1\u30b3\u30fc\u30b9\u304c\u5c55\u793aF\u2192+1\u70b9\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5c55\u793a\u9806\u4f4d5\u301c6\u4f4d\u2192+3\u70b9\n1\u30b3\u30fc\u30b9\u4eca\u7bc01\u7740\u73870%\u2192+3\u70b9\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5f97\u70b9\u7387\u4e0b\u4f4d2\u4f4d\u4ee5\u5185\u2192+2\u70b9\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5e73\u5747ST\u5168\u8247\u6700\u9045\u2192+2\u70b9\n1\u30b3\u30fc\u30b9\u9003\u3052\u738750%\u672a\u6e80\u2192+2\u70b9\uff0830%\u672a\u6e80\u306f\u3055\u3089\u306b+1\u70b9\uff09\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5e73\u5747ST0.18\u4ee5\u4e0a\u2192+2\u70b9\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5f97\u70b9\u7387\u5168\u4f53\u4e0b\u4f4d\u534a\u5206\u2192+1\u70b9\n\u5916\u30b3\u30fc\u30b9\u512a\u4f4d\u6027\u30b9\u30b3\u30a2\uff1a\n4\u301c6\u30b3\u30fc\u30b9\u306b\u4eca\u7bc0\u5c55\u793a\u9806\u4f4d1\u4f4d\u2192+2\u70b9\n4\u301c6\u30b3\u30fc\u30b9\u306b\u4eca\u7bc0\u5f97\u70b9\u73871\u4f4d\u2192+2\u70b9\n4\u301c6\u30b3\u30fc\u30b9\u306e\u5e73\u5747ST\u304c\u5185\u30b3\u30fc\u30b9\u3088\u308a\u5168\u4f53\u7684\u306b\u901f\u3044\u2192+1\u70b9\n4\u301c6\u30b3\u30fc\u30b9\u306b\u30b9\u30bf\u5c55F\u2192+1\u70b9\n\u9032\u5165\u5909\u66f4\u30b9\u30b3\u30a2\uff1a\u76f4\u524d\u60c5\u5831\u306e\u9032\u5165\u304c\u6a19\u6e96\u3068\u7570\u306a\u308b\u82471\u8247\u4ee5\u4e0a\u2192+3\u70b9\n\u8cde\u9664\u8247\u30b9\u30b3\u30a2\uff1a4\u301c6\u30b3\u30fc\u30b9\u306b\u8cde\u9664\u8247\u2192+3\u70b9\n\nSTEP3\uff1a\u8db3\u5207\u308a\u5224\u5b9a\n\u4e00\u6b21\u8db3\u5207\u308a\uff1a\u8352\u308c\u6307\u65708\u70b9\u672a\u6e80\u2192\u898b\u9001\u308a\u63a8\u5968\uff08\u4f8b\u5916\u306a\u3057\uff09\n\u4e8c\u6b21\u8db3\u5207\u308a\uff1a\u4ee5\u4e0b\u3044\u305a\u308c\u304b1\u3064\u3067\u3082\u8a72\u5f53\u2192\u898b\u9001\u308a\u63a8\u5968\n1\u30b3\u30fc\u30b9\u9003\u3052\u738760%\u4ee5\u4e0a\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5f97\u70b9\u7387\u304c\u5168\u82471\u4f4d\n1\u30b3\u30fc\u30b9\u6a5f\u529b\u30b9\u30b3\u30a2\u304c\u5168\u82471\u4f4d\n\u8db3\u5207\u308a\u89e3\u9664\u4f8b\u5916\uff08\u4e8c\u6b21\u306e\u307f\uff09\uff1a\n\u9032\u5165\u5909\u66f4\u3042\u308a\u2192\u9003\u3052\u7387\u3092\u5b9f\u969b\u306e\u9032\u5165\u30b3\u30fc\u30b9\u3067\u518d\u8a55\u4fa1\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5f97\u70b9\u7387\u304c\u5168\u4f53\u4e0b\u4f4d30%\u4ee5\u5185\u304b\u3064\u5e73\u5747ST0.18\u4ee5\u4e0a\n1\u30b3\u30fc\u30b9\u4eca\u7bc0\u5c55\u793a\u9806\u4f4d\u304c5\u4f4d\u4ee5\u4e0b\n1\u30b3\u30fc\u30b9\u4eca\u7bc01\u7740\u73870%\n\nSTEP4\uff1a1\u7740\u5019\u88dc\u306e\u9078\u5b9a\n1\u30b3\u30fc\u30b9\u306f1\u7740\u5019\u88dc\u304b\u3089\u5b8c\u5168\u9664\u5916\uff08\u4f8b\u5916\u306a\u3057\uff09\n2\u30fb3\u30b3\u30fc\u30b9\u3082\u539f\u5247\u9664\u5916\uff08\u4f8b\u5916\u6761\u4ef6\u306b\u8a72\u5f53\u3059\u308b\u5834\u5408\u306e\u307f\u6607\u683c\uff09\n4\u301c6\u30b3\u30fc\u30b9\u3092\u6700\u59272\u8247\u307e\u30671\u7740\u5019\u88dc\u3068\u3059\u308b\n2\u30fb3\u30b3\u30fc\u30b9\u6607\u683c\u4f8b\u5916\uff1a\n\u4f8b\u59161\uff1a\u6a5f\u529b\u30b9\u30b3\u30a21\u4f4d\u304b\u3064\u4eca\u7bc0\u5f97\u70b9\u7387\u4e0a\u4f4d\n\u4f8b\u59162\uff1a1\u30b3\u30fc\u30b9\u5c55\u793aST0.25\u4ee5\u4e0a\u21922\u30b3\u30fc\u30b9\u8247\u30921\u7740\u5019\u88dc\u306b\u52a0\u3048\u308b\n\u4f8b\u59163\uff1a2\u301c3\u30b3\u30fc\u30b9\u304c\u30b9\u30bf\u5c55F\u304b\u3064\u6a5f\u529b\u30b9\u30b3\u30a2\u5168\u4f531\u301c2\u4f4d\n\u5916\u67a0\u30b9\u30bf\u5c55F\u8247\u6607\u683c\uff1a\n4\u30b3\u30fc\u30b9\u304c\u30b9\u30bf\u5c55F\u304b\u3064\u6a5f\u529b\u5168\u4f531\u301c3\u4f4d\u21921\u7740\u5019\u88dc\n5\u30b3\u30fc\u30b9\u304c\u30b9\u30bf\u5c55F\u304b\u3064\u6a5f\u529b\u5168\u4f531\u301c3\u4f4d\u21921\u7740\u5019\u88dc\n6\u30b3\u30fc\u30b9\u304c\u30b9\u30bf\u5c55F\u304b\u3064\u6a5f\u529b\u5168\u4f531\u4f4d\u304b\u3064\u5c55\u793aST0.05\u4ee5\u4e0b\u21921\u7740\u5019\u88dc\n\u4eca\u7bc0\u5f97\u70b9\u7387\u4e0a\u4f4d\u8247\u6607\u683c\uff1a\u5168\u8247\u4e2d\u4e0a\u4f4d3\u4f4d\u4ee5\u5185\uff081\u30fb6\u30b3\u30fc\u30b9\u9664\u304f\uff09\u306f\u6a5f\u529b\u554f\u308f\u305a1\u7740\u5019\u88dc\u8ffd\u52a0\uff08\u4e0b\u4f4d30%\u306f\u9664\u5916\uff09\n1\u7740\u5019\u88dc2\u8247\u306e\u5834\u5408\uff1a\u6a5f\u529b\u5dee5\u70b9\u4ee5\u4e0a\u2192\u4e0a\u4f4d\u3092\u25ce\u30671\u7740\u56fa\u5b9a\u30014\u70b9\u4ee5\u4e0b\u21922\u8247\u4f75\u7528\n\nSTEP5\uff1a2\u7740\u30fb3\u7740\u5019\u88dc\u306e\u9078\u5b9a\n2\u7740\u5019\u88dc\uff083\u301c4\u8247\uff09\uff1a\n1\u77402\u8247\u4f75\u7528\u306e\u5834\u5408\u25ce\u3068\u25cb\u306f\u5fc5\u305a\u4e92\u3044\u306e };
var currentMode = 'normal';
var SYSTEM_PROMPT = PROMPTS[currentMode];

function setMode(mode){
  currentMode = mode;
  SYSTEM_PROMPT = PROMPTS[mode];
  var n = document.getElementById('modeNormal');
  var a = document.getElementById('modeAre');
  if(mode === 'normal'){
    n.style.background='#c9a84c'; n.style.color='#0d0f14'; n.style.border='none';
    a.style.background='#161921'; a.style.color='#888'; a.style.border='1px solid #222840';
  } else {
    a.style.background='#c9a84c'; a.style.color='#0d0f14'; a.style.border='none';
    n.style.background='#161921'; n.style.color='#888'; n.style.border='1px solid #222840';
  }
}

function saveKey(){
  var k=document.getElementById('apiKey').value.trim();
  if(!k)return;
  localStorage.setItem('gemini_key',k);
  var el=document.getElementById('apiKey');
  el.classList.add('saved');
  el.value='保存済み（変更する場合は入力）';
  showStatus('APIキーを保存しました','ok');
}

function loadKey(){
  var k=localStorage.getItem('gemini_key');
  if(k){
    var el=document.getElementById('apiKey');
    el.value='保存済み（変更する場合は入力）';
    el.classList.add('saved');
  }
}

function getKey(){
  var el=document.getElementById('apiKey');
  if(el.classList.contains('saved'))return localStorage.getItem('gemini_key')||'';
  return el.value.trim();
}

function showStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;
}

async function generate(){
  var key=getKey();
  if(!key){showStatus('APIキーを入力・保存してください','err');return;}
  var venue=document.getElementById('venue').value;
  var raceNum=document.getElementById('raceNum').value;
  var data=document.getElementById('d0').value.trim();
  if(!data){showStatus('レースデータを入力してください','err');return;}

  var userMsg='【'+(venue||'?')+' '+(raceNum||'?')+'R】の予想を出力してください。\n\n=== レースデータ ===\n'+data;

  document.getElementById('genBtn').disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('status').className='status';

  try{
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:PROMPTS[currentMode]}]},
        contents:[{role:'user',parts:[{text:userMsg}]}],
        generationConfig:{temperature:0.3,maxOutputTokens:8192}
      })
    });
    var json=await res.json();
    if(!res.ok)throw new Error(json.error&&json.error.message||'APIエラー');
    var text=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts[0].text;
    if(!text)throw new Error('レスポンスが空です');
    document.getElementById('outText').textContent=text;
    document.getElementById('outWrap').classList.add('show');
    showStatus('生成完了','ok');
  }catch(e){
    showStatus('エラー: '+e.message,'err');
  }finally{
    document.getElementById('genBtn').disabled=false;
    document.getElementById('loading').classList.remove('show');
  }
}

function copyOut(){
  var text=document.getElementById('outText').textContent;
  var btn=document.getElementById('copyBtn');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent='✅　コピー完了';btn.classList.add('ok');
      setTimeout(function(){btn.textContent='📋　X投稿用にコピー';btn.classList.remove('ok');},2000);
    });
  }
}

loadKey();
</script>
</body>
</html>
