<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G. 予想エンジン v2.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Anton&family=Tenor+Sans&display=swap');
:root{--bg:#f8f7f4;--surface:#ffffff;--border:#e0dcd6;--border-strong:#c8c4be;--text:#1a1814;--text-sub:#6b6560;--text-muted:#a09b96;--accent:#c0392b;--accent-light:#fdf0ef;--accent-border:#f0c0bc;--blue:#1a5fa8;--blue-light:#eef4fc;--green:#1a7a3a;--green-light:#eef8f2;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:16px 14px 80px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--text);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;font-family:'Noto Serif JP',serif;}
.logo-text{font-size:16px;font-weight:700;color:var(--text);font-family:'Noto Serif JP',serif;}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ver{font-size:10px;color:var(--text-sub);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:2px;}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;}
.sec-label{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.mode-row{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{flex:1;padding:11px;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mode-btn.active{background:var(--text);color:#fff;border:2px solid var(--text);}
.mode-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
/* 点数セレクター */
.pts-row{display:flex;gap:6px;margin-bottom:10px;}
.pts-btn{flex:1;padding:8px 4px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;}
.pts-btn.active{background:var(--accent);color:#fff;border:2px solid var(--accent);}
.pts-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
.pts-label{font-size:10px;color:var(--text-sub);margin-bottom:5px;}
.race-row{display:flex;gap:8px;}
.sel-w{flex:1;position:relative;}
.sel-w::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:11px;pointer-events:none;}
.sel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px 28px 10px 10px;-webkit-appearance:none;outline:none;font-family:'Noto Sans JP',sans-serif;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:10px;resize:none;outline:none;font-family:monospace;line-height:1.8;min-height:110px;}
textarea::placeholder{color:var(--text-muted);font-size:11px;}
.calc-btn{width:100%;padding:12px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:700;border:1px solid #c0d8f0;border-radius:4px;-webkit-appearance:none;margin-top:10px;font-family:'Noto Sans JP',sans-serif;}
.gen-btn{width:100%;padding:15px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:4px;-webkit-appearance:none;margin-top:4px;font-family:'Noto Serif JP',serif;letter-spacing:1px;}
.gen-btn:disabled{background:var(--border);color:var(--text-muted);}
.api-row{display:flex;gap:8px;}
.api-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px;outline:none;font-family:monospace;}
.api-input.saved{border-color:#a0d0b0;color:var(--green);}
.api-save{background:var(--text);color:#fff;border:none;padding:10px 14px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.calc-result{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-top:12px;display:none;}
.calc-result.show{display:block;}
.cr-sec{font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 6px;padding-left:6px;border-left:2px solid var(--accent);}
.cr-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.cr-table th{background:var(--bg);color:var(--text-sub);padding:5px;text-align:center;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;}
.cr-table td{padding:5px;border-bottom:1px solid var(--border);text-align:center;color:var(--text-sub);}
.cr-table tr.best td{color:var(--accent);font-weight:700;background:var(--accent-light);}
.tot{color:var(--text)!important;font-weight:700;}
.info-row{font-size:11px;color:var(--text-sub);margin:5px 0;}
.info-row b{color:var(--text);font-weight:700;}
.are-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin:8px 0;}
.are-score{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif;}
.score-pass{color:var(--green);}
.score-fail{color:var(--accent);}
.are-label{font-size:10px;color:var(--text-muted);}
.bd-list{font-size:11px;color:var(--text-sub);margin-top:6px;line-height:2.0;}
.bd-list span{color:var(--text);}
.furikiri{padding:10px 12px;border-radius:4px;font-size:13px;font-weight:700;margin:8px 0;}
.furikiri.pass{background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.furikiri.fail{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.cand-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.chip{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:700;}
.c1{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.c2{background:var(--blue-light);color:var(--blue);border:1px solid #c0d8f0;}
.status{font-size:12px;font-weight:500;padding:10px 12px;border-radius:4px;margin-bottom:12px;display:none;}
.status.err{display:block;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.status.ok{display:block;background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.loading{text-align:center;padding:24px 0;display:none;}
.loading.show{display:block;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:var(--text-muted);}
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.out-text{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:14px;font-size:12px;color:var(--text);line-height:2.0;white-space:pre-wrap;word-break:break-word;}
.copy-btn{width:100%;margin-top:8px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.copy-btn.ok{background:var(--green-light);color:var(--green);border-color:#a0d8b0;}
.div{height:1px;background:var(--border);margin:4px 0 14px;}

/* ===== 縦並びレイアウト ===== */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;}
.section-card.hidden{display:none;}
.sec-step-label{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;text-transform:uppercase;}
.step-next-btn{width:100%;padding:13px;background:var(--text);color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;-webkit-appearance:none;margin-top:12px;font-family:'Noto Serif JP',serif;letter-spacing:1px;cursor:pointer;touch-action:manipulation;}
/* 印選択ボタン */
.mark-boat-btn{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;gap:2px;position:relative;z-index:101;-webkit-tap-highlight-color:rgba(0,0,0,0.1);touch-action:manipulation;user-select:none;-webkit-user-select:none;}
/* プルダウン式印カード */
.mark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;position:relative;z-index:100;isolation:isolate;}
.mark-card{border-radius:8px;border:2px solid var(--border);background:var(--bg);padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
.mark-card.mark-maru{border-color:var(--accent);background:var(--accent-light);}
.mark-card.mark-shiro{border-color:var(--blue);background:var(--blue-light);}
.mark-card.mark-sankaku{border-color:#a0856a;background:#f5f0e8;}
.mark-card.mark-yonkaku{border-color:#6a8050;background:#f0f5e8;}
.mark-card.mark-batsu{border-color:var(--border);background:var(--bg);}
.mark-card-num{font-size:22px;font-weight:900;line-height:1;}
.mark-card-sel{width:100%;border-radius:4px;border:1px solid var(--border);font-size:14px;font-weight:700;padding:5px 2px;text-align:center;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.7);font-family:'Noto Sans JP',sans-serif;cursor:pointer;touch-action:manipulation;}
.mark-boat-btn .boat-num{font-size:18px;font-weight:700;}
.mark-boat-btn .boat-mark{font-size:11px;font-weight:700;}
.mark-boat-btn.mark-maru{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.mark-boat-btn.mark-shiro{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
.mark-boat-btn.mark-sankaku{background:#f5f0e8;border-color:#a0856a;color:#7a6040;}
.mark-boat-btn.mark-yonkaku{background:#f0f5e8;border-color:#6a8050;color:#4a6030;}
.mark-boat-btn.mark-batsu{background:var(--bg);border-color:var(--border);color:var(--text-muted);}
.mark-legend{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--text-sub);margin-bottom:8px;}
.mark-legend span{display:flex;align-items:center;gap:3px;}
















.eval-card-wrap{margin-top:14px;display:none;}
.eval-card-wrap.show{display:block;}
.eval-card-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.eval-card{position:relative;border-radius:10px;overflow:hidden;padding:16px 14px 18px;background:#0c0c0c;}
.eval-card-title{text-align:center;font-family:'Noto Serif JP',serif;font-style:italic;font-weight:900;font-size:clamp(20px,5vw,32px);letter-spacing:.04em;color:#e8c96a;text-shadow:0 0 20px rgba(200,153,60,0.3),0 2px 4px rgba(0,0,0,1);margin-bottom:5px;line-height:1.1;}
.eval-brush{display:block;height:9px;margin:0 auto 12px;width:52%;background:linear-gradient(90deg,transparent 0%,rgba(180,140,30,.45) 20%,rgba(255,220,80,.65) 50%,rgba(180,140,30,.45) 80%,transparent 100%);border-radius:50%;filter:blur(2.5px);}
.eval-boats{background:#141414;border:1px solid #2e2e2e;border-radius:8px;padding:14px 8px 12px;position:relative;display:flex;align-items:flex-start;justify-content:space-between;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 24px rgba(0,0,0,.9);}
.eval-corner-tr{position:absolute;top:5px;right:5px;width:16px;height:16px;border-top:2px solid #c9a84c;border-right:2px solid #c9a84c;}
.eval-corner-bl{position:absolute;bottom:5px;left:5px;width:16px;height:16px;border-bottom:2px solid #c9a84c;border-left:2px solid #c9a84c;}
.eval-gold-lines{position:relative;margin-top:10px;display:flex;flex-direction:column;gap:3px;padding:0 0 2px;}
.eval-gold-dot{position:absolute;width:9px;height:9px;left:50%;transform:translateX(-50%);top:0;background:radial-gradient(circle,#ffe580 0%,#c9a84c 55%,transparent 100%);border-radius:50%;}
.eval-gold-line{height:1.4px;background:linear-gradient(90deg,transparent 0%,#8a6010 12%,#c9a84c 32%,#ffe580 50%,#c9a84c 68%,#8a6010 88%,transparent 100%);}
.eval-hint{margin-top:9px;color:#4a4a4a;font-size:.65rem;text-align:center;}
.eval-save-btn{width:100%;margin-top:8px;padding:11px;background:linear-gradient(135deg,#7a5800,#c9a84c,#ffe580,#c9a84c,#7a5800);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.05em;}
.eval-slot{display:flex;flex-direction:column;align-items:center;gap:6px;width:13%;}
.eval-badge{width:100%;aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,7vw,40px);font-weight:900;font-family:'Anton',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.7);}
.eval-arrow{color:#4a4a4a;font-size:14px;font-weight:700;align-self:center;margin-bottom:22px;flex-shrink:0;}
.eval-stars{display:flex;gap:1px;justify-content:center;flex-wrap:nowrap;width:100%;}
.eval-star-on{color:#c9a84c;font-size:clamp(8px,2.3vw,13px);line-height:1;}
.eval-star-off{color:#2a2a2a;font-size:clamp(8px,2.3vw,13px);line-height:1;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div><div class="logo-text">予想エンジン</div><div class="logo-sub">JS計算 + AI生成 v2.1</div></div>
  </div>
  <div class="ver">v2.1</div>
</div>

<!-- API KEY -->
<div class="sec">
  <div class="sec-label">Gemini API Key</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="AIza...">
    <button class="api-save" onclick="saveKey()">保存</button>
  </div>
</div>

<!-- セクション1：データ入力・解析 -->
<div class="section-card" id="sec1">
  <div class="sec-step-label">① レースデータを入力</div>
  <div class="race-row" style="margin-bottom:10px;">
    <div class="sel-w">
      <select class="sel" id="venue" onchange="saveVenueRace()">
        <option value="">場所を選択</option>
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
      </select>
    </div>
    <div class="sel-w" style="flex:0 0 80px">
      <select class="sel" id="raceNum" onchange="saveVenueRace()">
        <option value="">R</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
  </div>
  <textarea id="raceData" rows="7" placeholder="データ抽出BMで4タブ収集 → コピー → ここに貼り付け"></textarea>
  <div style="display:flex;gap:8px;margin-top:10px;">
    <button class="calc-btn" style="flex:1;margin-top:0;" onclick="runCalc()">⚡ データを解析する</button>
    <button onclick="clearAll()" style="padding:13px 16px;background:#f8f7f4;color:#888;border:1px solid #e0dcd6;border-radius:4px;font-size:13px;cursor:pointer;-webkit-appearance:none;">✕</button>
  </div>
</div>

<!-- 解析結果：常時表示 -->
<div class="calc-result" id="calcResult" style="margin-bottom:12px;">
  <div style="font-size:11px;color:#c9a84c;font-weight:700;margin-bottom:8px;">📊 解析結果</div>
  <div id="calcContent"></div>
</div>

<!-- セクション2：印・点数設定（解析後に表示） -->
<div class="section-card hidden" id="sec2">
  <div class="sec-step-label">② 印と点数を確認・調整</div>

  <!-- 信頼度表示 -->
  <div id="step2ShinkidoDisp" style="margin-bottom:12px;"></div>

  <!-- 6艇印選択（プルダウン式） -->
  <div style="font-size:10px;color:var(--text-sub);margin-bottom:8px;font-weight:700;">各艇の印をプルダウンで選択</div>
  <div class="mark-grid" id="markGrid"></div>
  <div style="font-size:10px;color:var(--text-muted);margin-bottom:12px;">※ ◎○は1艇ずつ自動調整</div>

  <!-- A/B/C切り替え -->
  <div style="font-size:10px;color:var(--text-sub);margin-bottom:6px;font-weight:700;">モード</div>
  <div style="display:flex;gap:6px;margin-bottom:12px;" id="step2ModeRow"></div>

  <!-- 点数選択 -->
  <div style="font-size:10px;color:var(--text-sub);margin-bottom:6px;font-weight:700;">買い目点数</div>
  <div class="pts-row">
    <button class="pts-btn inactive" id="pts4" onclick="setPts(4)">4点<br><span style="font-size:10px;font-weight:400;">本線4</span></button>
    <button class="pts-btn inactive" id="pts6" onclick="setPts(6)">6点<br><span style="font-size:10px;font-weight:400;">本線6</span></button>
    <button class="pts-btn active" id="pts8" onclick="setPts(8)">8点<br><span style="font-size:10px;font-weight:400;">通常</span></button>
    <button class="pts-btn inactive" id="pts12" onclick="setPts(12)">12点<br><span style="font-size:10px;font-weight:400;">本線6+抑え6</span></button>
    <button class="pts-btn inactive" id="pts14" onclick="setPts(14)">14点<br><span style="font-size:10px;font-weight:400;">本線6+抑え8</span></button>
    <button class="pts-btn inactive" id="pts15" onclick="setPts(15)">15点<br><span style="font-size:10px;font-weight:400;">本線6+抑え9</span></button>
  </div>

  <button class="step-next-btn" id="generateBtn" onclick="doGenerate()">予想を生成する 🎯</button>
</div>

<!-- セクション3：生成結果（生成後に表示） -->
<div class="section-card hidden" id="sec3">
  <div class="sec-step-label">③ 予想結果</div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Gemini が予想を生成中...</div>
  </div>
  <div class="out-wrap" id="outWrap">
  <div class="div"></div>
  <div class="out-hdr">予想結果</div>
  <div class="out-text" id="outText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyOut()">📋 全文コピー</button>
  <button onclick="copyXAndSogo()" style="width:100%;margin-top:6px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;" id="copyXSogoBtn">𝕏 総合評価＋サマリーをコピー</button>
  <button onclick="copyXOnly()" style="width:100%;margin-top:6px;padding:11px;background:#1a1a2a;color:#c9a84c;border:1px solid #3a3a5a;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;" id="copyXOnlyBtn">𝕏 Xサマリーのみコピー</button>
  <div id="resultInput" style="display:none;"></div>
  <div id="editMarkWrap" style="display:none;margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;">
    <div style="font-size:10px;color:var(--text-sub);font-weight:700;margin-bottom:8px;">◎○▲を差し替えて再生成</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <div style="flex:1;"><div style="font-size:10px;color:var(--accent);margin-bottom:4px;">◎</div><select id="editMaru" class="sel" style="font-size:13px;"></select></div>
      <div style="flex:1;"><div style="font-size:10px;color:var(--blue);margin-bottom:4px;">○</div><select id="editShiro" class="sel" style="font-size:13px;"></select></div>
      <div style="flex:1;"><div style="font-size:10px;color:#7a6040;margin-bottom:4px;">▲</div><select id="editSankaku" class="sel" style="font-size:13px;"></select></div>
    </div>

<script>

// ===== 縦並びレイアウト制御 =====
var currentStep = 1;
var manualMarks = {};

function showSec(id){
  var el=document.getElementById(id);
  if(el){el.classList.remove('hidden');}
}

function goStep1(){
  // clearAllで代替（何もしない）
}

function goStep2(){
  if(!calcData){showStatus('先にデータを解析してください','err');return;}
  initMarkGrid();
  initStep2ModeRow();
  initStep2Shinkido();

  setPts(8);
  showSec('sec2');
  setTimeout(function(){
    var el=document.getElementById('sec2');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function goStep3(){
  applyManualMarks();
  showSec('sec3');
  setTimeout(function(){
    var el=document.getElementById('sec3');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
  generate();
}

function doGenerate(){
  applyManualMarks();
  showSec('sec3');
  setTimeout(function(){
    var el=document.getElementById('sec3');
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
  generate();
}

function showStep(n){currentStep=n;}

function initMarkGrid(){
  if(!calcData)return;
  var boats = calcData.parsed.boats.slice().sort(function(a,b){return a.nyuse-b.nyuse;});
  var sogoSorted = calcData.parsed.boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
  var shinkido = calcData.normalResult.shinkido;

  manualMarks = {};
  var maruN,shiroN,sankakuN,yonkakuN;

  if(shinkido==='A'){
    maruN='1';
    var shiroListI=sogoSorted.filter(function(b){return String(b.n)!=='1';});
    shiroN=String(shiroListI[0]?shiroListI[0].n:2);
    var sankakuListI=sogoSorted.filter(function(b){return String(b.n)!==maruN&&String(b.n)!==shiroN;});
    sankakuN=String(sankakuListI[0]?sankakuListI[0].n:3);
  } else if(shinkido==='B'){
    maruN=String(sogoSorted[0]?sogoSorted[0].n:1);
    shiroN=(maruN!=='1')?'1':String(sogoSorted[1]?sogoSorted[1].n:2);
    var sankakuListBI=sogoSorted.filter(function(b){return String(b.n)!==maruN&&String(b.n)!==shiroN;});
    sankakuN=String(sankakuListBI[0]?sankakuListBI[0].n:3);
  } else {
    maruN=String(sogoSorted[0]?sogoSorted[0].n:1);
    shiroN=String(sogoSorted[1]?sogoSorted[1].n:2);
    var rem1I=sogoSorted.filter(function(b){return String(b.n)!==maruN&&String(b.n)!==shiroN;});
    sankakuN=String(rem1I[0]?rem1I[0].n:3);
  }

  var rem2I=sogoSorted.filter(function(b){return String(b.n)!==maruN&&String(b.n)!==shiroN&&String(b.n)!==sankakuN;});
  yonkakuN=String(rem2I[0]?rem2I[0].n:4);

  [1,2,3,4,5,6].forEach(function(n){
    var ns=String(n);
    if(ns===maruN) manualMarks[ns]='maru';
    else if(ns===shiroN) manualMarks[ns]='shiro';
    else if(ns===sankakuN) manualMarks[ns]='sankaku';
    else if(ns===yonkakuN) manualMarks[ns]='yonkaku';
    else manualMarks[ns]='batsu';
  });

  renderMarkGrid(boats);
}

function renderMarkGrid(boats){
  var grid = document.getElementById('markGrid');
  if(!grid)return;
  var markLabels = {maru:'◎',shiro:'○',sankaku:'▲',yonkaku:'△',batsu:'×'};
  var markOrder = ['maru','shiro','sankaku','yonkaku','batsu'];
  var boatList = boats||calcData.parsed.boats.slice().sort(function(a,b){return a.nyuse-b.nyuse;});
  grid.innerHTML = boatList.map(function(b){
    var ns=String(b.n);
    var mark=manualMarks[ns]||'batsu';
    var opts = markOrder.map(function(m){
      return '<option value="'+m+'"'+(m===mark?' selected':'')+'>'+markLabels[m]+'</option>';
    }).join('');
    // 艇色
    var numColors={'1':'#888','2':'#111','3':'#c42222','4':'#1e52cc','5':'#cc9a00','6':'#168432'};
    var numColor = numColors[ns]||'#111';
    return '<div class="mark-card mark-'+mark+'" id="markCard'+ns+'">'+
      '<div class="mark-card-num" style="color:'+numColor+';">'+b.n+'</div>'+
      '<select class="mark-card-sel" onchange="setMarkBoat(\''+ns+'\',this.value)" id="markSel'+ns+'">'+opts+'</select>'+
      '</div>';
  }).join('');
}

function cycleMarkBoat(ns){
  // ◎→○→▲→△→×→◎ のサイクル（後方互換で残す）
  var order=['maru','shiro','sankaku','yonkaku','batsu'];
  var cur=manualMarks[ns]||'batsu';
  var next=order[(order.indexOf(cur)+1)%order.length];
  setMarkBoat(ns,next);
}

function setMarkBoat(ns, next){
  // ◎○は1艇のみ制約
  if(next==='maru'){
    Object.keys(manualMarks).forEach(function(k){if(manualMarks[k]==='maru')manualMarks[k]='batsu';});
  }
  if(next==='shiro'){
    Object.keys(manualMarks).forEach(function(k){if(manualMarks[k]==='shiro')manualMarks[k]='batsu';});
  }
  manualMarks[ns]=next;
  renderMarkGrid();
  // プルダウンの選択値も更新（renderMarkGridで再描画されるが念のため）
}

function applyManualMarks(){
  if(!calcData)return;
  var maruN=null,shiroN=null,sankakuN=null,yonkakuN=null;
  Object.keys(manualMarks).forEach(function(n){
    if(manualMarks[n]==='maru')maruN=n;
    if(manualMarks[n]==='shiro')shiroN=n;
    if(manualMarks[n]==='sankaku')sankakuN=n;
    if(manualMarks[n]==='yonkaku')yonkakuN=n;
  });
  // calcData.normalResultに反映
  if(maruN&&shiroN){
    window._manualOverride={maru:maruN,shiro:shiroN,sankaku:sankakuN,yonkaku:yonkakuN};
  }
}

function initStep2ModeRow(){
  if(!calcData)return;
  var shinkido=calcData.normalResult.shinkido;
  var row=document.getElementById('step2ModeRow');
  if(!row)return;
  row.innerHTML=['A','B','C'].map(function(x){
    var isActive=x===shinkido;
    var color=x==='A'?'var(--blue)':x==='B'?'var(--green)':'var(--accent)';
    return '<button onclick="step2OverrideShinkido(\''+x+'\')" id="step2sh_'+x+'" style="flex:1;padding:10px;border-radius:4px;font-size:15px;font-weight:700;-webkit-appearance:none;cursor:pointer;touch-action:manipulation;border:2px solid '+(isActive?color:'var(--border)')+';background:'+(isActive?color:'var(--surface)')+';color:'+(isActive?'#fff':'var(--text-sub)')+';">'+x+'</button>';
  }).join('');
}

function step2OverrideShinkido(x){
  if(!calcData)return;
  calcData.normalResult.shinkido=x;
  initStep2ModeRow();
  initMarkGrid();
  initStep2Shinkido();
}

function initStep2Shinkido(){
  if(!calcData)return;
  var s=calcData.normalResult.shinkido;
  var color=s==='A'?'var(--blue)':s==='B'?'var(--green)':'var(--accent)';
  var label=s==='A'?'信頼度A（イン戦強）':s==='B'?'信頼度B（標準）':'信頼度C（荒れ注意）';
  var disp=document.getElementById('step2ShinkidoDisp');
  if(disp)disp.innerHTML='<div style="text-align:center;padding:8px;background:var(--bg);border-radius:4px;margin-bottom:8px;"><div style="font-size:32px;font-weight:900;color:'+color+';">'+s+'</div><div style="font-size:11px;color:'+color+';">'+label+'</div></div>';
  // 荒れ指数も表示
  if(calcData.areResult){
    var sc=calcData.areResult.score;
    var pass=calcData.furikiriResult&&calcData.furikiriResult.pass;
    disp.innerHTML+='<div style="font-size:12px;color:var(--text-sub);text-align:center;margin-bottom:4px;">荒れ指数: <b style="color:'+(sc>=10?'var(--green)':'var(--text-sub)')+';">'+sc+'点</b>'+(pass?' ✅ 荒れ展開有力':'')+' / 逃げ率: <b>'+(calcData.parsed.nigeRate!==null?calcData.parsed.nigeRate+'%':'?')+'</b></div>';
  }
}

var currentMode = 'normal';
var currentPts = 8; // デフォルト点数
var calcData = null;

function clearAll(){
  var editWrap=document.getElementById('editMarkWrap');
  if(editWrap)editWrap.style.display='none';
  document.getElementById('raceData').value='';
  document.getElementById('calcResult').classList.remove('show');
  document.getElementById('calcContent').innerHTML='';
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('outText').textContent='';
  var s2=document.getElementById('sec2');if(s2)s2.classList.add('hidden');
  var s3=document.getElementById('sec3');if(s3)s3.classList.add('hidden');
  try{document.getElementById('venue').value='';}catch(e){}
  try{document.getElementById('raceNum').value='';}catch(e){}
  calcData=null;
  window.scrollTo(0,0);
}

function saveKey(){
  var k=document.getElementById('apiKey').value.trim();
  if(!k)return;

    document.getElementById('apiKey').value='保存済み';

function getKey(){

function setMode(m){
  currentMode=m;
  // 荒れモード廃止：常にnormalモード
  // 点数セレクターは信頼度Cが確定した後にdisplayCalcResultsで表示
  if(calcData)displayCalcResults(calcData);
}

function setPts(pts){
  currentPts=pts;
  [4,6,8,12,14,15].forEach(function(p){
    var btn=document.getElementById('pts'+p);
    if(btn)btn.className='pts-btn '+(p===pts?'active':'inactive');
  });
}

function showStatus(msg,type){
  var el=document.getElementById('statusToast');
  if(!el){
    el=document.createElement('div');
    el.id='statusToast';
    el.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:6px;font-size:13px;font-weight:700;font-family:\'Noto Sans JP\',sans-serif;max-width:90vw;text-align:center;display:none;';
    document.body.appendChild(el);
  }
  el.textContent=msg;
  if(type==='err'){el.style.background='#fdf0ef';el.style.color='#c0392b';el.style.border='1px solid #f0c0bc';}
  else{el.style.background='#eef8f2';el.style.color='#1a7a3a';el.style.border='1px solid #a0d8b0';}
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.display='none';},3000);
}
function showToast(msg){showStatus(msg,'err');}

/* ===== PARSER ===== */
function parseData(raw){
  var lines=raw.replace(/\r/g,'').split('\n');
  var boats=[];
  for(var i=0;i<6;i++){
    boats.push({n:i+1,name:'',fKi:0,fZen:0,soyoRate:0,stKoki:null,
      tokuten:null,avgST:null,exhibRank:null,winsRate:null,raceCount:null,renRate3:null,
      avgEx:null,avgLap:null,avgStr:null,
      nyuse:i+1,exT:null,lapT:null,strT:null,st:null,stF:false,tilt:0,
      kiryoku:null,kiryokuRank:null,
      buhin:false,zenkokuRate:null,totiRate:null,renRate:null,
      courseRen2:null,courseRen3:null,
      sogoScore:null,sogoRank:null});
  }
  var section='',nigeContext='';
  var nigeRate6M=null,nigeRateLocal=null,nigeRateKoki=null,localCount=0;
  var afterFrank=false,afterNigeRow=false;
  // コース別連対率の優先管理（当地10走以上→直近6ヶ月→今期）
  var courseRen2Local=null,courseRen2_6M=null,courseRen2Koki=null;
  var courseRen3Local=null,courseRen3_6M=null,courseRen3Koki=null;
  var courseLocalCount=0;
  var waku2RenContext='',waku3RenContext='';
  var inWaku2Ren=false,inWaku3Ren=false;

  function v6(line){
    var cols=line.split('\t'),out=[];
    for(var ci=1;ci<cols.length&&out.length<6;ci++){
      var v=(cols[ci]||'').trim();
      if(!v||v==='-'){out.push(null);continue;}
      var clean=v.replace(/[%（）()]/g,'').replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      out.push(isNaN(n)?null:n);
    }
    while(out.length<6)out.push(null);
    return out;
  }
  function stv6(line){
    var cols=line.split('\t'),vals=[],flags=[];
    for(var ci=1;ci<cols.length&&vals.length<6;ci++){
      var v=(cols[ci]||'').trim();
      var isF=v.startsWith('F');
      flags.push(isF);
      var clean=v.replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      vals.push(isNaN(n)?null:n);
    }
    while(vals.length<6){vals.push(null);flags.push(false);}
    return{vals:vals,flags:flags};
  }

  for(var idx=0;idx<lines.length;idx++){
    var line=lines[idx].trim();
    var cols=line.split('\t');
    var label=(cols[0]||'').trim().replace(/\s+/g,'');

    var sm=line.match(/=== (.+?) ===/);
    if(sm){section=sm[1].trim().replace(/\s/g,'');afterFrank=false;afterNigeRow=false;continue;}

    if(section==='基本情報'){
      if(label.includes('基本情報')||label.includes('基本')){
        var nc=line.split('\t').slice(1);
        for(var j=0;j<6&&j<nc.length;j++){var nm=nc[j].trim();if(nm)boats[j].name=nm;}
      }
      if(label==='フライング')afterFrank=true;
      if(afterFrank&&label==='今期'){
        var fv=v6(line);for(var j=0;j<6;j++)boats[j].fKi=fv[j]||0;afterFrank=false;
      }
      if(label==='前期'){var fv2=v6(line);for(var j=0;j<6;j++)boats[j].fZen=fv2[j]||0;}
      if(label==='事故率'){var sv=v6(line);for(var j=0;j<6;j++)boats[j].soyoRate=sv[j]||0;}
      if(label==='全国'){var grv=v6(line);for(var j=0;j<6;j++)if(grv[j]!==null)boats[j].zenkokuRate=grv[j];}
      if(label==='当地'&&section==='基本情報'){var trv=v6(line);for(var j=0;j<6;j++)if(trv[j]!==null)boats[j].totiRate=trv[j];}
      if(label==='今期'&&!afterFrank){
        var sv2=v6(line);
        var allSmall=sv2.filter(function(v){return v!==null;}).every(function(v){return v<1.0;});
        if(allSmall)for(var j=0;j<6;j++)if(sv2[j]!==null)boats[j].stKoki=sv2[j];
      }
    }

    if(section==='今節成績'){
      if(label==='得点率'){
        var tv=v6(line);
        for(var j=0;j<6;j++){
          boats[j].tokuten=tv[j];
          // 走数を括弧内から取得試行
          var cols2=line.split('\t');
          if(cols2[j+1]){
            var rc=cols2[j+1].match(/\((\d+)\)/);
            if(rc)boats[j].raceCount=parseInt(rc[1]);
          }
        }
      }
      if(label==='平均ST'){var sv3=v6(line);for(var j=0;j<6;j++)if(sv3[j]!==null)boats[j].avgST=sv3[j];}
      if(label==='展示順位'||label==='平均展示順位'){var ev=v6(line);for(var j=0;j<6;j++)boats[j].exhibRank=ev[j];}
      if(label==='1着率'){var wv=v6(line);for(var j=0;j<6;j++)boats[j].winsRate=wv[j];}
      if(label==='2連対率'){var rv=v6(line);for(var j=0;j<6;j++)boats[j].renRate=rv[j];}
      if(label==='3連対率'){var r3v=v6(line);for(var j=0;j<6;j++)boats[j].renRate3=r3v[j];}
      if(label==='平均展示'){var av=v6(line);for(var j=0;j<6;j++)if(av[j])boats[j].avgEx=av[j];}
      if(label==='平均周足'||label==='平均周り足'){var lv=v6(line);for(var j=0;j<6;j++)if(lv[j])boats[j].avgLap=lv[j];}
      if(label==='平均直線'){var dv=v6(line);for(var j=0;j<6;j++)if(dv[j])boats[j].avgStr=dv[j];}
    }

    if(section==='直前情報'){
      if(label==='進入'){var nv=v6(line);for(var j=0;j<6;j++)if(nv[j])boats[j].nyuse=Math.round(nv[j]);}
      if(label==='展示'){var etv=v6(line);for(var j=0;j<6;j++)if(etv[j])boats[j].exT=etv[j];}
      if(label==='周り足'||label==='周り足'){var ltv=v6(line);for(var j=0;j<6;j++)if(ltv[j])boats[j].lapT=ltv[j];}
      if(label==='直線'){var stv=v6(line);for(var j=0;j<6;j++)if(stv[j])boats[j].strT=stv[j];}
      if(label==='ST'){var sf=stv6(line);for(var j=0;j<6;j++)if(sf.vals[j]!==null){boats[j].st=sf.vals[j];boats[j].stF=sf.flags[j];}}
      if(label==='チルト'){var cv=v6(line);for(var j=0;j<6;j++)if(cv[j]!==null)boats[j].tilt=cv[j];}
      if(label==='部品交換'){var bv=line.split('\t').slice(1);for(var j=0;j<6&&j<bv.length;j++){if((bv[j]||'').trim()&&(bv[j]||'').trim()!=='-')boats[j].buhin=true;}}
    }

    if(section==='枠別勝率'){
      if(label==='当地'&&line.includes('(')){var cm=line.match(/\((\d+)\)/);if(cm)localCount=parseInt(cm[1]);}
      if(line.includes('直近6ヶ月')||line.includes('直近 6ヶ月')||line.includes('直近６ヶ月'))nigeContext='6M';
      else if(line.includes('直近1年')||line.includes('直近 1年')||line.includes('直近１年'))nigeContext='1Y';
      else if(label==='当地'&&!line.includes('%'))nigeContext='local';
      else if(label==='今期'&&nigeContext==='')nigeContext='koki';

      // コース別2連対率・3連対率（枠別勝率タブ）
      if(label==='2連対率'&&!line.includes('%'))inWaku2Ren=true;
      else if(label==='3連対率'&&!line.includes('%'))inWaku3Ren=true;
      else if(label==='平均ST')inWaku2Ren=false;// 次セクションに入ったらフラグ解除

      if(inWaku2Ren&&line.includes('%')){
        var r2vals=v6(line);
        if(label==='当地'&&!courseRen2Local){
          var lcm2=line.match(/\((\d+)\)/);if(lcm2)courseLocalCount=parseInt(lcm2[1]);
          courseRen2Local=r2vals;
        } else if((label.includes('直近 6')||label.includes('直近6'))&&!courseRen2_6M){
          courseRen2_6M=r2vals;
        } else if(label==='今期'&&!courseRen2Koki){
          courseRen2Koki=r2vals;
        }
      }
      if(inWaku3Ren&&line.includes('%')){
        var r3vals=v6(line);
        if(label==='当地'&&!courseRen3Local){courseRen3Local=r3vals;}
        else if((label.includes('直近 6')||label.includes('直近6'))&&!courseRen3_6M){courseRen3_6M=r3vals;}
        else if(label==='今期'&&!courseRen3Koki){courseRen3Koki=r3vals;}
      }

      if(label.startsWith('逃げ')&&!line.includes('%')){afterNigeRow=true;}
      else if(afterNigeRow){
        var pct=parseFloat((line.split('\t')[0]||'').replace(/%/,''));
        if(!isNaN(pct)){
          if(nigeContext==='6M'&&nigeRate6M===null)nigeRate6M=pct;
          else if(nigeContext==='local'&&nigeRateLocal===null)nigeRateLocal=pct;
          else if(nigeContext==='koki'&&nigeRateKoki===null)nigeRateKoki=pct;
        }
        afterNigeRow=false;
      }
    }
  }

  var nigeRate=null,nigeRateSrc='';
  if(localCount>=10&&nigeRateLocal!==null){nigeRate=nigeRateLocal;nigeRateSrc='当地('+localCount+'戦)';}
  else if(nigeRate6M!==null){nigeRate=nigeRate6M;nigeRateSrc='直近6M';}
  else if(nigeRateKoki!==null){nigeRate=nigeRateKoki;nigeRateSrc='今期';}

  // コース別連対率を各艇に反映（当地10走以上→直近6ヶ月→今期）
  var bestRen2 = (courseLocalCount>=10&&courseRen2Local)?courseRen2Local : (courseRen2_6M||courseRen2Koki||null);
  var bestRen3 = (courseLocalCount>=10&&courseRen3Local)?courseRen3Local : (courseRen3_6M||courseRen3Koki||null);
  if(bestRen2){boats.forEach(function(b,i){if(bestRen2[i]!==null)b.courseRen2=bestRen2[i];});}
  if(bestRen3){boats.forEach(function(b,i){if(bestRen3[i]!==null)b.courseRen3=bestRen3[i];});}

  return{boats:boats,nigeRate:nigeRate,nigeRateSrc:nigeRateSrc,localCount:localCount};
}

/* ===== 今節走数推定 ===== */
function estimateRaceCountFromRates(wins,ren2,ren3){
  for(var n=1;n<=12;n++){
    var ok=true;
    [wins,ren2,ren3].forEach(function(rate){
      if(rate===null||rate===0)return;
      var found=false;
      for(var k=0;k<=n;k++){if(Math.abs(Math.round(k/n*1000)/10-rate)<0.5){found=true;break;}}
      if(!found)ok=false;
    });
    if(ok)return n;
  }
  return null;
}
function calcRaceCount(boats){
  var counts={};
  boats.forEach(function(b){
    var c=estimateRaceCountFromRates(b.winsRate,b.renRate,b.renRate3);
    if(c)counts[c]=(counts[c]||0)+1;
  });
  var maxN=null,maxCnt=0;
  Object.keys(counts).forEach(function(k){if(counts[k]>maxCnt){maxCnt=counts[k];maxN=parseInt(k);}});
  return maxN||0;
}

/* ===== 機力スコア ===== */
function calcKiryoku(boats){
  boats.forEach(function(b){
    var avgE=b.avgEx!==null?b.avgEx:b.exT;
    var avgL=b.avgLap!==null?b.avgLap:b.lapT;
    var avgS=b.avgStr!==null?b.avgStr:b.strT;
    var dirE=b.exT,dirL=b.lapT,dirS=b.strT;
    if(dirE!==null&&dirL!==null&&dirS!==null){
      b.kiryoku=(avgE||dirE)+(avgL||dirL)+(avgS||dirS)+dirE+dirL+dirS;
    }else if(dirE!==null&&dirL!==null){
      b.kiryoku=(avgE||dirE)*2+(avgL||dirL)*2;
    }
  });
  var valid=boats.filter(function(b){return b.kiryoku!==null;}).sort(function(a,b){return a.kiryoku-b.kiryoku;});
  valid.forEach(function(b,i){b.kiryokuRank=i+1;});
}

/* ===== 総合評価スコア ===== */
function calcSogoScore(boats,nigeRate,raceCount){
  var allTok=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  var maxTok=allTok.length?Math.max.apply(null,allTok):1;
  var minTok=allTok.length?Math.min.apply(null,allTok):0;
  var allRate=boats.map(function(b){return b.totiRate||b.zenkokuRate||0;});
  var maxRate=Math.max.apply(null,allRate)||1;
  var allST=boats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  var minST=allST.length?Math.min.apply(null,allST):0.10;
  var maxST=allST.length?Math.max.apply(null,allST):0.30;
  var maxKr=boats.filter(function(b){return b.kiryokuRank!==null;}).length||6;
  var allDirST=boats.map(function(b){return (!b.stF&&b.st!==null)?b.st:null;}).filter(function(v){return v!==null;});
  var minDirST=allDirST.length?Math.min.apply(null,allDirST):0.10;
  var maxDirST=allDirST.length?Math.max.apply(null,allDirST):0.30;
  var allRen=boats.map(function(b){return b.renRate!==null?b.renRate:0;});
  var maxRen=Math.max.apply(null,allRen)||1;

  // 今節走数判定（raceCountが取れてる艇の平均、なければ得点率から推定）
   // 走数ベースで序盤/終盤を判定（3走以下=序盤）
  var isEarlyRace;
  if(raceCount&&raceCount>0){
    isEarlyRace=(raceCount<=3);
  } else {
    // フォールバック：得点率から推定
    var validTok=allTok.filter(function(v){return v>0;}).length;
    isEarlyRace=(validTok<=2||maxTok<=6);
  }

  boats.forEach(function(b){
    var score=0;

    // 今節得点率：序盤は10点、終盤は25点（動的切替）
    var tokWeight=isEarlyRace?10:25;
    if(b.tokuten!==null&&maxTok>minTok)score+=(b.tokuten-minTok)/(maxTok-minTok)*tokWeight;
    else if(b.tokuten!==null)score+=tokWeight/2;

    // 勝率：序盤は20点、終盤は5点（動的切替）
    var rateWeight=isEarlyRace?20:5;
    var rate=b.totiRate||b.zenkokuRate||0;
    if(maxRate>0)score+=rate/maxRate*rateWeight;

    // 平均ST 8点（今節の傾向として固定）
    var st=b.avgST||b.stKoki;
    if(st!==null&&maxST>minST)score+=(maxST-st)/(maxST-minST)*8;
    else if(st!==null)score+=4;

    // 機力 28点（当日の舟の状態を最重視・序盤終盤問わず）
    if(b.kiryokuRank!==null&&maxKr>1)score+=(maxKr-b.kiryokuRank)/(maxKr-1)*28;

    // 直前ST 10点
    if(b.st!==null&&!b.stF&&maxDirST>minDirST)score+=(maxDirST-b.st)/(maxDirST-minDirST)*10;

    // 2連対率：序盤は12点、終盤は10点（序盤は過去連対傾向を重視）
    var renWeight=isEarlyRace?12:10;
    var ren=b.renRate!==null?b.renRate:0;
    if(maxRen>0)score+=ren/maxRen*renWeight;

    // チルト補正
    if(b.tilt<=-0.5)score+=2;else if(b.tilt>=0.5)score+=1;
    // 部品交換補正
    if(b.buhin){var imp=false;if(b.exT!==null&&b.avgEx!==null&&b.exT<b.avgEx-0.05)imp=true;if(b.lapT!==null&&b.avgLap!==null&&b.lapT<b.avgLap-0.05)imp=true;if(b.strT!==null&&b.avgStr!==null&&b.strT<b.avgStr-0.05)imp=true;score+=imp?3:0.5;}
    // Fペナルティ
    if(b.fKi>=1)score-=3;
    // 今節1着率0%ペナルティ（終盤のみ有効）
    if(!isEarlyRace&&b.winsRate===0&&b.tokuten!==null&&b.tokuten>0)score-=2;
    // 1号艇ボーナス：逃げ率65%以上で+5点
    if(b.nyuse===1&&nigeRate!==null&&nigeRate>=65)score+=5;

    // コース別ボーナス（控えめに設定・1号艇の過剰評価を避ける）
    var courseBonus=[3,2,1,1,0,-2];
    score+=courseBonus[b.nyuse-1]||0;

    // コース別2連対率（5pt）
    var allCR2=boats.map(function(x){return x.courseRen2!==null?x.courseRen2:0;});
    var maxCR2=Math.max.apply(null,allCR2)||1;
    if(b.courseRen2!==null&&maxCR2>0)score+=b.courseRen2/maxCR2*5;

    // コース別3連対率（4pt）
    var allCR3=boats.map(function(x){return x.courseRen3!==null?x.courseRen3:0;});
    var maxCR3=Math.max.apply(null,allCR3)||1;
    if(b.courseRen3!==null&&maxCR3>0)score+=b.courseRen3/maxCR3*4;

    b.sogoScore=Math.max(0,score);
  });

  var sorted=boats.slice().sort(function(a,b){return (b.sogoScore||0)-(a.sogoScore||0);});
  sorted.forEach(function(b,i){b.sogoRank=i+1;});
  // 6号艇が1位の場合、2位と入れ替え
  var rank1=sorted[0],rank2=sorted[1];
  if(rank1&&rank2&&rank1.nyuse===6){
    rank1.sogoRank=2;
    rank2.sogoRank=1;
  }
}

/* ===== 信頼度・荒れ指数後補正 ===== */
function applyShinkidoAreBonus(boats,shinkido,areScore){
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  boats.forEach(function(b){
    var bonus=0;
    // 信頼度補正（1号艇のみ）
    if(b.nyuse===1){
      if(shinkido==='A')bonus+=10;
      else if(shinkido==='C')bonus-=5;
    }
    // 荒れ指数補正（1号艇のみ）
    if(b.nyuse===1){
      if(areScore===0)bonus+=5;
      else if(areScore>=9)bonus-=5;
    }
    b.sogoScore=Math.max(0,(b.sogoScore||0)+bonus);
  });
  // 補正後に再ランク付け
  var sorted=boats.slice().sort(function(a,b){return (b.sogoScore||0)-(a.sogoScore||0);});
  sorted.forEach(function(b,i){b.sogoRank=i+1;});
  // 6号艇が1位の場合は2位と入れ替え
  var rank1=sorted[0],rank2=sorted[1];
  if(rank1&&rank2&&rank1.nyuse===6){rank1.sogoRank=2;rank2.sogoRank=1;}
}

/* ===== JS強制× ===== */
function calcForceNG(boats){
  var scores=[];
  boats.forEach(function(b){
    var s=0;
    var st=b.avgST||b.stKoki;
    if(st!==null&&st>=0.25)s+=3;
    var allTok=boats.map(function(x){return x.tokuten;}).filter(function(v){return v!==null;});
    var minTok=allTok.length?Math.min.apply(null,allTok):null;
    var maxKr=boats.filter(function(x){return x.kiryokuRank!==null;}).length;
    if(b.tokuten!==null&&minTok!==null&&b.tokuten===minTok&&b.kiryokuRank===maxKr)s+=2;
    if(b.tokuten!==null&&b.tokuten<=2.0&&b.winsRate===0)s+=2;
    scores.push({n:b.n,s:s});
  });
  scores.sort(function(a,b){return b.s-a.s;});
  if(scores.length&&scores[0].s>0){
    var ng=scores[0].n;
    boats.forEach(function(b){b.forceNG=(b.n===ng);});
  }
}

/* ===== 荒れ指数 ===== */
function calcAreIndex(boats,nigeRate){
  var score=0,bd=[];
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  var innerBoats=boats.filter(function(b){return [1,2,3].includes(b.nyuse);});
  var outerBoats=boats.filter(function(b){return b.nyuse>=4;});

  var fKi123=innerBoats.filter(function(b){return b.fKi>=1;});
  if(b1.fKi>=1){score+=3;bd.push('1コース今期F持ち +3');}
  else if(fKi123.length>=2){score+=3;bd.push('1〜3コース今期F複数 +3');}
  else if(fKi123.length===1){score+=1;bd.push('2〜3コース今期F1艇 +1');}

  var exF123=innerBoats.filter(function(b){return b.stF;});
  if(b1.stF){score+=1;bd.push('1コース展示F +1');}
  if(!b1.stF&&exF123.length>=2){score+=1;bd.push('1〜3コース展示F複数 +1');}

  if(b1.exhibRank!==null&&b1.exhibRank>=5){score+=3;bd.push('1コース今節展示'+b1.exhibRank+'位 +3');}
  if(b1.winsRate!==null&&b1.winsRate===0){score+=3;bd.push('1コース今節1着率0% +3');}
  var allTok=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT=allTok.slice().sort(function(a,b){return a-b;});
    if(b1.tokuten<=sortedT[1]){score+=2;bd.push('1コース今節得点率下位2 +2');}
  }
  var allAvgST=boats.map(function(b){return b.avgST;}).filter(function(v){return v!==null;});
  if(allAvgST.length>=2&&b1.avgST!==null){
    if(b1.avgST===Math.max.apply(null,allAvgST)){score+=2;bd.push('1コース今節平均ST最遅 +2');}
  }

  if(nigeRate!==null){
    if(nigeRate<30){score+=3;bd.push('逃げ率'+nigeRate+'%<30% +3');}
    else if(nigeRate<50){score+=2;bd.push('逃げ率'+nigeRate+'%<50% +2');}
  }
  var stFallback=b1.avgST!==null?b1.avgST:b1.stKoki;
  if(stFallback!==null&&stFallback>=0.18){score+=2;bd.push('1コース平均ST'+stFallback+'≥0.18 +2');}
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT2=allTok.slice().sort(function(a,b){return a-b;});
    var mid=sortedT2[Math.floor(sortedT2.length/2)];
    if(b1.tokuten<mid){score+=1;bd.push('1コース今節得点率下位半分 +1');}
  }

  var allExRank=boats.map(function(b){return b.exhibRank;}).filter(function(v){return v!==null;});
  if(outerBoats.some(function(b){return b.exhibRank===1&&allExRank.length;})){score+=2;bd.push('外枠今節展示1位 +2');}
  if(allTok.length){
    var maxTok=Math.max.apply(null,allTok);
    if(outerBoats.some(function(b){return b.tokuten===maxTok&&maxTok>0;})){score+=2;bd.push('外枠今節得点率1位 +2');}
  }
  var inSTs=innerBoats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  var outSTs=outerBoats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  if(inSTs.length&&outSTs.length){
    var avgIn=inSTs.reduce(function(s,v){return s+v;},0)/inSTs.length;
    var avgOut=outSTs.reduce(function(s,v){return s+v;},0)/outSTs.length;
    if(avgOut<avgIn-0.01){score+=1;bd.push('外枠平均ST優秀 +1');}
  }
  if(outerBoats.some(function(b){return b.stF;})){score+=1;bd.push('外枠展示F +1');}
  if(boats.some(function(b){return b.nyuse!==b.n;})){score+=3;bd.push('進入変更 +3');}
  var shojoOuter=outerBoats.filter(function(b){return b.fZen>=2;});
  if(shojoOuter.length){score+=3;bd.push('外枠賞除疑い艇（前期F≥2） +3');}

  return{score:score,breakdown:bd};
}

/* ===== 足切り ===== */
function checkFurikiri(areScore,boats,nigeRate){
  if(areScore<10)return{pass:false,stage:1,reason:'荒れ指数'+areScore+'点（10点未満）'};
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  function ex(){
    if(boats.some(function(b){return b.nyuse!==b.n;}))return true;
    var allT=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
    if(allT.length&&b1.tokuten!==null){
      var s=allT.slice().sort(function(a,b){return a-b;});
      var th=s[Math.floor(s.length*0.3)];
      var stc=b1.avgST!==null?b1.avgST:b1.stKoki;
      if(b1.tokuten<=th&&stc!==null&&stc>=0.18)return true;
    }
    if(b1.exhibRank!==null&&b1.exhibRank>=5)return true;
    if(b1.winsRate!==null&&b1.winsRate===0)return true;
    return false;
  }
  if(nigeRate!==null&&nigeRate>=55&&!ex())return{pass:false,stage:2,reason:'逃げ率'+nigeRate+'%（≥55%）'};
  var allT2=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allT2.length&&b1.tokuten!==null&&b1.tokuten===Math.max.apply(null,allT2)&&!ex())
    return{pass:false,stage:2,reason:'1コース今節得点率1位'};
  if(b1.kiryokuRank===1&&!ex())
    return{pass:false,stage:2,reason:'1コース機力1位'};
  return{pass:true};
}

/* ===== 1着候補 ===== */
function select1st(boats){
  var cands=[];
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  boats.filter(function(b){return b.nyuse>=4&&b.stF;}).forEach(function(b){
    if(b.nyuse<=5&&b.kiryokuRank<=3)cands.push({n:b.n,reason:b.nyuse+'コース展示F・機力'+b.kiryokuRank+'位'});
    else if(b.nyuse===6&&b.kiryokuRank===1&&b.st!==null&&b.st<=0.05)cands.push({n:b.n,reason:'6コース展示F・機力1位・ST優秀'});
  });
  var allT=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allT.length){
    var sortedT=allT.slice().sort(function(a,b){return b-a;});
    var top3=sortedT.slice(0,3);
    var bot30=sortedT[Math.floor(sortedT.length*0.7)]||0;
    boats.forEach(function(b){
      if(b.nyuse===1||b.nyuse===6)return;
      if(b.tokuten!==null&&top3.includes(b.tokuten)&&b.tokuten>bot30){
        if(!cands.find(function(c){return c.n===b.n;}))cands.push({n:b.n,reason:b.nyuse+'コース今節得点率上位'});
      }
    });
  }
  boats.filter(function(b){return b.nyuse<=3&&b.nyuse>1;}).forEach(function(b){
    if(b.kiryokuRank===1){
      var allT2=boats.map(function(x){return x.tokuten;}).filter(function(v){return v!==null;});
      if(allT2.length){
        var st2=allT2.slice().sort(function(a,b){return b-a;}).slice(0,3);
        if(b.tokuten!==null&&st2.includes(b.tokuten)&&!cands.find(function(c){return c.n===b.n;}))
          cands.push({n:b.n,reason:b.nyuse+'コース機力1位＋得点率上位'});
      }
    }
    if(b1.st!==null&&b1.st>=0.25&&b.nyuse===2&&!cands.find(function(c){return c.n===b.n;}))
      cands.push({n:b.n,reason:'1コースST0.25以上→2コース昇格'});
  });
  return cands.slice(0,2);
}

/* ===== 通常モード ===== */
function calcNormal(boats,nigeRate){
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  var st=b1.avgST!==null?b1.avgST:b1.stKoki;
  var sogoSorted=boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
  var sogoTop=sogoSorted[0]?sogoSorted[0].nyuse:1;
  var shinkido='B';

  if(sogoTop!==1){
    // 逃げ率65%以上 → 1号は十分逃げ期待できるのでB
    if(nigeRate!==null&&nigeRate>=65){
      shinkido='B';
    } else if(nigeRate!==null&&nigeRate>=60&&st!==null&&st<=0.17){
      shinkido='B';
    } else {
      shinkido='C';
    }
  } else {
    // sogoRank1位=1号
    if(nigeRate!==null&&st!==null){
      if(nigeRate>=65&&st<=0.15)shinkido='A';
      else if(nigeRate<50||st>=0.20)shinkido='C';
    }
  }
  // 2着候補はsogoRankベースで選定（1号除く上位2艇）
  var sorted=boats.filter(function(b){return b.nyuse!==1;}).sort(function(a,b){
    return (a.sogoRank||99)-(b.sogoRank||99);
  });
  var ab=sorted.slice(0,2).map(function(b,i){return{n:b.n,reason:'2着候補'+(i===0?'A':'B')};});
  return{shinkido:shinkido,ab:ab};
}

/* ===== メイン計算 ===== */
function runCalc(){
  try{
  var raw=document.getElementById('raceData').value.trim();
  if(!raw){showStatus('データを貼り付けてください','err');return;}
  var parsed=parseData(raw);
  calcKiryoku(parsed.boats);
  var raceCount=calcRaceCount(parsed.boats);
  parsed.raceCount=raceCount;
  calcSogoScore(parsed.boats,parsed.nigeRate,raceCount);
  calcForceNG(parsed.boats);
  var areResult=calcAreIndex(parsed.boats,parsed.nigeRate);
  var furikiriResult=checkFurikiri(areResult.score,parsed.boats,parsed.nigeRate);
  var cands1st=select1st(parsed.boats);
  // 仮モード判定（補正前）→ applyShinkidoAreBonus → 再モード判定（補正後）
  var normalResultTmp=calcNormal(parsed.boats,parsed.nigeRate);
  applyShinkidoAreBonus(parsed.boats,normalResultTmp.shinkido,areResult.score);
  var normalResult=calcNormal(parsed.boats,parsed.nigeRate);
  calcData={parsed:parsed,areResult:areResult,furikiriResult:furikiriResult,cands1st:cands1st,normalResult:normalResult};
  displayCalcResults(calcData);
  document.getElementById('calcResult').classList.add('show');
  goStep2();
  }catch(e){showStatus('エラー: '+e.message,'err');console.error(e);}
}

/* ===== 表示 ===== */
function displayCalcResults(data){
  var parsed=data.parsed,areResult=data.areResult,furikiriResult=data.furikiriResult,cands1st=data.cands1st,normalResult=data.normalResult;

/* ===== 買い目圧縮 ===== */
function compressBets(betsArr){
  var valid=betsArr.filter(function(b){return /^[1-6]-[1-6]-[1-6]$/.test(b);});
  if(!valid.length)return '';
  var used=[];
  var parts=[];

  function isUsed(i){return used.indexOf(i)>=0;}
  function markUsed(arr){arr.forEach(function(i){if(used.indexOf(i)<0)used.push(i);});}

  // STEP0: 1着固定で2着と3着が対称のペア（2点単位で判定）例: 1-56-56
  var byFirst0={};
  valid.forEach(function(b,i){
    var a=b[0];
    if(!byFirst0[a])byFirst0[a]=[];
    byFirst0[a].push(i);
  });
  Object.keys(byFirst0).forEach(function(a){
    var indices=byFirst0[a].filter(function(i){return !isUsed(i);});
    for(var pi=0;pi<indices.length;pi++){
      for(var pj=pi+1;pj<indices.length;pj++){
        var ii=indices[pi],ij=indices[pj];
        if(isUsed(ii)||isUsed(ij))continue;
        var s2=valid[ii][2],s3=valid[ii][4];
        var t2=valid[ij][2],t3=valid[ij][4];
        if(s2===t3&&s3===t2){
          var combo=[s2,s3].sort().join('');
          parts.push(a+'-'+combo+'-'+combo);
          markUsed([ii,ij]);
        }
      }
    }
  });

  // STEP1: 1着・2着固定で3着をまとめる（例: 4-6-2+4-6-3 → 4-6-23）
  var byFirstSecond={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[0]+'-'+b[2];
    if(!byFirstSecond[key])byFirstSecond[key]=[];
    byFirstSecond[key].push(i);
  });
  Object.keys(byFirstSecond).forEach(function(key){
    var indices=byFirstSecond[key].filter(function(i){return !isUsed(i);});
    if(indices.length>=2){
      var thirds=indices.map(function(i){return valid[i][4];}).sort();
      parts.push(key+'-'+thirds.join(''));
      markUsed(indices);
    }
  });

  // STEP2: 2着・3着固定で1着をまとめる（例: 4-3-2+6-3-2 → 46-3-2）
  var bySecondThird={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[2]+'-'+b[4];
    if(!bySecondThird[key])bySecondThird[key]=[];
    bySecondThird[key].push(i);
  });
  Object.keys(bySecondThird).forEach(function(key){
    var indices=bySecondThird[key];
    var unused=indices.filter(function(i){return !isUsed(i);});
    if(unused.length>=2){
      var firsts=unused.map(function(i){return valid[i][0];}).sort();
      parts.push(firsts.join('')+'-'+key);
      markUsed(unused);
    }
  });

  // STEP3: 1着・3着固定で2着をまとめる
  var byFirstThird={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[0]+'-'+b[4];
    if(!byFirstThird[key])byFirstThird[key]=[];
    byFirstThird[key].push(i);
  });
  Object.keys(byFirstThird).forEach(function(key){
    var indices=byFirstThird[key];
    var unused=indices.filter(function(i){return !isUsed(i);});
    if(unused.length>=2){
      var parts2=key.split('-');
      var seconds=unused.map(function(i){return valid[i][2];}).sort();
      parts.push(parts2[0]+'-'+seconds.join('')+'-'+parts2[1]);
      markUsed(unused);
    }
  });

  // 残り（単独）
  valid.forEach(function(b,i){if(!isUsed(i))parts.push(b);});
  return parts.join('/');
}

/* ===== 評価順文字列生成 ===== */
function buildHyokaOrder(boats){
  var sorted=boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
  if(!sorted.length)return '';
  // 全艇をsogoRank順に>か>>で連結（グループまとめなし・上の総合評価と順序一致）
  var result=String(sorted[0].n);
  for(var i=1;i<sorted.length;i++){
    var prev=sorted[i-1],curr=sorted[i];
    var diff=(prev.sogoScore||0)-(curr.sogoScore||0);
    result+=(diff>=20?'>>':'>')+String(curr.n);
  }
  return result;
}

/* ===== 荒れモード買い目生成（JS固定） ===== */
// △（4位評価）ヘルパー
function getYonkaku(maru,shiro,sankaku,go,ngBoats,allBoats){
  // sogoRank4位の艇番（maru/shiro/sankaku/go以外かつngでない）
  if(calcData&&calcData.parsed){
    var s4=calcData.parsed.boats.find(function(b){return b.sogoRank===4;});
    if(s4)return String(s4.n);
  }
  // fallback
  return allBoats.filter(function(x){return x!==maru&&x!==shiro&&x!==sankaku&&x!==go&&ngBoats.indexOf(x)<0;})[0]||'4';
}

function buildAreBetsFinal(maru,shiro,sankaku,go,ngBoats){
  var allBoats=['1','2','3','4','5','6'];
  var yonkaku=getYonkaku(maru,shiro,sankaku,go,ngBoats,allBoats);
  var sixth=allBoats.filter(function(x){return x!==maru&&x!==shiro&&x!==sankaku&&x!==yonkaku&&x!==go;})[0]||'6';
  var shinkido=calcData?calcData.normalResult.shinkido:'B';

  // 評価順位マップ（◎=1,○=2,▲=3,△=4,⑤=5,sixth=6）
  var rank={};
  rank[maru]=1; rank[shiro]=2; rank[sankaku]=3; rank[yonkaku]=4; rank[go]=5; rank[sixth]=6;

  // 6艇全部で買い目生成（sixthは1着のみ除外、2着・3着は解放）
  var boats=[maru,shiro,sankaku,yonkaku,go,sixth];
  var all=[];

  boats.forEach(function(a){
    boats.forEach(function(b){
      if(b===a)return;
      boats.forEach(function(c){
        if(c===a||c===b)return;
        // モード別1着制約
        // A: 1号頭のみ（逃げ一本）
        // B: 1号(=◎)頭 OR ○頭（◎は必ず1号）
        // C: ◎頭 OR ○頭（◎は1号以外）
        // sixth: 1着からは除外（2着・3着は解放）
        if(a===sixth)return;
        if(shinkido==='A' && a!=='1')return;
        if(shinkido==='B' && a!=='1' && a!==shiro)return;
        if(shinkido==='C' && a!==maru && a!==shiro)return;
        var firstBonus=(a===maru)?0:0.5;
        var score=rank[a]*10+rank[b]*10+rank[c]+firstBonus;
        all.push({bet:a+'-'+b+'-'+c, score:score});
      });
    });
  });

  all.sort(function(a,b){return a.score-b.score;});

  // 上位15点に絞る（母集団）
  var top=all.slice(0,15).map(function(x){return x.bet;});

  // 点数に応じて本線・抑えに分割
  var honsen,osaee;
  if(currentPts===4){
    honsen=top.slice(0,4); osaee=[];
  } else if(currentPts===6){
    honsen=top.slice(0,6); osaee=[];
  } else if(currentPts===8){
    honsen=top.slice(0,4); osaee=top.slice(4,8);
  } else if(currentPts===12){
    honsen=top.slice(0,6); osaee=top.slice(6,12);
  } else if(currentPts===14){
    honsen=top.slice(0,6); osaee=top.slice(6,14);
  } else {
    honsen=top.slice(0,6); osaee=top.slice(6,15);
  }

  return{honsen:honsen,osaee:osaee};
}

  var r=document.getElementById('raceNum').value;
  if(v)localStorage.setItem('last_venue',v);
  if(r)localStorage.setItem('last_race',r);
}

function loadVenueRace(){
  var v=localStorage.getItem('last_venue');
  var r=localStorage.getItem('last_race');
  if(v){var el=document.getElementById('venue');for(var i=0;i<el.options.length;i++){if(el.options[i].value===v){el.selectedIndex=i;break;}}}
  if(r){var el2=document.getElementById('raceNum');for(var i=0;i<el2.options.length;i++){if(el2.options[i].value===r){el2.selectedIndex=i;break;}}}
}

function formatXSummary(raw){
  // 1行目（場所・R）の下だけ空行、残りは詰める
  var lines=raw.trim().split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  if(lines.length===0)return '';
  return lines[0]+'\n\n'+lines.slice(1).join('\n');
}

function copyXOnly(){
  var text=document.getElementById('outText').textContent;
  var xIdx=text.indexOf('【Xサマリー】');
  if(xIdx<0){showStatus('Xサマリーが見つかりません','err');return;}
  var xEnd=text.indexOf('\n【',xIdx+1);
  var xRaw=xEnd>=0?text.slice(xIdx+7,xEnd):text.slice(xIdx+7);

    btn.textContent='✅ コピー完了';

}

/* ===== オッズパーサー ===== */
function parseOdds(raw){
  var lines=raw.split('\n').map(function(l){return l.replace(/\t/g,' ').trim();}).filter(function(l){return l.length>0;});
  var boats={};var playerRe=/^([1-6])\s+([　-\u9fff\u30a0-\u30ff]+)/;var blocks=[];var cur=null;
  for(var i=0;i<lines.length;i++){var line=lines[i];var pm=line.match(playerRe);if(pm){cur={boatNo:parseInt(pm[1]),name:pm[2],dataLines:[]};blocks.push(cur);continue;}if(cur&&!line.startsWith('合成')&&!line.startsWith('2単'))cur.dataLines.push(line);}
  for(var bi=0;bi<blocks.length;bi++){
    var block=blocks[bi];var boatNo=block.boatNo,name=block.name,dataLines=block.dataLines;
    boats[boatNo]={name:name,odds:{}};if(dataLines.length<1)continue;
    var tokenLines=dataLines.map(function(l){return l.split(/\s+/).filter(function(t){return /^\d+(\.\d+)?$/.test(t);}).map(Number);});
    var row0=tokenLines[0];if(!row0||row0.length<3)continue;
    var secondBoats=[];
    for(var j=0;j+2<row0.length;j+=3){var s=Math.round(row0[j]),t=Math.round(row0[j+1]),v=row0[j+2];if(s>=1&&s<=6&&t>=1&&t<=6&&v>0){secondBoats.push(s);boats[boatNo].odds[boatNo+'-'+s+'-'+t]=v;}}
    for(var row=1;row<tokenLines.length;row++){var toks=tokenLines[row];for(var col=0;col<secondBoats.length;col++){var jj=col*2;if(jj+1>=toks.length)continue;var tt=Math.round(toks[jj]),vv=toks[jj+1];if(tt>=1&&tt<=6&&vv>0)boats[boatNo].odds[boatNo+'-'+secondBoats[col]+'-'+tt]=vv;}}
  }
  return boats;
}

function calcGoseiOdds(betsArr,oddsData){
  var sum=0;
  betsArr.forEach(function(bet){var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;var first=parseInt(parts[1]);var bd=oddsData[first];if(!bd)return;var o=bd.odds[bet];if(o&&o>0)sum+=1/o;});
  return sum===0?null:(1/sum).toFixed(1);
}

function showOddsResult(){
  var raw=document.getElementById('raceData').value;
  var oddsIdx=raw.indexOf('=== オッズ ===');
  if(oddsIdx<0){document.getElementById('oddsResult').innerHTML='';return;}
  var oddsRaw=raw.slice(oddsIdx);
  var oddsData=parseOdds(oddsRaw);
  var outText=document.getElementById('outText').textContent;
  var bets=[],seen={};
  var lines=outText.split('\n');
  var inBetSection=false;
  lines.forEach(function(ln){
    var t=ln.trim();
    if(t.indexOf('【最終買い目】')>=0||t.indexOf('【買い目】')>=0){inBetSection=true;return;}
    if(inBetSection&&t.startsWith('【')&&t.indexOf('買い目')<0){inBetSection=false;}
    if(inBetSection&&/^\d-\d-\d$/.test(t)&&!seen[t]){seen[t]=true;bets.push(t);}
  });
  if(bets.length===0){document.getElementById('oddsResult').innerHTML='';return;}
  var html='<div style="margin-top:14px;"><div style="font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:6px;border-left:2px solid var(--accent);">買い目オッズ</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr><th style="text-align:left;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">買い目</th><th style="text-align:right;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">オッズ</th></tr></thead><tbody>';
  var validBets=[];
  bets.forEach(function(bet){
    var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;
    var first=parseInt(parts[1]);var bd=oddsData[first];var o=bd?bd.odds[bet]:null;
    var oStr=o?o.toFixed(1)+'倍':'—';
    var color=o?(o>=100?'color:var(--accent)':o>=30?'color:var(--text)':'color:var(--green)'):'color:var(--text-muted)';
    html+='<tr><td style="padding:5px 6px;border-bottom:1px solid var(--border);font-weight:700;">'+bet+'</td><td style="text-align:right;padding:5px 6px;border-bottom:1px solid var(--border);'+color+'">'+oStr+'</td></tr>';
    if(o)validBets.push(bet);
  });
  html+='</tbody></table>';
  var gosei=calcGoseiOdds(validBets,oddsData);
  if(gosei){html+='<div style="margin-top:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;"><span style="font-size:10px;color:var(--text-sub);">合成オッズ</span><span style="font-size:22px;font-weight:700;color:var(--accent);margin-left:10px;">'+gosei+'倍</span><span style="font-size:10px;color:var(--text-muted);margin-left:8px;">('+validBets.length+'点)</span></div>';}
  html+='</div>';
  document.getElementById('oddsResult').innerHTML=html;
}

function regenerateBets(){
  if(!calcData)return;
  var maruCA=document.getElementById('editMaru').value;
  var shiroCA=document.getElementById('editShiro').value;
  var sankakuCA=document.getElementById('editSankaku').value;
  var venue=document.getElementById('venue').value||'?';
  var raceNum=document.getElementById('raceNum').value||'?';
  var sogoSortedC=calcData.parsed.boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
  var goCA=String(sogoSortedC[4]?sogoSortedC[4].n:'5');
  var usedCA=[maruCA,shiroCA,sankakuCA];
  if(usedCA.indexOf(goCA)>=0){
    var goAltCA=sogoSortedC.filter(function(b){return usedCA.indexOf(String(b.n))<0;});
    goCA=String(goAltCA[goAltCA.length>1?1:0]?goAltCA[goAltCA.length>1?1:0].n:goCA);
  }
  var betsC=buildAreBetsFinal(maruCA,shiroCA,sankakuCA,goCA,[]);
  var honsenC=betsC.honsen;
  var osaeeC=betsC.osaee;
  var honsenStrC=compressBets(honsenC)||honsenC.join('/');
  var osaeeStrC=compressBets(osaeeC)||osaeeC.join('/');
  // テキストを更新
  var text=document.getElementById('outText').textContent;
  // 既存の【最終買い目】を置き換え
  var betBlockC='【最終買い目】'+(honsenC.length+osaeeC.length)+'点\n本線\n'+honsenC.join('\n')+'\n抑え\n'+osaeeC.join('\n')+'\n';
  text=text.replace(/【最終買い目】[\s\S]*?(?=【|$)/g,'');
  var inIdxC=text.indexOf('【イン信頼度】');
  if(inIdxC>=0){text=text.slice(0,inIdxC)+betBlockC+'\n'+text.slice(inIdxC);}
  else{text=betBlockC+'\n'+text;}
  // Xサマリー再構築
  var xIdxC=text.indexOf('【Xサマリー】');
  var commentC='';
  if(xIdxC>=0){
    var beforeC=text.slice(0,xIdxC),afterC=text.slice(xIdxC);
    var xLinesC=afterC.split('\n');
    for(var xci=1;xci<xLinesC.length;xci++){
      var xlc=xLinesC[xci].trim();
      if(!xlc||xlc===venue+raceNum+'R'||xlc.indexOf('本線')===0||xlc.indexOf('抑え')===0||xlc==='G.'||/^[\d><=]+$/.test(xlc))continue;
      commentC=xlc;break;
    }
    var hyokaC=buildHyokaOrder(calcData.parsed.boats);
    var newXC='【Xサマリー】\n'+venue+raceNum+'R\n'+(commentC?commentC+'\n\n':'')+hyokaC+'\n本線\u3000'+honsenStrC+(osaeeC.length?'\n抑え\u3000'+osaeeStrC:'')+'\n\nG.';
    text=beforeC+newXC;
  }
  document.getElementById('outText').textContent=text;
  showOddsResult();
  showStatus('買い目を再生成しました','ok');
}


async function generate(){
  if(!calcData){showStatus('先にデータを解析してください','err');return;}
  var venue=document.getElementById('venue').value||'?';
  var raceNum=document.getElementById('raceNum').value||'?';
  var key=getKey();
  if(!key){showStatus('APIキーを保存してください','err');return;}
  var prompt=buildPrompt();
  document.getElementById('loading').classList.add('show');
  document.getElementById('outWrap').classList.remove('show');

  // 60秒タイムアウト
  var controller=new AbortController();
  var timeoutId=setTimeout(function(){controller.abort();},60000);

  try{
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal:controller.signal,
      body:JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0.15,maxOutputTokens:3000,thinkingConfig:{thinkingBudget:0}}
      })
    });
    clearTimeout(timeoutId);
    var json=await res.json();
    if(!res.ok)throw new Error(json.error&&json.error.message||'APIエラー '+res.status);
    var text=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts[0].text;
    if(!text){
      // finishReasonを確認
      var reason=json.candidates&&json.candidates[0]&&json.candidates[0].finishReason||'不明';
      throw new Error('レスポンスが空です (finishReason:'+reason+')');
    }

    // 見送り推奨は表示するだけで生成続行
    if(text.indexOf('見送り推奨')>=0&&text.length<300){
      showStatus('⚠️ 見送り推奨レース（生成続行）','ok');
      // 通常の買い目生成に続ける
    }

    // ===== 全モード共通：JS固定買い目生成 =====
    if(calcData){
      var shinkido=calcData.normalResult.shinkido;
      var sogoSorted=calcData.parsed.boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});

      // AIの総合評価から◎○▲を取得
      var maruFromAI=null,shiroFromAI=null,sankakuFromAI=null;
      text.split('\n').forEach(function(ln){
        var m1=ln.match(/(\d)位[\s\u3000]*(\d)号艇[\s\u3000]*◎/);if(m1)maruFromAI=m1[2];
        var m2=ln.match(/(\d)位[\s\u3000]*(\d)号艇[\s\u3000]*○/);if(m2)shiroFromAI=m2[2];
        var m3=ln.match(/(\d)位[\s\u3000]*(\d)号艇[\s\u3000]*▲/);if(m3)sankakuFromAI=m3[2];
      });

      // モード別に◎○を決定してbuildAreBetsFinalに渡す
      var shinkidoG=calcData.normalResult.shinkido;
      var maru,shiro,sankaku;
      if(window._manualOverride){
        var mo=window._manualOverride;
        maru=mo.maru||String(sogoSorted[0]?sogoSorted[0].n:'1');
        shiro=mo.shiro||String(sogoSorted[1]?sogoSorted[1].n:'2');
        sankaku=mo.sankaku||String(sogoSorted[2]?sogoSorted[2].n:'3');
        window._manualOverride=null;
      } else if(shinkidoG==='A'){
        // Aモード：◎は1号固定、○はsogoRank1位（1号以外）
        maru='1';
        var shiroListG=sogoSorted.filter(function(b){return String(b.n)!=='1';});
        shiro=String(shiroListG[0]?shiroListG[0].n:'2');
        var sankakuListG=sogoSorted.filter(function(b){return String(b.n)!==maru&&String(b.n)!==shiro;});
        sankaku=String(sankakuListG[0]?sankakuListG[0].n:'3');
      } else if(shinkidoG==='B'){
        // Bモード：◎はsogoRank1位、○は1号（◎が1号の場合はsogoRank2位）
        maru=String(sogoSorted[0]?sogoSorted[0].n:'1');
        shiro=(maru!=='1')?'1':String(sogoSorted[1]?sogoSorted[1].n:'2');
        var sankakuListB=sogoSorted.filter(function(b){return String(b.n)!==maru&&String(b.n)!==shiro;});
        sankaku=String(sankakuListB[0]?sankakuListB[0].n:'3');
      } else {
        // Cモード：sogoRankそのまま
        maru=String(sogoSorted[0]?sogoSorted[0].n:'1');
        shiro=String(sogoSorted[1]?sogoSorted[1].n:'2');
        var remG=sogoSorted.filter(function(b){return String(b.n)!==maru&&String(b.n)!==shiro;});
        sankaku=String(remG[0]?remG[0].n:'3');
      }

      // go=sogoRank5位（◎○▲と重複しない）
      var usedMSS=[maru,shiro,sankaku];
      var goList=sogoSorted.filter(function(b){return usedMSS.indexOf(String(b.n))<0;});
      var go=String(goList[1]?goList[1].n:goList[0]?goList[0].n:'5');

      // ng艇取得
      var ngBoats=[];
      text.split('\n').forEach(function(ln){
        var mx=ln.match(/(\d)位[\s\u3000]*(\d)号艇[\s\u3000]*×/);if(mx)ngBoats.push(mx[2]);
        var mx2=ln.match(/^×(\d)/);if(mx2&&ngBoats.indexOf(mx2[1])<0)ngBoats.push(mx2[1]);
      });

      // 逃げ率60%以上で12点以上なら8点に戻す
      var nigeRateVal=calcData.parsed.nigeRate;
      if(currentPts>=12&&nigeRateVal!==null&&nigeRateVal>=60){
        currentPts=8;setPts(8);
        showStatus('逃げ率'+nigeRateVal+'%のため8点に変更','ok');
      }

      // JS固定で買い目生成
      var betsResult=buildAreBetsFinal(maru,shiro,sankaku,go,ngBoats);
      var honsen=betsResult.honsen;
      var osaee=betsResult.osaee;
      var honsenStr=compressBets(honsen)||honsen.join('/');
      var osaeeStr=osaee.length?(compressBets(osaee)||osaee.join('/')):'';
      var totalPts=honsen.length+osaee.length;

      // 【最終買い目】ブロックを置換
      var betBlock='【最終買い目】'+totalPts+'点\n本線\n'+honsen.join('\n')+(osaee.length?'\n抑え\n'+osaee.join('\n'):'')+'\n';
      text=text.replace(/【最終買い目】[\s\S]*?(?=【|$)/g,'');
      var inIdx=text.indexOf('【イン信頼度】');
      if(inIdx>=0){text=text.slice(0,inIdx)+betBlock+'\n'+text.slice(inIdx);}
      else{text=betBlock+'\n'+text;}

      // Xサマリー再構築
      var hyokaOrder=buildHyokaOrder(calcData.parsed.boats);
      var xIdx2=text.indexOf('【Xサマリー】');
      var commentLine='';
      if(xIdx2>=0){
        var before2=text.slice(0,xIdx2),after2=text.slice(xIdx2);
        var xLines2=after2.split('\n');
        for(var xi2=1;xi2<xLines2.length;xi2++){
          var xl2=xLines2[xi2].trim();
          // スキップ条件：空行・場所R行・本線・抑え・G.・数字のみの評価順
          if(!xl2)continue;
          if(xl2===venue+raceNum+'R')continue;
          if(xl2.indexOf('本線')===0||xl2.indexOf('抑え')===0)continue;
          if(xl2==='G.')continue;
          if(/^[\d><=＞＜＝>>]+$/.test(xl2))continue;
          if(xl2.startsWith('【'))break; // 次のブロックに入ったら終了
          commentLine=xl2;break;
        }
      }
      // コメントが取れなかった場合：【評価】ブロックから◎の短評を拾う
      if(!commentLine){
        var evalIdx=text.indexOf('【評価】');
        if(evalIdx>=0){
          var evalLines=text.slice(evalIdx).split('\n');
          for(var ei=1;ei<evalLines.length;ei++){
            var el2=evalLines[ei].trim();
            if(!el2||el2.startsWith('【'))break;
            if(el2.startsWith('◎')){
              // 「◎1 苗字(短評)」から短評部分を取り出す
              var mp=el2.match(/◎\d\s+\S+\((.+?)\)/);
              if(mp)commentLine='❶'+el2.replace(/^◎\d\s*/,'').replace(/\(.+\)/,'').trim()+'。';
              break;
            }
          }
        }
      }
      var newX='【Xサマリー】\n'+venue+raceNum+'R\n';
      if(commentLine)newX+=commentLine+'\n\n';
      newX+=hyokaOrder+'\n';
      newX+='本線\u3000'+(compressBets(honsen)||honsen.join('/'))+'\n';
      if(osaee.length)newX+='抑え\u3000'+(compressBets(osaee)||osaee.join('/'))+'\n';
      newX+='\nG.';
      if(xIdx2>=0){
        text=text.slice(0,xIdx2)+newX;
      } else {
        text+='\n'+newX;
      }
    }

    document.getElementById('outText').textContent=text;
    document.getElementById('outWrap').classList.add('show');
    showOddsResult();
    window._lastGenMeta={maru:maru,shiro:shiro,sankaku:sankaku,pts:currentPts,honsen:honsen,osaee:osaee};
    renderEvalCard(text,venue,raceNum);
    autoSaveLog(text);
    showStatus('生成完了','ok');

    // 差し替えUIを表示
    var mFT=text.match(/1位[\s\u3000]*(\d)号艇[\s\u3000]*◎/);
    var sFT=text.match(/2位[\s\u3000]*(\d)号艇[\s\u3000]*○/);
    var kFT=text.match(/3位[\s\u3000]*(\d)号艇[\s\u3000]*▲/);
    if(mFT&&sFT&&kFT)showEditMarkUI(mFT[1],sFT[1],kFT[1]);

  } catch(e){
    clearTimeout(timeoutId);
    var msg=e.name==='AbortError'?'タイムアウト（60秒）。再試行してください':'エラー: '+e.message;
    showStatus(msg,'err');
  }
  finally{
    document.getElementById('loading').classList.remove('show');
  }
}

/* ===== ログ機能 ===== */
function autoSaveLog(text){
  if(!calcData)return;
  var venue=document.getElementById('venue').value||'?';
  var raceNum=document.getElementById('raceNum').value||'?';
  // 同日同レースが既存なら上書き（重複防止）
  var existingLogs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var today=new Date().toISOString().slice(0,10);
  var dupIdx=existingLogs.findIndex(function(l){
    return l.venue===venue&&l.raceNum===raceNum&&l.datetime&&l.datetime.slice(0,10)===today&&!l.result;
  });
  if(dupIdx>=0){existingLogs.splice(dupIdx,1);}
  var aiRanking=[];
  for(var r=1;r<=6;r++){
    var m=text.match(new RegExp(r+'位[\\s　]*(\\d)号艇'));
    if(m)aiRanking.push({rank:r,n:parseInt(m[1])});
  }
  // 買い目取得：Xサマリーから展開済みで取得（圧縮表記対応）
  var honsen=[],osaee=[];
  var xIdx=text.indexOf('【Xサマリー】');
  var searchText=xIdx>=0?text.slice(xIdx):text;
  var honsenM=searchText.match(/本線[\s　]+([\S]+)/);
  var osaeM=searchText.match(/抑え[\s　]+([\S]+)/);
  function expandBetsLog(str){
    if(!str)return[];
    var result=[];
    str.split('/').forEach(function(seg){
      seg=seg.trim();if(!seg)return;
      if(/^[1-6]-[1-6]-[1-6]$/.test(seg)){result.push(seg);return;}
      var parts=seg.split('-');
      if(parts.length===3){
        var s1=parts[0].split('').filter(function(c){return/[1-6]/.test(c);});
        var s2=parts[1].split('').filter(function(c){return/[1-6]/.test(c);});
        var s3=parts[2].split('').filter(function(c){return/[1-6]/.test(c);});
        s1.forEach(function(a){s2.forEach(function(b){s3.forEach(function(c){
          if(a!==b&&b!==c&&a!==c)result.push(a+'-'+b+'-'+c);
        });});});
      }
    });
    return result;
  }
  honsen=honsenM?expandBetsLog(honsenM[1]):[];
  osaee=osaeM?expandBetsLog(osaeM[1]):[];
  // window._lastGenMetaからmaru/shiro/sankaku/pts取得
  var meta=window._lastGenMeta||{};
  var boats=calcData.parsed.boats.map(function(b){
    return{n:b.n,name:b.name,tokuten:b.tokuten,avgST:b.avgST||b.stKoki,kiryokuRank:b.kiryokuRank,sogoRank:b.sogoRank,sogoScore:b.sogoScore?Math.round(b.sogoScore*10)/10:null};
  });
  var entry={
    id:Date.now(),
    datetime:new Date().toISOString(),
    venue:venue,
    raceNum:raceNum,
    shinkido:calcData.normalResult?calcData.normalResult.shinkido:null,
    nigeRate:calcData.parsed.nigeRate,
    areScore:calcData.areResult?calcData.areResult.score:null,
    pts:meta.pts||currentPts,
    maru:meta.maru||null,
    shiro:meta.shiro||null,
    sankaku:meta.sankaku||null,
    boats:boats,
    aiRanking:aiRanking,
    bets:{honsen:honsen,osaee:osaee},
    result:null,hit:null,maruResult:null,shiroResult:null,sankakuResult:null
  };
  entry.savedAt=Date.now();
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  logs.push(entry);
  if(logs.length>200)logs=logs.slice(-200);
  localStorage.setItem('kyotei_logs',JSON.stringify(logs));

  // ===== kyotei_v2にも書き込む =====
  writeToV2(entry,honsen,osaee);

  updateLogSummary();
}

// kyotei_v2の結果を更新（commitLog時）
function updateV2Result(kyoteiLogId,sel,payout,hitResult,logs){
  try{
    var v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
    var idx=v2logs.findIndex(function(l){return l.id===kyoteiLogId;});
    if(idx<0)return; // 対応するエントリがなければ何もしない

    var l=v2logs[idx];
    var combo=sel[1]+'-'+sel[2]+'-'+sel[3];
    l.result=combo;
    l.payout=payout>0?'¥'+payout.toLocaleString():'';

    // miss分類を自動判定
    var miss=[];
    if(hitResult){
      miss=['hit'];
    } else {
      // ◎の着順を確認
      var kyoteiLog=logs.find(function(k){return k.id===kyoteiLogId;});
      var maruN=l.maru;
      var maruPos=null;
      if(maruN){
        if(String(sel[1])===String(maruN))maruPos=1;
        else if(String(sel[2])===String(maruN))maruPos=2;
        else if(String(sel[3])===String(maruN))maruPos=3;
      }
      // 買い目と結果の照合
      var allBets=(l.bets||[]).map(function(b){return b.val;});
      var inBets=allBets.indexOf(combo)>=0;
      if(maruPos===null){
        miss=['ichaku']; // ◎着外
      } else if(maruPos===1&&!inBets){
        miss=['nichaku']; // ◎1着だが紐ズレ（2着または3着が合わない）
      } else if(maruPos===2||maruPos===3){
        miss=['ichaku']; // ◎が2着以下
      } else {
        miss=['tensu']; // その他（点数外れ等）
      }
    }
    l.miss=miss;
    localStorage.setItem('kyotei_v2',JSON.stringify(v2logs));
  }catch(e){console.error('updateV2Result error:',e);}
}

// kyotei_v2（予想ログG.html）用フォーマットで書き込む
function writeToV2(entry,honsen,osaee){
  try{
    // betsをG.html形式（{val,type}の配列）に変換
    var betsV2=[];
    honsen.forEach(function(b){betsV2.push({val:b,type:'honsen'});});
    osaee.forEach(function(b){betsV2.push({val:b,type:'osaee'});});
    var raceNumV2=String(entry.raceNum).replace(/R$/i,'')+'R';
    var v2entry={
      id:entry.id,
      date:entry.datetime.slice(0,10),
      venue:entry.venue,
      raceNum:raceNumV2,
      ver:'v2.0',
      shinkido:entry.shinkido,
      nigeRate:entry.nigeRate,
      areScore:entry.areScore,
      pts:entry.pts,
      maru:entry.maru,
      shiro:entry.shiro,
      sankaku:entry.sankaku,
      result:'',
      payout:'',
      bets:betsV2,
      miss:[],
      memo:''
    };
    var v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
    // 同日同レースの重複排除
    var today=v2entry.date;
    v2logs=v2logs.filter(function(l){
      return !(l.venue===v2entry.venue&&l.raceNum===v2entry.raceNum&&l.date===today&&!l.result);
    });
    v2logs.unshift(v2entry);
    if(v2logs.length>300)v2logs=v2logs.slice(0,300);
    localStorage.setItem('kyotei_v2',JSON.stringify(v2logs));
  }catch(e){console.error('writeToV2 error:',e);}
}

function selectBtn(id,place,n){

  [1,2,3,4,5,6].forEach(function(i){
    var btn=document.getElementById('rb_'+id+'_'+place+'_'+i);
