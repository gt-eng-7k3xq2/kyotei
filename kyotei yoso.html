<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G. 予想エンジン v2.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Anton&family=Tenor+Sans&display=swap');
:root{--bg:#f8f7f4;--surface:#ffffff;--border:#e0dcd6;--border-strong:#c8c4be;--text:#1a1814;--text-sub:#6b6560;--text-muted:#a09b96;--accent:#c0392b;--accent-light:#fdf0ef;--accent-border:#f0c0bc;--blue:#1a5fa8;--blue-light:#eef4fc;--green:#1a7a3a;--green-light:#eef8f2;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:16px 14px 80px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--text);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;font-family:'Noto Serif JP',serif;}
.logo-text{font-size:16px;font-weight:700;color:var(--text);font-family:'Noto Serif JP',serif;}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ver{font-size:10px;color:var(--text-sub);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:2px;}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;}
.sec-label{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.mode-row{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{flex:1;padding:11px;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mode-btn.active{background:var(--text);color:#fff;border:2px solid var(--text);}
.mode-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
/* 点数セレクター */
.pts-row{display:flex;gap:6px;margin-bottom:10px;}
.pts-btn{flex:1;padding:8px 4px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;}
.pts-btn.active{background:var(--accent);color:#fff;border:2px solid var(--accent);}
.pts-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
.pts-label{font-size:10px;color:var(--text-sub);margin-bottom:5px;}
.race-row{display:flex;gap:8px;}
.sel-w{flex:1;position:relative;}
.sel-w::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:11px;pointer-events:none;}
.sel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px 28px 10px 10px;-webkit-appearance:none;outline:none;font-family:'Noto Sans JP',sans-serif;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:10px;resize:none;outline:none;font-family:monospace;line-height:1.8;min-height:110px;}
textarea::placeholder{color:var(--text-muted);font-size:11px;}
.calc-btn{width:100%;padding:12px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:700;border:1px solid #c0d8f0;border-radius:4px;-webkit-appearance:none;margin-top:10px;font-family:'Noto Sans JP',sans-serif;}
.gen-btn{width:100%;padding:15px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:4px;-webkit-appearance:none;margin-top:4px;font-family:'Noto Serif JP',serif;letter-spacing:1px;}
.gen-btn:disabled{background:var(--border);color:var(--text-muted);}
.api-row{display:flex;gap:8px;}
.api-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px;outline:none;font-family:monospace;}
.api-input.saved{border-color:#a0d0b0;color:var(--green);}
.api-save{background:var(--text);color:#fff;border:none;padding:10px 14px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.calc-result{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-top:12px;display:none;}
.calc-result.show{display:block;}
.cr-sec{font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 6px;padding-left:6px;border-left:2px solid var(--accent);}
.cr-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.cr-table th{background:var(--bg);color:var(--text-sub);padding:5px;text-align:center;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;}
.cr-table td{padding:5px;border-bottom:1px solid var(--border);text-align:center;color:var(--text-sub);}
.cr-table tr.best td{color:var(--accent);font-weight:700;background:var(--accent-light);}
.tot{color:var(--text)!important;font-weight:700;}
.info-row{font-size:11px;color:var(--text-sub);margin:5px 0;}
.info-row b{color:var(--text);font-weight:700;}
.are-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin:8px 0;}
.are-score{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif;}
.score-pass{color:var(--green);}
.score-fail{color:var(--accent);}
.are-label{font-size:10px;color:var(--text-muted);}
.bd-list{font-size:11px;color:var(--text-sub);margin-top:6px;line-height:2.0;}
.bd-list span{color:var(--text);}
.furikiri{padding:10px 12px;border-radius:4px;font-size:13px;font-weight:700;margin:8px 0;}
.furikiri.pass{background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.furikiri.fail{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.cand-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.chip{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:700;}
.c1{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.c2{background:var(--blue-light);color:var(--blue);border:1px solid #c0d8f0;}
.status{font-size:12px;font-weight:500;padding:10px 12px;border-radius:4px;margin-bottom:12px;display:none;}
.status.err{display:block;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.status.ok{display:block;background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.loading{text-align:center;padding:24px 0;display:none;}
.loading.show{display:block;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:var(--text-muted);}
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.out-text{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:14px;font-size:12px;color:var(--text);line-height:2.0;white-space:pre-wrap;word-break:break-word;}
.copy-btn{width:100%;margin-top:8px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.copy-btn.ok{background:var(--green-light);color:var(--green);border-color:#a0d8b0;}
.div{height:1px;background:var(--border);margin:4px 0 14px;}

/* ===== 評価カード ===== */
.eval-card-wrap{margin-top:14px;display:none;}
.eval-card-wrap.show{display:block;}
.eval-card-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.eval-card{position:relative;border-radius:10px;overflow:hidden;padding:16px 14px 58px;background:#0a0a0a;}
.eval-card-title{text-align:center;font-family:'Playfair Display','Noto Serif JP',serif;font-style:italic;font-weight:900;font-size:clamp(20px,5.5vw,36px);letter-spacing:.04em;color:#e8c96a;text-shadow:0 0 20px rgba(200,153,60,0.4),0 2px 4px rgba(0,0,0,0.9);margin-bottom:5px;line-height:1.1;}
.eval-brush{display:block;height:9px;margin:0 auto 12px;width:52%;background:linear-gradient(90deg,transparent 0%,rgba(180,140,30,.45) 20%,rgba(255,220,80,.65) 50%,rgba(180,140,30,.45) 80%,transparent 100%);border-radius:50%;filter:blur(2.5px);}
.eval-boats{background:linear-gradient(180deg,#1f1f1f 0%,#131313 100%);border:1px solid #2e2e2e;border-radius:8px;padding:14px 10px 12px;position:relative;display:flex;align-items:center;justify-content:space-between;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 24px rgba(0,0,0,.9);}
.eval-boats::before{content:'';position:absolute;top:5px;left:5px;width:16px;height:16px;border-top:2px solid #c9a84c;border-left:2px solid #c9a84c;}
.eval-boats::after{content:'';position:absolute;bottom:5px;right:5px;width:16px;height:16px;border-bottom:2px solid #c9a84c;border-right:2px solid #c9a84c;}
.eval-corner-tr{position:absolute;top:5px;right:5px;width:16px;height:16px;border-top:2px solid #c9a84c;border-right:2px solid #c9a84c;}
.eval-corner-bl{position:absolute;bottom:5px;left:5px;width:16px;height:16px;border-bottom:2px solid #c9a84c;border-left:2px solid #c9a84c;}
.eval-slot{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;min-width:0;}
.eval-arrow{color:#555;font-size:clamp(13px,3vw,22px);font-weight:bold;flex-shrink:0;line-height:1;padding:0 1px;margin-bottom:22px;}
.eval-badge{width:clamp(34px,9vw,60px);height:clamp(34px,9vw,60px);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:clamp(20px,5.5vw,38px);position:relative;flex-shrink:0;box-shadow:0 5px 14px rgba(0,0,0,.75);}

.eval-stars{display:flex;gap:1px;font-size:clamp(9px,2.4vw,15px);line-height:1;}
.eval-star-on{color:#f0c800;filter:drop-shadow(0 0 3px rgba(255,210,0,.7));}
.eval-star-off{color:#252525;}
.eval-gold-lines{position:relative;margin-top:10px;display:flex;flex-direction:column;gap:3px;padding:0 0 2px;}
.eval-gold-dot{position:absolute;width:9px;height:9px;left:50%;transform:translateX(-50%);top:0;background:radial-gradient(circle,#ffe580 0%,#c9a84c 55%,transparent 100%);border-radius:50%;}
.eval-gold-line{height:1.4px;background:linear-gradient(90deg,transparent 0%,#8a6010 12%,#c9a84c 32%,#ffe580 50%,#c9a84c 68%,#8a6010 88%,transparent 100%);}
.eval-hint{margin-top:9px;color:#4a4a4a;font-size:.65rem;text-align:center;}
.eval-hint span{color:#c9a84c;}
.eval-save-btn{width:100%;margin-top:8px;padding:11px;background:linear-gradient(135deg,#7a5800,#c9a84c,#ffe580,#c9a84c,#7a5800);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.05em;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div><div class="logo-text">予想エンジン</div><div class="logo-sub">JS計算 + AI生成 v2.1</div></div>
  </div>
  <div class="ver">v2.1</div>
</div>

<div class="sec">
  <div class="sec-label">Gemini API Key</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="AIza...">
    <button class="api-save" onclick="saveKey()">保存</button>
  </div>
</div>

<div class="sec">
  <div class="sec-label">モード・レース情報</div>
  <div class="mode-row">
    <button class="mode-btn active" id="modeNormal" onclick="setMode('normal')">通常 v4.8</button>
    <button class="mode-btn inactive" id="modeAre" onclick="setMode('are')">荒れ v2.4</button>
  </div>
  <!-- 荒れモード点数セレクター -->
  <div id="arePtsSection" style="display:none;margin-bottom:10px;">
    <div class="pts-label">買い目点数</div>
    <div class="pts-row">
      <button class="pts-btn active" id="pts12" onclick="setPts(12)">12点<br><span style="font-size:10px;font-weight:400;">本線6+抑え6</span></button>
      <button class="pts-btn inactive" id="pts14" onclick="setPts(14)">14点<br><span style="font-size:10px;font-weight:400;">本線6+抑え8</span></button>
      <button class="pts-btn inactive" id="pts15" onclick="setPts(15)">15点<br><span style="font-size:10px;font-weight:400;">本線6+抑え9</span></button>
    </div>
  </div>
  <div class="race-row">
    <div class="sel-w">
      <select class="sel" id="venue" onchange="saveVenueRace()">
        <option value="">場所を選択</option>
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
      </select>
    </div>
    <div class="sel-w" style="flex:0 0 80px">
      <select class="sel" id="raceNum" onchange="saveVenueRace()">
        <option value="">R</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-label">レースデータ（データ抽出BMでコピー）</div>
  <textarea id="raceData" rows="7" placeholder="データ抽出BMで4タブ収集 → コピー → ここに貼り付け"></textarea>
  <div style="display:flex;gap:8px;"><button class="calc-btn" style="flex:1;margin-top:0;" onclick="runCalc()">⚡ データを解析する</button><button onclick="clearAll()" style="padding:13px 16px;background:#1a1a2a;color:#888;border:1px solid #2a2a3a;border-radius:10px;font-size:13px;cursor:pointer;-webkit-appearance:none;">✕</button></div>
  <div class="calc-result" id="calcResult">
    <div style="font-size:11px;color:#c9a84c;font-weight:700;margin-bottom:8px;">📊 解析結果（AIに送信する前に確認）</div>
    <div id="calcContent"></div>
  </div>
</div>

<div class="status" id="status"></div>
<button class="gen-btn" id="genBtn" onclick="generate()" disabled>🎯 予想を生成する</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Gemini が予想を生成中...</div>
</div>

<div class="out-wrap" id="outWrap">
  <div class="div"></div>
  <div class="out-hdr">予想結果</div>
  <div class="out-text" id="outText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyOut()">📋 全文コピー</button>
  <button onclick="copyXAndSogo()" style="width:100%;margin-top:6px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;" id="copyXSogoBtn">𝕏 総合評価＋サマリーをコピー</button>
  <button onclick="copyXOnly()" style="width:100%;margin-top:6px;padding:11px;background:#1a1a2a;color:#c9a84c;border:1px solid #3a3a5a;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;" id="copyXOnlyBtn">𝕏 Xサマリーのみコピー</button>
  <div id="resultInput" style="display:none;"></div>
  <div id="oddsResult"></div>
  <div class="eval-card-wrap" id="evalCardWrap">
    <div class="div"></div>
    <div class="eval-card-hdr">評価カード</div>
    <div class="eval-card" id="evalCard">
      <div class="eval-card-title" id="evalCardTitle">G.の総合評価🚤</div>
      <span class="eval-brush"></span>
      <div class="eval-boats" id="evalBoats">
        <div class="eval-corner-tr"></div>
        <div class="eval-corner-bl"></div>
      </div>
      <div class="eval-gold-lines">
        <div class="eval-gold-line"></div>
        <div class="eval-gold-line"></div>
        <div class="eval-gold-dot"></div>

<script>

var currentMode = 'normal';
var currentPts = 12; // 荒れモード買い目点数
var calcData = null;

function clearAll(){
  document.getElementById('raceData').value='';
  document.getElementById('calcResult').classList.remove('show');
  document.getElementById('calcContent').innerHTML='';
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('outText').textContent='';
  document.getElementById('status').style.display='none';
  document.getElementById('genBtn').disabled=true;
  try{document.getElementById('venue').value='';}catch(e){}
  try{document.getElementById('raceNum').value='';}catch(e){}
  calcData=null;
}

function saveKey(){
  var k=document.getElementById('apiKey').value.trim();
  if(!k)return;
  localStorage.setItem('gemini_key',k);
  document.getElementById('apiKey').classList.add('saved');
  document.getElementById('apiKey').value='保存済み';
  showStatus('APIキーを保存しました','ok');
}

function loadKey(){
  if(localStorage.getItem('gemini_key')){
    document.getElementById('apiKey').value='保存済み';
    document.getElementById('apiKey').classList.add('saved');
  }
}

function getKey(){
  var el=document.getElementById('apiKey');
  if(el.classList.contains('saved'))return localStorage.getItem('gemini_key')||'';
  return el.value.trim();
}

function setMode(m){
  currentMode=m;
  document.getElementById('modeNormal').className='mode-btn '+(m==='normal'?'active':'inactive');
  document.getElementById('modeAre').className='mode-btn '+(m==='are'?'active':'inactive');
  document.getElementById('arePtsSection').style.display=(m==='are')?'block':'none';
  if(calcData)displayCalcResults(calcData);
}

function setPts(pts){
  currentPts=pts;
  [12,14,15].forEach(function(p){
    document.getElementById('pts'+p).className='pts-btn '+(p===pts?'active':'inactive');
  });
}

function showStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;
  el.style.display='block';
}

/* ===== PARSER ===== */
function parseData(raw){
  var lines=raw.replace(/\r/g,'').split('\n');
  var boats=[];
  for(var i=0;i<6;i++){
    boats.push({n:i+1,name:'',fKi:0,fZen:0,soyoRate:0,stKoki:null,
      tokuten:null,avgST:null,exhibRank:null,winsRate:null,
      avgEx:null,avgLap:null,avgStr:null,
      nyuse:i+1,exT:null,lapT:null,strT:null,st:null,stF:false,tilt:0,
      kiryoku:null,kiryokuRank:null,
      buhin:false,zenkokuRate:null,totiRate:null,renRate:null,
      sogoScore:null,sogoRank:null});
  }
  var section='',nigeContext='';
  var nigeRate6M=null,nigeRateLocal=null,nigeRateKoki=null,localCount=0;
  var afterFrank=false,afterNigeRow=false;

  function v6(line){
    var cols=line.split('\t'),out=[];
    for(var ci=1;ci<cols.length&&out.length<6;ci++){
      var v=(cols[ci]||'').trim();
      if(!v||v==='-'){out.push(null);continue;}
      var clean=v.replace(/[%（）()]/g,'').replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      out.push(isNaN(n)?null:n);
    }
    while(out.length<6)out.push(null);
    return out;
  }
  function stv6(line){
    var cols=line.split('\t'),vals=[],flags=[];
    for(var ci=1;ci<cols.length&&vals.length<6;ci++){
      var v=(cols[ci]||'').trim();
      var isF=v.startsWith('F');
      flags.push(isF);
      var clean=v.replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      vals.push(isNaN(n)?null:n);
    }
    while(vals.length<6){vals.push(null);flags.push(false);}
    return{vals:vals,flags:flags};
  }

  for(var idx=0;idx<lines.length;idx++){
    var line=lines[idx].trim();
    var cols=line.split('\t');
    var label=(cols[0]||'').trim().replace(/\s+/g,'');

    var sm=line.match(/=== (.+?) ===/);
    if(sm){section=sm[1].trim().replace(/\s/g,'');afterFrank=false;afterNigeRow=false;continue;}

    if(section==='基本情報'){
      if(label.includes('基本情報')||label.includes('基本')){
        var nc=line.split('\t').slice(1);
        for(var j=0;j<6&&j<nc.length;j++){var nm=nc[j].trim();if(nm)boats[j].name=nm;}
      }
      if(label==='フライング')afterFrank=true;
      if(afterFrank&&label==='今期'){
        var fv=v6(line);for(var j=0;j<6;j++)boats[j].fKi=fv[j]||0;afterFrank=false;
      }
      if(label==='前期'){var fv2=v6(line);for(var j=0;j<6;j++)boats[j].fZen=fv2[j]||0;}
      if(label==='事故率'){var sv=v6(line);for(var j=0;j<6;j++)boats[j].soyoRate=sv[j]||0;}
      if(label==='全国'){var grv=v6(line);for(var j=0;j<6;j++)if(grv[j]!==null)boats[j].zenkokuRate=grv[j];}
      if(label==='当地'&&section==='基本情報'){var trv=v6(line);for(var j=0;j<6;j++)if(trv[j]!==null)boats[j].totiRate=trv[j];}
      if(label==='今期'&&!afterFrank){
        var sv2=v6(line);
        var allSmall=sv2.filter(function(v){return v!==null;}).every(function(v){return v<1.0;});
        if(allSmall)for(var j=0;j<6;j++)if(sv2[j]!==null)boats[j].stKoki=sv2[j];
      }
    }

    if(section==='今節成績'){
      if(label==='得点率'){var tv=v6(line);for(var j=0;j<6;j++)boats[j].tokuten=tv[j];}
      if(label==='平均ST'){var sv3=v6(line);for(var j=0;j<6;j++)if(sv3[j]!==null)boats[j].avgST=sv3[j];}
      if(label==='展示順位'||label==='平均展示順位'){var ev=v6(line);for(var j=0;j<6;j++)boats[j].exhibRank=ev[j];}
      if(label==='1着率'){var wv=v6(line);for(var j=0;j<6;j++)boats[j].winsRate=wv[j];}
      if(label==='2連対率'){var rv=v6(line);for(var j=0;j<6;j++)boats[j].renRate=rv[j];}
      if(label==='平均展示'){var av=v6(line);for(var j=0;j<6;j++)if(av[j])boats[j].avgEx=av[j];}
      if(label==='平均周足'||label==='平均周り足'){var lv=v6(line);for(var j=0;j<6;j++)if(lv[j])boats[j].avgLap=lv[j];}
      if(label==='平均直線'){var dv=v6(line);for(var j=0;j<6;j++)if(dv[j])boats[j].avgStr=dv[j];}
    }

    if(section==='直前情報'){
      if(label==='進入'){var nv=v6(line);for(var j=0;j<6;j++)if(nv[j])boats[j].nyuse=Math.round(nv[j]);}
      if(label==='展示'){var etv=v6(line);for(var j=0;j<6;j++)if(etv[j])boats[j].exT=etv[j];}
      if(label==='周り足'||label==='周り足'){var ltv=v6(line);for(var j=0;j<6;j++)if(ltv[j])boats[j].lapT=ltv[j];}
      if(label==='直線'){var stv=v6(line);for(var j=0;j<6;j++)if(stv[j])boats[j].strT=stv[j];}
      if(label==='ST'){var sf=stv6(line);for(var j=0;j<6;j++)if(sf.vals[j]!==null){boats[j].st=sf.vals[j];boats[j].stF=sf.flags[j];}}
      if(label==='チルト'){var cv=v6(line);for(var j=0;j<6;j++)if(cv[j]!==null)boats[j].tilt=cv[j];}
      if(label==='部品交換'){var bv=line.split('\t').slice(1);for(var j=0;j<6&&j<bv.length;j++){if((bv[j]||'').trim()&&(bv[j]||'').trim()!=='-')boats[j].buhin=true;}}
    }

    if(section==='枠別勝率'){
      if(label==='当地'&&line.includes('(')){var cm=line.match(/\((\d+)\)/);if(cm)localCount=parseInt(cm[1]);}
      if(line.includes('直近6ヶ月')||line.includes('直近 6ヶ月')||line.includes('直近６ヶ月'))nigeContext='6M';
      else if(line.includes('直近1年')||line.includes('直近 1年')||line.includes('直近１年'))nigeContext='1Y';
      else if(label==='当地'&&!line.includes('%'))nigeContext='local';
      else if(label==='今期'&&nigeContext==='')nigeContext='koki';
      if(label.startsWith('逃げ')&&!line.includes('%')){afterNigeRow=true;}
      else if(afterNigeRow){
        var pct=parseFloat((line.split('\t')[0]||'').replace(/%/,''));
        if(!isNaN(pct)){
          if(nigeContext==='6M'&&nigeRate6M===null)nigeRate6M=pct;
          else if(nigeContext==='local'&&nigeRateLocal===null)nigeRateLocal=pct;
          else if(nigeContext==='koki'&&nigeRateKoki===null)nigeRateKoki=pct;
        }
        afterNigeRow=false;
      }
    }
  }

  var nigeRate=null,nigeRateSrc='';
  if(localCount>=10&&nigeRateLocal!==null){nigeRate=nigeRateLocal;nigeRateSrc='当地('+localCount+'戦)';}
  else if(nigeRate6M!==null){nigeRate=nigeRate6M;nigeRateSrc='直近6M';}
  else if(nigeRateKoki!==null){nigeRate=nigeRateKoki;nigeRateSrc='今期';}

  return{boats:boats,nigeRate:nigeRate,nigeRateSrc:nigeRateSrc,localCount:localCount};
}

/* ===== 機力スコア ===== */
function calcKiryoku(boats){
  boats.forEach(function(b){
    var avgE=b.avgEx!==null?b.avgEx:b.exT;
    var avgL=b.avgLap!==null?b.avgLap:b.lapT;
    var avgS=b.avgStr!==null?b.avgStr:b.strT;
    var dirE=b.exT,dirL=b.lapT,dirS=b.strT;
    if(dirE!==null&&dirL!==null&&dirS!==null){
      b.kiryoku=(avgE||dirE)+(avgL||dirL)+(avgS||dirS)+dirE+dirL+dirS;
    }else if(dirE!==null&&dirL!==null){
      b.kiryoku=(avgE||dirE)*2+(avgL||dirL)*2;
    }
  });
  var valid=boats.filter(function(b){return b.kiryoku!==null;}).sort(function(a,b){return a.kiryoku-b.kiryoku;});
  valid.forEach(function(b,i){b.kiryokuRank=i+1;});
}

/* ===== 総合評価スコア ===== */
function calcSogoScore(boats,nigeRate){
  var allTok=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  var maxTok=allTok.length?Math.max.apply(null,allTok):1;
  var minTok=allTok.length?Math.min.apply(null,allTok):0;
  var allRate=boats.map(function(b){return b.totiRate||b.zenkokuRate||0;});
  var maxRate=Math.max.apply(null,allRate)||1;
  var allST=boats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  var minST=allST.length?Math.min.apply(null,allST):0.10;
  var maxST=allST.length?Math.max.apply(null,allST):0.30;
  var maxKr=boats.filter(function(b){return b.kiryokuRank!==null;}).length||6;
  var allDirST=boats.map(function(b){return b.st;}).filter(function(v){return v!==null;});
  var minDirST=allDirST.length?Math.min.apply(null,allDirST):0.10;
  var maxDirST=allDirST.length?Math.max.apply(null,allDirST):0.30;
  var allRen=boats.map(function(b){return b.renRate!==null?b.renRate:0;});
  var maxRen=Math.max.apply(null,allRen)||1;

  boats.forEach(function(b){
    var score=0;
    if(b.tokuten!==null&&maxTok>minTok)score+=(b.tokuten-minTok)/(maxTok-minTok)*30;
    else if(b.tokuten!==null)score+=15;
    var rate=b.totiRate||b.zenkokuRate||0;
    if(maxRate>0)score+=rate/maxRate*20;
    var st=b.avgST||b.stKoki;
    if(st!==null&&maxST>minST)score+=(maxST-st)/(maxST-minST)*20;
    else if(st!==null)score+=10;
    if(b.kiryokuRank!==null&&maxKr>1)score+=(maxKr-b.kiryokuRank)/(maxKr-1)*15;
    if(b.st!==null&&!b.stF&&maxDirST>minDirST)score+=(maxDirST-b.st)/(maxDirST-minDirST)*10;
    var ren=b.renRate!==null?b.renRate:0;
    if(maxRen>0)score+=ren/maxRen*10;
    if(b.tilt<=-0.5)score+=2;else if(b.tilt>=0.5)score+=1;
    if(b.buhin){var imp=false;if(b.exT!==null&&b.avgEx!==null&&b.exT<b.avgEx-0.05)imp=true;if(b.lapT!==null&&b.avgLap!==null&&b.lapT<b.avgLap-0.05)imp=true;if(b.strT!==null&&b.avgStr!==null&&b.strT<b.avgStr-0.05)imp=true;score+=imp?3:0.5;}
    if(b.fKi>=1)score-=3;
    if(b.winsRate===0&&b.tokuten!==null&&b.tokuten>0)score-=2;
    if(b.nyuse===6)score-=8;
    if(b.nyuse===5)score-=4;
    if(b.nyuse===1&&nigeRate!==null&&nigeRate>=70)score+=10;
    b.sogoScore=Math.max(0,score);
  });

  var sorted=boats.slice().sort(function(a,b){return (b.sogoScore||0)-(a.sogoScore||0);});
  sorted.forEach(function(b,i){b.sogoRank=i+1;});
  // 6号艇が1位の場合、2位と入れ替え
  var rank1=sorted[0],rank2=sorted[1];
  if(rank1&&rank2&&rank1.nyuse===6){
    rank1.sogoRank=2;
    rank2.sogoRank=1;
  }
}

/* ===== 信頼度・荒れ指数後補正 ===== */
function applyShinkidoAreBonus(boats,shinkido,areScore){
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  boats.forEach(function(b){
    var bonus=0;
    // 信頼度補正（1号艇のみ）
    if(b.nyuse===1){
      if(shinkido==='A')bonus+=10;
      else if(shinkido==='C')bonus-=5;
    }
    // 荒れ指数補正（1号艇のみ）
    if(b.nyuse===1){
      if(areScore===0)bonus+=5;
      else if(areScore>=9)bonus-=5;
    }
    b.sogoScore=Math.max(0,(b.sogoScore||0)+bonus);
  });
  // 補正後に再ランク付け
  var sorted=boats.slice().sort(function(a,b){return (b.sogoScore||0)-(a.sogoScore||0);});
  sorted.forEach(function(b,i){b.sogoRank=i+1;});
  // 6号艇が1位の場合は2位と入れ替え
  var rank1=sorted[0],rank2=sorted[1];
  if(rank1&&rank2&&rank1.nyuse===6){rank1.sogoRank=2;rank2.sogoRank=1;}
}

/* ===== JS強制× ===== */
function calcForceNG(boats){
  var scores=[];
  boats.forEach(function(b){
    var s=0;
    var st=b.avgST||b.stKoki;
    if(st!==null&&st>=0.25)s+=3;
    var allTok=boats.map(function(x){return x.tokuten;}).filter(function(v){return v!==null;});
    var minTok=allTok.length?Math.min.apply(null,allTok):null;
    var maxKr=boats.filter(function(x){return x.kiryokuRank!==null;}).length;
    if(b.tokuten!==null&&minTok!==null&&b.tokuten===minTok&&b.kiryokuRank===maxKr)s+=2;
    if(b.tokuten!==null&&b.tokuten<=2.0&&b.winsRate===0)s+=2;
    scores.push({n:b.n,s:s});
  });
  scores.sort(function(a,b){return b.s-a.s;});
  if(scores.length&&scores[0].s>0){
    var ng=scores[0].n;
    boats.forEach(function(b){b.forceNG=(b.n===ng);});
  }
}

/* ===== 荒れ指数 ===== */
function calcAreIndex(boats,nigeRate){
  var score=0,bd=[];
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  var innerBoats=boats.filter(function(b){return [1,2,3].includes(b.nyuse);});
  var outerBoats=boats.filter(function(b){return b.nyuse>=4;});

  var fKi123=innerBoats.filter(function(b){return b.fKi>=1;});
  if(b1.fKi>=1){score+=3;bd.push('1コース今期F持ち +3');}
  else if(fKi123.length>=2){score+=3;bd.push('1〜3コース今期F複数 +3');}
  else if(fKi123.length===1){score+=1;bd.push('2〜3コース今期F1艇 +1');}

  var exF123=innerBoats.filter(function(b){return b.stF;});
  if(b1.stF){score+=1;bd.push('1コース展示F +1');}
  if(!b1.stF&&exF123.length>=2){score+=1;bd.push('1〜3コース展示F複数 +1');}

  if(b1.exhibRank!==null&&b1.exhibRank>=5){score+=3;bd.push('1コース今節展示'+b1.exhibRank+'位 +3');}
  if(b1.winsRate!==null&&b1.winsRate===0){score+=3;bd.push('1コース今節1着率0% +3');}
  var allTok=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT=allTok.slice().sort(function(a,b){return a-b;});
    if(b1.tokuten<=sortedT[1]){score+=2;bd.push('1コース今節得点率下位2 +2');}
  }
  var allAvgST=boats.map(function(b){return b.avgST;}).filter(function(v){return v!==null;});
  if(allAvgST.length>=2&&b1.avgST!==null){
    if(b1.avgST===Math.max.apply(null,allAvgST)){score+=2;bd.push('1コース今節平均ST最遅 +2');}
  }

  if(nigeRate!==null){
    if(nigeRate<30){score+=3;bd.push('逃げ率'+nigeRate+'%<30% +3');}
    else if(nigeRate<50){score+=2;bd.push('逃げ率'+nigeRate+'%<50% +2');}
  }
  var stFallback=b1.avgST!==null?b1.avgST:b1.stKoki;
  if(stFallback!==null&&stFallback>=0.18){score+=2;bd.push('1コース平均ST'+stFallback+'≥0.18 +2');}
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT2=allTok.slice().sort(function(a,b){return a-b;});
    var mid=sortedT2[Math.floor(sortedT2.length/2)];
    if(b1.tokuten<mid){score+=1;bd.push('1コース今節得点率下位半分 +1');}
  }

  var allExRank=boats.map(function(b){return b.exhibRank;}).filter(function(v){return v!==null;});
  if(outerBoats.some(function(b){return b.exhibRank===1&&allExRank.length;})){score+=2;bd.push('外枠今節展示1位 +2');}
  if(allTok.length){
    var maxTok=Math.max.apply(null,allTok);
    if(outerBoats.some(function(b){return b.tokuten===maxTok&&maxTok>0;})){score+=2;bd.push('外枠今節得点率1位 +2');}
  }
  var inSTs=innerBoats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  var outSTs=outerBoats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  if(inSTs.length&&outSTs.length){
    var avgIn=inSTs.reduce(function(s,v){return s+v;},0)/inSTs.length;
    var avgOut=outSTs.reduce(function(s,v){return s+v;},0)/outSTs.length;
    if(avgOut<avgIn-0.01){score+=1;bd.push('外枠平均ST優秀 +1');}
  }
  if(outerBoats.some(function(b){return b.stF;})){score+=1;bd.push('外枠展示F +1');}
  if(boats.some(function(b){return b.nyuse!==b.n;})){score+=3;bd.push('進入変更 +3');}
  var shojoOuter=outerBoats.filter(function(b){return b.fZen>=2;});
  if(shojoOuter.length){score+=3;bd.push('外枠賞除疑い艇（前期F≥2） +3');}

  return{score:score,breakdown:bd};
}

/* ===== 足切り ===== */
function checkFurikiri(areScore,boats,nigeRate){
  if(areScore<8)return{pass:false,stage:1,reason:'荒れ指数'+areScore+'点（8点未満）'};
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  function ex(){
    if(boats.some(function(b){return b.nyuse!==b.n;}))return true;
    var allT=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
    if(allT.length&&b1.tokuten!==null){
      var s=allT.slice().sort(function(a,b){return a-b;});
      var th=s[Math.floor(s.length*0.3)];
      var stc=b1.avgST!==null?b1.avgST:b1.stKoki;
      if(b1.tokuten<=th&&stc!==null&&stc>=0.18)return true;
    }
    if(b1.exhibRank!==null&&b1.exhibRank>=5)return true;
    if(b1.winsRate!==null&&b1.winsRate===0)return true;
    return false;
  }
  if(nigeRate!==null&&nigeRate>=60&&!ex())return{pass:false,stage:2,reason:'逃げ率'+nigeRate+'%（≥60%）'};
  var allT2=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allT2.length&&b1.tokuten!==null&&b1.tokuten===Math.max.apply(null,allT2)&&!ex())
    return{pass:false,stage:2,reason:'1コース今節得点率1位'};
  if(b1.kiryokuRank===1&&!ex())
    return{pass:false,stage:2,reason:'1コース機力1位'};
  return{pass:true};
}

/* ===== 1着候補 ===== */
function select1st(boats){
  var cands=[];
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  boats.filter(function(b){return b.nyuse>=4&&b.stF;}).forEach(function(b){
    if(b.nyuse<=5&&b.kiryokuRank<=3)cands.push({n:b.n,reason:b.nyuse+'コース展示F・機力'+b.kiryokuRank+'位'});
    else if(b.nyuse===6&&b.kiryokuRank===1&&b.st!==null&&b.st<=0.05)cands.push({n:b.n,reason:'6コース展示F・機力1位・ST優秀'});
  });
  var allT=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  if(allT.length){
    var sortedT=allT.slice().sort(function(a,b){return b-a;});
    var top3=sortedT.slice(0,3);
    var bot30=sortedT[Math.floor(sortedT.length*0.7)]||0;
    boats.forEach(function(b){
      if(b.nyuse===1||b.nyuse===6)return;
      if(b.tokuten!==null&&top3.includes(b.tokuten)&&b.tokuten>bot30){
        if(!cands.find(function(c){return c.n===b.n;}))cands.push({n:b.n,reason:b.nyuse+'コース今節得点率上位'});
      }
    });
  }
  boats.filter(function(b){return b.nyuse<=3&&b.nyuse>1;}).forEach(function(b){
    if(b.kiryokuRank===1){
      var allT2=boats.map(function(x){return x.tokuten;}).filter(function(v){return v!==null;});
      if(allT2.length){
        var st2=allT2.slice().sort(function(a,b){return b-a;}).slice(0,3);
        if(b.tokuten!==null&&st2.includes(b.tokuten)&&!cands.find(function(c){return c.n===b.n;}))
          cands.push({n:b.n,reason:b.nyuse+'コース機力1位＋得点率上位'});
      }
    }
    if(b1.st!==null&&b1.st>=0.25&&b.nyuse===2&&!cands.find(function(c){return c.n===b.n;}))
      cands.push({n:b.n,reason:'1コースST0.25以上→2コース昇格'});
  });
  return cands.slice(0,2);
}

/* ===== 通常モード ===== */
function calcNormal(boats,nigeRate){
  var b1=boats.find(function(b){return b.nyuse===1;})||boats[0];
  var st=b1.avgST!==null?b1.avgST:b1.stKoki;
  var shinkido='B';
  if(nigeRate!==null&&st!==null){
    if(nigeRate>=65&&st<=0.15)shinkido='A';
    else if(nigeRate<55||(st!==null&&st>=0.18))shinkido='C';
  }
  var sorted=boats.filter(function(b){return b.nyuse!==1;}).sort(function(a,b){
    var ta=a.tokuten||0,tb=b.tokuten||0;
    if(Math.abs(ta-tb)>0.5)return tb-ta;
    var sa=a.avgST||a.stKoki||0.2,sb=b.avgST||b.stKoki||0.2;
    return sa-sb;
  });
  var ab=sorted.slice(0,2).map(function(b,i){return{n:b.n,reason:'2着候補'+(i===0?'A':'B')};});
  return{shinkido:shinkido,ab:ab};
}

/* ===== メイン計算 ===== */
function runCalc(){
  var raw=document.getElementById('raceData').value.trim();
  if(!raw){showStatus('データを貼り付けてください','err');return;}
  var parsed=parseData(raw);
  calcKiryoku(parsed.boats);
  calcSogoScore(parsed.boats,parsed.nigeRate);
  calcForceNG(parsed.boats);
  var areResult=calcAreIndex(parsed.boats,parsed.nigeRate);
  var furikiriResult=checkFurikiri(areResult.score,parsed.boats,parsed.nigeRate);
  var cands1st=select1st(parsed.boats);
  var normalResult=calcNormal(parsed.boats,parsed.nigeRate);
  // 信頼度・荒れ指数による後補正
  applyShinkidoAreBonus(parsed.boats,normalResult.shinkido,areResult.score);
  calcData={parsed:parsed,areResult:areResult,furikiriResult:furikiriResult,cands1st:cands1st,normalResult:normalResult};
  displayCalcResults(calcData);
  document.getElementById('calcResult').classList.add('show');
  document.getElementById('genBtn').disabled=false;
  document.getElementById('genBtn').scrollIntoView({behavior:'smooth',block:'center'});
}

/* ===== 買い目圧縮 ===== */
function compressBets(betsArr){
  var valid=betsArr.filter(function(b){return /^[1-6]-[1-6]-[1-6]$/.test(b);});
  if(!valid.length)return '';
  var used=[];
  var parts=[];

  function isUsed(i){return used.indexOf(i)>=0;}
  function markUsed(arr){arr.forEach(function(i){if(!isUsed(i))used.push(i);});}

  // STEP0: 1着固定で2着セット=3着セット対称（例: 3-4-5+3-5-4 → 3-45-45）
  var byFirst0={};
  valid.forEach(function(b,i){
    var a=b[0];
    if(!byFirst0[a])byFirst0[a]=[];
    byFirst0[a].push(i);
  });
  Object.keys(byFirst0).forEach(function(a){
    var indices=byFirst0[a].filter(function(i){return !isUsed(i);});
    if(indices.length<2)return;
    var seconds=indices.map(function(i){return valid[i][2];});
    var thirds=indices.map(function(i){return valid[i][4];});
    var secSet=seconds.slice().sort().join('');
    var thiSet=thirds.slice().sort().join('');
    if(secSet===thiSet){parts.push(a+'-'+secSet+'-'+thiSet);markUsed(indices);}
  });

  // STEP1: 1着・2着固定で3着をまとめる（例: 4-6-2+4-6-3 → 4-6-23）
  var byFirstSecond={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[0]+'-'+b[2];
    if(!byFirstSecond[key])byFirstSecond[key]=[];
    byFirstSecond[key].push(i);
  });
  Object.keys(byFirstSecond).forEach(function(key){
    var indices=byFirstSecond[key].filter(function(i){return !isUsed(i);});
    if(indices.length>=2){
      var thirds=indices.map(function(i){return valid[i][4];}).sort();
      parts.push(key+'-'+thirds.join(''));
      markUsed(indices);
    }
  });

  // STEP2: 2着・3着固定で1着をまとめる（例: 4-3-2+6-3-2 → 46-3-2）
  var bySecondThird={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[2]+'-'+b[4];
    if(!bySecondThird[key])bySecondThird[key]=[];
    bySecondThird[key].push(i);
  });
  Object.keys(bySecondThird).forEach(function(key){
    var indices=bySecondThird[key];
    var unused=indices.filter(function(i){return !isUsed(i);});
    if(unused.length>=2){
      var firsts=unused.map(function(i){return valid[i][0];}).sort();
      parts.push(firsts.join('')+'-'+key);
      markUsed(unused);
    }
  });

  // STEP3: 1着・3着固定で2着をまとめる
  var byFirstThird={};
  valid.forEach(function(b,i){
    if(isUsed(i))return;
    var key=b[0]+'-'+b[4];
    if(!byFirstThird[key])byFirstThird[key]=[];
    byFirstThird[key].push(i);
  });
  Object.keys(byFirstThird).forEach(function(key){
    var indices=byFirstThird[key];
    var unused=indices.filter(function(i){return !isUsed(i);});
    if(unused.length>=2){
      var parts2=key.split('-');
      var seconds=unused.map(function(i){return valid[i][2];}).sort();
      parts.push(parts2[0]+'-'+seconds.join('')+'-'+parts2[1]);
      markUsed(unused);
    }
  });

  // 残り（単独）
  valid.forEach(function(b,i){if(!isUsed(i))parts.push(b);});
  return parts.join('/');
}

function buildHyokaOrder(boats){
  var sorted=boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
  return sorted.map(function(b){return String(b.n);}).join('>');
}

// △（4位評価）ヘルパー
function getYonkaku(maru,shiro,sankaku,go,ngBoats,allBoats){
  // sogoRank4位の艇番（maru/shiro/sankaku/go以外かつngでない）
  if(calcData&&calcData.parsed){
    var s4=calcData.parsed.boats.find(function(b){return b.sogoRank===4;});
    if(s4)return String(s4.n);
  }
  // fallback
  return allBoats.filter(function(x){return x!==maru&&x!==shiro&&x!==sankaku&&x!==go&&ngBoats.indexOf(x)<0;})[0]||'4';
}

function buildAreBetsFinal(maru,shiro,sankaku,go,ngBoats){
  var allBoats=['1','2','3','4','5','6'];
  var yonkaku=getYonkaku(maru,shiro,sankaku,go,ngBoats,allBoats);
  var seen={};
  var addBet=function(arr,a,b,c){
    if(!a||!b||!c)return;
    if(a===b||b===c||a===c)return;
    var k=a+'-'+b+'-'+c;
    if(seen[k])return;
    seen[k]=true;
    arr.push(k);
  };

  // 本線6点
  var honsen=[];
  addBet(honsen,maru,shiro,sankaku);
  addBet(honsen,maru,shiro,yonkaku);
  addBet(honsen,maru,sankaku,yonkaku);
  addBet(honsen,shiro,maru,sankaku);
  addBet(honsen,shiro,maru,yonkaku);
  addBet(honsen,shiro,sankaku,yonkaku);
  honsen=honsen.slice(0,6);

  // 抑え（点数別）
  var osaee=[];

  if(currentPts===12){
    addBet(osaee,maru,sankaku,go);
    addBet(osaee,maru,yonkaku,go);
    addBet(osaee,shiro,sankaku,go);
    addBet(osaee,shiro,yonkaku,go);
    addBet(osaee,maru,go,sankaku);
    addBet(osaee,shiro,go,sankaku);
    osaee=osaee.slice(0,6);
  } else if(currentPts===14){
    addBet(osaee,maru,sankaku,go);
    addBet(osaee,maru,yonkaku,go);
    addBet(osaee,shiro,sankaku,go);
    addBet(osaee,shiro,yonkaku,go);
    addBet(osaee,maru,go,sankaku);
    addBet(osaee,shiro,go,sankaku);
    addBet(osaee,go,maru,sankaku);
    addBet(osaee,go,shiro,sankaku);
    osaee=osaee.slice(0,8);
  } else {
    // 15点
    addBet(osaee,maru,sankaku,go);
    addBet(osaee,maru,yonkaku,go);
    addBet(osaee,shiro,sankaku,go);
    addBet(osaee,shiro,yonkaku,go);
    addBet(osaee,maru,go,sankaku);
    addBet(osaee,shiro,go,sankaku);
    addBet(osaee,go,maru,sankaku);
    addBet(osaee,go,shiro,sankaku);
    addBet(osaee,go,maru,yonkaku);
    osaee=osaee.slice(0,9);
  }

  return{honsen:honsen,osaee:osaee};
}

      var ngFromAI=[];
      text.split('\n').forEach(function(ln){
        var m=ln.match(/(\d)位\s*(\d)号艇\s*×/);
        if(m)ngFromAI.push(m[2]);
      });
      if(ngFromAI.length>0)ngBoats=ngFromAI;

      // JS固定で買い目生成
      var betsResult=buildAreBetsFinal(maru,shiro,sankaku,go,ngBoats);
      var honsen=betsResult.honsen;
      var osaee=betsResult.osaee;
      var honsenStr=compressBets(honsen)||honsen.join('/');
      var osaeeStr=compressBets(osaee)||osaee.join('/');

      // テキストに【買い目】ブロックを挿入・差し替え
      var tLines=text.split('\n');
      var newLines=[],inBet=false,inserted=false;
      for(var ti=0;ti<tLines.length;ti++){
        var tl=tLines[ti];
        if(tl.indexOf('【買い目】')>=0){
          newLines.push('【買い目】');
          newLines.push('本線('+honsen.length+'点)');
          honsen.forEach(function(b){newLines.push(b);});
          newLines.push('抑え('+osaee.length+'点)');
          osaee.forEach(function(b){newLines.push(b);});
          newLines.push('');
          inBet=true;inserted=true;
          continue;
        }
        if(inBet){
          if(tl.indexOf('【')>=0){inBet=false;newLines.push(tl);}
          continue;
        }
        if(!inserted&&tl.indexOf('【総合評価】')>=0){
          newLines.push('【買い目】');
          newLines.push('本線('+honsen.length+'点)');
          honsen.forEach(function(b){newLines.push(b);});
          newLines.push('抑え('+osaee.length+'点)');
          osaee.forEach(function(b){newLines.push(b);});
          newLines.push('');
          inserted=true;
        }
        newLines.push(tl);
      }
      text=newLines.join('\n');

      // Xサマリーの本線・抑え・評価順を上書き
      var xIdx=text.indexOf('【Xサマリー】');
      if(xIdx>=0){
        var before=text.slice(0,xIdx);
        var after=text.slice(xIdx);
        // 評価順をJS固定で挿入
        var hyokaOrder=buildHyokaOrder(calcData.parsed.boats);
        after=after.replace(/HYOKA_ORDER/g,hyokaOrder);
        // 買い目上書き（圧縮済み）
        after=after.split('\n').map(function(ln){if(ln.indexOf('本線')===0)return '本線　'+honsenStr;if(ln.indexOf('抑え')===0)return '抑え　'+osaeeStr;return ln;}).join('\n');
        // 場所・レース番号を強制で先頭に挿入
        after=after.replace('【Xサマリー】','【Xサマリー】\n'+venue+raceNum+'R');
        var vrStr=venue+raceNum+'R';var vrSeen=false;after=after.split('\n').filter(function(ln){if(ln.trim()===vrStr){if(vrSeen)return false;vrSeen=true;}return true;}).join('\n');
        text=before+after;
      }

      // ◎○以外の1着買い目フィルター
      var ok1st=[maru,shiro];
      text=text.split('\n').filter(function(ln){
        var m=ln.match(/^(\d)-(\d)-(\d)$/);
        return !m||ok1st.indexOf(m[1])>=0;
      }).join('\n');
    }

    // ===== 通常モード：JS固定買い目生成 =====
    if(currentMode==='normal'&&calcData){
      var shinkido=calcData.normalResult.shinkido;
      var r1=text.match(/1位\s*(\d)号艇/);
      var r2=text.match(/2位\s*(\d)号艇/);
      var r3=text.match(/3位\s*(\d)号艇/);
      var r4=text.match(/4位\s*(\d)号艇/);
      var r5=text.match(/5位\s*(\d)号艇/);
      var r6=text.match(/6位\s*(\d)号艇/);
      var p1=r1?r1[1]:'1';
      var p2,p3,p4,p5;

      if(shinkido==='C'){
        // Cモード：総合評価順そのまま
        var usedP=[p1];
        var nextUnused=function(arr){return ['2','3','4','5','6'].filter(function(x){return arr.indexOf(x)<0;})[0]||'2';};
        p2=r2?r2[1]:null;p3=r3?r3[1]:null;p4=r4?r4[1]:null;p5=r5?r5[1]:null;
        if(!p2){p2=calcData.normalResult.ab[0]?String(calcData.normalResult.ab[0].n):nextUnused(usedP);}usedP.push(p2);
        if(!p3){p3=calcData.normalResult.ab[1]?String(calcData.normalResult.ab[1].n):nextUnused(usedP);}usedP.push(p3);
        if(!p4){p4=nextUnused(usedP);}usedP.push(p4);
        if(!p5){p5=nextUnused(usedP);}
      } else if(shinkido==='A'){
        // Aモード：1号頭固定。2着・3着はJS総合評価から1を除いた順
        var sogoOrder=[r1,r2,r3,r4,r5,r6].filter(function(m){return m&&m[1]!=='1';}).map(function(m){return m[1];});
        ['2','3','4','5','6'].forEach(function(x){if(sogoOrder.indexOf(x)<0)sogoOrder.push(x);});
        p2=sogoOrder[0]||'2';
        p3=sogoOrder[1]||'3';
        p4=sogoOrder[2]||'4';
        p5=sogoOrder[3]||'5';
      } else {
        // Bモード：1号頭4点 + JS2位評価頭4点
        var sogoOrderB=[r1,r2,r3,r4,r5,r6].filter(function(m){return m&&m[1]!=='1';}).map(function(m){return m[1];});
        ['2','3','4','5','6'].forEach(function(x){if(sogoOrderB.indexOf(x)<0)sogoOrderB.push(x);});
        p2=sogoOrderB[0]||'2'; // JS2位評価（1を除く1番手）
        p3=sogoOrderB[1]||'3';
        p4=sogoOrderB[2]||'4';
        p5=sogoOrderB[3]||'5';
      }

      var vb=function(a,b,c){return a&&b&&c&&a!==b&&b!==c&&a!==c;};
      var honsen=[],osaee=[],bets={};
      var addBetN=function(arr,a,b,c){if(!vb(a,b,c))return;var k=a+'-'+b+'-'+c;if(bets[k])return;bets[k]=true;arr.push(k);};

      if(shinkido==='C'){
        addBetN(honsen,p1,p2,p3);addBetN(honsen,p1,p3,p2);
        addBetN(honsen,p2,p1,p3);addBetN(honsen,p2,p3,p1);
        addBetN(osaee,p3,p1,p2);addBetN(osaee,p3,p2,p1);
        addBetN(osaee,p1,p3,p4);addBetN(osaee,p1,p4,p3);
      } else if(shinkido==='A'){
        // Aモード：1号頭固定8点
        addBetN(honsen,'1',p2,p3);addBetN(honsen,'1',p3,p2);
        addBetN(honsen,'1',p2,p4);addBetN(honsen,'1',p3,p4);
        addBetN(osaee,'1',p2,p5);addBetN(osaee,'1',p3,p5);
        addBetN(osaee,'1',p4,p2);addBetN(osaee,'1',p4,p3);
      } else {
        // Bモード：1号頭4点 + p2頭4点
        addBetN(honsen,'1',p2,p3);addBetN(honsen,'1',p3,p2);
        addBetN(honsen,p2,'1',p3);addBetN(honsen,p2,p3,'1');
        addBetN(osaee,'1',p2,p4);addBetN(osaee,'1',p4,p2);
        addBetN(osaee,p2,'1',p4);addBetN(osaee,p2,p4,'1');
      }

      honsen=honsen.slice(0,4);osaee=osaee.slice(0,4);
      var honsenStr=compressBets(honsen)||honsen.join('/');
      var osaeeStr=compressBets(osaee)||osaee.join('/');
      var betBlock='【最終買い目】8点\n本線\n'+honsen.join('\n')+'\n抑え\n'+osaee.join('\n')+'\n';

      // AIが出した【最終買い目】ブロックを全て削除
      text=text.replace(/【最終買い目】[\s\S]*?(?=【|$)/g,'');
      // 【Xサマリー】より前にある「本線」「抑え」行も削除（重複防止）
      var xPos=text.indexOf('【Xサマリー】');
      if(xPos>=0){
        var preX=text.slice(0,xPos);
        var postX=text.slice(xPos);
                preX=preX.split('\n').filter(function(ln){return ln.indexOf('本線')!==0&&ln.indexOf('抑え')!==0;}).join('\n');
        text=preX+postX;
      }
      // 【イン信頼度】の前に挿入
      var inIdx=text.indexOf('【イン信頼度】');
      if(inIdx>=0){text=text.slice(0,inIdx)+betBlock+'\n'+text.slice(inIdx);}
      else{text=betBlock+'\n'+text;}

      // Xサマリー内の本線・抑え・評価順を上書き
      var xIdx2=text.indexOf('【Xサマリー】');
      if(xIdx2>=0){
        var before2=text.slice(0,xIdx2);
        var after2=text.slice(xIdx2);
        // 評価順をJS固定で挿入
        var hyokaOrder2=buildHyokaOrder(calcData.parsed.boats);
        after2=after2.replace(/HYOKA_ORDER/g,hyokaOrder2);
        // 買い目上書き（圧縮済み）
        after2=after2.split('\n').map(function(ln){if(ln.indexOf('本線')===0)return '本線　'+honsenStr;if(ln.indexOf('抑え')===0)return '抑え　'+osaeeStr;return ln;}).join('\n');
        // 場所・レース番号を強制で先頭に挿入
        after2=after2.replace('【Xサマリー】','【Xサマリー】\n'+venue+raceNum+'R');
        var vrStr2=venue+raceNum+'R';var vrSeen2=false;after2=after2.split('\n').filter(function(ln){if(ln.trim()===vrStr2){if(vrSeen2)return false;vrSeen2=true;}return true;}).join('\n');
        text=before2+after2;
      }
    }

    document.getElementById('outText').textContent=text;
    document.getElementById('outWrap').classList.add('show');
    showOddsResult();
    renderEvalCard(text,venue,raceNum);
    autoSaveLog(text);
    showStatus('生成完了','ok');

  }catch(e){showStatus('エラー: '+e.message,'err');}
  finally{
    document.getElementById('genBtn').disabled=false;
    document.getElementById('loading').classList.remove('show');
  }
}

/* ===== オッズパーサー ===== */
function parseOdds(raw){
  var lines=raw.split('\n').map(function(l){return l.replace(/\t/g,' ').trim();}).filter(function(l){return l.length>0;});
  var boats={};var playerRe=/^([1-6])\s+([\u3000-\u9fff\u30a0-\u30ff]+)/;var blocks=[];var cur=null;
  for(var i=0;i<lines.length;i++){var line=lines[i];var pm=line.match(playerRe);if(pm){cur={boatNo:parseInt(pm[1]),name:pm[2],dataLines:[]};blocks.push(cur);continue;}if(cur&&!line.startsWith('合成')&&!line.startsWith('2単'))cur.dataLines.push(line);}
  for(var bi=0;bi<blocks.length;bi++){
    var block=blocks[bi];var boatNo=block.boatNo,name=block.name,dataLines=block.dataLines;
    boats[boatNo]={name:name,odds:{}};if(dataLines.length<1)continue;
    var tokenLines=dataLines.map(function(l){return l.split(/\s+/).filter(function(t){return /^\d+(\.\d+)?$/.test(t);}).map(Number);});
    var row0=tokenLines[0];if(!row0||row0.length<3)continue;
    var secondBoats=[];
    for(var j=0;j+2<row0.length;j+=3){var s=Math.round(row0[j]),t=Math.round(row0[j+1]),v=row0[j+2];if(s>=1&&s<=6&&t>=1&&t<=6&&v>0){secondBoats.push(s);boats[boatNo].odds[boatNo+'-'+s+'-'+t]=v;}}
    for(var row=1;row<tokenLines.length;row++){var toks=tokenLines[row];for(var col=0;col<secondBoats.length;col++){var jj=col*2;if(jj+1>=toks.length)continue;var tt=Math.round(toks[jj]),vv=toks[jj+1];if(tt>=1&&tt<=6&&vv>0)boats[boatNo].odds[boatNo+'-'+secondBoats[col]+'-'+tt]=vv;}}
  }
  return boats;
}

function calcGoseiOdds(betsArr,oddsData){
  var sum=0;
  betsArr.forEach(function(bet){var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;var first=parseInt(parts[1]);var bd=oddsData[first];if(!bd)return;var o=bd.odds[bet];if(o&&o>0)sum+=1/o;});
  return sum===0?null:(1/sum).toFixed(1);
}

function showOddsResult(){
  var raw=document.getElementById('raceData').value;
  var oddsIdx=raw.indexOf('=== オッズ ===');
  if(oddsIdx<0){document.getElementById('oddsResult').innerHTML='';return;}
  var oddsRaw=raw.slice(oddsIdx);
  var oddsData=parseOdds(oddsRaw);
  var outText=document.getElementById('outText').textContent;
  var bets=[],seen={};
  var lines=outText.split('\n');
  var inBetSection=false;
  lines.forEach(function(ln){
    var t=ln.trim();
    if(t.indexOf('【最終買い目】')>=0||t.indexOf('【買い目】')>=0){inBetSection=true;return;}
    if(inBetSection&&t.startsWith('【')&&t.indexOf('買い目')<0){inBetSection=false;}
    if(inBetSection&&/^\d-\d-\d$/.test(t)&&!seen[t]){seen[t]=true;bets.push(t);}
  });
  if(bets.length===0){document.getElementById('oddsResult').innerHTML='';return;}
  var html='<div style="margin-top:14px;"><div style="font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:6px;border-left:2px solid var(--accent);">買い目オッズ</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr><th style="text-align:left;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">買い目</th><th style="text-align:right;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">オッズ</th></tr></thead><tbody>';
  var validBets=[];
  bets.forEach(function(bet){
    var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;
    var first=parseInt(parts[1]);var bd=oddsData[first];var o=bd?bd.odds[bet]:null;
    var oStr=o?o.toFixed(1)+'倍':'—';
    var color=o?(o>=100?'color:var(--accent)':o>=30?'color:var(--text)':'color:var(--green)'):'color:var(--text-muted)';
    html+='<tr><td style="padding:5px 6px;border-bottom:1px solid var(--border);font-weight:700;">'+bet+'</td><td style="text-align:right;padding:5px 6px;border-bottom:1px solid var(--border);'+color+'">'+oStr+'</td></tr>';
    if(o)validBets.push(bet);
  });
  html+='</tbody></table>';
  var gosei=calcGoseiOdds(validBets,oddsData);
  if(gosei){html+='<div style="margin-top:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;"><span style="font-size:10px;color:var(--text-sub);">合成オッズ</span><span style="font-size:22px;font-weight:700;color:var(--accent);margin-left:10px;">'+gosei+'倍</span><span style="font-size:10px;color:var(--text-muted);margin-left:8px;">('+validBets.length+'点)</span></div>';}
  html+='</div>';
  document.getElementById('oddsResult').innerHTML=html;
}


/* ===== 評価カード描画 ===== */
var BOAT_COLORS={1:{bg:'#a0a0a0',text:'#000'},2:{bg:'#1a1a1a',text:'#fff'},3:{bg:'#c02020',text:'#fff'},4:{bg:'#1a50c8',text:'#fff'},5:{bg:'#c89800',text:'#000'},6:{bg:'#148030',text:'#fff'}};
var MARK_TO_STARS={'◎':5,'○':4,'▲':3,'△':2,'×':1};

function renderEvalCard(text,venue,raceNum){
  // 総合評価から順位・印を取得
  var rankData=[];
  text.split('\n').forEach(function(line){
    var m=line.match(/(\d)位[\s\u3000]+(\d)号艇[\s\u3000]*(◎|○|▲|△|×)/);
    if(m)rankData.push({rank:parseInt(m[1]),boat:parseInt(m[2]),mark:m[3]});
  });
  if(!rankData.length)return;
  rankData.sort(function(a,b){return a.rank-b.rank;});

  // タイトル
  var title='G.の総合評価🚤';
  if(venue&&venue!=='?'&&raceNum&&raceNum!=='?')title='G.の総合評価🚤　'+venue+raceNum+'R';
  document.getElementById('evalCardTitle').textContent=title;

  // 艇バッジ生成
  var container=document.getElementById('evalBoats');
  var ctr=container.querySelector('.eval-corner-tr');
  var cbl=container.querySelector('.eval-corner-bl');
  container.innerHTML='';
  container.appendChild(ctr);
  container.appendChild(cbl);

  rankData.forEach(function(d,idx){
    if(idx>0){
      var arrow=document.createElement('div');
      arrow.className='eval-arrow';
      arrow.textContent='›';
      container.appendChild(arrow);
    }
    var slot=document.createElement('div');
    slot.className='eval-slot';
    var badge=document.createElement('div');
    badge.className='eval-badge';
    var c=BOAT_COLORS[d.boat]||BOAT_COLORS[1];
    badge.style.background=c.bg;
    badge.style.color=c.text;
    badge.textContent=d.boat;
    var stars=document.createElement('div');
    stars.className='eval-stars';
    var starCount=MARK_TO_STARS[d.mark]||1;
    var starsHtml='';
    for(var i=0;i<5;i++)starsHtml+='<span class="'+(starCount>i?'eval-star-on':'eval-star-off')+'">★</span>';
    stars.innerHTML=starsHtml;
    slot.appendChild(badge);
    slot.appendChild(stars);
    container.appendChild(slot);
  });

  document.getElementById('evalCardWrap').classList.add('show');
}

        });
      } else {
        // フォールバック：通常ダウンロード
        var url=URL.createObjectURL(blob);
        var link=document.createElement('a');
        link.download='GARON_評価カード.png';
        link.href=url;
        link.click();
        setTimeout(function(){URL.revokeObjectURL(url);},1000);
        btn.textContent='✅ 保存しました';
        setTimeout(function(){btn.textContent='📥 評価カードを保存・共有';btn.disabled=false;},2000);
      }
    },'image/png');
  }).catch(function(){
    btn.textContent='📥 評価カードを保存・共有';
    btn.disabled=false;
    showStatus('生成失敗。スクショをお試しください。','err');
  });
}

/* ===== ログ機能 ===== */
function autoSaveLog(text){
  if(!calcData)return;
  var venue=document.getElementById('venue').value||'?';
  var raceNum=document.getElementById('raceNum').value||'?';
  var aiRanking=[];
  for(var r=1;r<=6;r++){
    var m=text.match(new RegExp(r+'位[\\s　]*(\\d)号艇'));
    if(m)aiRanking.push({rank:r,n:parseInt(m[1])});
  }
  var honsen=[],osaee=[],inSec='';
  text.split('\n').forEach(function(ln){
    var t=ln.trim();
    if(t.indexOf('本線')===0)inSec='honsen';
    else if(t.indexOf('抑え')===0)inSec='osaee';
    else if(/^\d-\d-\d$/.test(t)){
      if(inSec==='honsen')honsen.push(t);
      else if(inSec==='osaee')osaee.push(t);
    }
  });
  var boats=calcData.parsed.boats.map(function(b){
    return{n:b.n,name:b.name,tokuten:b.tokuten,avgST:b.avgST||b.stKoki,kiryokuRank:b.kiryokuRank,sogoRank:b.sogoRank,sogoScore:b.sogoScore?Math.round(b.sogoScore*10)/10:null};
  });
  var entry={
    id:Date.now(),
    datetime:new Date().toISOString(),
    venue:venue,
    raceNum:raceNum,
    mode:currentMode,
    shinkido:currentMode==='normal'?(calcData.normalResult?calcData.normalResult.shinkido:null):null,
    nigeRate:calcData.parsed.nigeRate,
    areScore:calcData.areResult?calcData.areResult.score:null,
    furikiriPass:currentMode==='are'?(calcData.furikiriResult?calcData.furikiriResult.pass:null):null,
    arePts:currentMode==='are'?currentPts:null,
    boats:boats,
    aiRanking:aiRanking,
    bets:{honsen:honsen,osaee:osaee},
    result:null,hit:null,maruResult:null,shiroResult:null,sankakuResult:null
  };
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  logs.push(entry);
  if(logs.length>200)logs=logs.slice(-200);
  localStorage.setItem('kyotei_logs',JSON.stringify(logs));
  updateLogSummary();
}

function updateLogSummary(){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var el=document.getElementById('logSummary');
  if(!logs.length){el.style.display='none';return;}
  el.style.display='block';
  var pending=logs.filter(function(l){return l.result===null;});
  var done=logs.filter(function(l){return l.result!==null&&l.result!=='skip';});
  var hits=done.filter(function(l){return l.hit;}).length;
  var maruHits=done.filter(function(l){return l.maruResult===1;}).length;
  var totalPayout=done.reduce(function(s,l){return s+(l.result.payout||0);},0);
  var html='<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;">';
  html+='<div style="font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;">予想ログ</div>';
  if(pending.length){
    html+='<div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;">📋 結果未入力（'+pending.length+'件）</div>';
    pending.slice().reverse().forEach(function(l){
      var dt=new Date(l.datetime);
      var label=l.venue+l.raceNum+'R '+(dt.getMonth()+1)+'/'+(dt.getDate())+' '+dt.getHours()+':'+(dt.getMinutes()<10?'0':'')+dt.getMinutes();
      html+='<button onclick="openResultInput('+l.id+')" style="display:block;width:100%;text-align:left;padding:9px 10px;margin-bottom:4px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;font-family:\'Noto Sans JP\',sans-serif;">'+label+' → 結果を入力</button>';
    });
    html+='<div style="height:8px;"></div>';
  }
  if(done.length){
    html+='<div style="display:flex;gap:8px;margin-bottom:10px;">';
    html+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:18px;font-weight:700;color:var(--accent);">'+Math.round(hits/done.length*100)+'%</div><div style="font-size:10px;color:var(--text-sub);">的中率</div><div style="font-size:10px;color:var(--text-muted);">'+hits+'/'+done.length+'</div></div>';
    html+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:18px;font-weight:700;color:var(--blue);">'+Math.round(maruHits/done.length*100)+'%</div><div style="font-size:10px;color:var(--text-sub);">◎1着率</div></div>';
    html+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:14px;font-weight:700;color:var(--green);">'+totalPayout.toLocaleString()+'</div><div style="font-size:10px;color:var(--text-sub);">累計払戻</div></div>';
    html+='</div>';
    html+='<button onclick="analyzeLog()" style="width:100%;padding:11px;background:var(--blue-light);color:var(--blue);border:1px solid #c0d8f0;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:\'Noto Sans JP\',sans-serif;'+(done.length<10?'opacity:0.5;':'')+'">🔍 AIに改善提案させる'+(done.length<10?' ('+done.length+'/10件)':'')+'</button>';
    html+='<button onclick="resetLog()" style="width:100%;margin-top:6px;padding:10px;background:var(--surface);color:var(--text-muted);border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:700;-webkit-appearance:none;font-family:\'Noto Sans JP\',sans-serif;">🗑 ログをリセット</button>';
  }
  html+='</div>';
  el.innerHTML=html;
}

function openResultInput(id){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var entry=null;
  for(var i=0;i<logs.length;i++){if(logs[i].id===id){entry=logs[i];break;}}
  if(!entry)return;
  var el=document.getElementById('logSummary');
  var html='<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;">';
  html+='<div style="font-size:11px;font-weight:700;margin-bottom:10px;">'+entry.venue+entry.raceNum+'R の結果を入力</div>';
  ['1着','2着','3着'].forEach(function(label,pi){
    html+='<div style="font-size:11px;color:var(--text-sub);margin-bottom:5px;">'+label+'</div>';
    html+='<div style="display:flex;gap:5px;margin-bottom:10px;">';
    [1,2,3,4,5,6].forEach(function(n){
      html+='<button onclick="selectBtn('+id+','+(pi+1)+','+n+')" id="rb_'+id+'_'+(pi+1)+'_'+n+'" style="flex:1;padding:10px 0;border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;background:var(--surface);color:var(--text);-webkit-appearance:none;">'+n+'</button>';
    });
    html+='</div>';
  });
  html+='<div style="font-size:11px;color:var(--text-sub);margin-bottom:5px;">払戻（円・任意）</div>';
  html+='<input type="number" id="pay_'+id+'" placeholder="例: 12500" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px;outline:none;margin-bottom:10px;">';
  html+='<button onclick="commitLog('+id+')" style="width:100%;padding:12px;background:var(--text);color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:\'Noto Sans JP\',sans-serif;">保存</button>';
  html+='<button onclick="skipLog('+id+')" style="width:100%;margin-top:6px;padding:11px;background:var(--surface);color:var(--text-sub);border:1px solid var(--border);border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;">見送り</button>';
  html+='<button onclick="updateLogSummary()" style="width:100%;margin-top:6px;padding:10px;background:var(--surface);color:var(--text-sub);border:1px solid var(--border);border-radius:4px;font-size:12px;-webkit-appearance:none;">キャンセル</button>';
  html+='</div>';
  el.innerHTML=html;
  window['_rb_'+id]={1:null,2:null,3:null};
}

function selectBtn(id,place,n){
  if(!window['_rb_'+id])return;
  window['_rb_'+id][place]=n;
  [1,2,3,4,5,6].forEach(function(i){
    var btn=document.getElementById('rb_'+id+'_'+place+'_'+i);
    if(btn){btn.style.background=i===n?'var(--text)':'var(--surface)';btn.style.color=i===n?'#fff':'var(--text)';}
  });
}

function skipLog(id){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  for(var i=0;i<logs.length;i++){
    if(logs[i].id===id){logs[i].result='skip';logs[i].hit=false;break;}
  }
  localStorage.setItem('kyotei_logs',JSON.stringify(logs));
  delete window['_rb_'+id];
  showStatus('見送りとして記録しました','ok');
  updateLogSummary();
}

function commitLog(id){
  var sel=window['_rb_'+id];
  if(!sel||!sel[1]||!sel[2]||!sel[3]){
    // 未入力の着順をハイライト
    [1,2,3].forEach(function(place){
      if(!sel||!sel[place]){
        [1,2,3,4,5,6].forEach(function(n){
          var btn=document.getElementById('rb_'+id+'_'+place+'_'+n);
          if(btn)btn.style.border='2px solid var(--accent)';
        });
      }
    });
    showToast('1着・2着・3着をすべて入力してください');
    return;
  }
  var payout=parseInt(document.getElementById('pay_'+id).value)||0;
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var hitResult=false;
  for(var i=0;i<logs.length;i++){
    if(logs[i].id===id){
      var l=logs[i];
      l.result={first:sel[1],second:sel[2],third:sel[3],payout:payout};
      var combo=sel[1]+'-'+sel[2]+'-'+sel[3];
      var allBets=l.bets.honsen.concat(l.bets.osaee);
      l.hit=allBets.indexOf(combo)>=0;
      hitResult=l.hit;
      l.aiRanking.forEach(function(ar){
        var pos=ar.n===sel[1]?1:ar.n===sel[2]?2:ar.n===sel[3]?3:null;
        if(ar.rank===1)l.maruResult=pos;
        if(ar.rank===2)l.shiroResult=pos;
        if(ar.rank===3)l.sankakuResult=pos;
      });
      break;
    }
  }
  localStorage.setItem('kyotei_logs',JSON.stringify(logs));
  delete window['_rb_'+id];
  var combo2=sel[1]+'-'+sel[2]+'-'+sel[3];
  showStatus(combo2+' '+(hitResult?'✅ 的中':'❌ 外れ'),'ok');
  updateLogSummary();
}

function resetLog(){
  if(!confirm('ログを全件削除します。この操作は元に戻せません。よろしいですか？'))return;
  if(!confirm('本当に削除しますか？'))return;
  localStorage.removeItem('kyotei_logs');
  document.getElementById('logAnalysis').style.display='none';
  updateLogSummary();
  showStatus('ログをリセットしました','ok');
}

function analyzeLog(){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var done=logs.filter(function(l){return l.result!==null;});
  if(done.length<10){alert('10件以上記録してから分析できます');return;}
  var key=getKey();
  if(!key){alert('APIキーを設定してください');return;}
  var summary=done.map(function(l,i){
    var r=l.result;
    var combo=r.first+'-'+r.second+'-'+r.third;
    var ai=l.aiRanking.map(function(a){return a.rank+'位:'+a.n+'号';}).join('/');
    var meta=[];
    if(l.mode==='normal'&&l.shinkido)meta.push('信頼度'+l.shinkido);
    if(l.nigeRate!==null&&l.nigeRate!==undefined)meta.push('逃げ率'+l.nigeRate+'%');
    if(l.areScore!==null&&l.areScore!==undefined)meta.push('荒れ'+l.areScore+'点');
    if(l.mode==='are'&&l.arePts)meta.push(l.arePts+'点買い');
    return (i+1)+'. '+l.venue+l.raceNum+'R ['+l.mode+'] '+(meta.length?'('+meta.join('/')+') ':'')+' AI評価:'+ai+' 結果:'+combo+' '+(l.hit?'的中':'外れ')+(l.maruResult?' ◎'+l.maruResult+'着':'')+(r.payout?' 払戻'+r.payout:'');
  }).join('\n');
  var prompt='競艇予想システムのログを分析し、結論のみを以下フォーマットで出力せよ。説明・前置き・繰り返し一切不要。\n\n'+summary+'\n\n【出力フォーマット（厳守）】\n【◎1着率】XX% (X/X件)\n【外れパターン】\n・パターン名: 件数と原因1行\n・パターン名: 件数と原因1行\n【スコア改善案】\n・指標名: +X/-X点、根拠1行\n・指標名: +X/-X点、根拠1行\n【通常モード改善】\n・改善点: 1行\n【荒れモード改善】\n・改善点: 1行\n【優先対応】\n・最重要: 1行\n・次点: 1行';
  document.getElementById('logAnalysis').style.display='block';
  document.getElementById('logAnalysis').innerHTML='<div style="margin-top:10px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:6px;text-align:center;"><div class="spinner" style="margin:0 auto 8px;"></div><div style="font-size:11px;color:var(--text-muted);">分析中...</div></div>';
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:2000,thinkingConfig:{thinkingBudget:0}}})
  }).then(function(res){return res.json();}).then(function(json){
    var t=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts[0].text||'分析失敗';
    document.getElementById('logAnalysis').innerHTML='<div style="margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;"><div style="font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px;">AI改善提案</div><div style="font-size:12px;color:var(--text);line-height:2.0;white-space:pre-wrap;">'+t+'</div></div>';
  }).catch(function(e){document.getElementById('logAnalysis').innerHTML='<div style="color:var(--accent);padding:10px;">エラー: '+e.message+'</div>';});
}

loadKey();
loadVenueRace();
updateLogSummary();
</script>
