<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G. 予想エンジン v2.0</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0f14;color:#e0e4f0;font-family:-apple-system,sans-serif;min-height:100vh;padding:20px 16px 80px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#e8c56a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#0d0f14;}
.logo-text{font-size:18px;font-weight:700;color:#fff;}
.logo-sub{font-size:11px;color:#556;margin-top:1px;}
.ver{font-size:11px;color:#556;background:#161921;border:1px solid #252a38;padding:4px 10px;border-radius:20px;}
.sec{background:#161921;border:1px solid #222840;border-radius:14px;padding:16px;margin-bottom:14px;}
.sec-label{font-size:11px;color:#c9a84c;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:12px;}
.mode-row{display:flex;gap:8px;margin-bottom:12px;}
.mode-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:-apple-system,sans-serif;}
.mode-btn.active{background:#c9a84c;color:#0d0f14;border:none;}
.mode-btn.inactive{background:#0d0f14;color:#888;border:1px solid #222840;}
.race-row{display:flex;gap:8px;}
.sel-w{flex:1;position:relative;}
.sel-w::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#667;font-size:11px;pointer-events:none;}
.sel{width:100%;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#e0e4f0;font-size:13px;padding:11px 28px 11px 12px;-webkit-appearance:none;outline:none;}
textarea{width:100%;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#c8d0e8;font-size:11px;padding:12px;resize:none;outline:none;font-family:monospace;line-height:1.8;min-height:110px;}
textarea::placeholder{color:#333a50;font-size:11px;}
.calc-btn{width:100%;padding:13px;background:#1a2a4a;color:#7aabee;font-size:13px;font-weight:700;border:1px solid #2a3a6a;border-radius:10px;-webkit-appearance:none;margin-top:10px;}
.gen-btn{width:100%;padding:16px;background:linear-gradient(135deg,#c9a84c,#e8c56a);color:#080a0f;font-size:15px;font-weight:800;border:none;border-radius:12px;-webkit-appearance:none;margin-top:4px;}
.gen-btn:disabled{background:#1e2330;color:#333;}
.api-row{display:flex;gap:8px;}
.api-input{flex:1;background:#0d0f14;border:1px solid #252a38;border-radius:10px;color:#e0e4f0;font-size:13px;padding:11px 12px;outline:none;font-family:monospace;}
.api-input.saved{border-color:#2a6a3a;color:#5dc87a;}
.api-save{background:#c9a84c;color:#0d0f14;border:none;padding:11px 16px;border-radius:10px;font-size:12px;font-weight:700;-webkit-appearance:none;}
.calc-result{background:#0d0f14;border:1px solid #1a2030;border-radius:12px;padding:14px;margin-top:12px;display:none;}
.calc-result.show{display:block;}
.cr-sec{font-size:11px;color:#c9a84c;font-weight:700;letter-spacing:1px;margin:10px 0 8px;}
.cr-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px;}
.cr-table th{background:#161921;color:#c9a84c;padding:5px 6px;text-align:center;border-bottom:1px solid #1a2030;font-size:10px;}
.cr-table td{padding:5px 6px;border-bottom:1px solid #111820;text-align:center;color:#8090b0;}
.cr-table tr.best td{color:#f0d878;font-weight:700;}
.tot{color:#aaa !important;}
.info-row{font-size:11px;color:#667;margin:6px 0;}
.info-row b{color:#aab;}
.are-box{background:#0d0f14;border:1px solid #1a2030;border-radius:8px;padding:10px;margin:8px 0;}
.are-score{font-size:26px;font-weight:800;}
.score-pass{color:#5dc87a;}
.score-fail{color:#e55;}
.are-label{font-size:10px;color:#556;}
.bd-list{font-size:11px;color:#778;margin-top:6px;line-height:1.9;}
.bd-list span{color:#aab;}
.furikiri{padding:10px 12px;border-radius:8px;font-size:13px;font-weight:700;margin:8px 0;}
.furikiri.pass{background:#0a1a10;color:#5dc87a;border:1px solid #1a4a28;}
.furikiri.fail{background:#1a0808;color:#e55;border:1px solid #4a1515;}
.cand-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.c1{background:rgba(201,168,76,0.15);color:#c9a84c;border:1px solid rgba(201,168,76,0.3);}
.c2{background:rgba(85,136,224,0.12);color:#88aaee;border:1px solid rgba(85,136,224,0.25);}
.status{font-size:12px;font-weight:500;padding:10px 12px;border-radius:10px;margin-bottom:12px;display:none;}
.status.err{display:block;background:#1a0808;color:#ff6b6b;border:1px solid #4a1515;}
.status.ok{display:block;background:#081a10;color:#5dc87a;border:1px solid #1a4a28;}
.loading{text-align:center;padding:24px 0;display:none;}
.loading.show{display:block;}
.spinner{width:26px;height:26px;border:2px solid #252a38;border-top-color:#c9a84c;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:#556;}
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-hdr{font-size:11px;color:#c9a84c;letter-spacing:1px;font-weight:700;margin-bottom:8px;}
.out-text{background:#0d0f14;border:1px solid #222840;border-radius:10px;padding:14px;font-size:12px;color:#c8d0e8;line-height:1.9;white-space:pre-wrap;word-break:break-word;}
.copy-btn{width:100%;margin-top:10px;padding:12px;background:#161921;color:#c9a84c;border:1px solid #2a3050;border-radius:10px;font-size:13px;font-weight:700;-webkit-appearance:none;}
.copy-btn.ok{background:#081a10;color:#5dc87a;border-color:#1a4a28;}
.div{height:1px;background:linear-gradient(90deg,transparent,#252a38,transparent);margin:4px 0 14px;}

</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div><div class="logo-text">予想エンジン</div><div class="logo-sub">JS計算 + AI生成 v2.0</div></div>
  </div>
  <div class="ver">v2.0</div>
</div>

<div class="sec">
  <div class="sec-label">Gemini API Key</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="AIza...">
    <button class="api-save" onclick="saveKey()">保存</button>
  </div>
</div>

<div class="sec">
  <div class="sec-label">モード・レース情報</div>
  <div class="mode-row">
    <button class="mode-btn active" id="modeNormal" onclick="setMode('normal')">通常 v4.7</button>
    <button class="mode-btn inactive" id="modeAre" onclick="setMode('are')">荒れ v2.3</button>
  </div>
  <div class="race-row">
    <div class="sel-w">
      <select class="sel" id="venue">
        <option value="">場所を選択</option>
        <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
        <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
        <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
        <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
        <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
      </select>
    </div>
    <div class="sel-w" style="flex:0 0 80px">
      <select class="sel" id="raceNum">
        <option value="">R</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-label">レースデータ（データ抽出BMでコピー）</div>
  <textarea id="raceData" rows="7" placeholder="データ抽出BMで4タブ収集 → コピー → ここに貼り付け"></textarea>
  <div style="display:flex;gap:8px;"><button class="calc-btn" style="flex:1;margin-top:0;" onclick="runCalc()">⚡ データを解析する</button><button onclick="clearAll()" style="padding:13px 16px;background:#1a1a2a;color:#888;border:1px solid #2a2a3a;border-radius:10px;font-size:13px;cursor:pointer;-webkit-appearance:none;">✕</button></div>
  <div class="calc-result" id="calcResult">
    <div style="font-size:11px;color:#c9a84c;font-weight:700;margin-bottom:8px;">📊 解析結果（AIに送信する前に確認）</div>
    <div id="calcContent"></div>
  </div>
</div>

<div class="status" id="status"></div>
<button class="gen-btn" id="genBtn" onclick="generate()" disabled>🎯 予想を生成する</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Gemini が予想を生成中...</div>
</div>

<div class="out-wrap" id="outWrap">
  <div class="div"></div>
  <div class="out-hdr">予想結果</div>
  <div class="out-text" id="outText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyOut()">📋 X投稿用にコピー</button>
<button class="copy-btn" id="bridgeBtn" onclick="saveToBridge()" style="margin-top:8px;background:#0a1a2a;color:#7aabee;border-color:#2a3a6a;">📤 G. Toolsに連携</button>
</div>

<script>

var currentMode = 'normal';
var calcData = null;


function clearAll(){
  document.getElementById('raceData').value='';
  document.getElementById('calcResult').classList.remove('show');
  document.getElementById('calcContent').innerHTML='';
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('outText').textContent='';
  document.getElementById('status').style.display='none';
  document.getElementById('genBtn').disabled=true;
  try{document.getElementById('venue').value='';}catch(e){}
  try{document.getElementById('raceNum').value='';}catch(e){}
  calcData=null;
}
function saveToBridge(){
  var text=document.getElementById('outText').textContent;
  if(!text){showStatus('先に予想を生成してください','err');return;}
  var venue=document.getElementById('venue').value||'';
  var raceNum=document.getElementById('raceNum').value||'';
  var bridge={ts:Date.now(),venue:venue,raceNum:raceNum,outputText:text,mode:currentMode};
  localStorage.setItem('yoso_bridge',JSON.stringify(bridge));
  var btn=document.getElementById('bridgeBtn');
  btn.textContent='✅ 連携済み';
  btn.style.color='#5dc87a';
  btn.style.borderColor='#1a4a28';
  setTimeout(function(){
    btn.textContent='📤 G. Toolsに連携';
    btn.style.color='#7aabee';
    btn.style.borderColor='#2a3a6a';
  },3000);
}
function saveKey(){
  var k=document.getElementById('apiKey').value.trim();
  if(!k)return;
  localStorage.setItem('gemini_key',k);
  document.getElementById('apiKey').classList.add('saved');
  document.getElementById('apiKey').value='保存済み';
  showStatus('APIキーを保存しました','ok');
}
function loadKey(){
  if(localStorage.getItem('gemini_key')){
    document.getElementById('apiKey').value='保存済み';
    document.getElementById('apiKey').classList.add('saved');
  }
}
function getKey(){
  var el=document.getElementById('apiKey');
  if(el.classList.contains('saved'))return localStorage.getItem('gemini_key')||'';
  return el.value.trim();
}
function setMode(m){
  currentMode=m;
  document.getElementById('modeNormal').className='mode-btn '+(m==='normal'?'active':'inactive');
  document.getElementById('modeAre').className='mode-btn '+(m==='are'?'active':'inactive');
  if(calcData)displayCalcResults(calcData);
}
function showStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;
  el.style.display='block';
}

/* ===== PARSER ===== */
function parseData(raw){
  var lines=raw.replace(/\r/g,'').split('\n');
  var boats=[];
  for(var i=0;i<6;i++){
    boats.push({n:i+1,name:'',fKi:0,fZen:0,soyoRate:0,stKoki:null,
      tokuten:null,avgST:null,exhibRank:null,winsRate:null,
      avgEx:null,avgLap:null,avgStr:null,
      nyuse:i+1,exT:null,lapT:null,strT:null,st:null,stF:false,tilt:0,
      kiryoku:null,kiryokuRank:null});
  }
  var section='',nigeContext='';
  var nigeRate6M=null,nigeRateLocal=null,nigeRateKoki=null,localCount=0;
  var afterFrank=false,afterNigeRow=false;

  function v6(line){
    var cols=line.split('\t'),out=[];
    for(var ci=1;ci<cols.length&&out.length<6;ci++){
      var v=(cols[ci]||'').trim();
      if(!v||v==='-'){out.push(null);continue;}
      var clean=v.replace(/[%（）()]/g,'').replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      out.push(isNaN(n)?null:n);
    }
    while(out.length<6)out.push(null);
    return out;
  }
  function stv6(line){
    var cols=line.split('\t'),vals=[],flags=[];
    for(var ci=1;ci<cols.length&&vals.length<6;ci++){
      var v=(cols[ci]||'').trim();
      var isF=v.startsWith('F');
      flags.push(isF);
      var clean=v.replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      vals.push(isNaN(n)?null:n);
    }
    while(vals.length<6){vals.push(null);flags.push(false);}
    return{vals,flags};
  }

  for(var idx=0;idx<lines.length;idx++){
    var line=lines[idx].trim();
    var cols=line.split('\t');
    var label=(cols[0]||'').trim().replace(/\s+/g,'');

    // Section
    var sm=line.match(/=== (.+?) ===/);
    if(sm){section=sm[1].trim().replace(/\s/g,'');afterFrank=false;afterNigeRow=false;continue;}

    if(section==='基本情報'){
      if(label.includes('基本情報')||label.includes('基本')){
        var nc=line.split('\t').slice(1);
        for(var j=0;j<6&&j<nc.length;j++){var nm=nc[j].trim();if(nm)boats[j].name=nm;}
      }
      if(label==='フライング')afterFrank=true;
      if(afterFrank&&label==='今期'){
        var fv=v6(line);for(var j=0;j<6;j++)boats[j].fKi=fv[j]||0;afterFrank=false;
      }
      if(label==='前期'){var fv2=v6(line);for(var j=0;j<6;j++)boats[j].fZen=fv2[j]||0;}
      if(label==='事故率'){var sv=v6(line);for(var j=0;j<6;j++)boats[j].soyoRate=sv[j]||0;}
      // 今期平均ST (基本情報内の平均ST→今期行)
      if(label==='今期'&&!afterFrank){
        var sv2=v6(line);
        var allSmall=sv2.filter(v=>v!==null).every(v=>v<1.0);
        if(allSmall)for(var j=0;j<6;j++)if(sv2[j]!==null)boats[j].stKoki=sv2[j];
      }
    }

    if(section==='今節成績'){
      if(label==='得点率'){var tv=v6(line);for(var j=0;j<6;j++)boats[j].tokuten=tv[j];}
      if(label==='平均ST'){var sv3=v6(line);for(var j=0;j<6;j++)if(sv3[j]!==null)boats[j].avgST=sv3[j];}
      if(label==='展示順位'||label==='平均展示順位'){var ev=v6(line);for(var j=0;j<6;j++)boats[j].exhibRank=ev[j];}
      if(label==='1着率'){var wv=v6(line);for(var j=0;j<6;j++)boats[j].winsRate=wv[j];}
      if(label==='平均展示'){var av=v6(line);for(var j=0;j<6;j++)if(av[j])boats[j].avgEx=av[j];}
      if(label==='平均周足'||label==='平均周り足'){var lv=v6(line);for(var j=0;j<6;j++)if(lv[j])boats[j].avgLap=lv[j];}
      if(label==='平均直線'){var dv=v6(line);for(var j=0;j<6;j++)if(dv[j])boats[j].avgStr=dv[j];}
    }

    if(section==='直前情報'){
      if(label==='進入'){var nv=v6(line);for(var j=0;j<6;j++)if(nv[j])boats[j].nyuse=Math.round(nv[j]);}
      if(label==='展示'){var etv=v6(line);for(var j=0;j<6;j++)if(etv[j])boats[j].exT=etv[j];}
      if(label==='周り足'||label==='周り足'){var ltv=v6(line);for(var j=0;j<6;j++)if(ltv[j])boats[j].lapT=ltv[j];}
      if(label==='直線'){var stv=v6(line);for(var j=0;j<6;j++)if(stv[j])boats[j].strT=stv[j];}
      if(label==='ST'){var sf=stv6(line);for(var j=0;j<6;j++)if(sf.vals[j]!==null){boats[j].st=sf.vals[j];boats[j].stF=sf.flags[j];}}
      if(label==='チルト'){var cv=v6(line);for(var j=0;j<6;j++)if(cv[j]!==null)boats[j].tilt=cv[j];}
    }

    if(section==='枠別勝率'){
      // 当地カウント
      if(label==='当地'&&line.includes('(')){var cm=line.match(/\((\d+)\)/);if(cm)localCount=parseInt(cm[1]);}
      // nigeコンテキスト
      if(line.includes('直近6ヶ月')||line.includes('直近 6ヶ月')||line.includes('直近６ヶ月'))nigeContext='6M';
      else if(line.includes('直近1年')||line.includes('直近 1年')||line.includes('直近１年'))nigeContext='1Y';
      else if(label==='当地'&&!line.includes('%'))nigeContext='local';
      else if(label==='今期'&&nigeContext==='')nigeContext='koki';
      // 逃げ率2行パターン
      if(label.startsWith('逃げ')&&!line.includes('%')){afterNigeRow=true;}
      else if(afterNigeRow){
        var pct=parseFloat((line.split('\t')[0]||'').replace(/%/,''));
        if(!isNaN(pct)){
          if(nigeContext==='6M'&&nigeRate6M===null)nigeRate6M=pct;
          else if(nigeContext==='local'&&nigeRateLocal===null)nigeRateLocal=pct;
          else if(nigeContext==='koki'&&nigeRateKoki===null)nigeRateKoki=pct;
        }
        afterNigeRow=false;
      }
    }
  }

  // 逃げ率決定
  var nigeRate=null,nigeRateSrc='';
  if(localCount>=10&&nigeRateLocal!==null){nigeRate=nigeRateLocal;nigeRateSrc='当地('+localCount+'戦)';}
  else if(nigeRate6M!==null){nigeRate=nigeRate6M;nigeRateSrc='直近6M';}
  else if(nigeRateKoki!==null){nigeRate=nigeRateKoki;nigeRateSrc='今期';}

  return{boats,nigeRate,nigeRateSrc,localCount};
}

/* ===== 機力スコア ===== */
function calcKiryoku(boats){
  boats.forEach(function(b){
    var avgE=b.avgEx!==null?b.avgEx:b.exT;
    var avgL=b.avgLap!==null?b.avgLap:b.lapT;
    var avgS=b.avgStr!==null?b.avgStr:b.strT;
    var dirE=b.exT,dirL=b.lapT,dirS=b.strT;
    if(dirE!==null&&dirL!==null&&dirS!==null){
      b.kiryoku=(avgE||dirE)+(avgL||dirL)+(avgS||dirS)+dirE+dirL+dirS;
    }else if(dirE!==null&&dirL!==null){
      b.kiryoku=(avgE||dirE)*2+(avgL||dirL)*2;
    }
  });
  var valid=boats.filter(b=>b.kiryoku!==null).sort((a,b)=>a.kiryoku-b.kiryoku);
  valid.forEach((b,i)=>b.kiryokuRank=i+1);
}

/* ===== 荒れ指数 ===== */
function calcAreIndex(boats,nigeRate){
  var score=0,bd=[];
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  var innerBoats=boats.filter(b=>[1,2,3].includes(b.nyuse));
  var outerBoats=boats.filter(b=>b.nyuse>=4);

  // F今期
  var fKi123=innerBoats.filter(b=>b.fKi>=1);
  if(b1.fKi>=1){score+=3;bd.push('1コース今期F持ち +3');}
  else if(fKi123.length>=2){score+=3;bd.push('1〜3コース今期F複数 +3');}
  else if(fKi123.length===1){score+=1;bd.push('2〜3コース今期F1艇 +1');}

  // 展示F
  var exF123=innerBoats.filter(b=>b.stF);
  if(b1.stF){score+=1;bd.push('1コース展示F +1');}
  if(!b1.stF&&exF123.length>=2){score+=1;bd.push('1〜3コース展示F複数 +1');}

  // 今節実績
  if(b1.exhibRank!==null&&b1.exhibRank>=5){score+=3;bd.push('1コース今節展示'+b1.exhibRank+'位 +3');}
  if(b1.winsRate!==null&&b1.winsRate===0){score+=3;bd.push('1コース今節1着率0% +3');}
  var allTok=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT=allTok.slice().sort((a,b)=>a-b);
    if(b1.tokuten<=sortedT[1]){score+=2;bd.push('1コース今節得点率下位2 +2');}
  }
  var allAvgST=boats.map(b=>b.avgST).filter(v=>v!==null);
  if(allAvgST.length>=2&&b1.avgST!==null){
    if(b1.avgST===Math.max(...allAvgST)){score+=2;bd.push('1コース今節平均ST最遅 +2');}
  }

  // 逃げ率・ST
  if(nigeRate!==null){
    if(nigeRate<30){score+=3;bd.push('逃げ率'+nigeRate+'%<30% +3');}
    else if(nigeRate<50){score+=2;bd.push('逃げ率'+nigeRate+'%<50% +2');}
  }
  var stFallback=b1.avgST!==null?b1.avgST:b1.stKoki;
  if(stFallback!==null&&stFallback>=0.18){score+=2;bd.push('1コース平均ST'+stFallback+'≥0.18 +2');}
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT2=allTok.slice().sort((a,b)=>a-b);
    var mid=sortedT2[Math.floor(sortedT2.length/2)];
    if(b1.tokuten<mid){score+=1;bd.push('1コース今節得点率下位半分 +1');}
  }

  // 外コース優位性
  var allExRank=boats.map(b=>b.exhibRank).filter(v=>v!==null);
  if(outerBoats.some(b=>b.exhibRank===1&&allExRank.length)){score+=2;bd.push('外枠今節展示1位 +2');}
  if(allTok.length){
    var maxTok=Math.max(...allTok);
    if(outerBoats.some(b=>b.tokuten===maxTok&&maxTok>0)){score+=2;bd.push('外枠今節得点率1位 +2');}
  }
  var inSTs=innerBoats.map(b=>b.avgST||b.stKoki).filter(v=>v!==null);
  var outSTs=outerBoats.map(b=>b.avgST||b.stKoki).filter(v=>v!==null);
  if(inSTs.length&&outSTs.length){
    var avgIn=inSTs.reduce((s,v)=>s+v,0)/inSTs.length;
    var avgOut=outSTs.reduce((s,v)=>s+v,0)/outSTs.length;
    if(avgOut<avgIn-0.01){score+=1;bd.push('外枠平均ST優秀 +1');}
  }
  if(outerBoats.some(b=>b.stF)){score+=1;bd.push('外枠展示F +1');}

  // 進入変更
  if(boats.some(b=>b.nyuse!==b.n)){score+=3;bd.push('進入変更 +3');}

  // 賞除艇（前期F2本以上 = 今期賞除の可能性）
  var shojoOuter=outerBoats.filter(b=>b.fZen>=2);
  if(shojoOuter.length){score+=3;bd.push('外枠賞除疑い艇（前期F≥2） +3');}

  return{score,breakdown:bd};
}

/* ===== 足切り ===== */
function checkFurikiri(areScore,boats,nigeRate){
  if(areScore<8)return{pass:false,stage:1,reason:'荒れ指数'+areScore+'点（8点未満）'};
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  function ex(){
    if(boats.some(b=>b.nyuse!==b.n))return true;
    var allT=boats.map(b=>b.tokuten).filter(v=>v!==null);
    if(allT.length&&b1.tokuten!==null){
      var s=allT.slice().sort((a,b)=>a-b);
      var th=s[Math.floor(s.length*0.3)];
      var stc=b1.avgST!==null?b1.avgST:b1.stKoki;
      if(b1.tokuten<=th&&stc!==null&&stc>=0.18)return true;
    }
    if(b1.exhibRank!==null&&b1.exhibRank>=5)return true;
    if(b1.winsRate!==null&&b1.winsRate===0)return true;
    return false;
  }
  if(nigeRate!==null&&nigeRate>=60&&!ex())return{pass:false,stage:2,reason:'逃げ率'+nigeRate+'%（≥60%）'};
  var allT2=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allT2.length&&b1.tokuten!==null&&b1.tokuten===Math.max(...allT2)&&!ex())
    return{pass:false,stage:2,reason:'1コース今節得点率1位'};
  if(b1.kiryokuRank===1&&!ex())
    return{pass:false,stage:2,reason:'1コース機力1位'};
  return{pass:true};
}

/* ===== JS強制×判定 ===== */
function calcForceNG(boats){
  var allTok=boats.map(b=>b.tokuten).filter(v=>v!==null);
  var minTok=allTok.length?Math.min(...allTok):null;
  var maxKiryokuRank=Math.max(...boats.map(b=>b.kiryokuRank||0));
  var candidates=[];
  boats.forEach(function(b){
    b.forceNG=false;b.forceNGReason='';
    var st=b.avgST!==null?b.avgST:(b.stKoki!==null?b.stKoki:null);
    var score=0,reason='';
    if(st!==null&&st>=0.25){score+=3;reason='平均ST'+st+'≥0.25';}
    if(minTok!==null&&b.tokuten===minTok&&b.kiryokuRank===maxKiryokuRank){score+=2;reason=reason||'得点率最下位＋機力最下位';}
    if(b.tokuten!==null&&b.tokuten<=2.00&&b.winsRate===0){score+=2;reason=reason||'得点率'+b.tokuten+'以下＋1着率0%';}
    if(score>0)candidates.push({b:b,score:score,reason:reason});
  });
  // 最もスコアが高い1艇だけ強制×
  if(candidates.length>0){
    candidates.sort(function(a,b){return b.score-a.score;});
    candidates[0].b.forceNG=true;
    candidates[0].b.forceNGReason=candidates[0].reason;
  }
}

/* ===== 1着候補 ===== */
function select1st(boats){
  var cands=[];
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  // 外枠展示F
  boats.filter(b=>b.nyuse>=4&&b.stF).forEach(b=>{
    if(b.nyuse<=5&&b.kiryokuRank<=3)cands.push({n:b.n,reason:b.nyuse+'コース展示F・機力'+b.kiryokuRank+'位'});
    else if(b.nyuse===6&&b.kiryokuRank===1&&b.st!==null&&b.st<=0.05)cands.push({n:b.n,reason:'6コース展示F・機力1位・ST優秀'});
  });
  // 今節得点率上位（1・6コース除く）
  var allT=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allT.length){
    var sortedT=allT.slice().sort((a,b)=>b-a);
    var top3=sortedT.slice(0,3);
    var bot30=sortedT[Math.floor(sortedT.length*0.7)]||0;
    boats.forEach(b=>{
      if(b.nyuse===1||b.nyuse===6)return;
      if(b.tokuten!==null&&top3.includes(b.tokuten)&&b.tokuten>bot30){
        if(!cands.find(c=>c.n===b.n))cands.push({n:b.n,reason:b.nyuse+'コース今節得点率上位'});
      }
    });
  }
  // 2・3コース例外
  boats.filter(b=>b.nyuse<=3&&b.nyuse>1).forEach(b=>{
    if(b.kiryokuRank===1){
      var allT2=boats.map(x=>x.tokuten).filter(v=>v!==null);
      if(allT2.length){
        var st=allT2.slice().sort((a,b)=>b-a).slice(0,3);
        if(b.tokuten!==null&&st.includes(b.tokuten)&&!cands.find(c=>c.n===b.n))
          cands.push({n:b.n,reason:b.nyuse+'コース機力1位＋得点率上位'});
      }
    }
    if(b1.st!==null&&b1.st>=0.25&&b.nyuse===2&&!cands.find(c=>c.n===b.n))
      cands.push({n:b.n,reason:'1コースST0.25以上→2コース昇格'});
  });
  return cands.slice(0,2);
}

/* ===== 通常モード ===== */
function calcNormal(boats,nigeRate){
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  var st=b1.avgST!==null?b1.avgST:b1.stKoki;
  var shinkido='B';
  if(nigeRate!==null&&st!==null){
    if(nigeRate>=65&&st<=0.15)shinkido='A';
    else if(nigeRate<55||(st!==null&&st>=0.18))shinkido='C';
  }
  // 2着候補（forceNG艇は除外・得点率＋ST＋機力の総合スコアで選定）
  var sorted=boats.filter(b=>b.nyuse!==1&&!b.forceNG).sort((a,b)=>{
    // 総合スコア：得点率(40%) + ST速さ(30%) + 機力順位の良さ(30%)
    var allTok=boats.map(x=>x.tokuten).filter(v=>v!==null);
    var maxTok=allTok.length?Math.max(...allTok):1;
    var maxKr=Math.max(...boats.map(x=>x.kiryokuRank||6));
    function score(b){
      var tok=(b.tokuten||0)/Math.max(maxTok,1)*40;
      var st=b.avgST!==null?b.avgST:(b.stKoki!==null?b.stKoki:0.2);
      var stScore=(0.3-Math.min(st,0.3))/0.3*30;
      var kr=b.kiryokuRank||maxKr;
      var krScore=(maxKr-kr)/Math.max(maxKr-1,1)*30;
      return tok+stScore+krScore;
    }
    return score(b)-score(a);
  });
  var ab=sorted.slice(0,2).map((b,i)=>({n:b.n,reason:'2着候補'+(i===0?'A':'B')}));
  return{shinkido,ab};
}

/* ===== メイン計算 ===== */
function runCalc(){
  var raw=document.getElementById('raceData').value.trim();
  if(!raw){showStatus('データを貼り付けてください','err');return;}
  var parsed=parseData(raw);
  calcKiryoku(parsed.boats);
  calcForceNG(parsed.boats);
  var areResult=calcAreIndex(parsed.boats,parsed.nigeRate);
  var furikiriResult=checkFurikiri(areResult.score,parsed.boats,parsed.nigeRate);
  var cands1st=select1st(parsed.boats);
  var normalResult=calcNormal(parsed.boats,parsed.nigeRate);
  calcData={parsed,areResult,furikiriResult,cands1st,normalResult};
  displayCalcResults(calcData);
  document.getElementById('calcResult').classList.add('show');
  document.getElementById('genBtn').disabled=false;
  document.getElementById('genBtn').scrollIntoView({behavior:'smooth',block:'center'});
}

    p+='【総合評価】(G.Tools連携用・必ず以下フォーマットで6艇出力)\\n1位 X号艇 ◎\\n2位 X号艇 ○\\n3位 X号艇 ▲\\n4位 X号艇 △\\n5位 X号艇 ×\\n6位 X号艇 ×\\n\\n【評価】(印は◎○▲△××のみ)\\n◎X 苗字(短評)\\n○X 苗字(短評)\\n▲X 苗字(短評)\\n△X 苗字(短評)\\n×X 苗字(短評)\\n×X 苗字(短評)\\n\\n';
    p+='【Xサマリー】\n'+venue+raceNum+'R\n通常モード。イン信頼度【'+normalResult.shinkido+'】\n（展開核心1行・買い目と整合すること）\n（狙い目1行）\n本線　HONSEN\n抑え　OSAEE\nG.';
  }
  return p;
  return p;
}

/* ===== API呼び出し ===== */
async function generate(){
  if(!calcData){showStatus('先にデータを解析してください','err');return;}
  var key=getKey();
  if(!key){showStatus('APIキーを保存してください','err');return;}
  var prompt=buildPrompt();
  document.getElementById('genBtn').disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('status').style.display='none';
  try{
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0.15,maxOutputTokens:16000}
      })
    });
    var json=await res.json();
    if(!res.ok)throw new Error(json.error&&json.error.message||'APIエラー');
    var text=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts[0].text;
    if(!text)throw new Error('レスポンスが空です');
    // AREモード：パラメータをパースして12点自動生成
    if(currentMode==='are'&&calcData&&calcData.cands1st&&calcData.cands1st.length>=2){
      var maru=String(calcData.cands1st[0].n);
      var shiro=String(calcData.cands1st[1].n);
      // AI総合評価の◎○を優先してmaru/shiroを上書き
      var mMaru=text.match(/1位[\s　]*(\d)号艇[\s　]*◎/);
      var mShiro=text.match(/2位[\s　]*(\d)号艇[\s　]*○/);
      if(mMaru&&mShiro){maru=mMaru[1];shiro=mShiro[1];}

      var mA=text.match(/3着A[:：]\s*(\d)号艇/);
      var mB=text.match(/3着B[:：]\s*(\d)号艇/);
      var mC=text.match(/2着追加[:：]\s*(\d)号艇/);
        // fallback: AIがパラメータを出さなかった場合
        if(!mA||!mB||!mC){
          var fb=[okOthers[0]||'1', okOthers[1]||okOthers[0]||'5', okOthers[0]||'1'];
          if(!mA)mA={1:fb[0]};if(!mB)mB={1:fb[1]};if(!mC)mC={1:fb[2]};
        }
        if(mA&&mB&&mC){
        var allBoats=['1','2','3','4','5','6'];
        var ranked2=calcData.parsed&&calcData.parsed.boats?calcData.parsed.boats.slice().sort(function(a,b){return (a.kiryokuRank||99)-(b.kiryokuRank||99);}):[];
        // JS強制×判定を最優先でngBoatsにセット
        var ngBoats=[];
        if(calcData.parsed&&calcData.parsed.boats){
          calcData.parsed.boats.forEach(function(b){if(b.forceNG)ngBoats.push(String(b.n));});
        }
        // JS強制×がない場合はAI×印を使用、それもない場合は機力最下位
        if(ngBoats.length===0){
          var ngFromAI=[];
          var aiLines=text.split('\n');
          aiLines.forEach(function(ln){
            var m=ln.match(/^(\d)位[\s　]*(\d)号艇[\s　]*×/);
            if(m)ngFromAI.push(m[2]);
          });
          if(ngFromAI.length>0)ngBoats=ngFromAI;
          else if(ranked2.length>=6)ngBoats=[String(ranked2[5].n)];
        }
        // ×印以外の◎○以外の艇
        var okOthers=allBoats.filter(function(b){return b!==maru&&b!==shiro&&ngBoats.indexOf(b)<0;});
        // C(2着追加)が◎○なら代替
        var C=mC[1];
        if(C===maru||C===shiro){for(var ri=0;ri<okOthers.length;ri++){C=okOthers[ri];break;}}
        // 全有効買い目を生成
        function vbet(a,b,c){return a!==b&&b!==c&&a!==c;}
        var seen={},allBets=[];
        function tryAdd(a,b,c){if(!vbet(a,b,c))return;var k=a+'-'+b+'-'+c;if(!seen[k]){seen[k]=true;allBets.push(k);}}
        // 優先順位順に生成
        var A=mA[1],B=mB[1];
        if(ngBoats.indexOf(A)>=0)A=okOthers.filter(function(x){return x!==B;})[0]||okOthers[0];
        if(ngBoats.indexOf(B)>=0||B===A)B=okOthers.filter(function(x){return x!==A;})[0]||okOthers[1]||okOthers[0];
        // 本線優先（◎-○, ○-◎, ◎-C の組み合わせ）
        var honsen=[];
        [A,B].forEach(function(t){tryAdd(maru,shiro,t);tryAdd(shiro,maru,t);tryAdd(maru,C,t);tryAdd(shiro,C,t);});
        honsen=allBets.splice(0,Math.min(6,allBets.length));
        // 抑え: 残り全組み合わせ
        var mid2=[maru,shiro];
        var mid3=okOthers.concat([]);
        mid2.forEach(function(h){mid3.forEach(function(m){okOthers.forEach(function(t){tryAdd(h,m,t);});});});
        // 全組み合わせからhonsenを除いた残りを抑えに
        var osaee=allBets.slice(0,6);
        var honsenStr=honsen.join('/'),osaeeStr=osaee.join('/');
        var bet='\n【買い目】\n本線('+honsen.length+'点)\n'+honsen.join('\n')+'\n抑え('+osaee.length+'点)\n'+osaee.join('\n')+'\n';
        var ii=text.indexOf('2着追加');
        if(ii>=0){var ni=text.indexOf('\n',ii);if(ni>=0)text=text.slice(0,ni+1)+bet+text.slice(ni+1);}
        text=text.replace(/本線[\u3000 ][X0-9\-\/]+/g,'本線\u3000'+honsenStr);
        text=text.replace(/抑え[\u3000 ][X0-9\-\/]+/g,'抑え\u3000'+osaeeStr);
      }
    }
    // 最終フィルタ：◎○以外が1着の買い目行を削除
    if(currentMode==='are'&&calcData&&calcData.cands1st&&calcData.cands1st.length>=2){
      var ok1st=[String(calcData.cands1st[0].n),String(calcData.cands1st[1].n)];
      text=text.split('\n').filter(function(ln){
        var m=ln.match(/^(\d)-(\d)-(\d)$/);
        return !m||ok1st.indexOf(m[1])>=0;
      }).join('\n');
    }
    // 通常モードJS自動生成
    if(currentMode==='normal'&&calcData){
      var ab=calcData.normalResult.ab;
      var shinkido=calcData.normalResult.shinkido;
      var abA=ab[0]?String(ab[0].n):null;
      var abB=ab[1]?String(ab[1].n):null;
      // 3着パラメータをAI出力からパース（数字以外は無効）
      var mA2=text.match(/3着A[:：]\s*(\d)号艇/);
      var mB2=text.match(/3着B[:：]\s*(\d)号艇/);
      var nA=mA2&&/^\d$/.test(mA2[1])?mA2[1]:null;
      var nB=mB2&&/^\d$/.test(mB2[1])?mB2[1]:null;
      // ngBoats収集（forceNG + AI×印）
      var ngNormal=[];
      if(calcData.parsed&&calcData.parsed.boats){
        calcData.parsed.boats.forEach(function(b){if(b.forceNG)ngNormal.push(String(b.n));});
      }
      text.split('\n').forEach(function(ln){
        var m=ln.match(/^(\d)位[\s　]*(\d)号艇[\s　]*×/);
        if(m&&ngNormal.indexOf(m[2])<0)ngNormal.push(m[2]);
      });
      // 3着候補（1号艇・2着候補A・2着候補B・ng艇を除く）
      var allBoats2=['1','2','3','4','5','6'];
      var okThird=allBoats2.filter(function(b){
        return b!=='1'&&b!==abA&&b!==abB&&ngNormal.indexOf(b)<0;
      });
      // nA・nBが無効なら okThird からフォールバック
      if(!nA||nA==='1'||nA===abA||nA===abB||ngNormal.indexOf(nA)>=0)nA=okThird[0]||'2';
      if(!nB||nB==='1'||nB===abA||nB===abB||nB===nA||ngNormal.indexOf(nB)>=0)
        nB=okThird.filter(function(x){return x!==nA;})[0]||String(parseInt(nA)%6+1);
      // 買い目生成（全艇番が異なることを保証）
      function validBet(a,b,c){return a&&b&&c&&a!==b&&b!==c&&a!==c;}
      function addBet(arr,a,b,c){if(validBet(a,b,c))arr.push(a+'-'+b+'-'+c);}
      var honsen=[],osaee=[];
      if(shinkido==='C'&&abB){
        // 非逃げ6点（abB軸）＋逃げ2点
        addBet(honsen,abB,abA,nA);
        addBet(honsen,abB,abA,nB);
        addBet(honsen,abB,nA,abA);
        addBet(honsen,abB,nB,abA);
        addBet(osaee,abB,nA,nB);
        addBet(osaee,abB,nB,nA);
        addBet(osaee,'1',abA,nA);
        addBet(osaee,'1',abA,nB);
      } else {
        // A/B：1着固定
        addBet(honsen,'1',abA,nA);
        addBet(honsen,'1',abA,nB);
        if(abB){
          addBet(honsen,'1',abB,nA);
          addBet(honsen,'1',abB,nB);
          addBet(osaee,'1',abA,abB);
          addBet(osaee,'1',abB,abA);
          addBet(osaee,'1',nA,abB);
          addBet(osaee,'1',nB,abB);
        } else {
          // abBなし：abA軸で3着4種
          addBet(osaee,'1',abA,nA);
          addBet(osaee,'1',abA,nB);
          addBet(osaee,'1',nA,abA);
          addBet(osaee,'1',nB,abA);
        }
      }
      // 重複除去して各4点
      function uniq2(arr){var s={};return arr.filter(function(x){if(s[x])return false;s[x]=true;return true;});}
      honsen=uniq2(honsen).slice(0,4);
      osaee=uniq2(osaee).slice(0,4);
      // 4点未満の場合、全組み合わせから補完（本線・抑えで独立管理）
      var allC=['2','3','4','5','6'];
      function fillArr(arr,axis1,max,exclude){
        var used={};
        arr.forEach(function(b){used[b]=true;});
        if(exclude)exclude.forEach(function(b){used[b]=true;});
        allC.forEach(function(b2){
          if(arr.length>=max)return;
          allC.forEach(function(b3){
            if(arr.length>=max)return;
            var bet=axis1+'-'+b2+'-'+b3;
            if(validBet(axis1,b2,b3)&&!used[bet]){used[bet]=true;arr.push(bet);}
          });
        });
      }
      var axis1st=shinkido==='C'&&abB?abB:'1';
      fillArr(honsen,axis1st,4,null);
      fillArr(osaee,axis1st,4,honsen);
      var honsenStr=honsen.join('/'),osaeeStr=osaee.join('/');
      var betBlock='\n【最終買い目】8点\n本線\n'+honsen.join('\n')+'\n抑え\n'+osaee.join('\n')+'\n';
      // パラメータブロックの直後に挿入
      var pi=text.indexOf('【買い目パラメータ】');
      if(pi>=0){
        var ni2=text.indexOf('\n3着B',pi);
        if(ni2>=0){var ni3=text.indexOf('\n',ni2+1);if(ni3>=0)text=text.slice(0,ni3+1)+betBlock+text.slice(ni3+1);}
        else text=text.slice(0,pi)+betBlock+text.slice(pi);
      } else {
        text=betBlock+'\n'+text;
      }
      // XサマリーのプレースホルダをJS生成買い目に置換
      text=text.replace('HONSEN',honsenStr);
      text=text.replace('OSAEE',osaeeStr);
    }
    document.getElementById('outText').textContent=text;
    document.getElementById('outWrap').classList.add('show');
    showStatus('生成完了','ok');
  }catch(e){showStatus('エラー: '+e.message,'err');}
  finally{
    document.getElementById('genBtn').disabled=false;
    document.getElementById('loading').classList.remove('show');
  }
}

function copyOut(){
  var text=document.getElementById('outText').textContent;
  var btn=document.getElementById('copyBtn');
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){btn.textContent='✅ コピー完了';btn.classList.add('ok');setTimeout(function(){btn.textContent='📋 X投稿用にコピー';btn.classList.remove('ok');},2000);});}
}
loadKey();

</script>
