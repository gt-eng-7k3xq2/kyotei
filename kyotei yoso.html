<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>G. дәҲжғігӮЁгғігӮёгғі v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{--bg:#f8f7f4;--surface:#ffffff;--border:#e0dcd6;--border-strong:#c8c4be;--text:#1a1814;--text-sub:#6b6560;--text-muted:#a09b96;--accent:#c0392b;--accent-light:#fdf0ef;--accent-border:#f0c0bc;--blue:#1a5fa8;--blue-light:#eef4fc;--green:#1a7a3a;--green-light:#eef8f2;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:16px 14px 80px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--text);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;font-family:'Noto Serif JP',serif;}
.logo-text{font-size:16px;font-weight:700;color:var(--text);font-family:'Noto Serif JP',serif;}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ver{font-size:10px;color:var(--text-sub);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:2px;}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;}
.sec-label{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.mode-row{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{flex:1;padding:11px;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mode-btn.active{background:var(--text);color:#fff;border:2px solid var(--text);}
.mode-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
.race-row{display:flex;gap:8px;}
.sel-w{flex:1;position:relative;}
.sel-w::after{content:'в–ҫ';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:11px;pointer-events:none;}
.sel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px 28px 10px 10px;-webkit-appearance:none;outline:none;font-family:'Noto Sans JP',sans-serif;}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:10px;resize:none;outline:none;font-family:monospace;line-height:1.8;min-height:110px;}
textarea::placeholder{color:var(--text-muted);font-size:11px;}
.calc-btn{width:100%;padding:12px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:700;border:1px solid #c0d8f0;border-radius:4px;-webkit-appearance:none;margin-top:10px;font-family:'Noto Sans JP',sans-serif;}
.gen-btn{width:100%;padding:15px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:4px;-webkit-appearance:none;margin-top:4px;font-family:'Noto Serif JP',serif;letter-spacing:1px;}
.gen-btn:disabled{background:var(--border);color:var(--text-muted);}
.api-row{display:flex;gap:8px;}
.api-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px;outline:none;font-family:monospace;}
.api-input.saved{border-color:#a0d0b0;color:var(--green);}
.api-save{background:var(--text);color:#fff;border:none;padding:10px 14px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.calc-result{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-top:12px;display:none;}
.calc-result.show{display:block;}
.cr-sec{font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 6px;padding-left:6px;border-left:2px solid var(--accent);}
.cr-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.cr-table th{background:var(--bg);color:var(--text-sub);padding:5px;text-align:center;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;}
.cr-table td{padding:5px;border-bottom:1px solid var(--border);text-align:center;color:var(--text-sub);}
.cr-table tr.best td{color:var(--accent);font-weight:700;background:var(--accent-light);}
.tot{color:var(--text)!important;font-weight:700;}
.info-row{font-size:11px;color:var(--text-sub);margin:5px 0;}
.info-row b{color:var(--text);font-weight:700;}
.are-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin:8px 0;}
.are-score{font-size:28px;font-weight:700;font-family:'Noto Serif JP',serif;}
.score-pass{color:var(--green);}
.score-fail{color:var(--accent);}
.are-label{font-size:10px;color:var(--text-muted);}
.bd-list{font-size:11px;color:var(--text-sub);margin-top:6px;line-height:2.0;}
.bd-list span{color:var(--text);}
.furikiri{padding:10px 12px;border-radius:4px;font-size:13px;font-weight:700;margin:8px 0;}
.furikiri.pass{background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.furikiri.fail{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.cand-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.chip{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:700;}
.c1{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.c2{background:var(--blue-light);color:var(--blue);border:1px solid #c0d8f0;}
.status{font-size:12px;font-weight:500;padding:10px 12px;border-radius:4px;margin-bottom:12px;display:none;}
.status.err{display:block;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);}
.status.ok{display:block;background:var(--green-light);color:var(--green);border:1px solid #a0d8b0;}
.loading{text-align:center;padding:24px 0;display:none;}
.loading.show{display:block;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:var(--text-muted);}
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.out-text{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:14px;font-size:12px;color:var(--text);line-height:2.0;white-space:pre-wrap;word-break:break-word;}
.copy-btn{width:100%;margin-top:8px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.copy-btn.ok{background:var(--green-light);color:var(--green);border-color:#a0d8b0;}
.div{height:1px;background:var(--border);margin:4px 0 14px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div><div class="logo-text">дәҲжғігӮЁгғігӮёгғі</div><div class="logo-sub">JSиЁҲз®— + AIз”ҹжҲҗ v2.0</div></div>
  </div>
  <div class="ver">v2.0</div>
</div>

<div class="sec">
  <div class="sec-label">Gemini API Key</div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="AIza...">
    <button class="api-save" onclick="saveKey()">дҝқеӯҳ</button>
  </div>
</div>

<div class="sec">
  <div class="sec-label">гғўгғјгғүгғ»гғ¬гғјгӮ№жғ…е ұ</div>
  <div class="mode-row">
    <button class="mode-btn active" id="modeNormal" onclick="setMode('normal')">йҖҡеёё v4.7</button>
    <button class="mode-btn inactive" id="modeAre" onclick="setMode('are')">иҚ’гӮҢ v2.3</button>
  </div>
  <div class="race-row">
    <div class="sel-w">
      <select class="sel" id="venue">
        <option value="">е ҙжүҖгӮ’йҒёжҠһ</option>
        <option>жЎҗз”ҹ</option><option>жҲёз”°</option><option>жұҹжҲёе·қ</option><option>е№іе’Ңеі¶</option><option>еӨҡж‘©е·қ</option>
        <option>жөңеҗҚж№–</option><option>и’ІйғЎ</option><option>еёёж»‘</option><option>жҙҘ</option><option>дёүеӣҪ</option>
        <option>гҒігӮҸгҒ“</option><option>дҪҸд№Ӣжұҹ</option><option>е°јеҙҺ</option><option>йіҙй–Җ</option><option>дёёдәҖ</option>
        <option>е…җеі¶</option><option>е®®еі¶</option><option>еҫіеұұ</option><option>дёӢй–ў</option><option>иӢҘжқҫ</option>
        <option>иҠҰеұӢ</option><option>зҰҸеІЎ</option><option>е”җжҙҘ</option><option>еӨ§жқ‘</option>
      </select>
    </div>
    <div class="sel-w" style="flex:0 0 80px">
      <select class="sel" id="raceNum">
        <option value="">R</option>
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-label">гғ¬гғјгӮ№гғҮгғјгӮҝпјҲгғҮгғјгӮҝжҠҪеҮәBMгҒ§гӮігғ”гғјпјү</div>
  <textarea id="raceData" rows="7" placeholder="гғҮгғјгӮҝжҠҪеҮәBMгҒ§4гӮҝгғ–еҸҺйӣҶ вҶ’ гӮігғ”гғј вҶ’ гҒ“гҒ“гҒ«иІјгӮҠд»ҳгҒ‘"></textarea>
  <div style="display:flex;gap:8px;"><button class="calc-btn" style="flex:1;margin-top:0;" onclick="runCalc()">вҡЎ гғҮгғјгӮҝгӮ’и§ЈжһҗгҒҷгӮӢ</button><button onclick="clearAll()" style="padding:13px 16px;background:#1a1a2a;color:#888;border:1px solid #2a2a3a;border-radius:10px;font-size:13px;cursor:pointer;-webkit-appearance:none;">вң•</button></div>
  <div class="calc-result" id="calcResult">
    <div style="font-size:11px;color:#c9a84c;font-weight:700;margin-bottom:8px;">рҹ“Ҡ и§ЈжһҗзөҗжһңпјҲAIгҒ«йҖҒдҝЎгҒҷгӮӢеүҚгҒ«зўәиӘҚпјү</div>
    <div id="calcContent"></div>
  </div>
</div>

<div class="status" id="status"></div>
<button class="gen-btn" id="genBtn" onclick="generate()" disabled>рҹҺҜ дәҲжғігӮ’з”ҹжҲҗгҒҷгӮӢ</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Gemini гҒҢдәҲжғігӮ’з”ҹжҲҗдёӯ...</div>
</div>

<div class="out-wrap" id="outWrap">
  <div class="div"></div>
  <div class="out-hdr">дәҲжғізөҗжһң</div>
  <div class="out-text" id="outText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyOut()">рҹ“Ӣ XжҠ•зЁҝз”ЁгҒ«гӮігғ”гғј</button>

<div id="oddsResult"></div>
</div>

<script>

var currentMode = 'normal';
var calcData = null;


function clearAll(){
  document.getElementById('raceData').value='';
  document.getElementById('calcResult').classList.remove('show');
  document.getElementById('calcContent').innerHTML='';
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('outText').textContent='';
  document.getElementById('status').style.display='none';
  document.getElementById('genBtn').disabled=true;
  try{document.getElementById('venue').value='';}catch(e){}
  try{document.getElementById('raceNum').value='';}catch(e){}
  calcData=null;
}
function saveKey(){
  var k=document.getElementById('apiKey').value.trim();
  if(!k)return;
  localStorage.setItem('gemini_key',k);
  document.getElementById('apiKey').classList.add('saved');
  document.getElementById('apiKey').value='дҝқеӯҳжёҲгҒҝ';
  showStatus('APIгӮӯгғјгӮ’дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ','ok');
}
function loadKey(){
  if(localStorage.getItem('gemini_key')){
    document.getElementById('apiKey').value='дҝқеӯҳжёҲгҒҝ';
    document.getElementById('apiKey').classList.add('saved');
  }
}
function getKey(){
  var el=document.getElementById('apiKey');
  if(el.classList.contains('saved'))return localStorage.getItem('gemini_key')||'';
  return el.value.trim();
}
function setMode(m){
  currentMode=m;
  document.getElementById('modeNormal').className='mode-btn '+(m==='normal'?'active':'inactive');
  document.getElementById('modeAre').className='mode-btn '+(m==='are'?'active':'inactive');
  if(calcData)displayCalcResults(calcData);
}
function showStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;el.className='status '+type;
  el.style.display='block';
}

/* ===== PARSER ===== */
function parseData(raw){
  var lines=raw.replace(/\r/g,'').split('\n');
  var boats=[];
  for(var i=0;i<6;i++){
    boats.push({n:i+1,name:'',fKi:0,fZen:0,soyoRate:0,stKoki:null,
      tokuten:null,avgST:null,exhibRank:null,winsRate:null,
      avgEx:null,avgLap:null,avgStr:null,
      nyuse:i+1,exT:null,lapT:null,strT:null,st:null,stF:false,tilt:0,
      kiryoku:null,kiryokuRank:null,
      buhin:false,zenkokuRate:null,totiRate:null,renRate:null,
      sogoScore:null,sogoRank:null});
  }
  var section='',nigeContext='';
  var nigeRate6M=null,nigeRateLocal=null,nigeRateKoki=null,localCount=0;
  var afterFrank=false,afterNigeRow=false;

  function v6(line){
    var cols=line.split('\t'),out=[];
    for(var ci=1;ci<cols.length&&out.length<6;ci++){
      var v=(cols[ci]||'').trim();
      if(!v||v==='-'){out.push(null);continue;}
      var clean=v.replace(/[%пјҲпјү()]/g,'').replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      out.push(isNaN(n)?null:n);
    }
    while(out.length<6)out.push(null);
    return out;
  }
  function stv6(line){
    var cols=line.split('\t'),vals=[],flags=[];
    for(var ci=1;ci<cols.length&&vals.length<6;ci++){
      var v=(cols[ci]||'').trim();
      var isF=v.startsWith('F');
      flags.push(isF);
      var clean=v.replace(/^F/,'');
      if(clean.startsWith('.'))clean='0'+clean;
      var n=parseFloat(clean);
      vals.push(isNaN(n)?null:n);
    }
    while(vals.length<6){vals.push(null);flags.push(false);}
    return{vals,flags};
  }

  for(var idx=0;idx<lines.length;idx++){
    var line=lines[idx].trim();
    var cols=line.split('\t');
    var label=(cols[0]||'').trim().replace(/\s+/g,'');

    // Section
    var sm=line.match(/=== (.+?) ===/);
    if(sm){section=sm[1].trim().replace(/\s/g,'');afterFrank=false;afterNigeRow=false;continue;}

    if(section==='еҹәжң¬жғ…е ұ'){
      if(label.includes('еҹәжң¬жғ…е ұ')||label.includes('еҹәжң¬')){
        var nc=line.split('\t').slice(1);
        for(var j=0;j<6&&j<nc.length;j++){var nm=nc[j].trim();if(nm)boats[j].name=nm;}
      }
      if(label==='гғ•гғ©гӮӨгғігӮ°')afterFrank=true;
      if(afterFrank&&label==='д»Ҡжңҹ'){
        var fv=v6(line);for(var j=0;j<6;j++)boats[j].fKi=fv[j]||0;afterFrank=false;
      }
      if(label==='еүҚжңҹ'){var fv2=v6(line);for(var j=0;j<6;j++)boats[j].fZen=fv2[j]||0;}
      if(label==='дәӢж•…зҺҮ'){var sv=v6(line);for(var j=0;j<6;j++)boats[j].soyoRate=sv[j]||0;}
      if(label==='е…ЁеӣҪ'){var grv=v6(line);for(var j=0;j<6;j++)if(grv[j]!==null)boats[j].zenkokuRate=grv[j];}
      if(label==='еҪ“ең°'&&section==='еҹәжң¬жғ…е ұ'){var trv=v6(line);for(var j=0;j<6;j++)if(trv[j]!==null)boats[j].totiRate=trv[j];}
      // д»Ҡжңҹе№іеқҮST (еҹәжң¬жғ…е ұеҶ…гҒ®е№іеқҮSTвҶ’д»ҠжңҹиЎҢ)
      if(label==='д»Ҡжңҹ'&&!afterFrank){
        var sv2=v6(line);
        var allSmall=sv2.filter(v=>v!==null).every(v=>v<1.0);
        if(allSmall)for(var j=0;j<6;j++)if(sv2[j]!==null)boats[j].stKoki=sv2[j];
      }
    }

    if(section==='д»ҠзҜҖжҲҗзёҫ'){
      if(label==='еҫ—зӮ№зҺҮ'){var tv=v6(line);for(var j=0;j<6;j++)boats[j].tokuten=tv[j];}
      if(label==='е№іеқҮST'){var sv3=v6(line);for(var j=0;j<6;j++)if(sv3[j]!==null)boats[j].avgST=sv3[j];}
      if(label==='еұ•зӨәй ҶдҪҚ'||label==='е№іеқҮеұ•зӨәй ҶдҪҚ'){var ev=v6(line);for(var j=0;j<6;j++)boats[j].exhibRank=ev[j];}
      if(label==='1зқҖзҺҮ'){var wv=v6(line);for(var j=0;j<6;j++)boats[j].winsRate=wv[j];}
      if(label==='2йҖЈеҜҫзҺҮ'){var rv=v6(line);for(var j=0;j<6;j++)boats[j].renRate=rv[j];}
      if(label==='е№іеқҮеұ•зӨә'){var av=v6(line);for(var j=0;j<6;j++)if(av[j])boats[j].avgEx=av[j];}
      if(label==='е№іеқҮе‘Ёи¶і'||label==='е№іеқҮе‘ЁгӮҠи¶і'){var lv=v6(line);for(var j=0;j<6;j++)if(lv[j])boats[j].avgLap=lv[j];}
      if(label==='е№іеқҮзӣҙз·ҡ'){var dv=v6(line);for(var j=0;j<6;j++)if(dv[j])boats[j].avgStr=dv[j];}
    }

    if(section==='зӣҙеүҚжғ…е ұ'){
      if(label==='йҖІе…Ҙ'){var nv=v6(line);for(var j=0;j<6;j++)if(nv[j])boats[j].nyuse=Math.round(nv[j]);}
      if(label==='еұ•зӨә'){var etv=v6(line);for(var j=0;j<6;j++)if(etv[j])boats[j].exT=etv[j];}
      if(label==='е‘ЁгӮҠи¶і'||label==='е‘ЁгӮҠи¶і'){var ltv=v6(line);for(var j=0;j<6;j++)if(ltv[j])boats[j].lapT=ltv[j];}
      if(label==='зӣҙз·ҡ'){var stv=v6(line);for(var j=0;j<6;j++)if(stv[j])boats[j].strT=stv[j];}
      if(label==='ST'){var sf=stv6(line);for(var j=0;j<6;j++)if(sf.vals[j]!==null){boats[j].st=sf.vals[j];boats[j].stF=sf.flags[j];}}
      if(label==='гғҒгғ«гғҲ'){var cv=v6(line);for(var j=0;j<6;j++)if(cv[j]!==null)boats[j].tilt=cv[j];}
      if(label==='йғЁе“ҒдәӨжҸӣ'){var bv=line.split('\t').slice(1);for(var j=0;j<6&&j<bv.length;j++){if((bv[j]||'').trim()&&(bv[j]||'').trim()!=='-')boats[j].buhin=true;}}
    }

    if(section==='жһ еҲҘеӢқзҺҮ'){
      // еҪ“ең°гӮ«гӮҰгғігғҲ
      if(label==='еҪ“ең°'&&line.includes('(')){var cm=line.match(/\((\d+)\)/);if(cm)localCount=parseInt(cm[1]);}
      // nigeгӮігғігғҶгӮӯгӮ№гғҲ
      if(line.includes('зӣҙиҝ‘6гғ¶жңҲ')||line.includes('зӣҙиҝ‘ 6гғ¶жңҲ')||line.includes('зӣҙиҝ‘пј–гғ¶жңҲ'))nigeContext='6M';
      else if(line.includes('зӣҙиҝ‘1е№ҙ')||line.includes('зӣҙиҝ‘ 1е№ҙ')||line.includes('зӣҙиҝ‘пј‘е№ҙ'))nigeContext='1Y';
      else if(label==='еҪ“ең°'&&!line.includes('%'))nigeContext='local';
      else if(label==='д»Ҡжңҹ'&&nigeContext==='')nigeContext='koki';
      // йҖғгҒ’зҺҮ2иЎҢгғ‘гӮҝгғјгғі
      if(label.startsWith('йҖғгҒ’')&&!line.includes('%')){afterNigeRow=true;}
      else if(afterNigeRow){
        var pct=parseFloat((line.split('\t')[0]||'').replace(/%/,''));
        if(!isNaN(pct)){
          if(nigeContext==='6M'&&nigeRate6M===null)nigeRate6M=pct;
          else if(nigeContext==='local'&&nigeRateLocal===null)nigeRateLocal=pct;
          else if(nigeContext==='koki'&&nigeRateKoki===null)nigeRateKoki=pct;
        }
        afterNigeRow=false;
      }
    }
  }

  // йҖғгҒ’зҺҮжұәе®ҡ
  var nigeRate=null,nigeRateSrc='';
  if(localCount>=10&&nigeRateLocal!==null){nigeRate=nigeRateLocal;nigeRateSrc='еҪ“ең°('+localCount+'жҲҰ)';}
  else if(nigeRate6M!==null){nigeRate=nigeRate6M;nigeRateSrc='зӣҙиҝ‘6M';}
  else if(nigeRateKoki!==null){nigeRate=nigeRateKoki;nigeRateSrc='д»Ҡжңҹ';}

  return{boats,nigeRate,nigeRateSrc,localCount};
}

/* ===== ж©ҹеҠӣгӮ№гӮігӮў ===== */
function calcKiryoku(boats){
  boats.forEach(function(b){
    var avgE=b.avgEx!==null?b.avgEx:b.exT;
    var avgL=b.avgLap!==null?b.avgLap:b.lapT;
    var avgS=b.avgStr!==null?b.avgStr:b.strT;
    var dirE=b.exT,dirL=b.lapT,dirS=b.strT;
    if(dirE!==null&&dirL!==null&&dirS!==null){
      b.kiryoku=(avgE||dirE)+(avgL||dirL)+(avgS||dirS)+dirE+dirL+dirS;
    }else if(dirE!==null&&dirL!==null){
      b.kiryoku=(avgE||dirE)*2+(avgL||dirL)*2;
    }
  });
  var valid=boats.filter(b=>b.kiryoku!==null).sort((a,b)=>a.kiryoku-b.kiryoku);
  valid.forEach((b,i)=>b.kiryokuRank=i+1);
}

/* ===== з·ҸеҗҲи©•дҫЎгӮ№гӮігӮўпјҲJSеӣәе®ҡпјү ===== */
function calcSogoScore(boats){
  var allTok=boats.map(function(b){return b.tokuten;}).filter(function(v){return v!==null;});
  var maxTok=allTok.length?Math.max.apply(null,allTok):1;
  var minTok=allTok.length?Math.min.apply(null,allTok):0;
  var allRate=boats.map(function(b){return b.totiRate||b.zenkokuRate||0;});
  var maxRate=Math.max.apply(null,allRate)||1;
  var allST=boats.map(function(b){return b.avgST||b.stKoki;}).filter(function(v){return v!==null;});
  var minST=allST.length?Math.min.apply(null,allST):0.10;
  var maxST=allST.length?Math.max.apply(null,allST):0.30;
  var maxKr=boats.filter(function(b){return b.kiryokuRank!==null;}).length||6;
  var allDirST=boats.map(function(b){return b.st;}).filter(function(v){return v!==null;});
  var minDirST=allDirST.length?Math.min.apply(null,allDirST):0.10;
  var maxDirST=allDirST.length?Math.max.apply(null,allDirST):0.30;
  boats.forEach(function(b){
    var score=0;
    if(b.tokuten!==null&&maxTok>minTok)score+=(b.tokuten-minTok)/(maxTok-minTok)*30;
    else if(b.tokuten!==null)score+=15;
    var rate=b.totiRate||b.zenkokuRate||0;
    if(maxRate>0)score+=rate/maxRate*20;
    var st=b.avgST||b.stKoki;
    if(st!==null&&maxST>minST)score+=(maxST-st)/(maxST-minST)*20;
    else if(st!==null)score+=10;
    if(b.kiryokuRank!==null&&maxKr>1)score+=(maxKr-b.kiryokuRank)/(maxKr-1)*15;
    if(b.st!==null&&!b.stF&&maxDirST>minDirST)score+=(maxDirST-b.st)/(maxDirST-minDirST)*10;
    if(b.tilt<=-0.5)score+=2;else if(b.tilt>=0.5)score+=1;
    if(b.buhin){var imp=false;if(b.exT!==null&&b.avgEx!==null&&b.exT<b.avgEx-0.05)imp=true;if(b.lapT!==null&&b.avgLap!==null&&b.lapT<b.avgLap-0.05)imp=true;if(b.strT!==null&&b.avgStr!==null&&b.strT<b.avgStr-0.05)imp=true;score+=imp?3:0.5;}
    if(b.fKi>=1)score-=3;
    if(b.winsRate===0&&b.tokuten!==null&&b.tokuten>0)score-=2;
    b.sogoScore=Math.max(0,score);
  });
  var sorted=boats.slice().sort(function(a,b){return (b.sogoScore||0)-(a.sogoScore||0);});
  sorted.forEach(function(b,i){b.sogoRank=i+1;});
}

/* ===== JSеј·еҲ¶Г— ===== */
function calcForceNG(boats){
  var scores=[];
  boats.forEach(function(b){
    var s=0;
    var st=b.avgST||b.stKoki;
    if(st!==null&&st>=0.25)s+=3;
    var allTok=boats.map(function(x){return x.tokuten;}).filter(function(v){return v!==null;});
    var minTok=allTok.length?Math.min.apply(null,allTok):null;
    var maxKr=boats.filter(function(x){return x.kiryokuRank!==null;}).length;
    if(b.tokuten!==null&&minTok!==null&&b.tokuten===minTok&&b.kiryokuRank===maxKr)s+=2;
    if(b.tokuten!==null&&b.tokuten<=2.0&&b.winsRate===0)s+=2;
    scores.push({n:b.n,s:s});
  });
  scores.sort(function(a,b){return b.s-a.s;});
  if(scores.length&&scores[0].s>0){
    var ng=scores[0].n;
    boats.forEach(function(b){b.forceNG=(b.n===ng);});
  }
}

/* ===== иҚ’гӮҢжҢҮж•° ===== */
function calcAreIndex(boats,nigeRate){
  var score=0,bd=[];
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  var innerBoats=boats.filter(b=>[1,2,3].includes(b.nyuse));
  var outerBoats=boats.filter(b=>b.nyuse>=4);

  // Fд»Ҡжңҹ
  var fKi123=innerBoats.filter(b=>b.fKi>=1);
  if(b1.fKi>=1){score+=3;bd.push('1гӮігғјгӮ№д»ҠжңҹFжҢҒгҒЎ +3');}
  else if(fKi123.length>=2){score+=3;bd.push('1гҖң3гӮігғјгӮ№д»ҠжңҹFиӨҮж•° +3');}
  else if(fKi123.length===1){score+=1;bd.push('2гҖң3гӮігғјгӮ№д»ҠжңҹF1иүҮ +1');}

  // еұ•зӨәF
  var exF123=innerBoats.filter(b=>b.stF);
  if(b1.stF){score+=1;bd.push('1гӮігғјгӮ№еұ•зӨәF +1');}
  if(!b1.stF&&exF123.length>=2){score+=1;bd.push('1гҖң3гӮігғјгӮ№еұ•зӨәFиӨҮж•° +1');}

  // д»ҠзҜҖе®ҹзёҫ
  if(b1.exhibRank!==null&&b1.exhibRank>=5){score+=3;bd.push('1гӮігғјгӮ№д»ҠзҜҖеұ•зӨә'+b1.exhibRank+'дҪҚ +3');}
  if(b1.winsRate!==null&&b1.winsRate===0){score+=3;bd.push('1гӮігғјгӮ№д»ҠзҜҖ1зқҖзҺҮ0% +3');}
  var allTok=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT=allTok.slice().sort((a,b)=>a-b);
    if(b1.tokuten<=sortedT[1]){score+=2;bd.push('1гӮігғјгӮ№д»ҠзҜҖеҫ—зӮ№зҺҮдёӢдҪҚ2 +2');}
  }
  var allAvgST=boats.map(b=>b.avgST).filter(v=>v!==null);
  if(allAvgST.length>=2&&b1.avgST!==null){
    if(b1.avgST===Math.max(...allAvgST)){score+=2;bd.push('1гӮігғјгӮ№д»ҠзҜҖе№іеқҮSTжңҖйҒ… +2');}
  }

  // йҖғгҒ’зҺҮгғ»ST
  if(nigeRate!==null){
    if(nigeRate<30){score+=3;bd.push('йҖғгҒ’зҺҮ'+nigeRate+'%<30% +3');}
    else if(nigeRate<50){score+=2;bd.push('йҖғгҒ’зҺҮ'+nigeRate+'%<50% +2');}
  }
  var stFallback=b1.avgST!==null?b1.avgST:b1.stKoki;
  if(stFallback!==null&&stFallback>=0.18){score+=2;bd.push('1гӮігғјгӮ№е№іеқҮST'+stFallback+'вүҘ0.18 +2');}
  if(allTok.length>=2&&b1.tokuten!==null){
    var sortedT2=allTok.slice().sort((a,b)=>a-b);
    var mid=sortedT2[Math.floor(sortedT2.length/2)];
    if(b1.tokuten<mid){score+=1;bd.push('1гӮігғјгӮ№д»ҠзҜҖеҫ—зӮ№зҺҮдёӢдҪҚеҚҠеҲҶ +1');}
  }

  // еӨ–гӮігғјгӮ№е„ӘдҪҚжҖ§
  var allExRank=boats.map(b=>b.exhibRank).filter(v=>v!==null);
  if(outerBoats.some(b=>b.exhibRank===1&&allExRank.length)){score+=2;bd.push('еӨ–жһ д»ҠзҜҖеұ•зӨә1дҪҚ +2');}
  if(allTok.length){
    var maxTok=Math.max(...allTok);
    if(outerBoats.some(b=>b.tokuten===maxTok&&maxTok>0)){score+=2;bd.push('еӨ–жһ д»ҠзҜҖеҫ—зӮ№зҺҮ1дҪҚ +2');}
  }
  var inSTs=innerBoats.map(b=>b.avgST||b.stKoki).filter(v=>v!==null);
  var outSTs=outerBoats.map(b=>b.avgST||b.stKoki).filter(v=>v!==null);
  if(inSTs.length&&outSTs.length){
    var avgIn=inSTs.reduce((s,v)=>s+v,0)/inSTs.length;
    var avgOut=outSTs.reduce((s,v)=>s+v,0)/outSTs.length;
    if(avgOut<avgIn-0.01){score+=1;bd.push('еӨ–жһ е№іеқҮSTе„Әз§Җ +1');}
  }
  if(outerBoats.some(b=>b.stF)){score+=1;bd.push('еӨ–жһ еұ•зӨәF +1');}

  // йҖІе…ҘеӨүжӣҙ
  if(boats.some(b=>b.nyuse!==b.n)){score+=3;bd.push('йҖІе…ҘеӨүжӣҙ +3');}

  // иіһйҷӨиүҮпјҲеүҚжңҹF2жң¬д»ҘдёҠ = д»ҠжңҹиіһйҷӨгҒ®еҸҜиғҪжҖ§пјү
  var shojoOuter=outerBoats.filter(b=>b.fZen>=2);
  if(shojoOuter.length){score+=3;bd.push('еӨ–жһ иіһйҷӨз–‘гҒ„иүҮпјҲеүҚжңҹFвүҘ2пјү +3');}

  return{score,breakdown:bd};
}

/* ===== и¶іеҲҮгӮҠ ===== */
function checkFurikiri(areScore,boats,nigeRate){
  if(areScore<8)return{pass:false,stage:1,reason:'иҚ’гӮҢжҢҮж•°'+areScore+'зӮ№пјҲ8зӮ№жңӘжәҖпјү'};
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  function ex(){
    if(boats.some(b=>b.nyuse!==b.n))return true;
    var allT=boats.map(b=>b.tokuten).filter(v=>v!==null);
    if(allT.length&&b1.tokuten!==null){
      var s=allT.slice().sort((a,b)=>a-b);
      var th=s[Math.floor(s.length*0.3)];
      var stc=b1.avgST!==null?b1.avgST:b1.stKoki;
      if(b1.tokuten<=th&&stc!==null&&stc>=0.18)return true;
    }
    if(b1.exhibRank!==null&&b1.exhibRank>=5)return true;
    if(b1.winsRate!==null&&b1.winsRate===0)return true;
    return false;
  }
  if(nigeRate!==null&&nigeRate>=60&&!ex())return{pass:false,stage:2,reason:'йҖғгҒ’зҺҮ'+nigeRate+'%пјҲвүҘ60%пјү'};
  var allT2=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allT2.length&&b1.tokuten!==null&&b1.tokuten===Math.max(...allT2)&&!ex())
    return{pass:false,stage:2,reason:'1гӮігғјгӮ№д»ҠзҜҖеҫ—зӮ№зҺҮ1дҪҚ'};
  if(b1.kiryokuRank===1&&!ex())
    return{pass:false,stage:2,reason:'1гӮігғјгӮ№ж©ҹеҠӣ1дҪҚ'};
  return{pass:true};
}

/* ===== 1зқҖеҖҷиЈң ===== */
function select1st(boats){
  var cands=[];
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  // еӨ–жһ еұ•зӨәF
  boats.filter(b=>b.nyuse>=4&&b.stF).forEach(b=>{
    if(b.nyuse<=5&&b.kiryokuRank<=3)cands.push({n:b.n,reason:b.nyuse+'гӮігғјгӮ№еұ•зӨәFгғ»ж©ҹеҠӣ'+b.kiryokuRank+'дҪҚ'});
    else if(b.nyuse===6&&b.kiryokuRank===1&&b.st!==null&&b.st<=0.05)cands.push({n:b.n,reason:'6гӮігғјгӮ№еұ•зӨәFгғ»ж©ҹеҠӣ1дҪҚгғ»STе„Әз§Җ'});
  });
  // д»ҠзҜҖеҫ—зӮ№зҺҮдёҠдҪҚпјҲ1гғ»6гӮігғјгӮ№йҷӨгҒҸпјү
  var allT=boats.map(b=>b.tokuten).filter(v=>v!==null);
  if(allT.length){
    var sortedT=allT.slice().sort((a,b)=>b-a);
    var top3=sortedT.slice(0,3);
    var bot30=sortedT[Math.floor(sortedT.length*0.7)]||0;
    boats.forEach(b=>{
      if(b.nyuse===1||b.nyuse===6)return;
      if(b.tokuten!==null&&top3.includes(b.tokuten)&&b.tokuten>bot30){
        if(!cands.find(c=>c.n===b.n))cands.push({n:b.n,reason:b.nyuse+'гӮігғјгӮ№д»ҠзҜҖеҫ—зӮ№зҺҮдёҠдҪҚ'});
      }
    });
  }
  // 2гғ»3гӮігғјгӮ№дҫӢеӨ–
  boats.filter(b=>b.nyuse<=3&&b.nyuse>1).forEach(b=>{
    if(b.kiryokuRank===1){
      var allT2=boats.map(x=>x.tokuten).filter(v=>v!==null);
      if(allT2.length){
        var st=allT2.slice().sort((a,b)=>b-a).slice(0,3);
        if(b.tokuten!==null&&st.includes(b.tokuten)&&!cands.find(c=>c.n===b.n))
          cands.push({n:b.n,reason:b.nyuse+'гӮігғјгӮ№ж©ҹеҠӣ1дҪҚпјӢеҫ—зӮ№зҺҮдёҠдҪҚ'});
      }
    }
    if(b1.st!==null&&b1.st>=0.25&&b.nyuse===2&&!cands.find(c=>c.n===b.n))
      cands.push({n:b.n,reason:'1гӮігғјгӮ№ST0.25д»ҘдёҠвҶ’2гӮігғјгӮ№жҳҮж ј'});
  });
  return cands.slice(0,2);
}

/* ===== йҖҡеёёгғўгғјгғү ===== */
function calcNormal(boats,nigeRate){
  var b1=boats.find(b=>b.nyuse===1)||boats[0];
  var st=b1.avgST!==null?b1.avgST:b1.stKoki;
  var shinkido='B';
  if(nigeRate!==null&&st!==null){
    if(nigeRate>=65&&st<=0.15)shinkido='A';
    else if(nigeRate<55||(st!==null&&st>=0.18))shinkido='C';
  }
  // 2зқҖеҖҷиЈң
  var sorted=boats.filter(b=>b.nyuse!==1).sort((a,b)=>{
    var ta=a.tokuten||0,tb=b.tokuten||0;
    if(Math.abs(ta-tb)>0.5)return tb-ta;
    var sa=a.avgST||a.stKoki||0.2,sb=b.avgST||b.stKoki||0.2;
    return sa-sb;
  });
  var ab=sorted.slice(0,2).map((b,i)=>({n:b.n,reason:'2зқҖеҖҷиЈң'+(i===0?'A':'B')}));
  return{shinkido,ab};
}

/* ===== гғЎгӮӨгғіиЁҲз®— ===== */
function runCalc(){
  var raw=document.getElementById('raceData').value.trim();
  if(!raw){showStatus('гғҮгғјгӮҝгӮ’иІјгӮҠд»ҳгҒ‘гҒҰгҒҸгҒ гҒ•гҒ„','err');return;}
  var parsed=parseData(raw);
  calcKiryoku(parsed.boats);
  calcSogoScore(parsed.boats);
  calcForceNG(parsed.boats);
  var areResult=calcAreIndex(parsed.boats,parsed.nigeRate);
  var furikiriResult=checkFurikiri(areResult.score,parsed.boats,parsed.nigeRate);
  var cands1st=select1st(parsed.boats);
  var normalResult=calcNormal(parsed.boats,parsed.nigeRate);
  calcData={parsed,areResult,furikiriResult,cands1st,normalResult};
  displayCalcResults(calcData);
  document.getElementById('calcResult').classList.add('show');
  document.getElementById('genBtn').disabled=false;
  document.getElementById('genBtn').scrollIntoView({behavior:'smooth',block:'center'});
}

  html+='<div class="info-row">1гӮігғјгӮ№йҖғгҒ’зҺҮ: <b>'+(nigeRate!==null?nigeRate+'% ('+nigeRateSrc+')':'еҸ–еҫ—гҒ§гҒҚгҒҡ')+'</b></div>';

  if(currentMode==='are'){
    // иҚ’гӮҢжҢҮж•°
    var cls=areResult.score>=8?'score-pass':'score-fail';
    html+='<div class="are-box"><div style="display:flex;align-items:baseline;gap:8px;"><span class="are-score '+cls+'">'+areResult.score+'зӮ№</span><span class="are-label">иҚ’гӮҢжҢҮж•°</span></div>';
    html+='<div class="bd-list">';
    if(areResult.breakdown.length)areResult.breakdown.forEach(b=>{html+='<span>'+b+'</span> ';});
    else html+='<span style="color:#445;">еҠ з®—гҒӘгҒ—</span>';
    html+='</div></div>';

    // и¶іеҲҮгӮҠ
    var fpass=furikiriResult.pass;
    html+='<div class="furikiri '+(fpass?'pass':'fail')+'">';
    if(fpass)html+='вң… и¶іеҲҮгӮҠгӮҜгғӘгӮў вҶ’ дәҲжғіз”ҹжҲҗеҸҜ';
    else html+='вқҢ иҰӢйҖҒгӮҠжҺЁеҘЁ: '+furikiriResult.reason;
    html+='</div>';

    if(fpass){
      html+='<div class="cr-sec">1зқҖеҖҷиЈң</div><div class="cand-row">';
      if(cands1st.length)cands1st.forEach(c=>{html+='<span class="chip c1">'+c.n+'еҸ·иүҮпјҲ'+c.reason+'пјү</span>';});
      else html+='<span style="font-size:11px;color:#e55;">еӨ–жһ жқЎд»¶жңӘйҒ”</span>';
      html+='</div>';
    }
  } else {
    // йҖҡеёёгғўгғјгғү
    html+='<div class="are-box"><div style="display:flex;align-items:baseline;gap:8px;"><span class="are-score" style="font-size:22px;color:#c9a84c;">гҖҗ'+normalResult.shinkido+'гҖ‘</span><span class="are-label">гӮӨгғідҝЎй јеәҰ</span></div></div>';
    html+='<div class="info-row">иҚ’гӮҢжҢҮж•°: <b>'+areResult.score+'зӮ№</b> вҶ’ '+(areResult.score>=8?'вҡ пёҸ иҚ’гӮҢи»ўз”ЁеҸҜ':'и»ўз”ЁдёҚеҸҜ')+'</div>';
    html+='<div class="cr-sec">2зқҖеҖҷиЈң</div><div class="cand-row">';
    normalResult.ab.forEach(c=>{html+='<span class="chip c2">'+c.n+'еҸ·иүҮпјҲ'+c.reason+'пјү</span>';});
    html+='</div>';
  }

  document.getElementById('calcContent').innerHTML=html;
}

    p+='гҖҗXгӮөгғһгғӘгғјгҖ‘\n'+venue+raceNum+'R\nйҖҡеёёгғўгғјгғүгҖӮгӮӨгғідҝЎй јеәҰгҖҗ'+normalResult.shinkido+'гҖ‘\nпјҲеұ•й–Ӣж ёеҝғ1иЎҢпјү\nпјҲзӢҷгҒ„зӣ®1иЎҢпјү\nжң¬з·ҡгҖҖ1-X-X/1-X-X/1-X-X/1-X-X\nжҠ‘гҒҲгҖҖ1-X-X/1-X-X/1-X-X/1-X-X\nG.';

/* ===== APIе‘јгҒіеҮәгҒ— ===== */
async function generate(){
  if(!calcData){showStatus('е…ҲгҒ«гғҮгғјгӮҝгӮ’и§ЈжһҗгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','err');return;}
  var key=getKey();
  if(!key){showStatus('APIгӮӯгғјгӮ’дҝқеӯҳгҒ—гҒҰгҒҸгҒ гҒ•гҒ„','err');return;}
  var prompt=buildPrompt();
  document.getElementById('genBtn').disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('outWrap').classList.remove('show');
  document.getElementById('status').style.display='none';
  try{
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0.15,maxOutputTokens:16000,thinkingConfig:{thinkingBudget:0}}
      })
    });
    var json=await res.json();
    if(!res.ok)throw new Error(json.error&&json.error.message||'APIгӮЁгғ©гғј');
    var text=json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts[0].text;
    if(!text)throw new Error('гғ¬гӮ№гғқгғігӮ№гҒҢз©әгҒ§гҒҷ');
    // AREгғўгғјгғүпјҡгғ‘гғ©гғЎгғјгӮҝгӮ’гғ‘гғјгӮ№гҒ—гҒҰ12зӮ№иҮӘеӢ•з”ҹжҲҗ
    if(currentMode==='are'&&calcData){
      // гҒҫгҒҡз·ҸеҗҲи©•дҫЎгҒӢгӮүв—Һв—ӢгӮ’еҸ–еҫ—
      var mMaru=text.match(/1дҪҚ[\sгҖҖ]*(\d)еҸ·иүҮ[\sгҖҖ]*в—Һ/);
      var mShiro=text.match(/2дҪҚ[\sгҖҖ]*(\d)еҸ·иүҮ[\sгҖҖ]*в—Ӣ/);
      var maru=mMaru?mMaru[1]:(calcData.cands1st&&calcData.cands1st[0]?String(calcData.cands1st[0].n):'1');
      var shiro=mShiro?mShiro[1]:(calcData.cands1st&&calcData.cands1st[1]?String(calcData.cands1st[1].n):'2');
      // maru===shiroгҒ«гҒӘгҒЈгҒҹе ҙеҗҲгҒ®е®үе…ЁејҒ
      if(maru===shiro){shiro=['1','2','3','4','5','6'].filter(function(x){return x!==maru;})[0]||'2';}

      var mA=text.match(/3зқҖA[:пјҡ]\s*(\d)еҸ·иүҮ/);
      var mB=text.match(/3зқҖB[:пјҡ]\s*(\d)еҸ·иүҮ/);
      var mC=text.match(/2зқҖиҝҪеҠ [:пјҡ]\s*(\d)еҸ·иүҮ/);
      // з·ҸеҗҲи©•дҫЎв–Ів–ігҒӢгӮү3зқҖеҖҷиЈңгӮ’еӣәе®ҡеҸ–еҫ—пјҲAIгғ‘гғ©гғЎгғјгӮҝгӮҲгӮҠе„Әе…Ҳпјү
      var rSan=text.match(/3дҪҚ\s*(\d)еҸ·иүҮ/);
      var rYon=text.match(/4дҪҚ\s*(\d)еҸ·иүҮ/);
      if(rSan&&rSan[1]!==maru&&rSan[1]!==shiro)mA={1:rSan[1]};
      if(rYon&&rYon[1]!==maru&&rYon[1]!==shiro&&rYon[1]!==(mA?mA[1]:null))mB={1:rYon[1]};
        if(mA&&mB){
        var allBoats=['1','2','3','4','5','6'];
        var ranked2=calcData.parsed&&calcData.parsed.boats?calcData.parsed.boats.slice().sort(function(a,b){return (a.kiryokuRank||99)-(b.kiryokuRank||99);}):[];
        var ngBoats=[];
        if(calcData.parsed&&calcData.parsed.boats){
          calcData.parsed.boats.forEach(function(b){if(b.forceNG)ngBoats.push(String(b.n));});
        }
        var ngFromAI=[];
        var aiLines=text.split('\n');
        aiLines.forEach(function(ln){
          var m=ln.match(/(\d)дҪҚ[\sгҖҖ]*(\d)еҸ·иүҮ[\sгҖҖ]*Г—/);
          if(m)ngFromAI.push(m[2]);
        });
        if(ngFromAI.length>0)ngBoats=ngFromAI;
        else if(ranked2.length>=6)ngBoats=[String(ranked2[5].n)];
        var okOthers=allBoats.filter(function(b){return b!==maru&&b!==shiro&&ngBoats.indexOf(b)<0;});
        // жҠ‘гҒҲз”Ёпјҡngд»ҘеӨ–гҒ®е…ЁиүҮпјҲв—Һв—Ӣеҗ«гӮҖпјү
        var okAll=allBoats.filter(function(b){return ngBoats.indexOf(b)<0;});
        // fallback: mA/mB/mCгҒҢеҸ–гӮҢгҒӘгҒӢгҒЈгҒҹе ҙеҗҲ
        if(!mA)mA={1:okOthers[0]||'3'};
        if(!mB)mB={1:okOthers.filter(function(x){return x!==(mA?mA[1]:null);})[0]||okOthers[0]||'4'};
        if(!mC)mC={1:okOthers[0]||'1'};
        // е…ЁжңүеҠ№иІ·гҒ„зӣ®гӮ’з”ҹжҲҗ
        var vbet=function(a,b,c){return a!==b&&b!==c&&a!==c;};
        // Aгғ»BгӮ’е…ҲгҒ«зўәе®ҡ
        var A=mA[1],B=mB[1];
        if(ngBoats.indexOf(A)>=0)A=okOthers.filter(function(x){return x!==B;})[0]||okOthers[0];
        if(ngBoats.indexOf(B)>=0||B===A)B=okOthers.filter(function(x){return x!==A;})[0]||okOthers[1]||okOthers[0];
        // C(2зқҖиҝҪеҠ )пјҡAгғ»Bгғ»в—Һгғ»в—ӢгҒЁиў«гӮүгҒӘгҒ„иүҮгӮ’е„Әе…ҲгҖҒгҒӘгҒ‘гӮҢгҒ°в—Һв—ӢгӮӮеҖҷиЈңгҒ«
        var C=mC[1];
        if(C===maru||C===shiro||C===A||C===B){
          C=okOthers.filter(function(x){return x!==A&&x!==B;})[0]||
            okAll.filter(function(x){return x!==maru&&x!==shiro&&x!==A&&x!==B;})[0]||
            (shiro!==A&&shiro!==B?shiro:null)||
            (maru!==A&&maru!==B?maru:null)||B;
        }
        // жң¬з·ҡпјҡв—Һй ӯ3зӮ№ + в—Ӣй ӯ3зӮ№ = 6зӮ№
        var honsen=[];
        var seen3={};
        var addHon=function(a,b,c){if(a===b||b===c||a===c)return;var k=a+'-'+b+'-'+c;if(seen3[k])return;seen3[k]=true;honsen.push(k);};
        // в—Һй ӯ3зӮ№
        addHon(maru,shiro,A);
        addHon(maru,shiro,B);
        addHon(maru,A,B);
        // в—Ӣй ӯ3зӮ№
        addHon(shiro,maru,A);
        addHon(shiro,maru,B);
        addHon(shiro,A,B);
        honsen=honsen.slice(0,6);
        // жҠ‘гҒҲпјҡжң¬з·ҡгҒЁйҮҚиӨҮгҒ—гҒӘгҒ„зө„гҒҝеҗҲгӮҸгҒӣ6зӮ№
        var osaee=[];
        var seen4={};
        honsen.forEach(function(k){seen4[k]=true;});
        var addOsa=function(a,b,c){if(a===b||b===c||a===c)return;var k=a+'-'+b+'-'+c;if(seen4[k])return;seen4[k]=true;osaee.push(k);};
        // в—Һй ӯж®ӢгӮҠ
        okAll.forEach(function(m){if(m===maru)return;okAll.forEach(function(t){addOsa(maru,m,t);});});
        // в—Ӣй ӯж®ӢгӮҠ
        okAll.forEach(function(m){if(m===shiro)return;okAll.forEach(function(t){addOsa(shiro,m,t);});});
        osaee=osaee.slice(0,6);
        var honsenStr=honsen.join('/'),osaeeStr=osaee.join('/');
        var bet='гҖҗиІ·гҒ„зӣ®гҖ‘\nжң¬з·ҡ('+honsen.length+'зӮ№)\n'+honsen.join('\n')+'\nжҠ‘гҒҲ('+osaee.length+'зӮ№)\n'+osaee.join('\n')+'\n\n';
        // ж—ўеӯҳгҖҗиІ·гҒ„зӣ®гҖ‘гҒҢгҒӮгӮҢгҒ°зҪ®жҸӣгҖҒгҒӘгҒ‘гӮҢгҒ°гҖҗз·ҸеҗҲи©•дҫЎгҖ‘зӣҙеүҚгҒ«жҢҝе…Ҙ
        if(text.indexOf('гҖҗиІ·гҒ„зӣ®гҖ‘')>=0){
          text=text.replace(/гҖҗиІ·гҒ„зӣ®гҖ‘[\s\S]*?\n\n/,bet);
        } else {
          var sogoIdx=text.indexOf('гҖҗз·ҸеҗҲи©•дҫЎгҖ‘');
          if(sogoIdx>=0){text=text.slice(0,sogoIdx)+bet+text.slice(sogoIdx);}
          else{text=bet+text;}
        }
        // XгӮөгғһгғӘгғјгҒ®жң¬з·ҡгғ»жҠ‘гҒҲиЎҢгӮӮдёҠжӣёгҒҚ
        text=text.replace(/жң¬з·ҡ[\u3000 \t][^\n]*/g,'жң¬з·ҡгҖҖ'+honsenStr);
        text=text.replace(/жҠ‘гҒҲ[\u3000 \t][^\n]*/g,'жҠ‘гҒҲгҖҖ'+osaeeStr);
      }
    }
    // йҖҡеёёгғўгғјгғүJSиҮӘеӢ•з”ҹжҲҗ
    if(currentMode==='normal'&&calcData){
      var shinkido=calcData.normalResult.shinkido;
      var r1=text.match(/1дҪҚ\s*(\d)еҸ·иүҮ/);
      var r2=text.match(/2дҪҚ\s*(\d)еҸ·иүҮ/);
      var r3=text.match(/3дҪҚ\s*(\d)еҸ·иүҮ/);
      var r4=text.match(/4дҪҚ\s*(\d)еҸ·иүҮ/);
      var r5=text.match(/5дҪҚ\s*(\d)еҸ·иүҮ/);
      var r6=text.match(/6дҪҚ\s*(\d)еҸ·иүҮ/);
      var p1=r1?r1[1]:'1';
      var p2,p3,p4,p5;
      if(shinkido==='C'){
        // Cгғўгғјгғүпјҡз·ҸеҗҲи©•дҫЎй ҶгҒқгҒ®гҒҫгҒҫ
        var ab=calcData.normalResult.ab;
        var usedP=[p1];
        function nextUnused(arr){return ['2','3','4','5','6'].filter(function(x){return arr.indexOf(x)<0;})[0]||'2';}
        p2=r2?r2[1]:null;p3=r3?r3[1]:null;p4=r4?r4[1]:null;p5=r5?r5[1]:null;
        if(!p2){p2=ab[0]?String(ab[0].n):nextUnused(usedP);}usedP.push(p2);
        if(!p3){p3=ab[1]?String(ab[1].n):nextUnused(usedP);}usedP.push(p3);
        if(!p4){p4=nextUnused(usedP);}usedP.push(p4);
        if(!p5){p5=nextUnused(usedP);}
      } else {
        // A/Bпјҡй ӯгҒҜ1еҸ·иүҮеӣәе®ҡгҖӮ2зқҖгғ»3зқҖгҒҜз·ҸеҗҲи©•дҫЎй ҶгҒӢгӮү1гӮ’йҷӨгҒ„гҒҰеҸ–еҫ—
        var sogoOrder=[r1,r2,r3,r4,r5,r6].filter(function(m){return m&&m[1]!=='1';}).map(function(m){return m[1];});
        // дёҚи¶іеҲҶгҒҜ2гҖң6гҒӢгӮүиЈңе®Ң
        ['2','3','4','5','6'].forEach(function(x){if(sogoOrder.indexOf(x)<0)sogoOrder.push(x);});
        p2=sogoOrder[0]||'2';
        p3=sogoOrder[1]||'3';
        p4=sogoOrder[2]||'4';
        p5=sogoOrder[3]||'5';
      }
      var vb=function(a,b,c){return a&&b&&c&&a!==b&&b!==c&&a!==c;};
      var honsen=[],osaee=[],bets={};
      var addBet=function(arr,a,b,c){if(!vb(a,b,c))return;var k=a+'-'+b+'-'+c;if(bets[k])return;bets[k]=true;arr.push(k);};
      if(shinkido==='C'){
        addBet(honsen,p1,p2,p3);addBet(honsen,p1,p3,p2);
        addBet(honsen,p2,p1,p3);addBet(honsen,p2,p3,p1);
        addBet(osaee,p3,p1,p2);addBet(osaee,p3,p2,p1);
        addBet(osaee,p1,p3,p4);addBet(osaee,p1,p4,p3);
      } else {
        addBet(honsen,'1',p2,p3);addBet(honsen,'1',p3,p2);
        addBet(honsen,'1',p2,p4);addBet(honsen,'1',p3,p4);
        addBet(osaee,'1',p2,p5);addBet(osaee,'1',p3,p5);
        addBet(osaee,'1',p4,p2);addBet(osaee,'1',p4,p3);
      }
      honsen=honsen.slice(0,4);osaee=osaee.slice(0,4);
      var honsenStr=honsen.join('/'),osaeeStr=osaee.join('/');
      var betBlock='гҖҗжңҖзөӮиІ·гҒ„зӣ®гҖ‘8зӮ№\nжң¬з·ҡ\n'+honsen.join('\n')+'\nжҠ‘гҒҲ\n'+osaee.join('\n')+'\n';
      // AIгҒҢеҮәгҒ—гҒҹгҖҗжңҖзөӮиІ·гҒ„зӣ®гҖ‘гғ–гғӯгғғгӮҜгӮ’е…ЁгҒҰеүҠйҷӨ
      text=text.replace(/гҖҗжңҖзөӮиІ·гҒ„зӣ®гҖ‘[\s\S]*?(?=гҖҗ|$)/g,'');
      // гҖҗгӮӨгғідҝЎй јеәҰгҖ‘гҒ®еүҚгҒ«жҢҝе…Ҙ
      var inIdx=text.indexOf('гҖҗгӮӨгғідҝЎй јеәҰгҖ‘');
      if(inIdx>=0){text=text.slice(0,inIdx)+betBlock+'\n'+text.slice(inIdx);}
      else{text=betBlock+'\n'+text;}
      text=text.replace(/жң¬з·ҡ[\u3000 \t][^\n]*/g,'жң¬з·ҡгҖҖ'+honsenStr);
      text=text.replace(/жҠ‘гҒҲ[\u3000 \t][^\n]*/g,'жҠ‘гҒҲгҖҖ'+osaeeStr);
    }
    if(currentMode==='are'&&calcData&&calcData.cands1st&&calcData.cands1st.length>=2){
      var ok1st=[String(calcData.cands1st[0].n),String(calcData.cands1st[1].n)];
      text=text.split('\n').filter(function(ln){
        var m=ln.match(/^(\d)-(\d)-(\d)$/);
        return !m||ok1st.indexOf(m[1])>=0;
      }).join('\n');
    }
    document.getElementById('outText').textContent=text;
    document.getElementById('outWrap').classList.add('show');
    showOddsResult();
    showStatus('з”ҹжҲҗе®ҢдәҶ','ok');
  }catch(e){showStatus('гӮЁгғ©гғј: '+e.message,'err');}
  finally{
    document.getElementById('genBtn').disabled=false;
    document.getElementById('loading').classList.remove('show');
  }
}

function copyOut(){
  var text=document.getElementById('outText').textContent;
  var btn=document.getElementById('copyBtn');
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){btn.textContent='вң… гӮігғ”гғје®ҢдәҶ';btn.classList.add('ok');setTimeout(function(){btn.textContent='рҹ“Ӣ XжҠ•зЁҝз”ЁгҒ«гӮігғ”гғј';btn.classList.remove('ok');},2000);});}
}

/* ===== гӮӘгғғгӮәгғ‘гғјгӮөгғј ===== */
function parseOdds(raw){
  var lines=raw.split('\n').map(function(l){return l.replace(/\t/g,' ').trim();}).filter(function(l){return l.length>0;});
  var boats={};var playerRe=/^([1-6])\s+([\u3000-\u9fff\u30a0-\u30ff]+)/;var blocks=[];var cur=null;
  for(var i=0;i<lines.length;i++){var line=lines[i];var pm=line.match(playerRe);if(pm){cur={boatNo:parseInt(pm[1]),name:pm[2],dataLines:[]};blocks.push(cur);continue;}if(cur&&!line.startsWith('еҗҲжҲҗ')&&!line.startsWith('2еҚҳ'))cur.dataLines.push(line);}
  for(var bi=0;bi<blocks.length;bi++){
    var block=blocks[bi];var boatNo=block.boatNo,name=block.name,dataLines=block.dataLines;
    boats[boatNo]={name:name,odds:{}};if(dataLines.length<1)continue;
    var tokenLines=dataLines.map(function(l){return l.split(/\s+/).filter(function(t){return /^\d+(\.\d+)?$/.test(t);}).map(Number);});
    var row0=tokenLines[0];if(!row0||row0.length<3)continue;
    var secondBoats=[];
    for(var j=0;j+2<row0.length;j+=3){var s=Math.round(row0[j]),t=Math.round(row0[j+1]),v=row0[j+2];if(s>=1&&s<=6&&t>=1&&t<=6&&v>0){secondBoats.push(s);boats[boatNo].odds[boatNo+'-'+s+'-'+t]=v;}}
    for(var row=1;row<tokenLines.length;row++){var toks=tokenLines[row];for(var col=0;col<secondBoats.length;col++){var jj=col*2;if(jj+1>=toks.length)continue;var tt=Math.round(toks[jj]),vv=toks[jj+1];if(tt>=1&&tt<=6&&vv>0)boats[boatNo].odds[boatNo+'-'+secondBoats[col]+'-'+tt]=vv;}}
  }
  return boats;
}
function calcGoseiOdds(betsArr,oddsData){
  var sum=0;
  betsArr.forEach(function(bet){var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;var first=parseInt(parts[1]);var bd=oddsData[first];if(!bd)return;var o=bd.odds[bet];if(o&&o>0)sum+=1/o;});
  return sum===0?null:(1/sum).toFixed(1);
}
function showOddsResult(){
  // гғ¬гғјгӮ№гғҮгғјгӮҝгҒӢгӮү=== гӮӘгғғгӮә ===гӮ»гӮҜгӮ·гғ§гғігӮ’иҮӘеӢ•жҠҪеҮә
  var raw=document.getElementById('raceData').value;
  var oddsIdx=raw.indexOf('=== гӮӘгғғгӮә ===');
  if(oddsIdx<0){document.getElementById('oddsResult').innerHTML='';return;}
  var oddsRaw=raw.slice(oddsIdx);
  var oddsData=parseOdds(oddsRaw);
  var outText=document.getElementById('outText').textContent;
  var bets=[],seen={};
  var lines=outText.split('\n');
  var inBetSection=false;
  lines.forEach(function(ln){
    var t=ln.trim();
    if(t.indexOf('гҖҗжңҖзөӮиІ·гҒ„зӣ®гҖ‘')>=0||t.indexOf('гҖҗиІ·гҒ„зӣ®гҖ‘')>=0){inBetSection=true;return;}
    if(inBetSection&&t.startsWith('гҖҗ')&&t.indexOf('иІ·гҒ„зӣ®')<0){inBetSection=false;}
    if(inBetSection&&/^\d-\d-\d$/.test(t)&&!seen[t]){seen[t]=true;bets.push(t);}
  });
  if(bets.length===0){document.getElementById('oddsResult').innerHTML='';return;}
  var html='<div style="margin-top:14px;"><div style="font-size:10px;color:var(--text-sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:6px;border-left:2px solid var(--accent);">иІ·гҒ„зӣ®гӮӘгғғгӮә</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr><th style="text-align:left;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">иІ·гҒ„зӣ®</th><th style="text-align:right;padding:5px 6px;background:var(--bg);color:var(--text-sub);font-size:10px;border-bottom:1px solid var(--border);">гӮӘгғғгӮә</th></tr></thead><tbody>';
  var validBets=[];
  bets.forEach(function(bet){
    var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;
    var first=parseInt(parts[1]);var bd=oddsData[first];var o=bd?bd.odds[bet]:null;
    var oStr=o?o.toFixed(1)+'еҖҚ':'вҖ”';
    var color=o?(o>=100?'color:var(--accent)':o>=30?'color:var(--text)':'color:var(--green)'):'color:var(--text-muted)';
    html+='<tr><td style="padding:5px 6px;border-bottom:1px solid var(--border);font-weight:700;">'+bet+'</td><td style="text-align:right;padding:5px 6px;border-bottom:1px solid var(--border);'+color+'">'+oStr+'</td></tr>';
    if(o)validBets.push(bet);
  });
  html+='</tbody></table>';
  var gosei=calcGoseiOdds(validBets,oddsData);
  if(gosei){html+='<div style="margin-top:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;"><span style="font-size:10px;color:var(--text-sub);">еҗҲжҲҗгӮӘгғғгӮә</span><span style="font-size:22px;font-weight:700;color:var(--accent);margin-left:10px;">'+gosei+'еҖҚ</span><span style="font-size:10px;color:var(--text-muted);margin-left:8px;">('+validBets.length+'зӮ№)</span></div>';}
  html+='</div>';
  document.getElementById('oddsResult').innerHTML=html;
}
loadKey();
