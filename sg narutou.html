<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡G. 予想エンジン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;700&family=Anton&display=swap">
<style>
  :root{--bg:#102a1c;--surface:#1a4228;--surface2:#225535;--border:#347a48;--gold:#c9a84c;--gold2:#f0d080;--red:#e05050;--blue:#4a9eff;--green:#4caf7d;--text:#eef5f0;--muted:#82cc96;--font:-apple-system,'Hiragino Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:40px;}
  .header{background:linear-gradient(135deg,#1f5030,#102a1c);border-bottom:1px solid var(--gold);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.05em;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .key-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 10px;border-radius:6px;-webkit-appearance:none;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:var(--muted);background:none;border:none;-webkit-appearance:none;border-bottom:2px solid transparent;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .page{display:none;padding:16px;}
  .page.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card-title{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:.08em;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px 12px;border-radius:8px;-webkit-appearance:none;font-family:var(--font);margin-bottom:10px;}
  textarea{height:130px;resize:none;font-size:12px;}
  select{height:42px;}
  .btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;-webkit-appearance:none;margin-bottom:8px;letter-spacing:.05em;}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#f0d080);color:#0a0a0f;}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;border:none;-webkit-appearance:none;font-weight:600;margin-bottom:0;}
  .mode-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;}
  .mode-normal{background:#1a3a1a;color:var(--green);border:1px solid var(--green);}
  .mode-are{background:#3a1a1a;color:var(--red);border:1px solid var(--red);}
  .mode-skip{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .info-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--muted);}
  .info-chip span{color:var(--text);font-weight:700;}
  .score-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px;}
  .score-cell{background:var(--surface2);border-radius:6px;padding:6px 4px;text-align:center;}
  .score-cell .boat-no{font-size:11px;font-weight:700;margin-bottom:2px;}
  .score-cell .score-val{font-size:14px;font-weight:700;color:var(--gold);}
  .score-cell .score-label{font-size:9px;color:var(--muted);}
  .bet-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
  .bet-table th{font-size:10px;color:var(--muted);padding:5px 4px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .bet-table td{padding:8px 4px;border-bottom:1px solid var(--border);}
  .bet-table tr:last-child td{border-bottom:none;}
  .bet-val{font-weight:700;font-size:14px;white-space:nowrap;}
  .bet-type{font-size:10px;color:var(--muted);white-space:nowrap;}
  .odds-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:5px 6px;border-radius:6px;width:62px;margin-bottom:0;text-align:right;}
  .conf-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 6px;border-radius:6px;-webkit-appearance:none;width:46px;margin-bottom:0;}
  .amt-cell{font-weight:700;color:var(--gold);text-align:right;white-space:nowrap;}
  .ret-cell{font-size:12px;text-align:right;white-space:nowrap;}
  .alloc-row{display:flex;gap:6px;margin-bottom:10px;}
  .alloc-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .alloc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
  .sum-label{font-size:12px;color:var(--muted);}
  .sum-val{font-size:15px;font-weight:700;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .stat-item{background:var(--surface2);border-radius:8px;padding:10px 12px;text-align:center;}
  .stat-val{font-size:20px;font-weight:700;}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .green{color:var(--green)!important;}.red{color:var(--red)!important;}.gold{color:var(--gold)!important;}
  .rate-bar-wrap{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-top:6px;}
  .rate-bar{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,var(--green),var(--gold));}
  .log-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;}
  .log-left{flex:1;}.log-race{font-size:13px;font-weight:700;}.log-meta{font-size:10px;color:var(--muted);margin-top:2px;}.log-bets{font-size:11px;color:var(--muted);margin-top:3px;}
  .log-right{text-align:right;min-width:70px;}.log-payout{font-size:15px;font-weight:700;color:var(--gold);}
  .log-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:4px;display:inline-block;}
  .badge-hit{background:#1a3a1a;color:var(--green);}.badge-miss{background:#3a1a1a;color:var(--red);}.badge-skip{background:var(--surface2);color:var(--muted);}
  .loading{color:var(--muted);text-align:center;padding:16px;}
  .dot-anim::after{content:'';animation:dots 1.2s infinite;}
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:'.'}}
  .divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .betcount-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .bc-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .bc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
  .ai-output{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text);margin-bottom:10px;min-height:40px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;padding:20px;align-items:center;justify-content:center;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:360px;}
  .modal-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;}

/* === 通常エンジン移植CSS === */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--text);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--text);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;font-family:'Noto Serif JP',serif;}
.logo-text{font-size:16px;font-weight:700;color:var(--text);font-family:'Noto Serif JP',serif;}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.ver{font-size:10px;color:var(--text-sub);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:2px;}
.mode-row{display:flex;gap:6px;margin-bottom:10px;}
.mode-btn{flex:1;padding:11px;border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mode-btn.active{background:var(--text);color:#fff;border:2px solid var(--text);}
.mode-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
.pts-row{display:flex;gap:6px;margin-bottom:10px;}
.pts-btn{flex:1;padding:8px 4px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;}
.pts-btn.active{background:var(--accent);color:#fff;border:2px solid var(--accent);}
.pts-btn.inactive{background:var(--surface);color:var(--text-sub);border:1px solid var(--border);}
.api-row{display:flex;gap:8px;}
.api-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;padding:10px;outline:none;font-family:monospace;}
.api-input.saved{border-color:#a0d0b0;color:var(--green);}
.api-save{background:var(--text);color:#fff;border:none;padding:10px 14px;border-radius:4px;font-size:12px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.calc-result{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-top:12px;display:none;}
.calc-result.show{display:block;}
.loading{text-align:center;padding:24px 0;display:none;}
.loading.show{display:block;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px;}
.loading-txt{font-size:11px;color:var(--text-muted);}
.out-wrap{display:none;margin-top:14px;}
.out-wrap.show{display:block;}
.out-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.out-text{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:14px;font-size:12px;color:var(--text);line-height:2.0;white-space:pre-wrap;word-break:break-word;}
.copy-btn{width:100%;margin-top:8px;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;}
.copy-btn.ok{background:var(--green-light);color:var(--green);border-color:#a0d8b0;}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;}
.section-card.hidden{display:none;}
.sec-step-label{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;text-transform:uppercase;}
.step-next-btn{width:100%;padding:13px;background:var(--text);color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;-webkit-appearance:none;margin-top:12px;font-family:'Noto Serif JP',serif;letter-spacing:1px;cursor:pointer;touch-action:manipulation;}
.mark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;position:relative;z-index:100;isolation:isolate;}
.eval-card-wrap{margin-top:14px;display:none;}
.eval-card-wrap.show{display:block;}
.eval-card-hdr{font-size:10px;color:var(--text-sub);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.eval-card{position:relative;border-radius:10px;overflow:hidden;padding:16px 14px 18px;background:#0c0c0c;}
.eval-card-title{text-align:center;font-family:'Noto Serif JP',serif;font-style:italic;font-weight:900;font-size:clamp(20px,5vw,32px);letter-spacing:.04em;color:#e8c96a;text-shadow:0 0 20px rgba(200,153,60,0.3),0 2px 4px rgba(0,0,0,1);margin-bottom:5px;line-height:1.1;}
.eval-brush{display:block;height:9px;margin:0 auto 12px;width:52%;background:linear-gradient(90deg,transparent 0%,rgba(180,140,30,.45) 20%,rgba(255,220,80,.65) 50%,rgba(180,140,30,.45) 80%,transparent 100%);border-radius:50%;filter:blur(2.5px);}
.eval-boats{background:#141414;border:1px solid #2e2e2e;border-radius:8px;padding:14px 8px 12px;position:relative;display:flex;align-items:flex-start;justify-content:space-between;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 24px rgba(0,0,0,.9);}
.eval-corner-tr{position:absolute;top:5px;right:5px;width:16px;height:16px;border-top:2px solid #c9a84c;border-right:2px solid #c9a84c;}
.eval-corner-bl{position:absolute;bottom:5px;left:5px;width:16px;height:16px;border-bottom:2px solid #c9a84c;border-left:2px solid #c9a84c;}
.eval-gold-lines{position:relative;margin-top:10px;display:flex;flex-direction:column;gap:3px;padding:0 0 2px;}
.eval-gold-dot{position:absolute;width:9px;height:9px;left:50%;transform:translateX(-50%);top:0;background:radial-gradient(circle,#ffe580 0%,#c9a84c 55%,transparent 100%);border-radius:50%;}
.eval-gold-line{height:1.4px;background:linear-gradient(90deg,transparent 0%,#8a6010 12%,#c9a84c 32%,#ffe580 50%,#c9a84c 68%,#8a6010 88%,transparent 100%);}
.eval-hint{margin-top:9px;color:#4a4a4a;font-size:.65rem;text-align:center;}
.eval-save-btn{width:100%;margin-top:8px;padding:11px;background:linear-gradient(135deg,#7a5800,#c9a84c,#ffe580,#c9a84c,#7a5800);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;-webkit-appearance:none;font-family:'Noto Sans JP',sans-serif;cursor:pointer;letter-spacing:.05em;}
.eval-slot{display:flex;flex-direction:column;align-items:center;gap:6px;width:13%;}
.eval-badge{width:100%;aspect-ratio:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,7vw,40px);font-weight:900;font-family:'Anton',sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.7);}
.eval-arrow{color:#4a4a4a;font-size:14px;font-weight:700;align-self:center;margin-bottom:22px;flex-shrink:0;}
.eval-stars{display:flex;gap:1px;justify-content:center;flex-wrap:nowrap;width:100%;}
.eval-star-on{color:#c9a84c;font-size:clamp(8px,2.3vw,13px);line-height:1;}
.eval-star-off{color:#2a2a2a;font-size:clamp(8px,2.3vw,13px);line-height:1;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="header">
  <div><div class="header-title">⚡ SG鳴門 集い専用</div><div class="header-sub">第36回 グランドチャンピオン 6/23〜28</div></div>
 
</div>
<!-- タブなし（予想のみ） -->

<!-- 予想タブ -->
<div id="page-yoso" class="page active">
  <div class="card">
    <div class="card-title">📋 レース情報</div>
    <div style="margin-bottom:8px;">
      <label>レース種別</label>
      <div style="display:flex;gap:6px;margin-top:4px;">
        <button id="rtype-ippan" onclick="setRaceType('ippan',this)" class="bc-btn" style="flex:1;padding:8px 0;font-size:12px;">一般戦</button>
        <button id="rtype-g2g3" onclick="setRaceType('g2g3',this)" class="bc-btn" style="flex:1;padding:8px 0;font-size:12px;">G2/G3</button>
        <button id="rtype-g1" onclick="setRaceType('g1',this)" class="bc-btn" style="flex:1;padding:8px 0;font-size:12px;">G1</button>
        <button id="rtype-sg" onclick="setRaceType('sg',this)" class="bc-btn active" style="flex:1;padding:8px 0;font-size:12px;">SG</button>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>場所</label>
        <select id="inp-venue" onchange="saveVenueRace()" style="width:100%;padding:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;">
          <option value="">場所を選択</option>
          <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
          <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
          <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
          <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
          <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
        </select>
      </div>
      <div><label>レース番号</label><select id="inp-racenum" onchange="saveVenueRace()">
          <option value="">R</option>
          <option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
          <option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
          <option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
          <option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
        </select></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 競艇日和データ（全文貼付け）</div>
    <textarea id="inp-data" placeholder="競艇日和のページ全体をコピー＆ペースト"></textarea>
    <div class="row2">
      <div><label>資金 (円)</label><input type="number" id="inp-shikin" value="3000" step="100"></div>
      <div>
        <label>買い目点数</label>
        <div class="betcount-row">
          <button class="bc-btn" onclick="setBetCount(4,this)">4</button>
          <button class="bc-btn" onclick="setBetCount(6,this)">6</button>
          <button class="bc-btn" onclick="setBetCount(8,this)">8</button>
          <button class="bc-btn active" onclick="setBetCount(12,this)">12</button>
          <button class="bc-btn" onclick="setBetCount(13,this)">13</button>
          <button class="bc-btn" onclick="setBetCount(16,this)">16</button>
        </div>
      </div>
    </div>
  </div>
  <button class="btn btn-gold" onclick="runYoso()">⚡ 予想実行</button>
  <button class="btn btn-ghost" onclick="clearYoso()">クリア</button>

  <div id="yoso-result" style="display:none;">
    <div class="card">
      <div class="card-title">📊 JSスコア計算結果</div>
      <div id="score-display"></div>
      <div id="mode-result" style="margin-top:8px;"></div>
      <hr class="divider">
      <label style="margin-bottom:8px;">モード選択</label>
      <div style="display:flex;gap:8px;">
        <button class="alloc-btn active" id="mode-btn-normal" onclick="setMode('normal')" style="flex:1;padding:10px;">🔒 通常</button>
        <button class="alloc-btn" id="mode-btn-are" onclick="setMode('are')" style="flex:1;padding:10px;">⚡ 荒れ</button>
        <button class="alloc-btn" id="mode-btn-skip" onclick="setMode('skip')" style="display:none;">⏭ SKIP</button>
      </div>
      <button class="btn btn-gold" onclick="applyMode()" style="margin-top:8px;">買い目を生成</button>
      <div style="margin-top:10px;">
        <label style="font-size:12px;color:var(--muted);margin-bottom:6px;display:block;">買い目構成</label>
        <div style="display:flex;gap:6px;">
          <button class="alloc-btn active" id="nige-btn-auto" onclick="setNigeMode('auto')" style="flex:1;padding:8px;font-size:11px;">🤖 自動</button>
          <button class="alloc-btn" id="nige-btn-high" onclick="setNigeMode('high')" style="flex:1;padding:8px;font-size:11px;">🔒 逃げ固定</button>
          <button class="alloc-btn" id="nige-btn-mid" onclick="setNigeMode('mid')" style="flex:1;padding:8px;font-size:11px;">⚖️ 2艇頭</button>

<!-- 保存ボタン（BMペースト跡地） -->
<div id="save-result-btn-wrap-bottom" style="padding:0 0 20px;display:none;">
  <button onclick="saveResult('pending')" style="width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;-webkit-appearance:none;letter-spacing:.05em;cursor:pointer;">💾 この予想を保存する</button>
</div>

<div class="toast" id="toast"></div>

<script>

// ============================================================
// 定数
// ============================================================
const STORE_KEY='sg_narutou_v1';
const SETTINGS_KEY='sg_narutou_settings';
const GEMINI_KEY='kyotei_gemini_key';
let selectedBetCount=12;
let allocMode='equal';
let selectedMode='normal'; // ユーザー手動選択
let selectedRaceType='sg'; // 'ippan','g2g3','g1','sg'
let currentCalcData=null;
let currentParsedData=null; // パース済みデータ保持
let currentAreScores=null; // スコア保持

function getLogs(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch{return[];}}
function saveLogs(l){localStorage.setItem(STORE_KEY,JSON.stringify(l));}
function getSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{"maxrace":3}');}catch{return{maxrace:3};}}
function saveSettingsData(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}
function getApiKey(){return localStorage.getItem(GEMINI_KEY)||'';}

// ============================================================
// モード手動選択
// ============================================================
function setMode(mode){
  selectedMode=mode;
  ['normal','are','skip'].forEach(m=>{
    const el=document.getElementById('mode-btn-'+m);
    if(el) el.classList.toggle('active',m===mode);
  });
}

var selectedNigeMode = 'auto'; // 'auto'|'high'|'mid'|'low'

function setNigeMode(mode){
  selectedNigeMode = mode;
  ['auto','high','mid','low'].forEach(m=>{
    const btn = document.getElementById('nige-btn-'+m);
    if(btn) btn.classList.toggle('active', m===mode);
  });
}

function applyMode(){
  if(!currentParsedData||!currentAreScores){showToast('先に予想実行してください');return;}
  if(selectedMode==='skip'){showToast('スキップ設定です');return;}
  generateBets(currentParsedData, currentAreScores, selectedMode);
}

function generateBets(d, areScores, mode){
  const racenum=document.getElementById('inp-racenum').value||'?';
  const honme='1';
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;
  const oddsMap=extractOddsMap(document.getElementById('inp-data').value);
  const ranking=parseRanking(document.getElementById('ai-raw').textContent||'');
  if(!ranking.length){showToast('AIランキングがありません');return;}

  // レース種別に応じて逃げ率ソースを切り替え
  // 当地は10走以上あるときのみ信頼性あり
  const _rtype=selectedRaceType||'sg';
  const _b1=d.boats[0];
  const _atchiValid=_b1.atchiNige>0&&(_b1.atchiNigeCount||0)>=10;
  const nigeRate=_rtype==='sg'?(_b1.sgNige>0?_b1.sgNige:_b1.nigerate6m):
                 _rtype==='g1'?(_b1.sgNige>0?_b1.sgNige:(_atchiValid?_b1.atchiNige:_b1.nigerate6m)):
                 _rtype==='g2g3'?(_atchiValid?_b1.atchiNige:_b1.nigerate6m):
                 /* ippan */(_atchiValid?_b1.atchiNige:_b1.nigerate6m);
  const{areIndex}=calcAreIndex(d);
  const betsRaw=mode==='are'?buildBetsAre(ranking,selectedBetCount,nigeRate):buildBetsNormal(ranking,selectedBetCount,currentParsedData);

  // バッジ更新
  const modeLabel=mode==='are'?'⚡ 荒れ':'🔒 通常';
  const modeCls=mode==='are'?'mode-are':'mode-normal';
  document.getElementById('race-info-strip').innerHTML=`
    <span class="mode-badge ${modeCls}" style="font-size:11px;padding:3px 10px;">${modeLabel}</span>
    <span class="info-chip">荒れ指数 <span>${areIndex}点</span></span>
    <span class="info-chip">逃げ率 <span>${nigeRate.toFixed(1)}%</span></span>
    <span class="info-chip">${racenum}R</span>
    <span class="info-chip">買い目 <span>${betsRaw.length}点</span></span>`;

  // テーブル描画
  const tbody=document.getElementById('bet-tbody');
  tbody.innerHTML='';
  for(const b of betsRaw){
    const autoOdds=oddsMap[b.val]||0;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="bet-val">${b.val}</span></td><td><span class="bet-type">${b.type}</span></td><td><input class="odds-inp" type="number" value="${autoOdds||''}" placeholder="倍率" step="0.1" min="0" oninput="recalcAlloc()"></td><td><select class="conf-sel" onchange="recalcAlloc()"><option value="3">高</option><option value="2" selected>中</option><option value="1">低</option></select></td><td class="amt-cell">—</td><td class="ret-cell">—</td>`;
    tbody.appendChild(tr);
  }

  document.getElementById('bet-section').style.display='block';
  currentCalcData={racenum,honme,nigeRate,areIndex,mode,betcount:betsRaw.length,shikin,ranking,betsRaw};
  recalcAlloc();
  updateXPreview();

  // 保存ボタンを表示
  var sbw=document.getElementById('save-result-btn-wrap-bottom');
  if(sbw) sbw.style.display='block';

  // 評価カード生成
  var venue = document.getElementById('inp-venue') ? document.getElementById('inp-venue').value : '';
  var racenum2 = document.getElementById('inp-racenum') ? document.getElementById('inp-racenum').value : '';
  var xText = document.getElementById('x-summary-preview') ? document.getElementById('x-summary-preview').value : '';
  if(typeof renderEvalCard === 'function') renderEvalCard(xText, venue, racenum2);

  // ログ自動保存（SG専用）
  sgAutoSaveLog(xText, venue, racenum2);

  // ログサマリー更新
  if(typeof updateLogSummary === 'function') updateLogSummary();
}

function setRaceType(type, btn){
  selectedRaceType=type;
  document.querySelectorAll('[id^="rtype-"]').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // 保存
  localStorage.setItem('sg_raceType', type);
}

function switchTab(name){
  // tabs removed
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');


}
function setBetCount(n,btn){selectedBetCount=n;document.querySelectorAll('.bc-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

// ============================================================
// データパース（競艇日和テキスト → 構造化）
// ============================================================
function parseData(text){
  const d={boats:[]};
  for(let i=1;i<=6;i++) d.boats.push({no:i,name:'',regno:'',nigerate6m:0,nigerate1y:0,atchiNige:0,atchiNigeCount:0,sgNige:0,sashi6m:0,makuri6m:0,makurisashi6m:0,sg1chakuRate:0,sg1chakuCount:0,kinsetsu6m:0,motor2ren:0,sessonPt:0,sessonRaces:0,sessonAvgST:0,sgAvgST:0,atchiAvgST:0,tenji:0,avgTenji:0,syukai:0,syukaiFoot:0,avgSyukaiFoot:0,directST:0,isExhibitF:false,isF:false});

  // 逃げ率パース（優先順位: SG/G1 → 当地 → 直近6ヶ月）
  // 直近6ヶ月
  const nigeSection=text.match(/直近 6ヶ月\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)/);
  if(nigeSection){
    [1,3,5,7,9,11].forEach((idx,i)=>{d.boats[i].nigerate6m=parseFloat(nigeSection[idx])||0;});
  }
  // 当地逃げ率
  (function(){
    var lines3=text.split('\n');
    var inAre=false;
    for(var li=0;li<lines3.length;li++){
      var ln=lines3[li];
      if(ln.includes('1着率')&&!inAre){inAre=true;continue;}
      if(!inAre)continue;
      if(ln.includes('当地')){
        var vals=[], counts=[];
        // xx% (n) の形式から率と走数を両方取得
        var re2=/([\d.]+)%\s*\((\d+)\)/g, m3;
        while((m3=re2.exec(ln))!==null){vals.push(parseFloat(m3[1]));counts.push(parseInt(m3[2]));}
        // 走数なしの場合は%だけ取得
        if(!vals.length){var re=/([\d.]+)%/g,m2;while((m2=re.exec(ln))!==null)vals.push(parseFloat(m2[1]));}
        for(var j=0;j<Math.min(vals.length,6);j++){
          d.boats[j].atchiNige=vals[j];
          d.boats[j].atchiNigeCount=counts[j]||0; // 走数
        }
        break;
      }
      if(ln.includes('直近')&&inAre&&ln.includes('%')) continue;
      if(ln.includes('2連対率')) break;
    }
  })();
  // SG/G1逃げ率（SGエンジンの最優先ソース）
  (function(){
    var lines4=text.split('\n');
    var inAre=false;
    for(var li=0;li<lines4.length;li++){
      var ln=lines4[li];
      if(ln.includes('1着率')&&!inAre){inAre=true;continue;}
      if(!inAre)continue;
      if(/^SG\/G1/.test(ln.trim())||ln.trim().startsWith('SG/G1')){
        var vals=[];
        var re=/([\d.]+)%/g,m2;
        while((m2=re.exec(ln))!==null) vals.push(parseFloat(m2[1]));
        for(var j=0;j<Math.min(vals.length,6);j++) d.boats[j].sgNige=vals[j];
        break;
      }
      if(ln.includes('2連対率')) break;
    }
  })();

  // 決まり手（直近6ヶ月）- 2ステップパーサー（kyotei_are.html準拠）
  (function(){
    var lines2=text.split('\n');
    var inK6M=false,nextIs6M=false,kType='';
    function kv6(line){
      var cols=line.split('\t'),out=[];
      for(var ci=0;ci<cols.length&&out.length<6;ci++){
        var v=(cols[ci]||'').trim().replace(/%/,'');
        var n=parseFloat(v);
        out.push(isNaN(n)?null:n);
      }
      while(out.length<6)out.push(null);
      return out;
    }
    for(var li=0;li<lines2.length;li++){
      var ln=lines2[li].trim();
      var lb=(ln.split('\t')[0]||'').trim().replace(/\s+/g,'');
      if(lb==='決まり手'){inK6M=false;nextIs6M=true;kType='';continue;}
      if(nextIs6M&&(ln.includes('直近6ヶ月')||ln.includes('直近 6ヶ月'))){inK6M=true;nextIs6M=false;continue;}
      if(!inK6M)continue;
      if(ln.includes('直近1年')||ln.includes('直近 1年')||ln.includes('直近3ヶ月')){inK6M=false;kType='';continue;}
      var fullLb=ln.split('\t').join('');
      if(fullLb.includes('差し')&&!fullLb.includes('捲り')){kType='sashi';continue;}
      if(fullLb.includes('捲り')&&!fullLb.includes('差し')){kType='makuri';continue;}
      if(fullLb.includes('捲り')&&fullLb.includes('差し')){kType='makuriSashi';continue;}
      if(kType){
        var kvals=kv6(ln);
        for(var j=0;j<6;j++){
          if(kvals[j]===null)continue;
          if(kType==='sashi')d.boats[j].sashi6m=kvals[j];
          else if(kType==='makuri')d.boats[j].makuri6m=kvals[j];
          else if(kType==='makuriSashi')d.boats[j].makurisashi6m=kvals[j];
        }
        kType='';
      }
    }
  })();

  // レース情報（BMデータ冒頭から取得）
  // フォーマット: "=== レース情報 ===\n場所\tXR\t日付"
  const raceMeta=text.match(/=== レース情報 ===\n([^\t\n]+)\t(\d+R)(?:\t(\d+))?/);
  if(raceMeta){
    d.venue=raceMeta[1].trim();
    d.raceNum=raceMeta[2].trim();
  }

  // 選手名（漢字）・登録番号パース
  // 登録番号行: タブ区切りで4〜5桁の数字が6つ
  const regnoLine=text.match(/\t(\d{4,5})\t(\d{4,5})\t(\d{4,5})\t(\d{4,5})\t(\d{4,5})\t(\d{4,5})/);
  if(regnoLine){
    for(let i=0;i<6;i++) d.boats[i].regno=regnoLine[i+1]||'';
  }
  // 漢字名: オッズセクションの "1\t菅章哉" 形式が最も確実
  (function(){
    var lines=text.split('\n');
    var inOdds=false;
    for(var li=0;li<lines.length;li++){
      var ln=lines[li];
      if(ln.includes('=== オッズ ===')) {inOdds=true;continue;}
      if(!inOdds) continue;
      var m=ln.match(/^([1-6])\t([^\t\d][^\t]+)$/);
      if(m){
        var no=parseInt(m[1]);
        var name=m[2].trim();
        if(/[一-龥]/.test(name)&&no>=1&&no<=6) d.boats[no-1].name=name;
      }
    }
    // フォールバック: 直前情報の選手情報テーブル（漢字6列行）
    if(d.boats.every(b=>!b.name)){
      for(var li2=0;li2<lines.length;li2++){
        var parts=lines[li2].split('\t').map(p=>p.trim()).filter(p=>p);
        if(parts.length>=6&&parts.slice(0,6).every(p=>/[一-龥]/.test(p))&&!parts[0].includes('期')&&!parts[0].includes('号艇')){
          for(var j=0;j<6;j++) d.boats[j].name=parts[j]||'';
          break;
        }
      }
    }
  })();

  // SG/G1 1着率
  const sgSection=text.match(/SG\/G1\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)/);
  if(sgSection){
    [1,3,5,7,9,11].forEach((idx,i)=>{
      d.boats[i].sg1chakuRate=parseFloat(sgSection[idx])||0;
      d.boats[i].sg1chakuCount=parseInt(sgSection[idx+1])||0;
    });
  }

  // 直近6ヶ月勝率
  const kinsetsuSection=text.match(/直近 6ヵ月\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)/);
  if(kinsetsuSection){
    for(let i=0;i<6;i++) d.boats[i].kinsetsu6m=parseFloat(kinsetsuSection[i+1])||0;
  }

  // モーター2連対率
  const motorSection=text.match(/モーター[\s\S]*?2連対率\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%/);
  if(motorSection){
    for(let i=0;i<6;i++) d.boats[i].motor2ren=parseFloat(motorSection[i+1])||0;
  }

  // 今節得点率（「-」は未走=0点・除外ではない）
  const sessonSection=text.match(/^得点率[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)/m);
  if(sessonSection){
    for(let i=0;i<6;i++){
      const v=(sessonSection[i+1]||'').trim();
      d.boats[i].sessonPt=(v==='-'||v==='')?0:parseFloat(v)||0;
      d.boats[i].isJogai=false; // デフォルトは除外なし
    }
  }

  // 賞除外判定：減点行に99がある艇のみ
  const gentenSection=text.match(/^減点[\t ]([^\n]+)/m);
  if(gentenSection){
    const cols=gentenSection[1].split(/[\t ]+/);
    for(let i=0;i<6;i++){
      const v=(cols[i]||'').trim();
      if(v==='99') d.boats[i].isJogai=true;
    }
  }

  // 今節平均ST（今節成績セクション内）
  const sessonStSection=text.match(/今節成績[\s\S]*?平均ST[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)/m);
  if(sessonStSection){
    for(let i=0;i<6;i++) d.boats[i].sessonAvgST=parseFloat(sessonStSection[i+1])||0;
  }

  // SG/G1平均ST（基本情報セクション内）
  const sgStSection=text.match(/基本情報[\s\S]*?SG\/G1[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)/m);
  if(sgStSection){
    for(let i=0;i<6;i++) d.boats[i].sgAvgST=parseFloat(sgStSection[i+1])||0;
  }

  // 当地平均ST（基本情報 > 当地行、数値のみ）
  const atchiStSection=text.match(/基本情報[\s\S]*?\n当地[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)/m);
  if(atchiStSection){
    for(let i=0;i<6;i++){
      const v=atchiStSection[i+1];
      d.boats[i].atchiAvgST=(v&&v!=='-')?parseFloat(v)||0:0;
    }
  }

  // 直前展示タイム
  const tenjiSection=text.match(/(?:^|\n)展示\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(tenjiSection){
    for(let i=0;i<6;i++) d.boats[i].tenji=parseFloat(tenjiSection[i+1])||0;
  }
  // 今節平均展示タイム（直前なければ補完）
  const avgTenjiSection=text.match(/^平均展示\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(avgTenjiSection){
    for(let i=0;i<6;i++) d.boats[i].avgTenji=parseFloat(avgTenjiSection[i+1])||0;
  }
  // 直前周り足（大きいほど良い）
  const syukaiFootSection=text.match(/(?:^|\n)周り足\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(syukaiFootSection){
    for(let i=0;i<6;i++) d.boats[i].syukaiFoot=parseFloat(syukaiFootSection[i+1])||0;
  }
  // 周回タイム（直前・ランク計算にも使用）
  const syukaiTimeSection=text.match(/(?:^|\n)周回\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(syukaiTimeSection){
    for(let i=0;i<6;i++) d.boats[i].syukai=parseFloat(syukaiTimeSection[i+1])||0;
  }
  // 平均周回タイム（直前なければ補完）
  const avgSyukaiSection=text.match(/^(?:平均周回|平均周り回)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(avgSyukaiSection){
    for(let i=0;i<6;i++) d.boats[i].avgSyukai=parseFloat(avgSyukaiSection[i+1])||0;
  }
  // 今節平均周り足（直前なければ補完）
  const avgSyukaiFootSection=text.match(/^(?:平均周足|平均周り足)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(avgSyukaiFootSection){
    for(let i=0;i<6;i++) d.boats[i].avgSyukaiFoot=parseFloat(avgSyukaiFootSection[i+1])||0;
  }

  // 直前ST・展示Fフラグ（展示でFっただけ＝STスコアなし、ペナルティなし）
  const stSection=text.match(/ST\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)/);
  if(stSection){
    for(let i=0;i<6;i++){
      const stStr=stSection[i+1];
      d.boats[i].isExhibitF=stStr.startsWith('F'); // 展示Fのみ
      d.boats[i].directST=parseFloat(stStr.replace('F',''))||0.20;
    }
  }

  // 今節走数推定（通常エンジン準拠）
  // 今節1着率・2連対率から逆算（estimateRaceCountSG）
  function estimateRaceCountSG(wins, ren2){
    for(var n=1;n<=12;n++){
      var ok=true;
      [wins,ren2].forEach(function(rate){
        if(rate===null||rate===undefined||rate===0) return;
        var found=false;
        for(var k=0;k<=n;k++){if(Math.abs(Math.round(k/n*1000)/10-rate)<0.6){found=true;break;}}
        if(!found) ok=false;
      });
      if(ok) return n;
    }
    return null;
  }
  (function(){
    var counts={};
    d.boats.forEach(function(b){
      // 今節1着率と2連対率から走数を逆算
      const w1=b.sessonPt>0?(b.sessonPt>=6?1:0)*100/1:null; // 簡易
      // 今節成績セクションから1着率・2連対率を取得済みの場合に使用
      // ここではsessonPtの値から走数を近似
      // sessonPt = 得点 / 走数 なので走数 = 得点合計 / sessonPt は不明
      // 代替: 早見R番号で近似
    });
  })();
  // 早見から走数近似（シンプルかつ確実）
  const hayamiSection=text.match(/早見[\t ]+([\dR\-]+)[\t ]+([\dR\-]+)[\t ]+([\dR\-]+)[\t ]+([\dR\-]+)[\t ]+([\dR\-]+)[\t ]+([\dR\-]+)/);
  if(hayamiSection){
    for(let i=0;i<6;i++){
      const val=(hayamiSection[i+1]||'').trim();
      if(val==='-'||!val){
        d.boats[i].sessonRaces=0;
      } else {
        const rnum=parseInt(val)||0;
        // SGは各艇が1日に2〜3走する。早見R番号から走数を推定
        // 1〜4R=1走, 5〜8R=2走, 9〜12R=3走
        d.boats[i].sessonRaces=rnum<=4?1:rnum<=8?2:3;
      }
    }
  }
  // フォールバック: 今節1着率の分母から逆算
  (function(){
    const ichi=text.match(/1着率[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%/);
    const niren=text.match(/2連対率[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%[\t ]([\d.]+)%/);
    if(ichi&&niren){
      for(let i=0;i<6;i++){
        if(d.boats[i].sessonRaces>0) continue; // 既に推定済み
        const w=parseFloat(ichi[i+1])||0;
        const r=parseFloat(niren[i+1])||0;
        const n=estimateRaceCountSG(w,r);
        if(n) d.boats[i].sessonRaces=n;
      }
    }
  })();

  // F休み（未消化F＝ペナルティ対象）
  const fRestSection=text.match(/F休み\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)/);
  if(fRestSection){
    for(let i=0;i<6;i++){
      d.boats[i].isF=(fRestSection[i+1]!=='-');
    }
  }

  return d;
}

// ============================================================
// 荒れスコア計算（kyotei_are.html完全準拠）
// ============================================================
function calcAreScore(d){
  const boats=d.boats;

  // 展示ランク（タイム小さいほど良い）: 直前||平均展示
  const exVals=boats.map(b=>b.tenji||b.avgTenji||99);
  const exOrder=[...boats].sort((a,b)=>(a.tenji||a.avgTenji||99)-(b.tenji||b.avgTenji||99));
  // 周回タイムランク（タイム小さいほど良い）: 直前||平均周回
  const lapOrder=[...boats].sort((a,b)=>(a.syukai||a.avgSyukai||99)-(b.syukai||b.avgSyukai||99));
  boats.forEach(b=>{
    b.exRank=exOrder.findIndex(x=>x.no===b.no);
    b.lapRank=lapOrder.findIndex(x=>x.no===b.no);
    // フォールバック: syukaiが0の場合はavgSyukaiを補完
    if(!b.syukai&&b.avgSyukai) b.syukai=b.avgSyukai;
  });

  // 合成ST計算（節間平均ST × 0.7 ＋ コース別平均ST × 0.3）
  // 今節平均STあり → 節間主軸 / なし（初日等）→ コース別のみ
  // 今節走数判定（通常エンジン準拠）
  // 走数3以下=序盤、4以上=終盤
  const raceCounts=boats.map(b=>b.sessonRaces||0).filter(v=>v>0);
  const avgRaceCount=raceCounts.length?raceCounts.reduce((s,v)=>s+v,0)/raceCounts.length:0;
  const isEarlyRace=avgRaceCount<=3;

  // コース別ST（キャリアベース）
  boats.forEach(b=>{
    const courseST=b.sgAvgST||b.atchiAvgST||0.18;
    // 序盤: 今節ST比重低（30%）、終盤: 高（70%）
    const sessonW=isEarlyRace?0.3:0.7;
    b.compositeST=b.sessonAvgST>0
      ? b.sessonAvgST*sessonW+courseST*(1-sessonW)
      : courseST;
  });
  const stVals=boats.map(b=>b.compositeST).filter(v=>v>0);
  const stMin=stVals.length?Math.min(...stVals):0.10;
  const stMax=stVals.length?Math.max(...stVals):0.25;

  // 正規化用最大値
  const tokuMax=Math.max(...boats.map(b=>b.sessonPt))||1;
  const tokuMin=Math.min(...boats.map(b=>b.sessonPt).filter(v=>v>0))||0;
  const motorMax=Math.max(...boats.map(b=>b.motor2ren))||1;
  const kinsetsuAll=boats.map(b=>b.kinsetsu6m||0);
  const kinsetsuMax=Math.max(...kinsetsuAll)||1;

  // 逃げ率（1号艇）
  // レース種別に応じて逃げ率ソース切り替え（当地は10走以上のみ信頼）
  const _rtype2=selectedRaceType||'sg';
  const _b1s=d.boats[0];
  const _atchiValid2=_b1s.atchiNige>0&&(_b1s.atchiNigeCount||0)>=10;
  const nigeRate1=_rtype2==='sg'?(_b1s.sgNige>0?_b1s.sgNige:_b1s.nigerate6m):
                  _rtype2==='g1'?(_b1s.sgNige>0?_b1s.sgNige:(_atchiValid2?_b1s.atchiNige:_b1s.nigerate6m)):
                  (_atchiValid2?_b1s.atchiNige:_b1s.nigerate6m);

  // コース別2連対率・3連対率正規化（SG/G1優先）
  const cr2Max=Math.max(...boats.map(b=>b.sg1chakuRate||0))||1;
  const cr3Max=Math.max(...boats.map(b=>b.kinsetsu6m||0))||1; // 3連対はキャリアで代用

  // コースボーナス（通常エンジン準拠）
  const courseBonus=[3,2,1,1,0,-2];

  const scores=boats.map(b=>{
    let s=0;

    // ① 今節得点率 序盤10pt/終盤25pt
    const tokWeight=isEarlyRace?10:25;
    if(tokuMax>tokuMin) s+=(b.sessonPt-tokuMin)/(tokuMax-tokuMin)*tokWeight;
    else if(b.sessonPt>0) s+=tokWeight/2;

    // ② キャリア勝率（直近6ヶ月）序盤20pt/終盤5pt
    const rateWeight=isEarlyRace?20:5;
    if(kinsetsuMax>0) s+=(b.kinsetsu6m||0)/kinsetsuMax*rateWeight;

    // ③ 展示機力ランク max14pt
    if(b.exRank>=0) s+=(5-b.exRank)*2.8;

    // ④ 周回機力ランク max14pt
    if(b.lapRank>=0) s+=(5-b.lapRank)*2.8;

    // ⑤ 合成ST max8pt
    const stPt=(stMax>stMin)?(stMax-b.compositeST)/(stMax-stMin)*8:0;
    s+=stPt;

    // ⑥ 直前ST max10pt（ST=0.00は最速として正しく計算）
    const dirST=b.isExhibitF?null:b.directST;
    const dirSTvals=boats.filter(x=>!x.isExhibitF&&x.directST!=null).map(x=>x.directST);
    const dirSTmin=dirSTvals.length?Math.min(...dirSTvals):0.10;
    const dirSTmax=dirSTvals.length?Math.max(...dirSTvals):0.25;
    if(dirST!=null&&dirSTmax>dirSTmin){
      s+=(dirSTmax-dirST)/(dirSTmax-dirSTmin)*10;
    }
    // ST最悪艇ペナルティ: 直前STが全体最悪かつ今節平均STも最悪の場合
    if(!b.isExhibitF&&dirST!=null&&dirST===dirSTmax&&dirSTmax>dirSTmin){
      const sessonSTvals=boats.map(x=>x.sessonAvgST||0).filter(v=>v>0);
      const sessonSTmax=sessonSTvals.length?Math.max(...sessonSTvals):0;
      if(b.sessonAvgST>0&&b.sessonAvgST===sessonSTmax) s-=5; // 直前・今節ともに最悪
    }

    // ⑦ 2連対率 序盤12pt/終盤10pt（通常エンジン準拠・攻撃力の代わり）
    const renWeight=isEarlyRace?12:10;
    const ren=b.sg1chakuRate||0; // SG/G1 2連対率
    if(cr2Max>0) s+=ren/cr2Max*renWeight;

    // ⑧ モーター2連対率 max10pt
    if(motorMax>0) s+=(b.motor2ren||0)/motorMax*10;

    // ⑨ コースボーナス（通常エンジン準拠: [3,2,1,1,0,-2]）
    s+=courseBonus[(b.no-1)]||0;

    // ⑩ 1号艇逃げ率ボーナス（通常エンジン: 65%以上で+5pt）
    if(b.no===1){
      if(nigeRate1>=65) s+=5;
      else if(nigeRate1<50) s-=5;
    }

    // ⑪ 終盤ペナルティ
    if(!isEarlyRace&&(b.sessonPt||0)===0&&b.sessonRaces>=2) s-=2;

    // ⑫ Fペナルティ（通常エンジン準拠: -3pt）
    if(b.isF) s-=3;

    // ⑬ 賞除外艇は-10ptペナルティ（買い目候補に残す）
    if(b.isJogai) s-=10;

    const _toku=isEarlyRace?
      (tokuMax>tokuMin?(b.sessonPt-tokuMin)/(tokuMax-tokuMin)*10:0):
      (tokuMax>tokuMin?(b.sessonPt-tokuMin)/(tokuMax-tokuMin)*25:0);
    const _atk=ren/cr2Max*renWeight;
    return{no:b.no, raw:s, tenji:b.tenji, syukai:b.syukai,
      _atk:_atk,
      _ex:(b.exRank>=0?(5-b.exRank)*2.8:0),
      _lap:(b.lapRank>=0?(5-b.lapRank)*2.8:0),
      _st:stPt,
      _toku:_toku,
      _motor:(b.motor2ren||0)/motorMax*10,
      _pen1:(b.no===1&&nigeRate1<50?-5:b.no===1&&nigeRate1>=65?5:0),
      _penF:(b.isF?-10:0)};
  });

  return scores.sort((a,b)=>b.raw-a.raw);
}

// ============================================================
// 荒れ指数計算（1号艇視点・JSで完結）
// ============================================================
function calcNigeRate(d){
  const b1=d.boats[0];
  // 当地10走以上なら当地優先
  const _atchiOK=b1.atchiNige>0&&(b1.atchiNigeCount||0)>=10;
  return b1.sgNige>0?b1.sgNige:(_atchiOK?b1.atchiNige:b1.nigerate6m);
}

function calcAreIndex(d){
  const nigeRate=calcNigeRate(d);
  let score=0;

  // 1. 1号艇逃げ率
  if(nigeRate<50) score+=5;
  else if(nigeRate<65) score+=3;
  else score+=1;

  // 2. 外コース(4〜6)攻撃力
  const outerAtk=d.boats.slice(3).reduce((s,b)=>s+(b.sashi6m+b.makuri6m+b.makurisashi6m*0.4),0)/3;
  if(outerAtk>30) score+=4;
  else if(outerAtk>15) score+=2;

  // 3. モーター格差
  const motors=d.boats.map(b=>b.motor2ren).filter(v=>v>0);
  if(motors.length>1){
    const gap=Math.max(...motors)-Math.min(...motors);
    if(gap>20) score+=3;
    else if(gap>10) score+=1;
  }

  // 4. F持ち艇
  if(d.boats.some(b=>b.isF)) score+=2;

  // 4.5 賞除外艇（実質5艇戦→展開不確実性UP）
  const jogaiCount=d.boats.filter(b=>b.isJogai).length;
  if(jogaiCount>=1) score+=3; // 1艇除外で+3（5艇戦）
  if(jogaiCount>=2) score+=2; // 2艇以上でさらに+2

  // 5. 鳴門SGボーナス
  score+=3;

  // 6. 1コース実力補正（マイナス）
  const b1=d.boats[0];
  // 今節走数で判断（sessonRaces>2なら今節得点率、そうでなければキャリア）
  if(b1.sessonRaces>2){
    if(b1.sessonPt>=7) score-=4;
    else if(b1.sessonPt>=5) score-=2;
  } else {
    if(b1.sg1chakuRate>=50&&b1.kinsetsu6m>=7.5) score-=4;
    else if(b1.sg1chakuRate>=40||b1.kinsetsu6m>=7.0) score-=2;
  }
  if(b1.motor2ren>=40) score-=2;
  if(b1.atchiNige>=60) score-=1;

  return{areIndex:Math.max(0,score), nigeRate};
}

// ============================================================
// モード判定（JSで確定）
// ============================================================
function judgeMode(areIndex, nigeRate){
  // calcAreIndexの最大スコアは約15〜18点
  // 逃げ率70%以上は通常固定
  if(nigeRate>=70) return 'normal';
  // areIndex10以上で荒れ推奨（逃げ率60%未満）
  if(areIndex>=10&&nigeRate<60) return 'are';
  // areIndex13以上は逃げ率関係なく荒れ
  if(areIndex>=13) return 'are';
  return 'normal';
}

// ============================================================
// オッズ自動抽出
// ============================================================
function extractOddsMap(text){
  const map={};
  const oddsSection=text.match(/=== オッズ ===([\s\S]*?)(?:===|$)/);
  if(!oddsSection) return map;
  const rawLines=oddsSection[1].split('\n').map(l=>l.replace(/\t/g,' ').trim()).filter(l=>l);
  let f=0,secOrder=[],blockLines=[];
  const flushBlock=()=>{
    for(const bl of blockLines){
      const t=bl.split(/\s+/).filter(x=>x&&/^[\d.]+$/.test(x));
      if(t.length===secOrder.length*2){
        for(let col=0;col<secOrder.length;col++){
          const trd=parseInt(t[col*2]),odds=parseFloat(t[col*2+1]);
          if(trd>=1&&trd<=6&&trd!==f&&trd!==secOrder[col]&&odds>0){
            const key=`${f}-${secOrder[col]}-${trd}`;
            if(!map[key]) map[key]=odds;
          }
        }
      }
    }
    blockLines=[];
  };
  for(const line of rawLines){
    const hm=line.match(/^([1-6])\s+[^\d]/);
    if(hm){flushBlock();f=parseInt(hm[1]);secOrder=[];continue;}
    if(!f||/合成|2単/.test(line)) continue;
    const tokens=line.split(/\s+/).filter(t=>t&&/^[\d.]+$/.test(t));
    if(!tokens.length) continue;
    if(!secOrder.length){
      for(let i=0;i+2<tokens.length;i+=3){
        const s=parseInt(tokens[i]),r=parseInt(tokens[i+1]),o=parseFloat(tokens[i+2]);
        if(s>=1&&s<=6&&s!==f&&r>=1&&r<=6&&r!==f&&r!==s&&o>0){
          if(!secOrder.includes(s)) secOrder.push(s);
          const key=`${f}-${s}-${r}`;
          if(!map[key]) map[key]=o;
        }
      }
    } else {
      blockLines.push(line);
    }
  }
  flushBlock();
  return map;
}

// ============================================================
// ランキングパース
// ============================================================
function parseRanking(text){
  const r=[];
  for(const line of text.split('\n')){
    const m=line.match(/(\d)位\s*(\d)号艇\s*([◎○▲△▽×])/);
    if(m) r.push({rank:parseInt(m[1]),boat:parseInt(m[2]),mark:m[3]});
  }
  return r.sort((a,b)=>a.rank-b.rank);
}

// ============================================================
// 買い目生成（JS固定）
// ============================================================
function buildBetsNormal(ranking, pts, parsedData){
  // 通常エンジン準拠 + 紐ズレ対策強化版
  // 逃げ率判定: nigeRate取得
  const b1 = currentParsedData&&currentParsedData.boats[0];
  const _atchiValidBN = b1&&b1.atchiNige>0&&(b1.atchiNigeCount||0)>=10;
  const nigeR = b1?(b1.sgNige>0?b1.sgNige:(_atchiValidBN?b1.atchiNige:b1.nigerate6m)):0;
  // 逃げ率で買い目モードを3段階に分類（手動指定があれば優先）
  const maru1 = String(ranking[0].boat) === '1';
  const _autoNigeMode = (maru1 && nigeR >= 65) ? 'high'
                      : (maru1 && nigeR >= 50) ? 'mid'
                      : 'low';
  const nigeMode = (typeof selectedNigeMode !== 'undefined' && selectedNigeMode !== 'auto')
                 ? selectedNigeMode
                 : _autoNigeMode;
  const isNigeRace = nigeMode !== 'low';

  if(ranking.length<4) return [];
  const maru    = String(ranking[0].boat);
  const shiro   = String(ranking[1].boat);
  const sankaku = ranking[2]?String(ranking[2].boat):null;
  const yonkaku = ranking[3]?String(ranking[3].boat):null;
  const go      = ranking[4]?String(ranking[4].boat):null;

  const rankMap = {};
  rankMap[maru]=1; rankMap[shiro]=2;
  if(sankaku) rankMap[sankaku]=3;
  if(yonkaku) rankMap[yonkaku]=4;
  if(go)      rankMap[go]=5;
  if(ranking[5]) rankMap[String(ranking[5].boat)]=6;

  // 賞除外艇を除いた艇リスト
  // activeBoatsをランク順（評価順）に並べる
  const activeBoats = ranking
    .map(r=>String(r.boat)); // 賞除外も含めて買い目候補に入れる（rankingはすでにスコア降順）

  const honsen=[], osaee=[];

  if(nigeMode === 'high'){
    // ===== 逃げ固定モード（逃げ率65%以上）=====
    // ◎頭固定・本線:2着=○▲・抑え:2着=△▽
    const honsenNige2 = activeBoats.filter(b=>b!==maru&&(rankMap[b]||9)<=3);
    const osaeeNige2  = activeBoats.filter(b=>b!==maru&&(rankMap[b]||9)>=4&&(rankMap[b]||9)<=5);
    for(const b of honsenNige2){
      for(const c of activeBoats){
        if(c===maru||c===b) continue;
        const cRank=rankMap[c]||9;
        if(cRank>=6) continue;
        honsen.push({val:`${maru}-${b}-${c}`, score:(rankMap[b]||9)*10+cRank});
      }
    }
    for(const b of osaeeNige2){
      for(const c of activeBoats){
        if(c===maru||c===b) continue;
        const cRank=rankMap[c]||9;
        if(cRank>=6) continue;
        osaee.push({val:`${maru}-${b}-${c}`, score:(rankMap[b]||9)*10+cRank});
      }
    }
  } else if(nigeMode === 'mid'){
    // ===== 半逃げモード（◎=1号艇・逃げ率50-65%）=====
    // 本線: ◎頭（2着=○▲）＋○頭（2着に◎含む）
    // 抑え: ◎頭（2着=△▽）
    const honsenFirst = [maru, shiro]; // ◎○が1着候補
    for(const a of honsenFirst){
      for(const b of activeBoats){
        if(b===a) continue;
        const bRank=rankMap[b]||9;
        if(bRank>=6) continue;
        for(const c of activeBoats){
          if(c===a||c===b) continue;
          const cRank=rankMap[c]||9;
          if(cRank>=6) continue;
          const score=(rankMap[a]||9)*100+bRank*10+cRank;
          // 本線: 2着が▲以内（◎頭）or 2着が◎（○頭）
          if(a===maru&&bRank<=3){
            honsen.push({val:`${a}-${b}-${c}`,score});
          } else if(a===shiro&&b===maru){
            honsen.push({val:`${a}-${b}-${c}`,score});
          } else if(a===maru&&bRank>=4&&bRank<=5){
            osaee.push({val:`${a}-${b}-${c}`,score});
          }
        }
      }
    }
  } else {
    // ===== 通常モード（low）=====
    // ◎頭固定
    // 本線: 2着=○▲ × 3着=残り全艇（評価順）
    // 抑え: 2着=△▽ × 3着=○▲のみ
    const rankOrder = activeBoats.slice().sort((a,b)=>(rankMap[a]||9)-(rankMap[b]||9));
    const thirdAll  = rankOrder.filter(b=>b!==maru&&(rankMap[b]||9)<=5);
    const honsen2nd = rankOrder.filter(b=>b!==maru&&(rankMap[b]||9)<=3); // ○▲
    const osaee2nd  = rankOrder.filter(b=>b!==maru&&(rankMap[b]||9)>=4&&(rankMap[b]||9)<=5); // △▽

    // 本線: 各2着軸ごとに3着を評価順で列挙
    for(const b of honsen2nd){
      const thirds = thirdAll.filter(c=>c!==b);
      for(const c of thirds){
        honsen.push({val:`${maru}-${b}-${c}`, score:(rankMap[b]||9)*10+(rankMap[c]||9)});
      }
    }
    // 抑え: 各2着軸ごとに3着=○▲のみ
    for(const b of osaee2nd){
      const thirds = thirdAll.filter(c=>c!==b&&(rankMap[c]||9)<=3);
      for(const c of thirds){
        osaee.push({val:`${maru}-${b}-${c}`, score:(rankMap[b]||9)*10+(rankMap[c]||9)});
      }
    }
  }

  honsen.sort((a,b)=>a.score-b.score);
  osaee.sort((a,b)=>a.score-b.score);

  const dedup=(arr)=>{const seen=new Set(),out=[];for(const x of arr){if(!seen.has(x.val)){seen.add(x.val);out.push(x.val);}}return out;};
  const honsenVals=dedup(honsen);
  const osaeeVals=dedup(osaee).filter(v=>!honsenVals.includes(v));

  // 点数配分
  let hc, oc;
  if(nigeMode === 'high'){
    // 逃げ固定: 本線=○▲各3着(6点)、抑え=△▽(残り)
    if(pts<=4){       hc=4;  oc=0; }
    else if(pts<=6){  hc=6;  oc=0; }
    else if(pts<=8){  hc=6;  oc=2; }
    else if(pts<=12){ hc=6;  oc=6; }
    else {            hc=6;  oc=7; }
  } else if(nigeMode === 'mid'){
    // 半逃げ: 本線=◎頭2着○▲＋○頭2着◎、抑え=◎頭2着△▽
    if(pts<=4){       hc=4;  oc=0; }
    else if(pts<=6){  hc=6;  oc=0; } // 1-3-245/1-4-235を本線6点
    else if(pts<=8){  hc=6;  oc=2; } // +抑え2点
    else if(pts<=12){ hc=9;  oc=3; }
    else {            hc=9;  oc=4; }
  } else {
    // 通常モード点数配分: 2着軸ごとに均等割り当て
    if(pts<=4){       hc=4;  oc=0; }
    else if(pts<=6){  hc=6;  oc=0; }
    else if(pts<=8){  hc=6;  oc=2; }
    else if(pts<=12){ hc=6;  oc=6; }
    else {            hc=7;  oc=6; }
  }

  const bets=[];
  honsenVals.slice(0,hc).forEach(v=>bets.push({val:v,type:'本線'}));
  osaeeVals.slice(0,oc).forEach(v=>bets.push({val:v,type:'抑え'}));
  return bets.slice(0,pts);
}

function buildBetsAre(ranking, pts, nigeRate){
  // 荒れエンジン(kyotei_are.html)のmakeAreBets準拠
  if(ranking.length<5) return [];
  const m = String(ranking[0].boat); // ◎
  const s = String(ranking[1].boat); // ○
  const sa= String(ranking[2].boat); // ▲
  const yo= String(ranking[3].boat); // △
  const go= String(ranking[4].boat); // ▽

  // 逃げ率65%未満かつ1号艇が◎○▲△▽に入っていない場合は1号艇を2着に入れる
  const use1 = (nigeRate < 65)
    && m!=='1' && s!=='1' && sa!=='1' && yo!=='1' && go!=='1';

  let honsen, osaee;
  if(use1){
    honsen = [
      m+'-'+s+'-1',   // ◎-○-1
      m+'-'+s+'-'+sa, // ◎-○-▲
      m+'-1-'+s,      // ◎-1-○
      m+'-1-'+sa,     // ◎-1-▲
      m+'-'+sa+'-'+s, // ◎-▲-○
      m+'-'+sa+'-1',  // ◎-▲-1
      m+'-'+s+'-'+go, // ◎-○-▽
    ];
    osaee = [
      s+'-'+m+'-1',   // ○-◎-1
      s+'-'+m+'-'+sa, // ○-◎-▲
      sa+'-'+m+'-'+s, // ▲-◎-○
      sa+'-'+s+'-'+m, // ▲-○-◎
      yo+'-'+m+'-'+s, // △-◎-○
      yo+'-'+s+'-'+m, // △-○-◎
    ];
  } else {
    honsen = [
      m+'-'+s+'-'+sa,  // ◎-○-▲
      m+'-'+s+'-'+yo,  // ◎-○-△
      m+'-'+sa+'-'+s,  // ◎-▲-○
      m+'-'+sa+'-'+yo, // ◎-▲-△
      m+'-'+yo+'-'+s,  // ◎-△-○
      m+'-'+yo+'-'+sa, // ◎-△-▲
      m+'-'+s+'-'+go,  // ◎-○-▽
    ];
    osaee = [
      s+'-'+m+'-'+sa,  // ○-◎-▲
      s+'-'+m+'-'+yo,  // ○-◎-△
      sa+'-'+m+'-'+s,  // ▲-◎-○
      sa+'-'+s+'-'+m,  // ▲-○-◎
      yo+'-'+m+'-'+s,  // △-◎-○
      yo+'-'+s+'-'+m,  // △-○-◎
    ];
  }

  // 重複除去して点数分返す
  const seen=new Set(), bets=[];
  const all=[...honsen.map(v=>({val:v,type:'本線'})),...osaee.map(v=>({val:v,type:'抑え'}))];
  for(const b of all){
    if(bets.length>=pts) break;
    if(!seen.has(b.val)){seen.add(b.val);bets.push(b);}
  }
  return bets;
}

// ============================================================
// 資金配分（100円単位・最低100円保証）
// ============================================================
function recalcAlloc(){
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;
  const rows=document.querySelectorAll('#bet-tbody tr');
  if(!rows.length) return;
  const items=[];
  rows.forEach(row=>{
    const oi=row.querySelector('.odds-inp'),cs=row.querySelector('.conf-sel');
    items.push({odds:parseFloat(oi?.value)||0,conf:parseInt(cs?.value)||2});
  });
  let weights=[];
  if(allocMode==='equal'){
    weights=items.map(()=>1);
  } else if(allocMode==='equalret'){
    // 均等回収: 各買い目の期待回収額を揃える
    // 目標回収額 = shikin（投資額と同等）
    // 購入額 = 目標回収額 / オッズ → オッズが高い=少額
    const anyOdds=items.some(it=>it.odds>0);
    if(anyOdds){
      // オッズなし買い目は平均オッズで代用
      const validOdds=items.filter(it=>it.odds>0).map(it=>it.odds);
      const avgOdds=validOdds.reduce((s,o)=>s+o,0)/Math.max(1,validOdds.length);
      // 各買い目の重みは 1/odds（オッズが高いほど少額）
      weights=items.map(it=>{
        const o=it.odds>0?it.odds:avgOdds;
        return 1/o;
      });
    } else weights=items.map(()=>1);
  } else {
    weights=items.map(it=>it.conf);
  }
  const totalW=weights.reduce((s,w)=>s+w,0);
  let amounts=weights.map(w=>Math.max(100,Math.floor(w/totalW*shikin/100)*100));
  let tot=amounts.reduce((s,a)=>s+a,0);
  // 超過分を末尾から削る（最低100円確保）
  for(let i=amounts.length-1;i>=0&&tot>shikin;i--){
    const cut=Math.min(amounts[i]-100,Math.ceil((tot-shikin)/100)*100);
    if(cut>0){amounts[i]-=cut;tot-=cut;}
  }
  const rem=shikin-amounts.reduce((s,a)=>s+a,0);
  if(rem>0&&amounts.length>0) amounts[0]+=rem;

  rows.forEach((row,i)=>{
    const amtCell=row.querySelector('.amt-cell'),retCell=row.querySelector('.ret-cell');
    const odds=parseFloat(row.querySelector('.odds-inp')?.value)||0;
    const amt=amounts[i]||0;
    if(amtCell) amtCell.textContent='¥'+amt.toLocaleString();
    if(retCell){
      if(odds>0){
        const ret=Math.floor(amt*odds/100)*100;
        const color=ret>=shikin?'var(--green)':'var(--muted)';
        retCell.innerHTML=`<span style="color:${color};">¥${ret.toLocaleString()}</span>`;
      } else retCell.textContent='—';
    }
  });

  const totalInvest=amounts.reduce((s,a)=>s+a,0);
  document.getElementById('sum-invest').textContent='¥'+totalInvest.toLocaleString();
  const rets=items.map((it,i)=>it.odds>0?Math.floor(amounts[i]*it.odds/100)*100:null).filter(r=>r!==null);
  if(rets.length){
    const minRet=Math.min(...rets);
    document.getElementById('sum-return').textContent='¥'+minRet.toLocaleString();
    const rate=totalInvest>0?Math.round(minRet/totalInvest*100):0;
    const rEl=document.getElementById('sum-rate');
    rEl.textContent=rate+'%';
    rEl.className='sum-val '+(rate>=100?'green':rate>=50?'gold':'red');
  } else {
    document.getElementById('sum-return').textContent='—';
    document.getElementById('sum-rate').textContent='—';
  }
  // 合成オッズ表示
  if(currentCalcData){
    const oddsMap=extractOddsMap(document.getElementById('inp-data').value);
    const betVals=(currentCalcData.betsRaw||[]).map(b=>b.val);
    const gosei=calcGoseiOdds(betVals,oddsMap);
    const gEl=document.getElementById('sum-gosei');
    if(gEl){
      if(gosei){
        const validCount=betVals.filter(v=>oddsMap[v]&&oddsMap[v]>0).length;
        gEl.innerHTML='<span style="font-size:10px;color:var(--muted);">合成オッズ</span><span style="font-size:20px;font-weight:700;color:var(--gold);margin-left:8px;">'+gosei+'倍</span><span style="font-size:10px;color:var(--muted);margin-left:6px;">('+validCount+'点)</span>';
        gEl.style.display='flex';
        gEl.style.alignItems='center';
        gEl.style.padding='10px';
        gEl.style.background='var(--surface2)';
        gEl.style.borderRadius='6px';
        gEl.style.marginTop='8px';
      } else {
        gEl.style.display='none';
      }
    }
  }
}

function setAllocMode(mode){
  allocMode=mode;
  ['alloc-equal','alloc-equalret','alloc-conf'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  const id=mode==='equal'?'alloc-equal':mode==='equalret'?'alloc-equalret':'alloc-conf';
  const el=document.getElementById(id);if(el)el.classList.add('active');
  recalcAlloc();
}

// ============================================================
// Xサマリー生成
// ============================================================
// 買い目を圧縮: 1着固定で2着・3着それぞれ集約
// 例: 1-2-4/1-4-2 → 1-24-24
//     4-2-1/4-2-3/4-1-2/4-3-1 → 4-123-123
function compressBetsSG(bets){
  const vals=bets.map(b=>typeof b==='string'?b:b.val);
  if(!vals.length) return '';
  // Step1: 1着-2着固定で3着をグループ化
  const g12={},order12=[];
  for(const v of vals){
    const p=v.split('-');if(p.length!==3)continue;
    const key=p[0]+'-'+p[1];
    if(!g12[key]){g12[key]=[];order12.push(key);}
    if(!g12[key].includes(p[2]))g12[key].push(p[2]);
  }
  // Step2: 1着でまとめて対称チェック（2着セット==3着セットなら f-SS-TT）
  const g1={},order1=[];
  for(const key of order12){
    const[f,s]=key.split('-');
    if(!g1[f]){g1[f]={sl:[],tm:{}};order1.push(f);}
    g1[f].sl.push(s);
    g1[f].tm[s]=g12[key].slice().sort((a,b)=>parseInt(a)-parseInt(b));
  }
  const res=[];
  for(const f of order1){
    const{sl,tm}=g1[f];
    const allS=sl.slice().sort((a,b)=>parseInt(a)-parseInt(b));
    const allT=[...new Set(sl.flatMap(s=>tm[s]))].sort((a,b)=>parseInt(a)-parseInt(b));
    const sSet=new Set(allS),tSet=new Set(allT);
    const symmetric=sSet.size===tSet.size&&[...sSet].every(x=>tSet.has(x));
    if(symmetric){
      res.push(f+'-'+allS.join('')+'-'+allT.join(''));
    }else{
      for(const s of sl) res.push(f+'-'+s+'-'+tm[s].join(''));
    }
  }
  return res.join('/');
}

function buildXSummary(withAmount){
  if(!currentCalcData) return '';
  const racenum=currentCalcData.racenum||'?';
  const ranking=currentCalcData.ranking||[];
  const betsRaw=currentCalcData.betsRaw||[];

  // 評価順: ◎>○>▲>△>▽>× を号艇番号で表示
  // 例: 4>1>6>5>3>2
  const hyokaOrder=ranking.map(r=>r.boat).join('>');

  // ◎艇：丸数字＋選手苗字
  const maruBoat=ranking[0]?.boat;
  const circled=['❶','❷','❸','❹','❺','❻'];
  const maruCircle=maruBoat?circled[maruBoat-1]:'◎';
  // 選手名から苗字を取得（currentParsedDataから）
  const maruName=currentParsedData&&maruBoat&&currentParsedData.boats[maruBoat-1]&&currentParsedData.boats[maruBoat-1].name
    ?currentParsedData.boats[maruBoat-1].name.split(' ')[0]||currentParsedData.boats[maruBoat-1].name
    :'';
  const maruStr=maruName?maruCircle+maruName:maruCircle;

  // 本線/抑えに分類
  const honsen=betsRaw.filter(b=>b.type==='本線');
  const osaee=betsRaw.filter(b=>b.type!=='本線');

  // 賭け金込みの場合は各買い目に金額追加
  const getRealBets=(arr)=>{
    if(!withAmount) return arr;
    const rows=document.querySelectorAll('#bet-tbody tr');
    return arr.map(b=>{
      const rowIdx=betsRaw.indexOf(b);
      const amtCell=rows[rowIdx]?.querySelector('.amt-cell');
      const amt=parseInt((amtCell?.textContent||'0').replace(/[¥,]/g,''))||0;
      return{...b,amount:amt};
    });
  };

  const fmtBets=(arr)=>{
    if(withAmount){
      // 金額が同じものをまとめて圧縮表示
      const withAmt=getRealBets(arr);
      // 金額ごとにグループ化
      const amtGroups={};
      for(const b of withAmt){
        const key=b.amount||0;
        if(!amtGroups[key]) amtGroups[key]=[];
        amtGroups[key].push(b.val);
      }
      // 金額降順でグループを並べる
      return Object.entries(amtGroups)
        .sort((a,b)=>parseInt(b[0])-parseInt(a[0]))
        .map(([amt,vals])=>compressBetsSG(vals.map(v=>({val:v})))+`　¥${parseInt(amt).toLocaleString()}`)
        .join('\n　　　');
    }
    // 圧縮表示
    return compressBetsSG(arr);
  };

  const venueVal=document.getElementById('inp-venue')?document.getElementById('inp-venue').value||'鳴門':'鳴門';
  const lines=[
    `${venueVal}${racenum}R`,
    ``,
    `${maruStr}の軸で勝負。`,
    `${hyokaOrder}`,
    ``,
    `本線　${fmtBets(honsen)}`,
  ];
  if(osaee.length) lines.push(`抑え　${fmtBets(osaee)}`);
  lines.push(``, `G.`);

  return lines.join('\n');
}

function copyXSummary(withAmount){
  // withAmount=trueの場合は賭け金込みで再生成、falseはtextarea内容（手動編集対応）
  const text=withAmount?buildXSummary(true):(document.getElementById('x-summary-preview')?.value||buildXSummary(false));
  if(!text){showToast('買い目を生成してください');return;}
  navigator.clipboard.writeText(text).then(()=>{
    showToast(withAmount?'𝕏 賭け金込みコピー':'𝕏 サマリーコピー');
  }).catch(()=>{
    // clipboard APIが使えない場合のフォールバック
    const ta=document.createElement('textarea');
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(withAmount?'𝕏 賭け金込みコピー':'𝕏 サマリーコピー');
  });
}

function saveResult(resultType){
  if(!currentCalcData){showToast('予想を実行してください');return;}
  const rows=document.querySelectorAll('#bet-tbody tr');
  const betsWithAmt=currentCalcData.betsRaw.map((b,i)=>{
    const amtCell=rows[i]?.querySelector('.amt-cell');
    const oddsInp=rows[i]?.querySelector('.odds-inp');
    return{val:b.val,type:b.type,amount:parseInt((amtCell?.textContent||'0').replace(/[¥,]/g,''))||0,odds:parseFloat(oddsInp?.value)||0};
  });
  const totalInvest=betsWithAmt.reduce((s,b)=>s+b.amount,0);
  const today=new Date();
  const dateStr=today.toISOString().slice(0,10);
  const venue=document.getElementById('inp-venue').value||'鳴門';
  const racenumRaw=document.getElementById('inp-racenum').value||'?';
  const ranking=currentCalcData.ranking||[];
  const maruBoat=ranking[0]?ranking[0].boat:null;
  const shiroBoat=ranking[1]?ranking[1].boat:null;
  const sankakuBoat=ranking[2]?ranking[2].boat:null;

  const id=Date.now();
  const entry={
    id,
    date:dateStr,
    venue,
    racenum:racenumRaw,
    honme:currentCalcData.honme,
    mode:currentCalcData.mode,
    nigeRate:currentCalcData.nigeRate,
    areIndex:currentCalcData.areIndex,
    betcount:currentCalcData.betcount,
    bets:betsWithAmt,
    invest:totalInvest||currentCalcData.shikin,
    maru:maruBoat,
    shiro:shiroBoat,
    sankaku:sankakuBoat,
    result:resultType==='skip'?'skip':null, // skip以外は後入力
    chakuju:null,
    payout:0,
    miss:resultType==='skip'?['skip']:[]
  };

  const logs=getLogs();
  // 同日同場所同レース重複防止
  const dupIdx=logs.findIndex(l=>l.venue===venue&&l.racenum===racenumRaw&&l.date===dateStr&&!l.result);
  if(dupIdx>=0) logs.splice(dupIdx,1);
  logs.push(entry);
  if(logs.length>200) logs.splice(0,logs.length-200);
  saveLogs(logs);

  // kyotei_v2にも書き込み（gtools連携）
  writeToV2(entry);

  showToast(resultType==='skip'?'⏭ スキップ登録':'💾 予想保存 → 結果は後で入力');
  clearYoso();
  // clearYoso後にupdateLogSummaryを呼ぶ（DOMが確実に存在する状態で）
  setTimeout(function(){updateLogSummary();},50);
}

// kyotei_v2 書き込み（gtools連携）
// ============================================================
function writeToV2(entry){
  try{
    const betsV2=(entry.bets||[]).map(b=>({val:b.val,type:b.type==='本線'?'honsen':'osaee'}));
    const racenumV2=String(entry.racenum).replace(/R$/i,'')+'R';
    const v2entry={
      id:entry.id,
      date:entry.date,
      venue:entry.venue||'鳴門',
      raceNum:racenumV2,
      ver:'sg-v1',
      shinkido:entry.mode==='are'?'荒':'通',
      nigeRate:entry.nigeRate,
      areScore:entry.areIndex,
      pts:entry.betcount,
      maru:entry.maru,
      shiro:entry.shiro,
      sankaku:entry.sankaku,
      result:'',
      payout:'',
      bets:betsV2,
      miss:[],
      memo:''
    };
    let v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
    // 重複除去
    v2logs=v2logs.filter(l=>!(l.venue===v2entry.venue&&l.raceNum===v2entry.raceNum&&l.date===v2entry.date&&!l.result));
    v2logs.unshift(v2entry);
    if(v2logs.length>300) v2logs=v2logs.slice(0,300);
    localStorage.setItem('kyotei_v2',JSON.stringify(v2logs));
  }catch(e){console.error('writeToV2 error:',e);}
}

// kyotei_v2の結果更新（commitResultから呼ぶ）
function updateV2Result(entryId, chakuju, payout, isHit, maruBoat){
  try{
    const v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
    const idx=v2logs.findIndex(l=>l.id===entryId);
    if(idx<0) return;
    const l=v2logs[idx];
    l.result=chakuju||'';
    l.payout=payout>0?'¥'+payout.toLocaleString():'';
    // miss分類
    if(isHit){
      l.miss=['hit'];
    } else {
      const parts=(chakuju||'').split('-');
      const first=parts[0],second=parts[1],third=parts[2];
      const maruStr=String(maruBoat||l.maru||'');
      const allBets=(l.bets||[]).map(b=>b.val);
      const inBet=allBets.includes(chakuju||'');
      if(!maruStr||(!parts.includes(maruStr))){
        l.miss=['ichaku']; // ◎着外
      } else if(first===maruStr&&!inBet){
        l.miss=['nichaku']; // ◎1着だが紐ズレ
      } else if(first!==maruStr){
        l.miss=['ichaku']; // ◎が1着以外
      } else {
        l.miss=['tensu']; // 点数外
      }
    }
    localStorage.setItem('kyotei_v2',JSON.stringify(v2logs));
  }catch(e){console.error('updateV2Result error:',e);}
}

  const sel=_resultSel;
  const chakuju=sel[1]&&sel[2]&&sel[3]?`${sel[1]}-${sel[2]}-${sel[3]}`:null;
  const allBets=(entry.bets||[]).map(b=>b.val);
  const isHit=chakuju?allBets.includes(chakuju):false;
  if(chakuju){
    const color=isHit?'var(--green)':'var(--muted)';
    html+=`<div style="font-size:12px;color:${color};margin-bottom:10px;">結果: ${chakuju}　${isHit?'✅ 的中':'—'}`;
    if(isHit) html+=` <span style="font-size:10px;">（買い目に入ってた）</span>`;
    html+=`</div>`;
  }
  html+=`<div style="display:flex;gap:8px;">`;
  if(isHit){
    html+=`<button onclick="commitResult('hit')" class="btn btn-gold btn-sm" style="flex:1;">✅ 的中登録</button>`;
  } else if(chakuju){
    html+=`<button onclick="commitResult('miss')" class="btn btn-ghost btn-sm" style="flex:1;color:var(--red);">❌ 外れ登録</button>`;
  }
  html+=`<button onclick="commitResult('skip')" class="btn btn-ghost btn-sm" style="flex:1;">⏭ SKIP</button>`;
  html+=`</div>`;
  document.getElementById('modal-body').innerHTML=html;
}

function _selBoat(pos,n){
  _resultSel[pos]=n;
  _renderModalBody();
}

function commitResult(type){
  if(!_resultInputId) return;
  const logs=getLogs();
  const idx=logs.findIndex(l=>l.id===_resultInputId);
  if(idx<0) return;
  const entry=logs[idx];
  const sel=_resultSel;
  const chakuju=sel[1]&&sel[2]&&sel[3]?`${sel[1]}-${sel[2]}-${sel[3]}`:null;
  const payout=parseInt(document.getElementById('modal-payout')?.value||'0')||0;
  const allBets=(entry.bets||[]).map(b=>b.val);
  const isHit=type==='hit'||(chakuju&&allBets.includes(chakuju));

  // miss分類
  let miss=[];
  if(type==='skip'){
    miss=['skip'];
  } else if(isHit){
    miss=['hit'];
  } else if(chakuju){
    const parts=chakuju.split('-');
    const maruStr=String(entry.maru||'');
    const inBet=allBets.includes(chakuju);
    if(maruStr&&!parts.includes(maruStr)) miss=['ichaku'];
    else if(maruStr&&parts[0]===maruStr&&!inBet) miss=['nichaku'];
    else if(maruStr&&parts[0]!==maruStr) miss=['ichaku'];
    else miss=['tensu'];
  }

  logs[idx].result=type==='skip'?'skip':(isHit?'hit':'miss');
  logs[idx].chakuju=chakuju;
  logs[idx].payout=isHit?payout:0;
  logs[idx].miss=miss;
  saveLogs(logs);

  // v2更新
  updateV2Result(_resultInputId, chakuju, payout, isHit, entry.maru);

  closeResultModal();
  updateLogSummary();
  showToast(type==='skip'?'⏭ SKIP登録':isHit?'✅ 的中登録！':'❌ 外れ登録');
}

  document.getElementById('result-modal').style.visibility='hidden';
  _resultInputId=null;
}

// ============================================================
// 当たり分析（kyotei_v2ベース）
// ============================================================
function showHitAnalysis(){
  const v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
  const done=v2logs.filter(l=>l.result&&l.miss&&l.miss.length&&!l.miss.includes('miseru')&&!l.miss.includes('skip'));
  if(done.length<5){showToast('データが不足しています（5件以上必要）');return;}
  const hits=done.filter(l=>l.miss.includes('hit'));
  const misses=done.filter(l=>!l.miss.includes('hit'));
  const hitRate=Math.round(hits.length/done.length*100);
  function pct(h,t){return t>0?Math.round(h/t*100):0;}
  function parsePay(p){return parseInt((p||'').replace(/[¥￥,]/g,''))||0;}
  // 荒れ指数帯別
  const areBands=[
    {label:'0〜3点',min:0,max:3,hit:0,total:0},
    {label:'4〜7点',min:4,max:7,hit:0,total:0},
    {label:'8〜11点',min:8,max:11,hit:0,total:0},
    {label:'12点〜',min:12,max:999,hit:0,total:0}
  ];
  done.forEach(l=>{
    const sc=l.areScore;
    if(sc===null||sc===undefined) return;
    for(const b of areBands){if(sc>=b.min&&sc<=b.max){b.total++;if(l.miss.includes('hit'))b.hit++;return;}}
  });
  // 逃げ率帯別
  const nigeBands=[
    {label:'〜49%',min:0,max:49,hit:0,total:0},
    {label:'50〜64%',min:50,max:64,hit:0,total:0},
    {label:'65%〜',min:65,max:999,hit:0,total:0}
  ];
  done.forEach(l=>{
    const nr=l.nigeRate;
    if(nr===null||nr===undefined) return;
    for(const b of nigeBands){if(nr>=b.min&&nr<=b.max){b.total++;if(l.miss.includes('hit'))b.hit++;return;}}
  });
  // モード別
  const modeStat={normal:{hit:0,total:0},are:{hit:0,total:0}};
  done.forEach(l=>{
    const m=l.shinkido==='荒'?'are':'normal';
    modeStat[m].total++;
    if(l.miss.includes('hit')) modeStat[m].hit++;
  });
  // 本線/抑え別的中
  let honsenHit=0,osaeeHit=0;
  hits.forEach(l=>{
    if(!l.bets||!l.result) return;
    const matched=l.bets.find(b=>b.val===l.result);
    if(!matched) return;
    if(matched.type==='honsen') honsenHit++; else osaeeHit++;
  });
  // 配当
  const hitPayouts=hits.map(l=>parsePay(l.payout)).filter(v=>v>0);
  const avgPay=hitPayouts.length>0?Math.round(hitPayouts.reduce((s,v)=>s+v,0)/hitPayouts.length):0;
  const maxPay=hitPayouts.length>0?Math.max(...hitPayouts):0;

  function barRow(label,h,t,color){
    const p=pct(h,t);
    const c=color||'var(--green)';
    return`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span>${label}</span><span style="color:${c};font-weight:700;">${h}/${t}件 (${p}%)</span></div><div style="height:5px;background:var(--surface2);border-radius:3px;"><div style="height:5px;width:${p}%;background:${c};border-radius:3px;"></div></div></div>`;
  }
  function sec(title,content){
    return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);"><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px;">${title}</div>${content}</div>`;
  }

  let html=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;">`;
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">
    <div style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:1.5px;">🎯 当たり分析</div>
    <div style="font-size:10px;color:var(--muted);">${done.length}件 / 的中${hits.length}件 (${hitRate}%)</div>
  </div>`;
  // 荒れ指数
  let aHtml=''; areBands.forEach(b=>{if(b.total>0)aHtml+=barRow(b.label,b.hit,b.total);});
  if(aHtml) html+=sec('① 荒れ指数帯別',aHtml);
  // 逃げ率
  let nHtml=''; nigeBands.forEach(b=>{if(b.total>0)nHtml+=barRow(b.label,b.hit,b.total);});
  if(nHtml) html+=sec('② 逃げ率帯別',nHtml);
  // モード別
  const mHtml=barRow('通常モード',modeStat.normal.hit,modeStat.normal.total,'var(--green)')+barRow('荒れモード',modeStat.are.hit,modeStat.are.total,'var(--red)');
  html+=sec('③ モード別',mHtml);
  // 本線/抑え別
  if(hits.length>0){
    html+=sec('④ 本線/抑え別的中',barRow('本線的中',honsenHit,hits.length,'var(--gold)')+barRow('抑え的中',osaeeHit,hits.length,'var(--blue)'));
  }
  // 配当
  if(hitPayouts.length>0){
    html+=sec('⑤ 的中配当',`<div style="display:flex;gap:8px;">
      <div style="flex:1;text-align:center;padding:10px;background:var(--surface2);border-radius:6px;"><div style="font-size:16px;font-weight:700;color:var(--green);">¥${avgPay.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);">平均配当</div></div>
      <div style="flex:1;text-align:center;padding:10px;background:var(--surface2);border-radius:6px;"><div style="font-size:16px;font-weight:700;color:var(--gold);">¥${maxPay.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);">最高配当</div></div>
    </div>`);
  }
  html+=`<button onclick="updateLogSummary();" style="width:100%;padding:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:12px;-webkit-appearance:none;">← 戻る</button>`;
  html+=`</div>`;
  const el=document.getElementById('yosoLogSummary');
  if(el){el.innerHTML+=html;el.scrollIntoView({behavior:'smooth',block:'start'});}
}

function showMissDetail(){
  const v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
  const missLogs=v2logs.filter(l=>l.result&&l.miss&&l.miss.length&&!l.miss.includes('hit')&&!l.miss.includes('skip')&&!l.miss.includes('miseru'));
  if(!missLogs.length){showToast('外れデータなし');return;}

  const MISS_LABELS={ichaku:'◎着外',nichaku:'紐ズレ',tensu:'点数外'};
  let ichakuN=0,nichakuN=0,tensuN=0;
  missLogs.forEach(l=>{
    const m=(l.miss||[])[0];
    if(m==='ichaku') ichakuN++;
    else if(m==='nichaku') nichakuN++;
    else tensuN++;
  });

  let html=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;">`;
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px;">
    <div style="font-size:10px;color:var(--red);font-weight:700;letter-spacing:1.5px;">📊 外れ詳細（${missLogs.length}件）</div>
  </div>`;
  html+=`<div style="display:flex;gap:8px;margin-bottom:12px;">
    <div style="flex:1;text-align:center;padding:8px;background:var(--surface2);border-radius:6px;"><div style="font-size:16px;font-weight:700;color:var(--red);">${ichakuN}</div><div style="font-size:10px;color:var(--muted);">◎着外</div></div>
    <div style="flex:1;text-align:center;padding:8px;background:var(--surface2);border-radius:6px;"><div style="font-size:16px;font-weight:700;color:var(--blue);">${nichakuN}</div><div style="font-size:10px;color:var(--muted);">紐ズレ</div></div>
    <div style="flex:1;text-align:center;padding:8px;background:var(--surface2);border-radius:6px;"><div style="font-size:16px;font-weight:700;color:var(--muted);">${tensuN}</div><div style="font-size:10px;color:var(--muted);">点数外</div></div>
  </div>`;

  missLogs.forEach(l=>{
    const allBets=(l.bets||[]).map(b=>b.val);
    const combo=l.result||'';
    const inBet=allBets.includes(combo);
    const mLabel=MISS_LABELS[((l.miss||[])[0])||'']||'外れ';
    const mColor=((l.miss||[])[0])==='ichaku'?'var(--red)':((l.miss||[])[0])==='nichaku'?'var(--blue)':'var(--muted)';
    const modeLabel=l.shinkido==='荒'?'荒れ':'通常';
    html+=`<div style="background:var(--surface2);border-radius:6px;padding:10px;margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:700;">${l.venue||'鳴門'} ${l.raceNum} <span style="font-size:10px;color:var(--muted);">[${modeLabel}]</span></span>
        <span style="font-size:11px;font-weight:700;color:${mColor};">${mLabel}</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:3px;">荒れ${l.areScore||'?'}点 逃げ${l.nigeRate||'?'}% ◎${l.maru||'?'}○${l.shiro||'?'}</div>
      <div style="font-size:12px;margin-bottom:3px;">結果: <b>${combo}</b>　${inBet?'<span style="color:var(--green);">✅ 買い目に入ってた</span>':'<span style="color:var(--red);">❌ 買い目になし</span>'}</div>
      <div style="font-size:10px;color:var(--muted);word-break:break-all;">${allBets.join(' ')}</div>
    </div>`;
  });
  html+=`<button onclick="updateLogSummary();" style="width:100%;padding:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:12px;-webkit-appearance:none;margin-top:4px;">← 戻る</button>`;
  html+=`</div>`;
  const el=document.getElementById('yosoLogSummary');
  if(el){el.innerHTML+=html;el.scrollIntoView({behavior:'smooth',block:'start'});}
}
