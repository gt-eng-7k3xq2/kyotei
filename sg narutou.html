// === showHitAnalysis ===
function showHitAnalysis(){
  // kyotei_v2から全データ取得
  var v2logs=JSON.parse(localStorage.getItem('kyotei_v2')||'[]');
  // 見送り除外・結果入力済みのみ
  var done=v2logs.filter(function(l){
    return l.result&&l.result!==''&&l.miss&&l.miss.length>0&&l.miss.indexOf('miseru')<0;
  });
  if(done.length<5){showStatus('データが不足しています（5件以上必要）','err');return;}

  var hits=done.filter(function(l){return l.miss.indexOf('hit')>=0;});
  var misses=done.filter(function(l){return l.miss.indexOf('hit')<0;});
  var hitRate=done.length>0?Math.round(hits.length/done.length*100):0;

  // ヘルパー
  function pct(h,t){return t>0?Math.round(h/t*100):0;}
  function avg(arr){return arr.length>0?Math.round(arr.reduce(function(s,v){return s+v;},0)/arr.length):0;}
  function parsePay(p){return parseInt((p||'').replace(/[¥￥,]/g,''))||0;}

  // ① 信頼度別
  var shinkidoData={A:{hit:0,total:0},B:{hit:0,total:0},C:{hit:0,total:0}};
  done.forEach(function(l){
    var s=l.shinkido;
    if(!s||!shinkidoData[s])return;
    shinkidoData[s].total++;
    if(l.miss.indexOf('hit')>=0)shinkidoData[s].hit++;
  });

  // ② 逃げ率帯別
  var nigeBands=[
    {label:'〜49%',min:0,max:49,hit:0,total:0},
    {label:'50〜64%',min:50,max:64,hit:0,total:0},
    {label:'65%〜',min:65,max:999,hit:0,total:0},
    {label:'不明',min:-1,max:-1,hit:0,total:0}
  ];
  done.forEach(function(l){
    var nr=l.nigeRate;
    var isHit=l.miss.indexOf('hit')>=0;
    if(nr===null||nr===undefined){nigeBands[3].total++;if(isHit)nigeBands[3].hit++;return;}
    for(var i=0;i<3;i++){
      if(nr>=nigeBands[i].min&&nr<=nigeBands[i].max){nigeBands[i].total++;if(isHit)nigeBands[i].hit++;return;}
    }
  });

  // ③ 荒れ指数帯別
  var areBands=[
    {label:'0〜3点',min:0,max:3,hit:0,total:0},
    {label:'4〜7点',min:4,max:7,hit:0,total:0},
    {label:'8〜11点',min:8,max:11,hit:0,total:0},
    {label:'12点〜',min:12,max:999,hit:0,total:0}
  ];
  done.forEach(function(l){
    var sc=l.areScore;
    if(sc===null||sc===undefined)return;
    for(var i=0;i<areBands.length;i++){
      if(sc>=areBands[i].min&&sc<=areBands[i].max){areBands[i].total++;if(l.miss.indexOf('hit')>=0)areBands[i].hit++;return;}
    }
  });

  // ④ 点数別
  var ptsBands={4:{hit:0,total:0},6:{hit:0,total:0},8:{hit:0,total:0},12:{hit:0,total:0},14:{hit:0,total:0},15:{hit:0,total:0}};
  done.forEach(function(l){
    var p=l.pts;
    if(!p||!ptsBands[p])return;
    ptsBands[p].total++;
    if(l.miss.indexOf('hit')>=0)ptsBands[p].hit++;
  });

  // ⑤ 本線/抑え別的中
  var honsenHit=0,osaeeHit=0,totalHit=hits.length;
  hits.forEach(function(l){
    if(!l.bets||!l.result)return;
    var matched=l.bets.find(function(b){return b.val===l.result;});
    if(!matched)return;
    if(matched.type==='honsen')honsenHit++;
    else osaeeHit++;
  });

  // ⑥ 的中時の平均・最高配当
  var hitPayouts=hits.map(function(l){return parsePay(l.payout);}).filter(function(v){return v>0;});
  var avgPay=hitPayouts.length>0?Math.round(hitPayouts.reduce(function(s,v){return s+v;},0)/hitPayouts.length):0;
  var maxPay=hitPayouts.length>0?Math.max.apply(null,hitPayouts):0;

  // ⑦ 的中/外れ時の◎sogoScore比較
  function getMaruScore(l){
    if(!l.boats||!l.maru)return null;
    var b=l.boats.find(function(b){return String(b.n)===String(l.maru);});
    return b?b.sogoScore:null;
  }
  var hitScores=hits.map(getMaruScore).filter(function(v){return v!==null;});
  var missScores=misses.map(getMaruScore).filter(function(v){return v!==null;});
  var avgHitScore=hitScores.length>0?Math.round(hitScores.reduce(function(s,v){return s+v;},0)/hitScores.length*10)/10:null;
  var avgMissScore=missScores.length>0?Math.round(missScores.reduce(function(s,v){return s+v;},0)/missScores.length*10)/10:null;

  // ⑧ 的中/外れ時の平均逃げ率
  var hitNige=hits.map(function(l){return l.nigeRate;}).filter(function(v){return v!==null&&v!==undefined;});
  var missNige=misses.map(function(l){return l.nigeRate;}).filter(function(v){return v!==null&&v!==undefined;});
  var avgHitNige=hitNige.length>0?Math.round(hitNige.reduce(function(s,v){return s+v;},0)/hitNige.length):null;
  var avgMissNige=missNige.length>0?Math.round(missNige.reduce(function(s,v){return s+v;},0)/missNige.length):null;

  // ===== HTML生成 =====
  function barRow(label,hitN,totalN,color){
    var p=pct(hitN,totalN);
    var barColor=color||'var(--green)';
    return '<div style="margin-bottom:10px;">'
      +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;">'
      +'<span style="color:var(--text);">'+label+'</span>'
      +'<span style="color:'+barColor+';font-weight:700;">'+hitN+'/'+totalN+'件 ('+p+'%)</span>'
      +'</div>'
      +'<div style="height:5px;background:var(--bg);border-radius:3px;">'
      +'<div style="height:5px;width:'+p+'%;background:'+barColor+';border-radius:3px;transition:width 0.4s;"></div>'
      +'</div></div>';
  }

  function section(title,content){
    return '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">'
      +'<div style="font-size:10px;font-weight:700;color:var(--text-sub);letter-spacing:1.5px;margin-bottom:10px;">'+title+'</div>'
      +content
      +'</div>';
  }

  var html='<div id="hitAnalysisWrap" style="margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">';
  html+='<div style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:1.5px;">🎯 当たり分析</div>';
  html+='<div style="display:flex;gap:6px;align-items:center;">';
  html+='<div style="font-size:10px;color:var(--text-sub);">'+done.length+'件 / 的中'+hits.length+'件 ('+hitRate+'%)</div>';
  html+='<button id="copyHitBtn" onclick="copyHitAnalysis()" style="padding:5px 12px;background:var(--text);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;-webkit-appearance:none;cursor:pointer;">📋 コピー</button>';
  html+='</div>';
  html+='</div>';

  // ① 信頼度別
  var sHtml='';
  ['A','B','C'].forEach(function(s){
    var d=shinkidoData[s];
    if(d.total===0)return;
    var color=s==='A'?'var(--blue)':s==='B'?'var(--green)':'var(--accent)';
    sHtml+=barRow('信頼度'+s,d.hit,d.total,color);
  });
  if(sHtml)html+=section('① 信頼度別',sHtml);

  // ② 逃げ率帯別
  var nHtml='';
  nigeBands.forEach(function(b){if(b.total>0)nHtml+=barRow(b.label,b.hit,b.total);});
  if(nHtml)html+=section('② 逃げ率帯別',nHtml);

  // ③ 荒れ指数帯別
  var aHtml='';
  areBands.forEach(function(b){if(b.total>0)aHtml+=barRow(b.label,b.hit,b.total);});
  if(aHtml)html+=section('③ 荒れ指数帯別',aHtml);

  // ④ 点数別
  var pHtml='';
  [4,6,8,12,14,15].forEach(function(p){
    var d=ptsBands[p];
    if(d.total>0)pHtml+=barRow(p+'点',d.hit,d.total);
  });
  if(pHtml)html+=section('④ 点数別',pHtml);

  // ⑤ 本線/抑え別
  if(totalHit>0){
    var bHtml=barRow('本線的中',honsenHit,totalHit,'var(--gold)');
    bHtml+=barRow('抑え的中',osaeeHit,totalHit,'var(--blue)');
    html+=section('⑤ 本線/抑え別的中',bHtml);
  }

  // ⑥ 的中時の配当
  if(hitPayouts.length>0){
    html+=section('⑥ 的中配当',
      '<div style="display:flex;gap:8px;">'
      +'<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;">'
      +'<div style="font-size:16px;font-weight:700;color:var(--green);">¥'+avgPay.toLocaleString()+'</div>'
      +'<div style="font-size:10px;color:var(--text-sub);">平均配当</div></div>'
      +'<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;">'
      +'<div style="font-size:16px;font-weight:700;color:var(--gold);">¥'+maxPay.toLocaleString()+'</div>'
      +'<div style="font-size:10px;color:var(--text-sub);">最高配当</div></div>'
      +'</div>'
    );
  }

  // ⑦ 的中/外れの◎sogoScore比較
  if(avgHitScore!==null||avgMissScore!==null){
    var cHtml='<div style="display:flex;gap:8px;">';
    if(avgHitScore!==null)cHtml+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--green);">'+avgHitScore+'pt</div><div style="font-size:10px;color:var(--text-sub);">的中時◎スコア</div></div>';
    if(avgMissScore!==null)cHtml+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--accent);">'+avgMissScore+'pt</div><div style="font-size:10px;color:var(--text-sub);">外れ時◎スコア</div></div>';
    cHtml+='</div>';
    html+=section('⑦ ◎スコア比較（的中vs外れ）',cHtml);
  }

  // ⑧ 平均逃げ率比較
  if(avgHitNige!==null||avgMissNige!==null){
    var nCHtml='<div style="display:flex;gap:8px;">';
    if(avgHitNige!==null)nCHtml+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--green);">'+avgHitNige+'%</div><div style="font-size:10px;color:var(--text-sub);">的中時逃げ率</div></div>';
    if(avgMissNige!==null)nCHtml+='<div style="flex:1;text-align:center;padding:10px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--accent);">'+avgMissNige+'%</div><div style="font-size:10px;color:var(--text-sub);">外れ時逃げ率</div></div>';
    nCHtml+='</div>';
    html+=section('⑧ 逃げ率比較（的中vs外れ）',nCHtml);
  }

  html+='</div>';

  var analysisEl=document.getElementById('logAnalysis');
  analysisEl.style.display='block';
  analysisEl.innerHTML=html;
  analysisEl.scrollIntoView({behavior:'smooth',block:'start'});
}

// === showMissDetail ===
function showMissDetail(){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var missLogs=logs.filter(function(l){return l.result&&l.result!=='skip'&&!l.hit;});
  if(!missLogs.length){alert('外れデータなし');return;}
  var el=document.getElementById('logSummary');
  var html='<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px;"><div style="font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1.5px;">外れ詳細（'+missLogs.length+'件）</div><button onclick="copyMissDetail()" id="copyMissBtn" style="padding:5px 12px;background:var(--text);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;-webkit-appearance:none;cursor:pointer;">📋 コピー</button></div>';
  var zuré=0,maruOut=0,maruOrd=0;
  missLogs.forEach(function(l){
    var r=l.result,maru=l.aiRanking?l.aiRanking.find(function(a){return a.rank===1;}):null;
    if(!maru)return;
    var came=r.first==maru.n||r.second==maru.n||r.third==maru.n;
    if(!came)maruOut++;else if(l.maruResult===1)zuré++;else maruOrd++;
  });
  // 信頼度別・モード別集計
  var shinkidoStat={A:{total:0,hit:0,miss:0},B:{total:0,hit:0,miss:0},C:{total:0,hit:0,miss:0}};
  var modeStat={normal:{total:0,hit:0},are:{total:0,hit:0}};
  var allLogs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var doneLogs=allLogs.filter(function(l){return l.result&&l.result!=='skip';});
  doneLogs.forEach(function(l){
    if(l.mode==='normal'&&l.shinkido&&shinkidoStat[l.shinkido]){
      shinkidoStat[l.shinkido].total++;
      if(l.hit)shinkidoStat[l.shinkido].hit++;
      else shinkidoStat[l.shinkido].miss++;
    }
    if(modeStat[l.mode]){modeStat[l.mode].total++;if(l.hit)modeStat[l.mode].hit++;}
  });

  html+='<div style="display:flex;gap:8px;margin-bottom:8px;">';
  html+='<div style="flex:1;text-align:center;padding:8px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--accent);">'+maruOut+'</div><div style="font-size:10px;color:var(--text-sub);">◎着外</div></div>';
  html+='<div style="flex:1;text-align:center;padding:8px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--blue);">'+zuré+'</div><div style="font-size:10px;color:var(--text-sub);">紐ズレ</div></div>';
  html+='<div style="flex:1;text-align:center;padding:8px;background:var(--bg);border-radius:4px;"><div style="font-size:16px;font-weight:700;color:var(--text-sub);">'+maruOrd+'</div><div style="font-size:10px;color:var(--text-sub);">◎着順違い</div></div>';
  html+='</div>';

  // 信頼度別集計
  html+='<div style="background:var(--bg);border-radius:4px;padding:10px;margin-bottom:8px;">';
  html+='<div style="font-size:10px;color:var(--text-sub);font-weight:700;margin-bottom:6px;">信頼度別（通常モード）</div>';
  html+='<div style="display:flex;gap:8px;">';
  ['A','B','C'].forEach(function(s){
    var st=shinkidoStat[s];
    var rate=st.total>0?Math.round(st.hit/st.total*100):0;
    var color=rate>=30?'var(--green)':rate>=20?'var(--blue)':'var(--accent)';
    html+='<div style="flex:1;text-align:center;padding:6px;background:var(--surface);border-radius:4px;">';
    html+='<div style="font-size:13px;font-weight:700;color:'+color+';">'+st.hit+'/'+st.total+'</div>';
    html+='<div style="font-size:9px;color:var(--text-muted);">信頼度'+s+'（'+rate+'%）</div>';
    html+='</div>';
  });
  html+='</div></div>';

  // モード別集計
  html+='<div style="background:var(--bg);border-radius:4px;padding:10px;margin-bottom:12px;">';
  html+='<div style="font-size:10px;color:var(--text-sub);font-weight:700;margin-bottom:6px;">モード別</div>';
  html+='<div style="display:flex;gap:8px;">';
  [{key:'normal',label:'通常'},{key:'are',label:'荒れ'}].forEach(function(m){
    var st=modeStat[m.key];
    var rate=st.total>0?Math.round(st.hit/st.total*100):0;
    var color=rate>=25?'var(--green)':'var(--accent)';
    html+='<div style="flex:1;text-align:center;padding:6px;background:var(--surface);border-radius:4px;">';
    html+='<div style="font-size:13px;font-weight:700;color:'+color+';">'+st.hit+'/'+st.total+'</div>';
    html+='<div style="font-size:9px;color:var(--text-muted);">'+m.label+'（'+rate+'%）</div>';
    html+='</div>';
  });
  html+='</div></div>';
  missLogs.forEach(function(l){
    var r=l.result;
    var rankMap={};(l.aiRanking||[]).forEach(function(a){rankMap[a.n]=a.rank;});
    var maru=l.aiRanking?l.aiRanking.find(function(a){return a.rank===1;}):null;
    var shiro=l.aiRanking?l.aiRanking.find(function(a){return a.rank===2;}):null;
    var maruN=maru?maru.n:'?',shiroN=shiro?shiro.n:'?';
    var maruCame=r.first==maruN||r.second==maruN||r.third==maruN;
    var missType=!maruCame?'◎着外':l.maruResult===1?'紐ズレ':'◎着順違い';
    var typeColor=missType==='◎着外'?'var(--red)':missType==='紐ズレ'?'var(--accent)':'var(--text-sub)';
    var allBets=l.bets?((l.bets.honsen||[]).concat(l.bets.osaee||[])):[];
    var combo=r.first+'-'+r.second+'-'+r.third;
    var inBet=allBets.length>0&&allBets.indexOf(combo)>=0;
    var modeLabel=l.mode==='are'?'荒':'通';
    html+='<div style="background:var(--bg);border-radius:4px;padding:10px;margin-bottom:6px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">';
    html+='<span style="font-size:13px;font-weight:700;">'+l.venue+l.raceNum+'R <span style="font-size:10px;color:var(--text-sub);">['+modeLabel+']</span></span>';
    html+='<span style="font-size:11px;font-weight:700;color:'+typeColor+';">'+missType+'</span>';
    html+='</div>';
    if(l.mode==='normal'){
      html+='<div style="font-size:10px;color:var(--text-sub);margin-bottom:3px;">信頼度'+l.shinkido+' 逃げ'+(l.nigeRate||'?')+'% 荒れ'+(l.areScore||0)+'点</div>';
    } else {
      html+='<div style="font-size:10px;color:var(--text-sub);margin-bottom:3px;">荒れ'+(l.areScore||0)+'点 逃げ'+(l.nigeRate||'?')+'% ◎'+maruN+'○'+shiroN+'</div>';
    }
    html+='<div style="font-size:12px;margin-bottom:3px;">結果: <b>'+r.first+'</b>('+(rankMap[r.first]||'?')+'位)-<b>'+r.second+'</b>('+(rankMap[r.second]||'?')+'位)-<b>'+r.third+'</b>('+(rankMap[r.third]||'?')+'位)</div>';
    html+='<div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;">◎'+maruN+'→'+(l.maruResult?l.maruResult+'着':'着外')+(l.shiroResult?' ○→'+l.shiroResult+'着':'')+'</div>';
    var honsen=l.bets?l.bets.honsen||[]:[];
    var osaee=l.bets?l.bets.osaee||[]:[];
    if(honsen.length||osaee.length){
      html+='<div style="font-size:10px;color:'+(inBet?'var(--green)':'var(--red)')+';margin-bottom:2px;">買い目に'+(inBet?'✅ 入ってた':'❌ 入ってない')+'</div>';
      var betLine='本線: '+honsen.map(function(b){return b===combo?'['+b+']':b;}).join('/');
      if(osaee.length)betLine+=' 抑え: '+osaee.map(function(b){return b===combo?'['+b+']':b;}).join('/');
      html+='<div style="font-size:9px;color:var(--text-muted);margin-top:2px;word-break:break-all;">'+betLine+'</div>';
    } else {
      html+='<div style="font-size:10px;color:var(--text-muted);">買い目データなし（新実装前のログ）</div>';
    }
    html+='</div>';
  });
  html+='<button onclick="updateLogSummary()" style="width:100%;padding:10px;background:var(--surface);color:var(--text-sub);border:1px solid var(--border);border-radius:4px;font-size:12px;-webkit-appearance:none;">← 戻る</button>';
  html+='</div>';
  el.innerHTML=html;
}

// === analyzeLog ===
function analyzeLog(){
  var logs=JSON.parse(localStorage.getItem('kyotei_logs')||'[]');
  var done=logs.filter(function(l){return l.result!==null&&l.result!=='skip';});
  if(done.length<10){alert('10件以上記録してから分析できます');return;}
  var key=getKey();
  if(!key){alert('APIキーを設定してください');return;}

  // 集計サマリー
  var total=done.length;
  var hits=done.filter(function(l){return l.hit;}).length;
  var maruHits=done.filter(function(l){return l.maruResult===1;}).length;
  var shiroHits=done.filter(function(l){return l.shiroResult===1;}).length;
  var missTypes={ichaku:0,nichaku:0,sankaku:0,tensu:0};
  var maruDist={1:0,2:0,3:0,out:0};
  var shiroDist={1:0,2:0,3:0,out:0};
  var normalHits=0,normalTotal=0,areHits=0,areTotal=0;
  var shinkidoStats={A:{hit:0,total:0},B:{hit:0,total:0},C:{hit:0,total:0}};

  done.forEach(function(l){
    (l.miss||[]).forEach(function(m){if(missTypes[m]!==undefined)missTypes[m]++;});
    if(l.maruResult===1)maruDist[1]++;
    else if(l.maruResult===2)maruDist[2]++;
    else if(l.maruResult===3)maruDist[3]++;
    else maruDist.out++;
    if(l.shiroResult===1)shiroDist[1]++;
    else if(l.shiroResult===2)shiroDist[2]++;
    else if(l.shiroResult===3)shiroDist[3]++;
    else shiroDist.out++;
    if(l.mode==='normal'){normalTotal++;if(l.hit)normalHits++;}
    if(l.mode==='are'){areTotal++;if(l.hit)areHits++;}
    if(l.shinkido&&shinkidoStats[l.shinkido]){shinkidoStats[l.shinkido].total++;if(l.hit)shinkidoStats[l.shinkido].hit++;}
  });

  // 個別ログ（全情報）
  var logLines=done.map(function(l,i){
    var r=l.result;
    var combo=r.first+'-'+r.second+'-'+r.third;
    // AI評価順位
    var ai=l.aiRanking.map(function(a){return a.rank+':'+a.n;}).join('/');
    // 買い目
    var bets=l.bets?(l.bets.honsen||[]).concat(l.bets.osaee||[]):[];
    var betStr=bets.join('/');
    // 外れ分類
    var missStr=(l.miss||[]).join(',');
    // メタ情報
    var meta=[];
    if(l.shinkido)meta.push('信頼度'+l.shinkido);
    if(l.nigeRate!=null)meta.push('逃げ'+l.nigeRate+'%');
    if(l.areScore!=null)meta.push('荒れ'+l.areScore+'pt');
    if(l.mode==='are'&&l.arePts)meta.push(l.arePts+'点買');
    var outcome=(l.hit?'的中':'外れ');
    var maruStr=l.maruResult?'◎'+l.maruResult+'着':'◎着外';
    var shiroStr=l.shiroResult?'○'+l.shiroResult+'着':'○着外';
    // 実際の2着・3着艇のsogoRank・sogoScoreを取得
    var boatMap={};
    (l.boats||[]).forEach(function(b){boatMap[b.n]={rank:b.sogoRank,score:b.sogoScore,kt:b.tokuten,st:b.avgST,kr:b.kiryokuRank};});
    var r2info=boatMap[r.second]?r.second+'号('+boatMap[r.second].rank+'位/'+boatMap[r.second].score+'pt/得'+boatMap[r.second].kt+'/ST'+boatMap[r.second].st+'/機'+boatMap[r.second].kr+')':r.second+'号(?位)';
    var r3info=boatMap[r.third]?r.third+'号('+boatMap[r.third].rank+'位/'+boatMap[r.third].score+'pt/得'+boatMap[r.third].kt+'/ST'+boatMap[r.third].st+'/機'+boatMap[r.third].kr+')':r.third+'号(?位)';
    var r1info=boatMap[r.first]?r.first+'号('+boatMap[r.first].rank+'位/'+boatMap[r.first].score+'pt)':r.first+'号(?位)';
    return (i+1)+'.'+l.venue+l.raceNum+'R['+l.mode+']['+(meta.join('/'))+'] AI:'+ai+' 結果:1着'+r1info+' 2着'+r2info+' 3着'+r3info+' '+outcome+' '+maruStr+' '+shiroStr+(missStr?' 分類:'+missStr:'')+(r.payout?' 払'+r.payout:'');
  }).join('\n');

  // 集計行
  var statLines=[
    '=集計=',
    '総数:'+total+' 的中:'+hits+'('+Math.round(hits/total*100)+'%)',
    '◎1着:'+maruHits+'('+Math.round(maruHits/total*100)+'%) ◎分布:1着'+maruDist[1]+'/2着'+maruDist[2]+'/3着'+maruDist[3]+'/着外'+maruDist.out,
    '○1着:'+shiroHits+'('+Math.round(shiroHits/total*100)+'%) ○分布:1着'+shiroDist[1]+'/2着'+shiroDist[2]+'/3着'+shiroDist[3]+'/着外'+shiroDist.out,
    '通常:'+normalHits+'/'+normalTotal+' 荒れ:'+areHits+'/'+areTotal,
    '信頼度A:'+shinkidoStats.A.hit+'/'+shinkidoStats.A.total+' B:'+shinkidoStats.B.hit+'/'+shinkidoStats.B.total+' C:'+shinkidoStats.C.hit+'/'+shinkidoStats.C.total,
    '外れ分類 1着:'+missTypes.ichaku+'/2着:'+missTypes.nichaku+'/3着:'+missTypes.sankaku+'/点数:'+missTypes.tensu
  ].join('\n');

  // 外れパターン集計（買い目依存なし・maruResult/shiroResultベース）
  var missLogs=done.filter(function(l){return !l.hit;});
  var maruOut=missLogs.filter(function(l){return !l.maruResult;}).length;
  var maruHit1=missLogs.filter(function(l){return l.maruResult===1;}).length; // 紐ズレ
  var maruHit2=missLogs.filter(function(l){return l.maruResult===2;}).length;
  var maruHit3=missLogs.filter(function(l){return l.maruResult===3;}).length;

  // 通常外れ詳細テキスト
  var normalMissDetail=done.filter(function(l){return l.mode==='normal'&&!l.hit;}).map(function(l){
    var r=l.result;
    var rankMap={};(l.aiRanking||[]).forEach(function(a){rankMap[a.n]=a.rank;});
    var maru=l.aiRanking?l.aiRanking.find(function(a){return a.rank===1;}):null;
    var maruN=maru?maru.n:'?';
    var maruCame=r.first==maruN||r.second==maruN||r.third==maruN;
    var missType=!maruCame?'◎着外':l.maruResult===1?'紐ズレ':'◎着順違い';
    // 各艇のsogoScore情報
    var bm={};(l.boats||[]).forEach(function(b){bm[b.n]=b;});
    function binfo(n){var b=bm[n];return b?n+'号('+b.sogoRank+'位/'+b.sogoScore+'pt/機'+b.kiryokuRank+')':n+'号(?)';}
    return l.venue+l.raceNum+'R['+missType+']['+l.shinkido+'/逃'+l.nigeRate+'%/荒'+l.areScore+'pt] 結果:'+binfo(r.first)+'-'+binfo(r.second)+'-'+binfo(r.third)+' ◎'+maruN+'→'+(l.maruResult?l.maruResult+'着':'着外')+(l.shiroResult?' ○→'+l.shiroResult+'着':'');
  }).join('\n');

  // 荒れ外れ詳細テキスト
  var areMissDetail=done.filter(function(l){return l.mode==='are'&&!l.hit;}).map(function(l){
    var r=l.result;
    var maru=l.aiRanking?l.aiRanking.find(function(a){return a.rank===1;}):null;
    var shiro=l.aiRanking?l.aiRanking.find(function(a){return a.rank===2;}):null;
    var maruN=maru?maru.n:'?',shiroN=shiro?shiro.n:'?';
    var bm2={};(l.boats||[]).forEach(function(b){bm2[b.n]=b;});
    function binfo2(n){var b=bm2[n];return b?n+'号('+b.sogoRank+'位/'+b.sogoScore+'pt/機'+b.kiryokuRank+')':n+'号(?)';}
    return l.venue+l.raceNum+'R[荒'+l.areScore+'pt/逃'+l.nigeRate+'%] ◎'+maruN+'('+binfo2(maruN)+')○'+shiroN+'('+binfo2(shiroN)+') 結果:'+binfo2(r.first)+'-'+binfo2(r.second)+'-'+binfo2(r.third)+' ◎→'+(l.maruResult?l.maruResult+'着':'着外')+' ○→'+(l.shiroResult?l.shiroResult+'着':'着外');
  }).join('\n');

  var summary=statLines+'\n外れ内訳:紐ズレ'+maruHit1+'件/◎2着'+maruHit2+'件/◎3着'+maruHit3+'件/◎着外'+maruOut+'件'+'\n\n=通常外れ詳細=\n'+normalMissDetail+'\n\n=荒れ外れ詳細=\n'+areMissDetail+'\n\n=個別ログ=\n'+logLines;

  var prompt='競艇予想システムのログ分析。以下フォーマットのみ出力。説明・前置き不要。切れないよう簡潔に。各レースの各艇データ（sogoRank/sogoScore/機力）も含まれるので、実際に2着3着に来た艇のスコア傾向も分析せよ。\n\n'+summary+'\n\n【出力フォーマット】\n【◎1着率】XX%(X/X) ○1着率XX%\n【外れ内訳】紐ズレX件/◎2着X件/◎3着X件/◎着外X件\n【通常外れ傾向】1〜2行\n【荒れ外れ傾向】1〜2行\n【信頼度別】A:X/X B:X/X C:X/X→1行\n【買い目改善】1〜2行\n【スコア改善案】\n・指標:±X点/根拠1行\n【最優先対応】1行';
  document.getElementById('logAnalysis').style.display='block';
  document.getElementById('logAnalysis').innerHTML='<div style="margin-top:10px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:6px;text-align:center;"><div class="spinner" style="margin:0 auto 8px;"></div><div style="font-size:11px;color:var(--text-muted);">分析中...</div></div>';
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:4000,thinkingConfig:{thinkingBudget:0}}})
  }).then(function(res){return res.json();}).then(function(json){

// === renderEvalCard ===
function renderEvalCard(text,venue,raceNum){
  // 総合評価から順位・印を取得（スペース種類を問わず柔軟にマッチ）
  var rankData=[];
  text.split('\n').forEach(function(line){
    var m=line.match(/([1-6])位[\s\u3000]*([1-6])号艇[\s\u3000]*(◎|○|▲|△|▽|×)/);
    if(m)rankData.push({rank:parseInt(m[1]),boat:parseInt(m[2]),mark:m[3]});
  });
  // パース結果が6未満ならcalcDataのsogoRankで補完
  if(rankData.length<6&&window.calcData&&calcData.parsed&&calcData.parsed.boats){
    var MARK_ORDER_F=['◎','○','▲','△','▽','×'];
    var sogoSorted=calcData.parsed.boats.slice().sort(function(a,b){return (a.sogoRank||99)-(b.sogoRank||99);});
    var parsedBoats=rankData.map(function(d){return d.boat;});
    sogoSorted.forEach(function(b,i){
      if(parsedBoats.indexOf(b.n)<0){
        rankData.push({rank:i+1,boat:b.n,mark:MARK_ORDER_F[Math.min(i,5)]});
      }
    });
    var seen={};
    rankData=rankData.filter(function(d){if(seen[d.boat])return false;seen[d.boat]=true;return true;});
    rankData.sort(function(a,b){return a.rank-b.rank;});
    rankData.forEach(function(d,i){d.rank=i+1;});
  }
  if(!rankData.length)return;
  rankData.sort(function(a,b){return a.rank-b.rank;});

  // タイトル
  var title='G.の総合評価🚤';
  if(venue&&venue!=='?'&&raceNum&&raceNum!=='?')title='G.の総合評価🚤　'+venue+raceNum+'R';
  document.getElementById('evalCardTitle').textContent=title;

  // 艇バッジ生成
  var container=document.getElementById('evalBoats');
  var ctr=container.querySelector('.eval-corner-tr');
  var cbl=container.querySelector('.eval-corner-bl');
  container.innerHTML='';
  container.appendChild(ctr);
  container.appendChild(cbl);

  rankData.forEach(function(d,idx){
    if(idx>0){
      var arrow=document.createElement('div');
      arrow.className='eval-arrow';
      arrow.textContent='›';
      container.appendChild(arrow);
    }
    var slot=document.createElement('div');
    slot.className='eval-slot';
    var badge=document.createElement('div');
    badge.className='eval-badge';
    var c=BOAT_COLORS[d.boat]||BOAT_COLORS[1];
    badge.style.background=c.bg;
    badge.style.color=c.text;
    badge.textContent=d.boat;
    var stars=document.createElement('div');
    stars.className='eval-stars';
    var starCount=MARK_TO_STARS[d.mark]||1;
    var starsHtml='';
    for(var i=0;i<5;i++)starsHtml+='<span class="'+(starCount>i?'eval-star-on':'eval-star-off')+'">★</span>';
    stars.innerHTML=starsHtml;
    slot.appendChild(badge);
    slot.appendChild(stars);
    container.appendChild(slot);
  });

  document.getElementById('evalCardWrap').classList.add('show');
}

// === parseOdds ===
function parseOdds(raw){
  var lines=raw.split('\n').map(function(l){return l.replace(/\t/g,' ').trim();}).filter(function(l){return l.length>0;});
  var boats={};var playerRe=/^([1-6])\s+([　-\u9fff\u30a0-\u30ff]+)/;var blocks=[];var cur=null;
  for(var i=0;i<lines.length;i++){var line=lines[i];var pm=line.match(playerRe);if(pm){cur={boatNo:parseInt(pm[1]),name:pm[2],dataLines:[]};blocks.push(cur);continue;}if(cur&&!line.startsWith('合成')&&!line.startsWith('2単'))cur.dataLines.push(line);}
  for(var bi=0;bi<blocks.length;bi++){
    var block=blocks[bi];var boatNo=block.boatNo,name=block.name,dataLines=block.dataLines;
    boats[boatNo]={name:name,odds:{}};if(dataLines.length<1)continue;
    var tokenLines=dataLines.map(function(l){return l.split(/\s+/).filter(function(t){return /^\d+(\.\d+)?$/.test(t);}).map(Number);});
    var row0=tokenLines[0];if(!row0||row0.length<3)continue;
    var secondBoats=[];
    for(var j=0;j+2<row0.length;j+=3){var s=Math.round(row0[j]),t=Math.round(row0[j+1]),v=row0[j+2];if(s>=1&&s<=6&&t>=1&&t<=6&&v>0){secondBoats.push(s);boats[boatNo].odds[boatNo+'-'+s+'-'+t]=v;}}
    for(var row=1;row<tokenLines.length;row++){var toks=tokenLines[row];for(var col=0;col<secondBoats.length;col++){var jj=col*2;if(jj+1>=toks.length)continue;var tt=Math.round(toks[jj]),vv=toks[jj+1];if(tt>=1&&tt<=6&&vv>0)boats[boatNo].odds[boatNo+'-'+secondBoats[col]+'-'+tt]=vv;}}
  }
  return boats;
}

// === calcGoseiOdds ===
function calcGoseiOdds(betsArr,oddsData){
  var sum=0;
  betsArr.forEach(function(bet){var parts=bet.match(/^(\d)-(\d)-(\d)$/);if(!parts)return;var first=parseInt(parts[1]);var bd=oddsData[first];if(!bd)return;var o=bd.odds[bet];if(o&&o>0)sum+=1/o;});
  return sum===0?null:(1/sum).toFixed(1);
}

    if(o)validBets.push(bet);
  });
  html+='</tbody></table>';
  var gosei=calcGoseiOdds(validBets,oddsData);

  else{text=betBlockC+'\n'+text;}
  // Xサマリー再構築
  var xIdxC=text.indexOf('【Xサマリー】');

  if(xIdxC>=0){
    var beforeC=text.slice(0,xIdxC),afterC=text.slice(xIdxC);
    var xLinesC=afterC.split('\n');
    for(var xci=1;xci<xLinesC.length;xci++){
      var xlc=xLinesC[xci].trim();
      if(!xlc||xlc===venue+raceNum+'R'||xlc.indexOf('本線')===0||xlc.indexOf('抑え')===0||xlc==='G.'||/^[\d><=]+$/.test(xlc))continue;
      commentC=xlc;break;
    }
    var hyokaC=buildHyokaOrder(calcData.parsed.boats);
    var newXC='【Xサマリー】\n'+venue+raceNum+'R\n'+(commentC?commentC+'\n\n':'')+hyokaC+'\n本線\u3000'+honsenStrC+(osaeeC.length?'\n抑え\u3000'+osaeeStrC:'')+'\n\nG.';
    text=beforeC+newXC;
  }
  document.getElementById('outText').textContent=text;
  showOddsResult();
  showStatus('買い目を再生成しました','ok');
}

// === binfo ===
function binfo(n){var b=bm[n];return b?n+'号('+b.sogoRank+'位/'+b.sogoScore+'pt/機'+b.kiryokuRank+')':n+'号(?)';}

// === binfo2 ===
function binfo2(n){var b=bm2[n];return b?n+'号('+b.sogoRank+'位/'+b.sogoScore+'pt/機'+b.kiryokuRank+')':n+'号(?)';}

// === showToast ===
function showToast(msg){showStatus(msg,'err');}

window.addEventListener('DOMContentLoaded',function(){loadVenueRace();updateLogSummary();});
