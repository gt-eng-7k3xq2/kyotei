var BOAT_COLORS={1:{bg:'#a8a8a8',text:'#000'},2:{bg:'#3a3a3a',text:'#fff'},3:{bg:'#c42222',text:'#fff'},4:{bg:'#1e52cc',text:'#fff'},5:{bg:'#cc9a00',text:'#000'},6:{bg:'#168432',text:'#fff'}};
var MARK_TO_STARS={'◎':5,'○':4,'▲':3,'△':2,'▽':1,'×':1};

function renderEvalCard(xText, venue, racenum){
  // currentAreScoresのrankingから直接生成
  if(!currentAreScores||!currentAreScores.length) return;
  const marks=['◎','○','▲','△','▽','×'];
  const rankData=currentAreScores.map((s,i)=>({rank:i+1,boat:parseInt(s.no),mark:marks[i]||'×'}));

  var title='G.の総合評価🚤';
  if(venue&&venue!=='?'&&racenum&&racenum!=='?') title='G.の総合評価🚤　'+venue+racenum+'R';
  document.getElementById('evalCardTitle').textContent=title;

  var container=document.getElementById('evalBoats');
  var ctr=container.querySelector('.eval-corner-tr');
  var cbl=container.querySelector('.eval-corner-bl');
  container.innerHTML='';
  if(ctr) container.appendChild(ctr);
  if(cbl) container.appendChild(cbl);

  // バッジサイズをinlineで固定（html2canvas/Safari対応）
  var slotW=Math.floor((container.offsetWidth||320)/6);
  var badgeSz=Math.min(slotW-8, 52);

  rankData.forEach(function(d,idx){
    if(idx>0){
      var arrow=document.createElement('div');
      arrow.className='eval-arrow';
      arrow.textContent='›';
      container.appendChild(arrow);
    }
    var slot=document.createElement('div');
    slot.className='eval-slot';
    var badge=document.createElement('div');
    badge.className='eval-badge';
    badge.style.width=badgeSz+'px';
    badge.style.height=badgeSz+'px';
    badge.style.fontSize=Math.floor(badgeSz*0.65)+'px';
    var col=BOAT_COLORS[d.boat]||BOAT_COLORS[1];
    badge.style.background=col.bg;
    badge.style.color=col.text;
    badge.textContent=d.boat;
    var stars=document.createElement('div');
    stars.className='eval-stars';
    var starCount=MARK_TO_STARS[d.mark]||1;
    var starsHtml='';
    for(var i=0;i<5;i++) starsHtml+='<span class="'+(starCount>i?'eval-star-on':'eval-star-off')+'">★</span>';
    stars.innerHTML=starsHtml;
    slot.appendChild(badge);
    slot.appendChild(stars);
    container.appendChild(slot);
  });
  document.getElementById('evalCardWrap').classList.add('show');
}

function saveEvalCard(){
  var card=document.getElementById('evalCard');
  if(!card)return;
  var btn=document.querySelector('.eval-save-btn');
  btn.textContent='生成中...';
  btn.disabled=true;
  html2canvas(card,{
    scale:3,
    useCORS:true,
    backgroundColor:'#0a0a0a',
    logging:false,
    allowTaint:true
  }).then(function(canvas){
    canvas.toBlob(function(blob){
      var file=new File([blob],'G_評価カード.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'G.の総合評価'}).then(function(){
          btn.textContent='✅ 共有しました';
          setTimeout(function(){btn.textContent='📥 評価カードを保存・共有';btn.disabled=false;},2000);
        }).catch(function(){
          btn.textContent='📥 評価カードを保存・共有';
          btn.disabled=false;
        });
      } else {
        var url=URL.createObjectURL(blob);
        var link=document.createElement('a');
        link.download='G_評価カード.png';
        link.href=url;
        link.click();
        setTimeout(function(){URL.revokeObjectURL(url);},1000);
        btn.textContent='✅ 保存しました';
        setTimeout(function(){btn.textContent='📥 評価カードを保存・共有';btn.disabled=false;},2000);
      }
    },'image/png');
  }).catch(function(){
    btn.textContent='📥 評価カードを保存・共有';
    btn.disabled=false;
    showToast('生成失敗。スクリーンショットで保存してください。');
  });
}
function showEditMark(){
  if(!currentAreScores||!currentAreScores.length){showToast('先に予想実行してください');return;}
  const wrap=document.getElementById('editMarkWrap');
  if(!wrap) return;
  const d=currentParsedData;
  const marksArr=['◎','○','▲','△','▽','×'];
  const selIds=['editMaru','editShiro','editSankaku','editYonkaku','editGo','editRoku'];
  selIds.forEach(function(id,idx){
    const sel=document.getElementById(id);
    if(!sel) return;
    sel.innerHTML='';
    for(var n=1;n<=6;n++){
      var opt=document.createElement('option');
      opt.value=n;
      var nm=d&&d.boats[n-1]?d.boats[n-1].name:'';
      var curRank=currentAreScores.findIndex(s=>parseInt(s.no)===n);
      var markLabel=curRank>=0?(marksArr[curRank]||''):'';
      opt.textContent=n+'号艇'+(nm?' '+nm.split(' ')[0]:'')+(markLabel?' '+markLabel:'');
      // 現在のランキング順で対応する号艇をデフォルト選択
      if(currentAreScores[idx]&&parseInt(currentAreScores[idx].no)===n) opt.selected=true;
      sel.appendChild(opt);
    }
  });
  wrap.style.display=wrap.style.display==='none'?'block':'none';
}

function regenerateBets(){
  if(!currentParsedData||!currentAreScores){showToast('先に予想実行してください');return;}
  const selIds=['editMaru','editShiro','editSankaku','editYonkaku','editGo','editRoku'];
  const newOrder=selIds.map(id=>parseInt(document.getElementById(id).value));

  // 重複チェック
  if(new Set(newOrder).size!==6){
    showToast('同じ号艇を重複して選択しています');return;
  }

  const marks=['◎','○','▲','△','▽','×'];
  const newRanking=newOrder.map((boat,i)=>({rank:i+1,boat,mark:marks[i]||'×'}));

  // currentAreScoresを新順序に更新
  currentAreScores=newOrder.map((boat)=>{
    const orig=(currentAreScores||[]).find(s=>parseInt(s.no)===boat)||{no:boat,raw:0};
    return Object.assign({},orig,{no:boat});
  });

  // AIランキング表示更新（選手名付き）
  const d=currentParsedData;
  document.getElementById('ai-raw').textContent=newRanking.map(function(r){
    const nm=d&&d.boats[r.boat-1]?d.boats[r.boat-1].name:'';
    return r.rank+'位 '+r.boat+'号艇 '+r.mark+(nm?' '+nm:'');
  }).join(String.fromCharCode(10));

  // 買い目再生成
  const nigeRate=currentCalcData?currentCalcData.nigeRate:0;
  const newBets=selectedMode==='are'
    ?buildBetsAre(newRanking,selectedBetCount,nigeRate)
    :buildBetsNormal(newRanking,selectedBetCount,currentParsedData);

  // currentCalcData更新
  if(currentCalcData){
    currentCalcData.ranking=newRanking;
    currentCalcData.betsRaw=newBets;
    currentCalcData.betcount=newBets.length;
    currentCalcData.maru=newOrder[0];
    currentCalcData.shiro=newOrder[1];
    currentCalcData.sankaku=newOrder[2];
  }

  // 買い目テーブル再描画
  const tbody=document.getElementById('bet-tbody');
  if(tbody){
    const shikin=currentCalcData?currentCalcData.shikin:3000;
    tbody.innerHTML=newBets.map(function(b){
      return`<tr><td>${b.val}</td><td>${b.type}</td><td><input class="odds-inp" type="number" step="0.1" min="1" placeholder="—" style="width:60px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px;font-size:12px;"></td><td><input class="conf-inp" type="range" min="1" max="5" value="3" style="width:50px;"></td><td class="amt-cell" style="text-align:right;">¥${Math.floor(shikin/newBets.length/100)*100}</td><td class="ret-cell" style="text-align:right;">—</td></tr>`;
    }).join('');
  }

  // Xサマリー・評価カード・資金配分更新
  updateXPreview();
  const venueVal=(document.getElementById('inp-venue')||{}).value||'';
  const racenumVal=(document.getElementById('inp-racenum')||{}).value||'';
  renderEvalCard('',venueVal,racenumVal);
  recalcAlloc();

  document.getElementById('editMarkWrap').style.display='none';
  const maruNm=d&&d.boats[newOrder[0]-1]?d.boats[newOrder[0]-1].name.split(' ')[0]:'';
  showToast('◎'+newOrder[0]+(maruNm?maruNm:'')+'で再生成しました');
}

// ============================================================
// 合成オッズ計算（通常エンジン準拠）
// ============================================================
function calcGoseiOdds(betsArr, oddsMap){
  var sum=0;
  betsArr.forEach(function(bet){
    var o=oddsMap[bet];
    if(o&&o>0) sum+=1/o;
  });
  return sum===0?null:(1/sum).toFixed(1);
}
