<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡SG鳴門 集い専用エンジン</title>
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131c; --surface2:#1c1c2e; --border:#2a2a40;
    --gold:#c9a84c; --gold2:#f0d080; --red:#e05050; --blue:#4a9eff;
    --green:#4caf7d; --text:#e8e8f0; --muted:#7070a0;
    --font:-apple-system,'Hiragino Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:40px;}
  .header{background:linear-gradient(135deg,#1a1a2e,#0f0f1a);border-bottom:1px solid var(--gold);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.05em;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .key-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 10px;border-radius:6px;-webkit-appearance:none;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:var(--muted);background:none;border:none;-webkit-appearance:none;border-bottom:2px solid transparent;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .page{display:none;padding:16px;}
  .page.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card-title{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:.08em;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px 12px;border-radius:8px;-webkit-appearance:none;font-family:var(--font);margin-bottom:10px;}
  textarea{height:130px;resize:none;font-size:12px;}
  select{height:42px;}
  .btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;-webkit-appearance:none;margin-bottom:8px;letter-spacing:.05em;}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#f0d080);color:#0a0a0f;}
  .btn-blue{background:linear-gradient(135deg,#2a6acc,#4a9eff);color:#fff;}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;border:none;-webkit-appearance:none;font-weight:600;margin-bottom:0;}
  .btn:disabled{opacity:.4;}
  .mode-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;}
  .mode-normal{background:#1a3a1a;color:var(--green);border:1px solid var(--green);}
  .mode-are{background:#3a1a1a;color:var(--red);border:1px solid var(--red);}
  .mode-skip{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .info-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--muted);}
  .info-chip span{color:var(--text);font-weight:700;}
  .bet-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
  .bet-table th{font-size:10px;color:var(--muted);padding:5px 4px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .bet-table td{padding:8px 4px;border-bottom:1px solid var(--border);}
  .bet-table tr:last-child td{border-bottom:none;}
  .bet-val{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;}
  .bet-type{font-size:10px;color:var(--muted);}
  .odds-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:5px 6px;border-radius:6px;width:64px;margin-bottom:0;text-align:right;}
  .conf-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 6px;border-radius:6px;-webkit-appearance:none;width:46px;margin-bottom:0;text-align:center;}
  .amt-cell{font-weight:700;color:var(--gold);text-align:right;white-space:nowrap;}
  .ret-cell{font-size:12px;text-align:right;white-space:nowrap;}
  .alloc-row{display:flex;gap:8px;margin-bottom:10px;}
  .alloc-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .alloc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
  .sum-label{font-size:12px;color:var(--muted);}
  .sum-val{font-size:15px;font-weight:700;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .stat-item{background:var(--surface2);border-radius:8px;padding:10px 12px;text-align:center;}
  .stat-val{font-size:20px;font-weight:700;}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .green{color:var(--green)!important;} .red{color:var(--red)!important;} .gold{color:var(--gold)!important;}
  .rate-bar-wrap{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-top:6px;}
  .rate-bar{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,var(--green),var(--gold));}
  .log-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;}
  .log-left{flex:1;}
  .log-race{font-size:13px;font-weight:700;}
  .log-meta{font-size:10px;color:var(--muted);margin-top:2px;}
  .log-bets{font-size:11px;color:var(--muted);margin-top:3px;}
  .log-right{text-align:right;min-width:70px;}
  .log-payout{font-size:15px;font-weight:700;color:var(--gold);}
  .log-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:4px;display:inline-block;}
  .badge-hit{background:#1a3a1a;color:var(--green);}
  .badge-miss{background:#3a1a1a;color:var(--red);}
  .badge-skip{background:var(--surface2);color:var(--muted);}
  .ai-output{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text);margin-bottom:10px;min-height:50px;}
  .loading{color:var(--muted);text-align:center;padding:16px;}
  .dot-anim::after{content:'';animation:dots 1.2s infinite;}
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:'.'}}
  .divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;padding:20px;align-items:center;justify-content:center;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:360px;}
  .modal-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;}
  .betcount-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .bc-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .bc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
</style>
</head>

      <div>

      </div>

<script>
// ============================================================
// ストア
// ============================================================
const STORE_KEY='sg_narutou_v1';
const SETTINGS_KEY='sg_narutou_settings';
const GEMINI_KEY='kyotei_gemini_key';
let selectedBetCount=12;
let allocMode='equal';
let currentCalcData=null;

function getLogs(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch{return[];}}
function saveLogs(l){localStorage.setItem(STORE_KEY,JSON.stringify(l));}
function getSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{"maxrace":3}');}catch{return{maxrace:3};}}
function saveSettingsData(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}
function getApiKey(){return localStorage.getItem(GEMINI_KEY)||'';}

// ============================================================
// タブ
// ============================================================
function switchTab(name){
  const names=['yoso','harai','tsudoi','log'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='tsudoi') renderTsudoi();
  if(name==='log') renderLog();
  if(name==='harai') renderHaraiSel();
}

// ============================================================
// 買い目点数選択
// ============================================================
function setBetCount(n,btn){
  selectedBetCount=n;
  document.querySelectorAll('.bc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ============================================================
// オッズ自動抽出
// ============================================================
// テキストから各買い目のオッズを抽出してMapで返す
// 形式: "2 3 7.5" → {key:"1-2-3", odds:7.5} 等
function extractOddsMap(text){
  const map={};
  // "1号艇軸" ブロックを検出: "1\t中嶋..." 以降
  // パターン: 着 2着 オッズ の行を探す
  // 実際フォーマット: "2	3	7.5	3	2	16.3	4	2	22.8	5	2	45.4	6	2	105.4"
  // → 1着=1固定, 残りを(2着,3着,オッズ)の組でパース

  // オッズセクション全体を抽出
  const oddsSection = text.match(/=== オッズ ===([\s\S]*?)(?:===|$)/);
  if(!oddsSection) return map;
  const lines = oddsSection[1].split('\n').map(l=>l.trim()).filter(l=>l);

  let currentFirst=0;
  for(const line of lines){
    // "1\t中嶋..." のような艇番＋名前行
    const boatHeader = line.match(/^(\d)\t/);
    if(boatHeader){
      currentFirst=parseInt(boatHeader[1]);
      continue;
    }
    // 艇番名前行（タブなし）: "1\s中嶋健一郎" パターン
    const boatHeader2 = line.match(/^(\d)\s+[^\d]/);
    if(boatHeader2 && !line.match(/^\d+\s+\d/)){
      currentFirst=parseInt(boatHeader2[1]);
      continue;
    }
    if(!currentFirst) continue;
    // オッズ行: "2	3	7.5	3	2	16.3..." または "2 3 7.5 3 2 16.3..."
    const nums = line.match(/(\d+)\s+(\d+)\s+([\d.]+)/g);
    if(nums){
      for(const m of nums){
        const parts = m.match(/(\d+)\s+(\d+)\s+([\d.]+)/);
        if(parts){
          const sec=parseInt(parts[1]), trd=parseInt(parts[2]), odds=parseFloat(parts[3]);
          if(sec>=1&&sec<=6&&trd>=1&&trd<=6&&sec!==trd&&odds>0){
            const key=`${currentFirst}-${sec}-${trd}`;
            if(!map[key]) map[key]=odds;
          }
        }
      }
    }
  }
  return map;
}

// ============================================================
// プロンプト（荒れ指数+モード+ランキングを1回で）
// ============================================================
function buildPrompt(data){
  return `あなたは競艇予想の専門家です。SGグランドチャンピオン（鳴門）のレースデータを分析してください。

【レースデータ】
${data}

【鳴門水面特性】
- 1コース1着率約48%（難水面・うねりが出やすい）
- SGはトップ選手集結でイン逃げ率が下がりやすい
- 外コース有利になりやすい

【荒れ指数の計算方法】（0〜20点）
以下の観点でスコアを算出してください：
1. 1号艇の逃げ率（直近6ヶ月）: 50%未満=+5pt / 50〜65%=+2pt / 65%超=0pt
2. 外コース（4〜6号艇）の攻撃力（差し・捲り合計率の平均）: 高=+4pt / 中=+2pt / 低=0pt
3. モーター格差（2連対率の差が大きい）: 大=+3pt / 中=+1pt / 小=0pt
4. STのばらつき（各艇の平均STの標準偏差）: 大=+3pt / 中=+1pt / 小=0pt
5. F持ちや事故率の高い艇の有無: あり=+2pt / なし=0pt
6. 鳴門ボーナス（SGかつ難水面）: +3pt固定

【モード判定基準】
- 荒れ指数0〜7点: 通常モード
- 荒れ指数8〜11点 かつ 逃げ率50%未満: 荒れモード
- 荒れ指数4〜7点: スキップ推奨
- 荒れ指数12点以上: 通常モード（高リスク注意）

【総合評価ランキング基準】
- 今節得点率・平均ST・モーター2連対率・展示タイム・コース適性を総合評価
- 6位艇は1着候補から弱く評価
- F持ち艇は大幅減点
- 今節得点率1位・2位は2着候補として重視

【出力形式】（必ずこの形式のみ・余計な説明不要）
荒れ指数: [数字]
逃げ率: [数字]%
モード: [通常/荒れ/スキップ]
1位 [数字]号艇 ◎
2位 [数字]号艇 ○
3位 [数字]号艇 ▲
4位 [数字]号艇 △
5位 [数字]号艇 ▽
6位 [数字]号艇 ×`;
}

// ============================================================
// AI出力パース
// ============================================================
function parseAiOutput(text){
  const areM = text.match(/荒れ指数[：:]\s*(\d+)/);
  const nigeM = text.match(/逃げ率[：:]\s*([\d.]+)/);
  const modeM = text.match(/モード[：:]\s*(通常|荒れ|スキップ)/);
  const areScore = areM ? parseInt(areM[1]) : 0;
  const nigeRate = nigeM ? parseFloat(nigeM[1]) : 0;
  const modeStr = modeM ? modeM[1] : '通常';
  const mode = modeStr==='荒れ' ? 'are' : modeStr==='スキップ' ? 'skip' : 'normal';

  const ranking=[];
  for(const line of text.split('\n')){
    const m=line.match(/(\d)位\s*(\d)号艇\s*([◎○▲△▽×])/);
    if(m) ranking.push({rank:parseInt(m[1]),boat:parseInt(m[2]),mark:m[3]});
  }
  ranking.sort((a,b)=>a.rank-b.rank);
  return {areScore, nigeRate, mode, ranking};
}

// ============================================================
// Gemini呼び出し
// ============================================================
async function callGemini(prompt){
  const key=getApiKey();
  if(!key) throw new Error('APIキーが未設定です');
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const body={
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.15,maxOutputTokens:512,thinkingConfig:{thinkingBudget:0}}
  };
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error('API Error: '+res.status);
  const json=await res.json();
  return json.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

// ============================================================
// 買い目生成（JS固定・AI介入なし）
// ============================================================
function buildBetsNormal(ranking){
  if(ranking.length<4) return [];
  const fst=ranking[0].boat;
  const sec=[ranking[1].boat,ranking[2].boat];
  const trd=[ranking[1].boat,ranking[2].boat,ranking[3].boat];
  const bets=[],seen=new Set();
  for(const s of sec){
    for(const t of trd){
      if(t===fst||t===s) continue;
      const key=`${fst}-${s}-${t}`;
      if(!seen.has(key)){seen.add(key);bets.push({val:key,type:'本線'});}
    }
  }
  return bets.slice(0,4);
}

function buildBetsAre(ranking,targetPts){
  if(ranking.length<5) return [];
  const [r1,r2,r3,r4,r5]=ranking;
  const a=r1.boat,b=r2.boat,c=r3.boat,d=r4.boat,e=r5.boat;
  const pool=[
    {val:`${a}-${b}-${c}`,type:'本線G1'},{val:`${a}-${b}-${d}`,type:'本線G1'},
    {val:`${b}-${a}-${c}`,type:'本線G1'},{val:`${b}-${a}-${d}`,type:'本線G1'},
    {val:`${c}-${d}-${a}`,type:'本線G3'},{val:`${c}-${d}-${b}`,type:'本線G3'},
    {val:`${d}-${c}-${a}`,type:'抑えG3'},{val:`${d}-${c}-${b}`,type:'抑えG3'},
    {val:`${c}-${a}-${d}`,type:'抑えG4'},{val:`${c}-${b}-${d}`,type:'抑えG4'},
    {val:`${d}-${a}-${c}`,type:'抑えG4'},{val:`${d}-${b}-${c}`,type:'抑えG4'},
    {val:`${b}-${e}-${a}`,type:'抑えG2'},{val:`${b}-${c}-${a}`,type:'抑えG2'},
    {val:`${b}-${e}-${c}`,type:'抑えG2'},
  ];
  const seen=new Set(),bets=[];
  for(const b2 of pool){
    if(bets.length>=targetPts) break;
    if(!seen.has(b2.val)){seen.add(b2.val);bets.push(b2);}
  }
  return bets;
}

// ============================================================
// 資金配分（100円単位）
// ============================================================
function recalcAlloc(){
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;
  const rows=document.querySelectorAll('#bet-tbody tr');
  if(!rows.length) return;

  const items=[];
  rows.forEach(row=>{
    const oddsInp=row.querySelector('.odds-inp');
    const confSel=row.querySelector('.conf-sel');
    items.push({odds:parseFloat(oddsInp?.value)||0, conf:parseInt(confSel?.value)||2});
  });

  let weights=[];
  if(allocMode==='equal'){
    const anyOdds=items.some(it=>it.odds>0);
    if(anyOdds){
      const avg=items.filter(it=>it.odds>0).reduce((s,it)=>s+(1/it.odds),0)/items.filter(it=>it.odds>0).length;
      weights=items.map(it=>it.odds>0?1/it.odds:avg);
    } else {
      weights=items.map(()=>1);
    }
  } else {
    weights=items.map(it=>it.conf);
  }

  const totalW=weights.reduce((s,w)=>s+w,0);
  let amounts=weights.map(w=>Math.floor(w/totalW*shikin/100)*100);
  const rem=shikin-amounts.reduce((s,a)=>s+a,0);
  if(amounts.length>0) amounts[0]+=rem;

  rows.forEach((row,i)=>{
    const amtCell=row.querySelector('.amt-cell');
    const retCell=row.querySelector('.ret-cell');
    const oddsInp=row.querySelector('.odds-inp');
    const odds=parseFloat(oddsInp?.value)||0;
    const amt=amounts[i]||0;
    if(amtCell) amtCell.textContent='¥'+amt.toLocaleString();
    if(retCell){
      if(odds>0){
        const ret=Math.floor(amt*odds/100)*100;
        const color=ret>=shikin?'var(--green)':'var(--muted)';
        retCell.innerHTML=`<span style="color:${color};">¥${ret.toLocaleString()}</span>`;
      } else {
        retCell.textContent='—';
      }
    }
  });

  const totalInvest=amounts.reduce((s,a)=>s+a,0);
  document.getElementById('sum-invest').textContent='¥'+totalInvest.toLocaleString();

  // 均等回収サマリー（オッズ入力済み買い目の最小回収）
  const rets=items.map((it,i)=>{
    if(it.odds<=0) return null;
    return Math.floor(amounts[i]*it.odds/100)*100;
  }).filter(r=>r!==null);

  if(rets.length){
    const minRet=Math.min(...rets);
    document.getElementById('sum-return').textContent='¥'+minRet.toLocaleString();
    const rate=totalInvest>0?Math.round(minRet/totalInvest*100):0;
    const rEl=document.getElementById('sum-rate');
    rEl.textContent=rate+'%';
    rEl.className='sum-val '+(rate>=100?'green':rate>=50?'gold':'red');
  } else {
    document.getElementById('sum-return').textContent='—';
    document.getElementById('sum-rate').textContent='—';
  }
}

function setAllocMode(mode){
  allocMode=mode;
  document.getElementById('alloc-equal').classList.toggle('active',mode==='equal');
  document.getElementById('alloc-conf').classList.toggle('active',mode==='conf');
  recalcAlloc();
}

// ============================================================
// 予想実行
// ============================================================
async function runYoso(){
  if(!getApiKey()){showToast('APIキーを設定してください');openKeyModal();return;}
  const data=document.getElementById('inp-data').value.trim();
  if(!data){showToast('データを入力してください');return;}
  const racenum=document.getElementById('inp-racenum').value||'?';
  const honme=document.getElementById('inp-honme').value;
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;

  document.getElementById('yoso-result').style.display='block';
  const rawEl=document.getElementById('ai-raw');
  rawEl.innerHTML='<span class="loading dot-anim">AI分析中</span>';
  document.getElementById('bet-tbody').innerHTML='';

  try{
    const aiText=await callGemini(buildPrompt(data));
    rawEl.textContent=aiText;

    const {areScore,nigeRate,mode,ranking}=parseAiOutput(aiText);

    if(mode==='skip'){
      document.getElementById('race-info-strip').innerHTML=`
        <span class="mode-badge mode-skip">⏭ スキップ推奨</span>
        <span class="info-chip">荒れ指数 <span>${areScore}点</span></span>
        <span class="info-chip">逃げ率 <span>${nigeRate}%</span></span>`;
      document.querySelector('.card:has(#bet-tbody)') && (document.getElementById('bet-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:12px;">スキップ推奨レースです</td></tr>');
      return;
    }

    if(!ranking.length){rawEl.textContent=aiText+'\n\n⚠️ランキング解析失敗。AI出力を確認してください。';return;}

    // オッズ自動抽出
    const oddsMap=extractOddsMap(data);

    // 買い目生成
    const betsRaw=mode==='are'?buildBetsAre(ranking,selectedBetCount):buildBetsNormal(ranking);

    // レース情報バッジ
    const modeLabel=mode==='are'?'⚡ 荒れモード':'🔒 通常モード';
    const modeCls=mode==='are'?'mode-are':'mode-normal';
    document.getElementById('race-info-strip').innerHTML=`
      <span class="mode-badge ${modeCls}">${modeLabel}</span>
      <span class="info-chip">荒れ指数 <span>${areScore}点</span></span>
      <span class="info-chip">逃げ率 <span>${nigeRate}%</span></span>
      <span class="info-chip">${racenum}R / ${honme}本目</span>
      <span class="info-chip">買い目 <span>${betsRaw.length}点</span></span>`;

    // テーブル描画
    const tbody=document.getElementById('bet-tbody');
    tbody.innerHTML='';
    for(const b of betsRaw){
      const autoOdds=oddsMap[b.val]||0;
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><span class="bet-val">${b.val}</span></td>
        <td><span class="bet-type">${b.type}</span></td>
        <td><input class="odds-inp" type="number" value="${autoOdds||''}" placeholder="倍率" step="0.1" min="0" oninput="recalcAlloc()"></td>
        <td><select class="conf-sel" onchange="recalcAlloc()">
          <option value="3">高</option>
          <option value="2" selected>中</option>
          <option value="1">低</option>
        </select></td>
        <td class="amt-cell">—</td>
        <td class="ret-cell">—</td>`;
      tbody.appendChild(tr);
    }

    currentCalcData={racenum,honme,nigeRate,areScore,mode,betcount:betsRaw.length,shikin,ranking,betsRaw};
    recalcAlloc();

  }catch(e){
    rawEl.textContent='エラー: '+e.message;
  }
}

function clearYoso(){
  ['inp-data','inp-chakuju','inp-payout-reg'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inp-racenum').value='';
  document.getElementById('yoso-result').style.display='none';
  currentCalcData=null;
}

// ============================================================
// 結果登録
// ============================================================
function saveResult(resultType){
  if(!currentCalcData){showToast('予想を実行してください');return;}
  const chakuju=document.getElementById('inp-chakuju').value.trim();
  const payout=parseInt(document.getElementById('inp-payout-reg').value)||0;

  const rows=document.querySelectorAll('#bet-tbody tr');
  const betsWithAmt=currentCalcData.betsRaw.map((b,i)=>{
    const amtCell=rows[i]?.querySelector('.amt-cell');
    const oddsInp=rows[i]?.querySelector('.odds-inp');
    const amt=parseInt((amtCell?.textContent||'0').replace(/[¥,]/g,''))||0;
    const odds=parseFloat(oddsInp?.value)||0;
    return{...b,amount:amt,odds};
  });
  const totalInvest=betsWithAmt.reduce((s,b)=>s+b.amount,0);

  const today=new Date();
  const dateStr=`${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

  const logs=getLogs();
  logs.push({
    id:Date.now(),date:dateStr,
    racenum:currentCalcData.racenum,
    honme:currentCalcData.honme,
    mode:currentCalcData.mode,
    nigeRate:currentCalcData.nigeRate,
    areScore:currentCalcData.areScore,
    betcount:currentCalcData.betcount,
    bets:betsWithAmt,
    invest:totalInvest||currentCalcData.shikin,
    result:resultType,
    chakuju,
    payout:resultType==='hit'?payout:0,
  });
  if(logs.length>100) logs.splice(0,logs.length-100);
  saveLogs(logs);
  showToast(resultType==='hit'?'✅ 的中登録！':resultType==='skip'?'⏭ スキップ登録':'❌ 外れ登録');
  clearYoso();
}

// ============================================================
// 払戻タブ
// ============================================================
function renderHaraiSel(){
  const logs=getLogs();
  const sel=document.getElementById('harai-sel');
  sel.innerHTML='<option value="">— 選択 —</option>';
  for(const l of logs){
    const opt=document.createElement('option');
    opt.value=l.id;
    opt.textContent=`${l.date} ${l.racenum}R [${l.result}] (${l.mode==='are'?'荒れ':'通常'})`;
    sel.appendChild(opt);
  }
}

function saveHarai(){
  const id=parseInt(document.getElementById('harai-sel').value);
  const amount=parseInt(document.getElementById('harai-amount').value);
  if(!id||isNaN(amount)){showToast('選択と金額を入力してください');return;}
  const logs=getLogs();
  const idx=logs.findIndex(l=>l.id===id);
  if(idx<0){showToast('ログが見つかりません');return;}
  logs[idx].payout=amount;logs[idx].result='hit';
  saveLogs(logs);
  showToast('払戻を登録しました');
  renderHaraiSel();
}

function parsePaste(){
  const text=document.getElementById('harai-paste').value;
  const m=text.match(/3連単[^\d]*([\d,]+)円/);
  if(m){
    document.getElementById('harai-amount').value=m[1].replace(/,/g,'');
    showToast('¥'+m[1]+' を検出しました');
  } else {
    showToast('払戻金額が検出できませんでした');
  }
}

// ============================================================
// 集い管理
// ============================================================
function renderTsudoi(){
  const logs=getLogs();
  const s=getSettings();
  const today=new Date();
  const todayStr=`${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  const todayLogs=logs.filter(l=>l.date===todayStr&&l.result!=='skip');
  const hitLogs=logs.filter(l=>l.result==='hit');
  const invLogs=logs.filter(l=>l.result!=='skip');
  const totalInvest=invLogs.reduce((s,l)=>s+(l.invest||0),0);
  const totalReturn=hitLogs.reduce((s,l)=>s+(l.payout||0),0);
  const rate=totalInvest>0?Math.round(totalReturn/totalInvest*100):0;

  document.getElementById('st-kaisu').textContent=`${todayLogs.length}/${s.maxrace||3}`;
  document.getElementById('st-teki').textContent=`${hitLogs.length}件`;
  document.getElementById('st-invest').textContent='¥'+totalInvest.toLocaleString();
  document.getElementById('st-return').textContent='¥'+totalReturn.toLocaleString();
  const rEl=document.getElementById('st-rate');
  rEl.textContent=totalInvest>0?rate+'%':'—';
  rEl.className='stat-val '+(rate>=100?'green':rate>=50?'gold':'red');
  const bar=document.getElementById('rate-bar');
  bar.style.width=Math.min(rate,100)+'%';
  if(rate>=100) bar.style.background='linear-gradient(90deg,var(--green),var(--gold2))';

  const byDate={};
  for(const l of logs){
    if(!byDate[l.date]) byDate[l.date]={invest:0,ret:0,hit:0,total:0};
    const d=byDate[l.date];
    if(l.result!=='skip'){d.invest+=l.invest||0;d.total++;}
    if(l.result==='hit'){d.ret+=l.payout||0;d.hit++;}
  }
  const dailyEl=document.getElementById('daily-list');
  const dates=Object.keys(byDate).sort().reverse();
  if(!dates.length){dailyEl.innerHTML='<p style="color:var(--muted);font-size:12px;text-align:center;padding:12px;">データなし</p>';return;}
  dailyEl.innerHTML=dates.map(dt=>{
    const d=byDate[dt];
    const r=d.invest>0?Math.round(d.ret/d.invest*100):0;
    return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span>${dt}</span>
      <span style="color:var(--muted);">${d.hit}/${d.total}件</span>
      <span style="color:${r>=100?'var(--green)':'var(--muted)'};">${r}%</span>
      <span style="color:var(--gold);">¥${d.ret.toLocaleString()}</span>
    </div>`;
  }).join('');
}

function saveSettings(){
  const maxrace=parseInt(document.getElementById('set-maxrace').value)||3;
  saveSettingsData({maxrace});
  showToast('設定保存しました');
}

function resetAll(){
  if(!confirm('全データをリセットしますか？')) return;
  localStorage.removeItem(STORE_KEY);
  renderTsudoi();
  showToast('リセットしました');
}

// ============================================================
// ログ一覧
// ============================================================
function renderLog(){
  const logs=getLogs().slice().reverse();
  const el=document.getElementById('log-list');
  const empty=document.getElementById('log-empty');
  if(!logs.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=logs.map(l=>{
    const bets=(l.bets||[]).map(b=>b.val).join(' ');
    const bc=l.result==='hit'?'badge-hit':l.result==='skip'?'badge-skip':'badge-miss';
    const bt=l.result==='hit'?'的中':l.result==='skip'?'SKIP':'外れ';
    const mLabel=l.mode==='are'?'⚡荒れ':'🔒通常';
    return`<div class="log-item">
      <div class="log-left">
        <div class="log-race">${l.date} ${l.racenum}R</div>
        <div class="log-meta">${mLabel} 荒れ${l.areScore||'?'}点 逃${l.nigeRate||'?'}% ${l.betcount||'?'}点買い</div>
        <div class="log-bets">${bets}</div>
      </div>
      <div class="log-right">
        ${l.result==='hit'?`<div class="log-payout">¥${(l.payout||0).toLocaleString()}</div>`:''}
        <div class="log-badge ${bc}">${bt}</div>
      </div>
    </div>`;
  }).join('');
}
