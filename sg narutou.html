<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡SG鳴門 集い専用エンジン</title>
<style>
  :root{--bg:#0a0a0f;--surface:#13131c;--surface2:#1c1c2e;--border:#2a2a40;--gold:#c9a84c;--gold2:#f0d080;--red:#e05050;--blue:#4a9eff;--green:#4caf7d;--text:#e8e8f0;--muted:#7070a0;--font:-apple-system,'Hiragino Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:40px;}
  .header{background:linear-gradient(135deg,#1a1a2e,#0f0f1a);border-bottom:1px solid var(--gold);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.05em;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .key-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 10px;border-radius:6px;-webkit-appearance:none;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:var(--muted);background:none;border:none;-webkit-appearance:none;border-bottom:2px solid transparent;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .page{display:none;padding:16px;}
  .page.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card-title{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:.08em;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
  input[type=text],input[type=number],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px 12px;border-radius:8px;-webkit-appearance:none;font-family:var(--font);margin-bottom:10px;}
  textarea{height:130px;resize:none;font-size:12px;}
  select{height:42px;}
  .btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;-webkit-appearance:none;margin-bottom:8px;letter-spacing:.05em;}
  .btn-gold{background:linear-gradient(135deg,#c9a84c,#f0d080);color:#0a0a0f;}
  .btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;border:none;-webkit-appearance:none;font-weight:600;margin-bottom:0;}
  .mode-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;}
  .mode-normal{background:#1a3a1a;color:var(--green);border:1px solid var(--green);}
  .mode-are{background:#3a1a1a;color:var(--red);border:1px solid var(--red);}
  .mode-skip{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .info-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--muted);}
  .info-chip span{color:var(--text);font-weight:700;}
  .score-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px;}
  .score-cell{background:var(--surface2);border-radius:6px;padding:6px 4px;text-align:center;}
  .score-cell .boat-no{font-size:11px;font-weight:700;margin-bottom:2px;}
  .score-cell .score-val{font-size:14px;font-weight:700;color:var(--gold);}
  .score-cell .score-label{font-size:9px;color:var(--muted);}
  .bet-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
  .bet-table th{font-size:10px;color:var(--muted);padding:5px 4px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
  .bet-table td{padding:8px 4px;border-bottom:1px solid var(--border);}
  .bet-table tr:last-child td{border-bottom:none;}
  .bet-val{font-weight:700;font-size:14px;white-space:nowrap;}
  .bet-type{font-size:10px;color:var(--muted);white-space:nowrap;}
  .odds-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:5px 6px;border-radius:6px;width:62px;margin-bottom:0;text-align:right;}
  .conf-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 6px;border-radius:6px;-webkit-appearance:none;width:46px;margin-bottom:0;}
  .amt-cell{font-weight:700;color:var(--gold);text-align:right;white-space:nowrap;}
  .ret-cell{font-size:12px;text-align:right;white-space:nowrap;}
  .alloc-row{display:flex;gap:6px;margin-bottom:10px;}
  .alloc-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .alloc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
  .sum-label{font-size:12px;color:var(--muted);}
  .sum-val{font-size:15px;font-weight:700;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .stat-item{background:var(--surface2);border-radius:8px;padding:10px 12px;text-align:center;}
  .stat-val{font-size:20px;font-weight:700;}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .green{color:var(--green)!important;}.red{color:var(--red)!important;}.gold{color:var(--gold)!important;}
  .rate-bar-wrap{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-top:6px;}
  .rate-bar{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,var(--green),var(--gold));}
  .log-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;}
  .log-left{flex:1;}.log-race{font-size:13px;font-weight:700;}.log-meta{font-size:10px;color:var(--muted);margin-top:2px;}.log-bets{font-size:11px;color:var(--muted);margin-top:3px;}
  .log-right{text-align:right;min-width:70px;}.log-payout{font-size:15px;font-weight:700;color:var(--gold);}
  .log-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;margin-top:4px;display:inline-block;}
  .badge-hit{background:#1a3a1a;color:var(--green);}.badge-miss{background:#3a1a1a;color:var(--red);}.badge-skip{background:var(--surface2);color:var(--muted);}
  .loading{color:var(--muted);text-align:center;padding:16px;}
  .dot-anim::after{content:'';animation:dots 1.2s infinite;}
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:'.'}}
  .divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .betcount-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .bc-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);-webkit-appearance:none;}
  .bc-btn.active{background:var(--surface);border-color:var(--gold);color:var(--gold);}
  .ai-output{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text);margin-bottom:10px;min-height:40px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;padding:20px;align-items:center;justify-content:center;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:360px;}
  .modal-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px;}
</style>
</head>
<body>
<div class="header">
  <div><div class="header-title">⚡ SG鳴門 集い専用</div><div class="header-sub">第36回 グランドチャンピオン 6/23〜28</div></div>
  <button class="key-btn" onclick="openKeyModal()">APIキー</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('yoso')">予想</button>
  <button class="tab" onclick="switchTab('harai')">払戻</button>
  <button class="tab" onclick="switchTab('tsudoi')">集い</button>
  <button class="tab" onclick="switchTab('log')">ログ</button>
</div>

<!-- 予想タブ -->
<div id="page-yoso" class="page active">
  <div class="card">
    <div class="card-title">📋 レース情報</div>
    <div class="row2">
      <div><label>レース番号</label><input type="number" id="inp-racenum" placeholder="6" min="1" max="12"></div>
      <div><label>本日の投入本目</label><select id="inp-honme"><option value="1">1本目</option><option value="2">2本目</option><option value="3">3本目</option></select></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📊 競艇日和データ（全文貼付け）</div>
    <textarea id="inp-data" placeholder="競艇日和のページ全体をコピー＆ペースト"></textarea>
    <div class="row2">
      <div><label>資金 (円)</label><input type="number" id="inp-shikin" value="3000" step="100"></div>
      <div>
        <label>買い目点数</label>
        <div class="betcount-row">
          <button class="bc-btn" onclick="setBetCount(4,this)">4</button>
          <button class="bc-btn" onclick="setBetCount(6,this)">6</button>
          <button class="bc-btn" onclick="setBetCount(8,this)">8</button>
          <button class="bc-btn active" onclick="setBetCount(12,this)">12</button>
          <button class="bc-btn" onclick="setBetCount(13,this)">13</button>
          <button class="bc-btn" onclick="setBetCount(16,this)">16</button>
        </div>
      </div>
    </div>
  </div>
  <button class="btn btn-gold" onclick="runYoso()">⚡ 予想実行</button>
  <button class="btn btn-ghost" onclick="clearYoso()">クリア</button>

  <div id="yoso-result" style="display:none;">
    <div class="card">
      <div class="card-title">📊 JSスコア計算結果</div>
      <div id="score-display"></div>
      <div id="mode-result" style="margin-top:8px;"></div>
      <hr class="divider">
      <label style="margin-bottom:8px;">モード選択</label>
      <div style="display:flex;gap:8px;">
        <button class="alloc-btn active" id="mode-btn-normal" onclick="setMode('normal')" style="flex:1;padding:10px;">🔒 通常</button>
        <button class="alloc-btn" id="mode-btn-are" onclick="setMode('are')" style="flex:1;padding:10px;">⚡ 荒れ</button>
        <button class="alloc-btn" id="mode-btn-skip" onclick="setMode('skip')" style="flex:1;padding:10px;">⏭ SKIP</button>
      </div>
      <button class="btn btn-gold" onclick="applyMode()" style="margin-top:8px;">買い目を生成</button>
    </div>
    <div id="bet-section" style="display:none;">
    <div class="card">
      <div class="card-title">🤖 AIランキング</div>
      <div id="ai-raw" class="ai-output"></div>
    </div>
    <div class="card">
      <div class="info-strip" id="race-info-strip"></div>
      <div class="card-title">🎯 買い目・資金配分</div>
      <div class="alloc-row">
        <button class="alloc-btn active" id="alloc-equal" onclick="setAllocMode('equal')">均等割</button>
        <button class="alloc-btn" id="alloc-equalret" onclick="setAllocMode('equalret')">均等回収</button>
        <button class="alloc-btn" id="alloc-conf" onclick="setAllocMode('conf')">自信度別</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="bet-table">
          <thead><tr><th>買い目</th><th>種別</th><th>オッズ</th><th>自信</th><th style="text-align:right;">金額</th><th style="text-align:right;">回収</th></tr></thead>
          <tbody id="bet-tbody"></tbody>
        </table>
      </div>
      <hr class="divider">
      <div class="sum-row"><span class="sum-label">合計投資</span><span class="sum-val gold" id="sum-invest">¥0</span></div>
      <div class="sum-row"><span class="sum-label">最小回収（1点的中）</span><span class="sum-val green" id="sum-return">—</span></div>
      <div class="sum-row"><span class="sum-label">回収率目安</span><span class="sum-val" id="sum-rate">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">💾 結果登録</div>
      <label>着順（1-2-3 形式）</label><input type="text" id="inp-chakuju" placeholder="例: 3-1-5">
      <label>払戻金額 (円)</label><input type="number" id="inp-payout-reg" placeholder="例: 15200">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gold btn-sm" style="flex:1;" onclick="saveResult('hit')">✅ 的中</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="saveResult('miss')">❌ 外れ</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="saveResult('skip')">⏭ SKIP</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">𝕏 X投稿サマリー</div>
      <div id="x-summary-preview" class="ai-output" style="min-height:80px;font-size:11px;"></div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="copyXSummary(false)">𝕏 サマリーのみ</button>
        <button class="btn btn-ghost btn-sm" style="flex:1;color:var(--gold);border-color:var(--gold);" onclick="copyXSummary(true)">𝕏 賭け金込み</button>
      </div>
    </div>
    </div><!-- /bet-section -->
  </div>
</div>

<!-- 払戻タブ -->
<div id="page-harai" class="page">
  <div class="card">
    <div class="card-title">💴 払戻登録</div>
    <label>対象レース</label><select id="harai-sel" style="margin-bottom:10px;"></select>
    <label>払戻金額 (円)</label><input type="number" id="harai-amount" placeholder="例: 18500">
    <button class="btn btn-gold" onclick="saveHarai()">登録</button>
  </div>
  <div class="card">
    <div class="card-title">📋 BMペースト</div>
    <textarea id="harai-paste" placeholder="boatrace.jpの払戻ページからコピーしたテキストを貼付け"></textarea>
    <button class="btn btn-ghost" onclick="parsePaste()">3連単を自動検出</button>
  </div>
</div>

<!-- 集いタブ -->
<div id="page-tsudoi" class="page">
  <div class="card">
    <div class="card-title">🏆 集い成績</div>
    <div class="stat-grid">
      <div class="stat-item"><div class="stat-val gold" id="st-kaisu">0/3</div><div class="stat-label">本日投入 / 上限</div></div>
      <div class="stat-item"><div class="stat-val" id="st-teki">0件</div><div class="stat-label">的中</div></div>
      <div class="stat-item"><div class="stat-val" id="st-invest">¥0</div><div class="stat-label">総投資</div></div>
      <div class="stat-item"><div class="stat-val gold" id="st-return">¥0</div><div class="stat-label">総回収</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:700;">回収率</span>
      <span style="font-size:22px;font-weight:700;" id="st-rate">—</span>
    </div>
    <div class="rate-bar-wrap"><div class="rate-bar" id="rate-bar" style="width:0%"></div></div>
  </div>
  <div class="card"><div class="card-title">📅 日別成績</div><div id="daily-list"></div></div>
  <div class="card">
    <div class="card-title">⚙️ 設定</div>
    <label>1日上限レース数</label>
    <select id="set-maxrace"><option value="3" selected>3レース（集いルール）</option><option value="2">2レース</option><option value="1">1レース</option></select>
    <button class="btn btn-ghost" onclick="saveSettings()">保存</button>
    <hr class="divider">
    <button class="btn btn-ghost" style="color:var(--red);border-color:var(--red);" onclick="resetAll()">⚠️ データリセット</button>
  </div>
</div>

<!-- ログタブ -->
<div id="page-log" class="page">
  <div id="log-list"></div>
  <p id="log-empty" style="text-align:center;color:var(--muted);padding:40px;font-size:13px;">ログなし</p>
</div>

<!-- APIキーモーダル -->
<div class="modal-wrap" id="key-modal">
  <div class="modal-box">
    <div class="modal-title">Gemini APIキー</div>
    <input type="text" id="modal-key-inp" placeholder="AIzaSy...">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-gold btn-sm" style="flex:1;" onclick="saveKey()">保存</button>
      <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="closeKeyModal()">キャンセル</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 定数
// ============================================================
const STORE_KEY='sg_narutou_v1';
const SETTINGS_KEY='sg_narutou_settings';
const GEMINI_KEY='kyotei_gemini_key';
let selectedBetCount=12;
let allocMode='equal';
let selectedMode='normal'; // ユーザー手動選択
let currentCalcData=null;
let currentParsedData=null; // パース済みデータ保持
let currentAreScores=null; // スコア保持

function getLogs(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch{return[];}}
function saveLogs(l){localStorage.setItem(STORE_KEY,JSON.stringify(l));}
function getSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{"maxrace":3}');}catch{return{maxrace:3};}}
function saveSettingsData(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}
function getApiKey(){return localStorage.getItem(GEMINI_KEY)||'';}

// ============================================================
// モード手動選択
// ============================================================
function setMode(mode){
  selectedMode=mode;
  ['normal','are','skip'].forEach(m=>{
    const el=document.getElementById('mode-btn-'+m);
    if(el) el.classList.toggle('active',m===mode);
  });
}

function applyMode(){
  if(!currentParsedData||!currentAreScores){showToast('先に予想実行してください');return;}
  if(selectedMode==='skip'){showToast('スキップ設定です');return;}
  generateBets(currentParsedData, currentAreScores, selectedMode);
}

function generateBets(d, areScores, mode){
  const racenum=document.getElementById('inp-racenum').value||'?';
  const honme=document.getElementById('inp-honme').value;
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;
  const oddsMap=extractOddsMap(document.getElementById('inp-data').value);
  const ranking=parseRanking(document.getElementById('ai-raw').textContent||'');
  if(!ranking.length){showToast('AIランキングがありません');return;}

  const betsRaw=mode==='are'?buildBetsAre(ranking,selectedBetCount):buildBetsNormal(ranking,selectedBetCount);
  const nigeRate=d.boats[0].atchiNige>0?d.boats[0].atchiNige:d.boats[0].nigerate6m;
  const{areIndex}=calcAreIndex(d);

  // バッジ更新
  const modeLabel=mode==='are'?'⚡ 荒れ':'🔒 通常';
  const modeCls=mode==='are'?'mode-are':'mode-normal';
  document.getElementById('race-info-strip').innerHTML=`
    <span class="mode-badge ${modeCls}" style="font-size:11px;padding:3px 10px;">${modeLabel}</span>
    <span class="info-chip">荒れ指数 <span>${areIndex}点</span></span>
    <span class="info-chip">逃げ率 <span>${nigeRate.toFixed(1)}%</span></span>
    <span class="info-chip">${racenum}R / ${honme}本目</span>
    <span class="info-chip">買い目 <span>${betsRaw.length}点</span></span>`;

  // テーブル描画
  const tbody=document.getElementById('bet-tbody');
  tbody.innerHTML='';
  for(const b of betsRaw){
    const autoOdds=oddsMap[b.val]||0;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span class="bet-val">${b.val}</span></td><td><span class="bet-type">${b.type}</span></td><td><input class="odds-inp" type="number" value="${autoOdds||''}" placeholder="倍率" step="0.1" min="0" oninput="recalcAlloc()"></td><td><select class="conf-sel" onchange="recalcAlloc()"><option value="3">高</option><option value="2" selected>中</option><option value="1">低</option></select></td><td class="amt-cell">—</td><td class="ret-cell">—</td>`;
    tbody.appendChild(tr);
  }

  document.getElementById('bet-section').style.display='block';
  currentCalcData={racenum,honme,nigeRate,areIndex,mode,betcount:betsRaw.length,shikin,ranking,betsRaw};
  recalcAlloc();
  updateXPreview();
}

function switchTab(name){
  ['yoso','harai','tsudoi','log'].forEach((n,i)=>document.querySelectorAll('.tab')[i].classList.toggle('active',n===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='tsudoi') renderTsudoi();
  if(name==='log') renderLog();
  if(name==='harai') renderHaraiSel();
}

// データパース（競艇日和テキスト → 構造化）
// ============================================================
function parseData(text){
  const d={boats:[]};
  for(let i=1;i<=6;i++) d.boats.push({no:i,nigerate6m:0,nigerate1y:0,atchiNige:0,sashi6m:0,makuri6m:0,makurisashi6m:0,sg1chakuRate:0,sg1chakuCount:0,kinsetsu6m:0,motor2ren:0,sessonPt:0,sessonRaces:0,sessonAvgST:0,sgAvgST:0,atchiAvgST:0,tenji:0,avgTenji:0,syukai:0,syukaiFoot:0,avgSyukaiFoot:0,directST:0,isExhibitF:false,isF:false});

  // 逃げ率（直近6ヶ月・当地） - 枠別勝率セクション
  const nigeSection=text.match(/直近 6ヶ月\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)/);
  if(nigeSection){
    [1,3,5,7,9,11].forEach((idx,i)=>{d.boats[i].nigerate6m=parseFloat(nigeSection[idx])||0;});
  }
  // 当地逃げ率
  const atchiSection=text.match(/当地\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)/);
  if(atchiSection){
    [1,3,5].forEach((idx,i)=>{d.boats[i].atchiNige=parseFloat(atchiSection[idx])||0;});
  }

  // 決まり手（直近6ヶ月）- 2ステップパーサー（kyotei_are.html準拠）
  (function(){
    var lines2=text.split('\n');
    var inK6M=false,nextIs6M=false,kType='';
    function kv6(line){
      var cols=line.split('\t'),out=[];
      for(var ci=0;ci<cols.length&&out.length<6;ci++){
        var v=(cols[ci]||'').trim().replace(/%/,'');
        var n=parseFloat(v);
        out.push(isNaN(n)?null:n);
      }
      while(out.length<6)out.push(null);
      return out;
    }
    for(var li=0;li<lines2.length;li++){
      var ln=lines2[li].trim();
      var lb=(ln.split('\t')[0]||'').trim().replace(/\s+/g,'');
      if(lb==='決まり手'){inK6M=false;nextIs6M=true;kType='';continue;}
      if(nextIs6M&&(ln.includes('直近6ヶ月')||ln.includes('直近 6ヶ月'))){inK6M=true;nextIs6M=false;continue;}
      if(!inK6M)continue;
      if(ln.includes('直近1年')||ln.includes('直近 1年')||ln.includes('直近3ヶ月')){inK6M=false;kType='';continue;}
      var fullLb=ln.split('\t').join('');
      if(fullLb.includes('差し')&&!fullLb.includes('捲り')){kType='sashi';continue;}
      if(fullLb.includes('捲り')&&!fullLb.includes('差し')){kType='makuri';continue;}
      if(fullLb.includes('捲り')&&fullLb.includes('差し')){kType='makuriSashi';continue;}
      if(kType){
        var kvals=kv6(ln);
        for(var j=0;j<6;j++){
          if(kvals[j]===null)continue;
          if(kType==='sashi')d.boats[j].sashi6m=kvals[j];
          else if(kType==='makuri')d.boats[j].makuri6m=kvals[j];
          else if(kType==='makuriSashi')d.boats[j].makurisashi6m=kvals[j];
        }
        kType='';
      }
    }
  })();

  // SG/G1 1着率
  const sgSection=text.match(/SG\/G1\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)\s+([\d.]+)%\s*\((\d+)\)/);
  if(sgSection){
    [1,3,5,7,9,11].forEach((idx,i)=>{
      d.boats[i].sg1chakuRate=parseFloat(sgSection[idx])||0;
      d.boats[i].sg1chakuCount=parseInt(sgSection[idx+1])||0;
    });
  }

  // 直近6ヶ月勝率
  const kinsetsuSection=text.match(/直近 6ヵ月\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)\s+([\d.]+)\s*\(\d+\)/);
  if(kinsetsuSection){
    for(let i=0;i<6;i++) d.boats[i].kinsetsu6m=parseFloat(kinsetsuSection[i+1])||0;
  }

  // モーター2連対率
  const motorSection=text.match(/モーター[\s\S]*?2連対率\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%\s+([\d.]+)%/);
  if(motorSection){
    for(let i=0;i<6;i++) d.boats[i].motor2ren=parseFloat(motorSection[i+1])||0;
  }

  // 今節得点率（行頭マッチ）
  const sessonSection=text.match(/^得点率[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)/m);
  if(sessonSection){
    for(let i=0;i<6;i++) d.boats[i].sessonPt=parseFloat(sessonSection[i+1])||0;
  }

  // 今節平均ST（今節成績セクション内）
  const sessonStSection=text.match(/今節成績[\s\S]*?平均ST[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)/m);
  if(sessonStSection){
    for(let i=0;i<6;i++) d.boats[i].sessonAvgST=parseFloat(sessonStSection[i+1])||0;

  // SG/G1平均ST（基本情報セクション内）
  const sgStSection=text.match(/基本情報[\s\S]*?SG\/G1[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)[\t ]([\d.]+)/m);
  if(sgStSection){
    for(let i=0;i<6;i++) d.boats[i].sgAvgST=parseFloat(sgStSection[i+1])||0;
  }

  // 当地平均ST（基本情報 > 当地行、数値のみ）
  const atchiStSection=text.match(/基本情報[\s\S]*?\n当地[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)[\t ]([\d.\-]+)/m);
  if(atchiStSection){
    for(let i=0;i<6;i++){
      const v=atchiStSection[i+1];
      d.boats[i].atchiAvgST=(v&&v!=='-')?parseFloat(v)||0:0;
    }
  }
  }

  // 直前展示タイム
  const tenjiSection=text.match(/(?:^|\n)展示\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(tenjiSection){
    for(let i=0;i<6;i++) d.boats[i].tenji=parseFloat(tenjiSection[i+1])||0;
  }
  // 今節平均展示タイム（直前なければ補完）
  const avgTenjiSection=text.match(/^平均展示\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(avgTenjiSection){
    for(let i=0;i<6;i++) d.boats[i].avgTenji=parseFloat(avgTenjiSection[i+1])||0;
  }
  // 直前周り足（大きいほど良い）
  const syukaiFootSection=text.match(/(?:^|\n)周り足\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(syukaiFootSection){
    for(let i=0;i<6;i++) d.boats[i].syukaiFoot=parseFloat(syukaiFootSection[i+1])||0;
  }
  // 周回タイム（表示用）
  const syukaiTimeSection=text.match(/(?:^|\n)周回\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(syukaiTimeSection){
    for(let i=0;i<6;i++) d.boats[i].syukai=parseFloat(syukaiTimeSection[i+1])||0;
  }
  // 今節平均周り足（直前なければ補完）
  const avgSyukaiFootSection=text.match(/^(?:平均周足|平均周り足)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/m);
  if(avgSyukaiFootSection){
    for(let i=0;i<6;i++) d.boats[i].avgSyukaiFoot=parseFloat(avgSyukaiFootSection[i+1])||0;
  }

  // 直前ST・展示Fフラグ（展示でFっただけ＝STスコアなし、ペナルティなし）
  const stSection=text.match(/ST\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)\s+([\w.]+)/);
  if(stSection){
    for(let i=0;i<6;i++){
      const stStr=stSection[i+1];
      d.boats[i].isExhibitF=stStr.startsWith('F'); // 展示Fのみ
      d.boats[i].directST=parseFloat(stStr.replace('F',''))||0.20;
    }
  }

  // 今節走数（早見から推定）
  const hayamiSection=text.match(/早見\s+([\dR-]+)\s+([\dR-]+)\s+([\dR-]+)\s+([\dR-]+)\s+([\dR-]+)\s+([\dR-]+)/);
  if(hayamiSection){
    // 早見の値から今節走数を推定（簡易版）
    for(let i=0;i<6;i++) d.boats[i].sessonRaces=hayamiSection[i+1]==='-'?0:parseInt(hayamiSection[i+1])||0;
  }

  // F休み（未消化F＝ペナルティ対象）
  const fRestSection=text.match(/F休み\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)\s+([\-\d\/～]+)/);
  if(fRestSection){
    for(let i=0;i<6;i++){
      d.boats[i].isF=(fRestSection[i+1]!=='-');
    }
  }

  return d;
}

// ============================================================
// 荒れスコア計算（kyotei_are.html完全準拠）
// ============================================================
function calcAreScore(d){
  const boats=d.boats;

  // 展示ランク（タイム小さいほど良い）: 直前||平均展示
  const exVals=boats.map(b=>b.tenji||b.avgTenji||99);
  const exOrder=[...boats].sort((a,b)=>(a.tenji||a.avgTenji||99)-(b.tenji||b.avgTenji||99));
  // 周回足ランク（スコア大きいほど良い）: 直前||平均周足
  const lapOrder=[...boats].sort((a,b)=>(b.syukaiFoot||b.avgSyukaiFoot||0)-(a.syukaiFoot||a.avgSyukaiFoot||0));
  boats.forEach(b=>{
    b.exRank=exOrder.findIndex(x=>x.no===b.no);
    b.lapRank=lapOrder.findIndex(x=>x.no===b.no);
  });

  // 合成ST計算（節間平均ST × 0.7 ＋ コース別平均ST × 0.3）
  // 今節平均STあり → 節間主軸 / なし（初日等）→ コース別のみ
  // コース別優先順: SG/G1 → 当地 → フォールバック0.18
  boats.forEach(b=>{
    const courseST=b.sgAvgST||b.atchiAvgST||0.18;
    b.compositeST=b.sessonAvgST>0
      ? b.sessonAvgST*0.7+courseST*0.3
      : courseST;
  });
  const stVals=boats.map(b=>b.compositeST).filter(v=>v>0);
  const stMin=stVals.length?Math.min(...stVals):0.10;
  const stMax=stVals.length?Math.max(...stVals):0.25;

  // 今節得点率正規化
  const tokuMax=Math.max(...boats.map(b=>b.sessonPt))||1;

  // モーター2連対率正規化
  const motorMax=Math.max(...boats.map(b=>b.motor2ren))||1;

  // 逃げ率（1号艇）
  const nigeRate1=d.boats[0].atchiNige>0?d.boats[0].atchiNige:d.boats[0].nigerate6m;

  const scores=boats.map(b=>{
    let s=0;

    // ① 攻撃力（差し+捲り+捲り差し）×0.4（cap無し）
    const atk=(b.sashi6m+b.makuri6m+b.makurisashi6m*0.4);
    s+=atk*0.4;

    // ② 展示機力ランク ×3 max15pt（rank0=15pt rank5=0pt）
    if(b.exRank>=0) s+=(5-b.exRank)*3;

    // ③ 周回機力ランク ×3 max15pt
    if(b.lapRank>=0) s+=(5-b.lapRank)*3;

    // ④ 合成ST max15pt（節間×0.7＋コース別×0.3、相対化）
    const stPt=(stMax>stMin)?(stMax-b.compositeST)/(stMax-stMin)*15:0;
    s+=stPt;

    // ⑤ 今節得点率 max15pt（相対化）
    s+=(b.sessonPt||0)/tokuMax*15;

    // ⑥ モーター2連対率 max10pt（相対化）
    if(motorMax>0) s+=(b.motor2ren||0)/motorMax*10;

    // ⑦ 1号艇評価（逃げ率に応じてボーナス/ペナルティ）
    if(b.no===1){
      if(nigeRate1>=70) s+=10;       // 逃げ率70%以上 → 大きくボーナス
      else if(nigeRate1>=60) s+=5;   // 60%以上 → ボーナス
      else if(nigeRate1>=50) s+=0;   // 50%以上 → 現状維持
      else s-=10;                     // 50%未満 → ペナルティ（-15→-10に緩和）
    }

    // ⑧ 未消化Fペナルティ -10pt（F休み持ち艇のみ、-15→-10に緩和）
    if(b.isF) s-=10;

    return{no:b.no, raw:Math.max(0,s), tenji:b.tenji, syukai:b.syukai,
      _atk:atk*0.4, _ex:(b.exRank>=0?(5-b.exRank)*3:0),
      _lap:(b.lapRank>=0?(5-b.lapRank)*3:0),
      _st:stPt,
      _toku:(b.sessonPt||0)/tokuMax*15,
      _motor:(b.motor2ren||0)/motorMax*10,
      _pen1:(b.no===1&&nigeRate1<50?-15:0),
      _penF:(b.isF?-15:0)};
  });

  return scores.sort((a,b)=>b.raw-a.raw);
}

// ============================================================
// 荒れ指数計算（1号艇視点・JSで完結）
// ============================================================
function calcNigeRate(d){
  const b1=d.boats[0];
  // 当地10走以上なら当地優先
  return b1.atchiNige>0?b1.atchiNige:b1.nigerate6m;
}

function calcAreIndex(d){
  const nigeRate=calcNigeRate(d);
  let score=0;

  // 1. 1号艇逃げ率
  if(nigeRate<50) score+=5;
  else if(nigeRate<65) score+=3;
  else score+=1;

  // 2. 外コース(4〜6)攻撃力
  const outerAtk=d.boats.slice(3).reduce((s,b)=>s+(b.sashi6m+b.makuri6m+b.makurisashi6m*0.4),0)/3;
  if(outerAtk>30) score+=4;
  else if(outerAtk>15) score+=2;

  // 3. モーター格差
  const motors=d.boats.map(b=>b.motor2ren).filter(v=>v>0);
  if(motors.length>1){
    const gap=Math.max(...motors)-Math.min(...motors);
    if(gap>20) score+=3;
    else if(gap>10) score+=1;
  }

  // 4. F持ち艇
  if(d.boats.some(b=>b.isF)) score+=2;

  // 5. 鳴門SGボーナス
  score+=3;

  // 6. 1コース実力補正（マイナス）
  const b1=d.boats[0];
  // 今節走数で判断（sessonRaces>2なら今節得点率、そうでなければキャリア）
  if(b1.sessonRaces>2){
    if(b1.sessonPt>=7) score-=4;
    else if(b1.sessonPt>=5) score-=2;
  } else {
    if(b1.sg1chakuRate>=50&&b1.kinsetsu6m>=7.5) score-=4;
    else if(b1.sg1chakuRate>=40||b1.kinsetsu6m>=7.0) score-=2;
  }
  if(b1.motor2ren>=40) score-=2;
  if(b1.atchiNige>=60) score-=1;

  return{areIndex:Math.max(0,score), nigeRate};
}

// ============================================================
// モード判定（JSで確定）
// ============================================================
function judgeMode(areIndex, nigeRate){
  if(nigeRate>=60) return 'normal';
  if(areIndex>=8&&areIndex<=11) return 'are';
  if(areIndex>=4&&areIndex<=7) return 'skip';
  if(areIndex>=12) return 'normal';
  return 'normal';
}

// ============================================================
// オッズ自動抽出
// ============================================================
function extractOddsMap(text){
  const map={};
  const oddsSection=text.match(/=== オッズ ===([\s\S]*?)(?:===|$)/);
  if(!oddsSection) return map;
  const rawLines=oddsSection[1].split('\n').map(l=>l.replace(/\t/g,' ').trim()).filter(l=>l);
  let f=0,secOrder=[],blockLines=[];
  const flushBlock=()=>{
    for(const bl of blockLines){
      const t=bl.split(/\s+/).filter(x=>x&&/^[\d.]+$/.test(x));
      if(t.length===secOrder.length*2){
        for(let col=0;col<secOrder.length;col++){
          const trd=parseInt(t[col*2]),odds=parseFloat(t[col*2+1]);
          if(trd>=1&&trd<=6&&trd!==f&&trd!==secOrder[col]&&odds>0){
            const key=`${f}-${secOrder[col]}-${trd}`;
            if(!map[key]) map[key]=odds;
          }
        }
      }
    }
    blockLines=[];
  };
  for(const line of rawLines){
    const hm=line.match(/^([1-6])\s+[^\d]/);
    if(hm){flushBlock();f=parseInt(hm[1]);secOrder=[];continue;}
    if(!f||/合成|2単/.test(line)) continue;
    const tokens=line.split(/\s+/).filter(t=>t&&/^[\d.]+$/.test(t));
    if(!tokens.length) continue;
    if(!secOrder.length){
      for(let i=0;i+2<tokens.length;i+=3){
        const s=parseInt(tokens[i]),r=parseInt(tokens[i+1]),o=parseFloat(tokens[i+2]);
        if(s>=1&&s<=6&&s!==f&&r>=1&&r<=6&&r!==f&&r!==s&&o>0){
          if(!secOrder.includes(s)) secOrder.push(s);
          const key=`${f}-${s}-${r}`;
          if(!map[key]) map[key]=o;
        }
      }
    } else {
      blockLines.push(line);
    }
  }
  flushBlock();
  return map;
}

async function callGemini(prompt){
  const key=getApiKey();
  if(!key) throw new Error('APIキーが未設定です');
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const body={contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.15,maxOutputTokens:256,thinkingConfig:{thinkingBudget:0}}};
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error('API Error: '+res.status);
  const json=await res.json();
  return json.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

}

function parseRanking(text){
  const r=[];
  for(const line of text.split('\n')){
    const m=line.match(/(\d)位\s*(\d)号艇\s*([◎○▲△▽×])/);
    if(m) r.push({rank:parseInt(m[1]),boat:parseInt(m[2]),mark:m[3]});
  }
  return r.sort((a,b)=>a.rank-b.rank);
}

function buildBetsNormal(ranking,pts){
  if(ranking.length<4) return [];
  const p=pts||4;
  const fst=ranking[0].boat;
  const sec=[ranking[1].boat,ranking[2].boat];
  const trd=[ranking[1].boat,ranking[2].boat,ranking[3].boat,ranking[4]?ranking[4].boat:null].filter(Boolean);
  const pool=[],seen=new Set();
  // 本線: 1着固定
  for(const s of sec) for(const t of trd){
    if(t===fst||t===s) continue;
    const key=`${fst}-${s}-${t}`;
    if(!seen.has(key)){seen.add(key);pool.push({val:key,type:'本線'});}
  }
  // 点数が足りない場合: ○頭の抑えを追加
  if(p>pool.length && ranking.length>=3){
    const b=ranking[1].boat,c=ranking[2].boat;
    const d=ranking[3]?ranking[3].boat:null;
    const extras=[
      `${b}-${fst}-${c}`,`${b}-${c}-${fst}`,
      d?`${fst}-${d}-${sec[0]}`:null,d?`${fst}-${d}-${sec[1]}`:null,
      d?`${b}-${fst}-${d}`:null,d?`${b}-${d}-${fst}`:null,
    ].filter(Boolean);
    for(const k of extras){
      if(!seen.has(k)){seen.add(k);pool.push({val:k,type:'抑え'});}
    }
  }
  return pool.slice(0,p);
}

function buildBetsAre(ranking,pts){
  if(ranking.length<5) return [];
  const [r1,r2,r3,r4,r5]=ranking;
  const a=r1.boat,b=r2.boat,c=r3.boat,d=r4.boat,e=r5.boat;
  // 引き継ぎノート準拠: ◎=a ○=b ▲=c △=d ▽=e
  const pool=[
    {val:`${a}-${b}-${c}`,type:'本線G1'},{val:`${a}-${b}-${e}`,type:'本線G1'},
    {val:`${b}-${a}-${c}`,type:'本線G1'},{val:`${b}-${a}-${e}`,type:'本線G1'},
    {val:`${c}-${d}-${a}`,type:'本線G3'},{val:`${c}-${d}-${b}`,type:'本線G3'},
    {val:`${d}-${c}-${a}`,type:'抑えG3'},{val:`${d}-${c}-${b}`,type:'抑えG3'},
    {val:`${c}-${a}-${d}`,type:'抑えG4'},{val:`${c}-${b}-${d}`,type:'抑えG4'},
    {val:`${d}-${a}-${c}`,type:'抑えG4'},{val:`${d}-${b}-${c}`,type:'抑えG4'},
    {val:`${b}-${e}-${a}`,type:'抑えG2'},{val:`${b}-${c}-${a}`,type:'抑えG2'},
    {val:`${b}-${c}-${e}`,type:'抑えG2'},{val:`${b}-${e}-${c}`,type:'抑えG2'},
  ];
  const seen=new Set(),bets=[];
  for(const b2 of pool){
    if(bets.length>=pts) break;
    if(!seen.has(b2.val)){seen.add(b2.val);bets.push(b2);}
  }
  return bets;
}

// 資金配分（100円単位・最低100円保証）
// ============================================================
function recalcAlloc(){
  const shikin=parseInt(document.getElementById('inp-shikin').value)||3000;
  const rows=document.querySelectorAll('#bet-tbody tr');
  if(!rows.length) return;
  const items=[];
  rows.forEach(row=>{
    const oi=row.querySelector('.odds-inp'),cs=row.querySelector('.conf-sel');
    items.push({odds:parseFloat(oi?.value)||0,conf:parseInt(cs?.value)||2});
  });
  let weights=[];
  if(allocMode==='equal'){
    weights=items.map(()=>1);
  } else if(allocMode==='equalret'){
    const anyOdds=items.some(it=>it.odds>0);
    if(anyOdds){
      const avg=items.filter(it=>it.odds>0).reduce((s,it)=>s+(1/it.odds),0)/Math.max(1,items.filter(it=>it.odds>0).length);
      weights=items.map(it=>it.odds>0?1/it.odds:avg);
    } else weights=items.map(()=>1);
  } else {
    weights=items.map(it=>it.conf);
  }
  const totalW=weights.reduce((s,w)=>s+w,0);
  let amounts=weights.map(w=>Math.max(100,Math.floor(w/totalW*shikin/100)*100));
  let tot=amounts.reduce((s,a)=>s+a,0);
  // 超過分を末尾から削る（最低100円確保）
  for(let i=amounts.length-1;i>=0&&tot>shikin;i--){
    const cut=Math.min(amounts[i]-100,Math.ceil((tot-shikin)/100)*100);
    if(cut>0){amounts[i]-=cut;tot-=cut;}
  }
  const rem=shikin-amounts.reduce((s,a)=>s+a,0);
  if(rem>0&&amounts.length>0) amounts[0]+=rem;

  rows.forEach((row,i)=>{
    const amtCell=row.querySelector('.amt-cell'),retCell=row.querySelector('.ret-cell');
    const odds=parseFloat(row.querySelector('.odds-inp')?.value)||0;
    const amt=amounts[i]||0;
    if(amtCell) amtCell.textContent='¥'+amt.toLocaleString();
    if(retCell){
      if(odds>0){
        const ret=Math.floor(amt*odds/100)*100;
        const color=ret>=shikin?'var(--green)':'var(--muted)';
        retCell.innerHTML=`<span style="color:${color};">¥${ret.toLocaleString()}</span>`;
      } else retCell.textContent='—';
    }
  });

  const totalInvest=amounts.reduce((s,a)=>s+a,0);
  document.getElementById('sum-invest').textContent='¥'+totalInvest.toLocaleString();
  const rets=items.map((it,i)=>it.odds>0?Math.floor(amounts[i]*it.odds/100)*100:null).filter(r=>r!==null);
  if(rets.length){
    const minRet=Math.min(...rets);
    document.getElementById('sum-return').textContent='¥'+minRet.toLocaleString();
    const rate=totalInvest>0?Math.round(minRet/totalInvest*100):0;
    const rEl=document.getElementById('sum-rate');
    rEl.textContent=rate+'%';
    rEl.className='sum-val '+(rate>=100?'green':rate>=50?'gold':'red');
  } else {
    document.getElementById('sum-return').textContent='—';
    document.getElementById('sum-rate').textContent='—';
  }
}

function setAllocMode(mode){
  allocMode=mode;
  ['alloc-equal','alloc-equalret','alloc-conf'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  const id=mode==='equal'?'alloc-equal':mode==='equalret'?'alloc-equalret':'alloc-conf';
  const el=document.getElementById(id);if(el)el.classList.add('active');
  recalcAlloc();
}

// ============================================================
// Xサマリー生成
// ============================================================
// 買い目を圧縮: 同じ1着-2着でまとめ、さらに同じ1着-3着もまとめる
// 例: 4-1-6/4-1-2 → 4-1-62
//     6-4-5/6-1-5 → 6-41-5
function compressBetsSG(bets){
  const vals=bets.map(b=>b.val);

  // Step1: 1着-2着でグループ化（3着をまとめる）
  const g12={};
  for(const v of vals){
    const p=v.split('-');
    if(p.length!==3) continue;
    const key=p[0]+'-'+p[1];
    if(!g12[key]) g12[key]=[];
    if(!g12[key].includes(p[2])) g12[key].push(p[2]);
  }

  // Step2: 展開して1着-3着でグループ化（2着をまとめる）
  // まず1着-2着圧縮を作る
  const pass1=Object.entries(g12).map(([key,thirds])=>({
    str:key+'-'+thirds.join(''),
    first:key.split('-')[0],
    second:key.split('-')[1],
    thirds
  }));

  // 同じ1着で3着が同じものを2着でまとめる
  const g13={};
  for(const v of vals){
    const p=v.split('-');
    if(p.length!==3) continue;
    const key=p[0]+'-'+p[2];
    if(!g13[key]) g13[key]=[];
    if(!g13[key].includes(p[1])) g13[key].push(p[1]);
  }

  // どちらの圧縮が短いか比較して短い方を採用
  // 方針: まず1着-2着でグループ化、結果を文字数比較
  // 3着・2着を番号若い順にソート
  const result1=Object.entries(g12).map(([key,thirds])=>key+'-'+thirds.slice().sort((a,b)=>parseInt(a)-parseInt(b)).join('')).join('/');

  // 1着-3着グループ化（2着を番号若い順）
  const result2=Object.entries(g13).map(([key,seconds])=>{
    const p=key.split('-');
    return p[0]+'-'+seconds.slice().sort((a,b)=>parseInt(a)-parseInt(b)).join('')+'-'+p[1];
  }).join('/');

  return result1.length<=result2.length?result1:result2;
}

function buildXSummary(withAmount){
  if(!currentCalcData) return '';
  const racenum=currentCalcData.racenum||'?';
  const ranking=currentCalcData.ranking||[];
  const betsRaw=currentCalcData.betsRaw||[];

  // 評価順: ◎>○>▲>△>▽>× を号艇番号で表示
  // 例: 4>1>6>5>3>2
  const hyokaOrder=ranking.map(r=>r.boat).join('>');

  // ◎艇の選手名（苗字）はAI出力から取れないのでシンプルに号艇で
  const maruBoat=ranking[0]?.boat;
  const circled=['❶','❷','❸','❹','❺','❻'];
  const maruStr=maruBoat?circled[maruBoat-1]:'◎';

  // 本線/抑えに分類
  const honsen=betsRaw.filter(b=>b.type.includes('G1')||b.type==='本線');
  const osaee=betsRaw.filter(b=>!b.type.includes('G1')&&b.type!=='本線');

  // 賭け金込みの場合は各買い目に金額追加
  const getRealBets=(arr)=>{
    if(!withAmount) return arr;
    const rows=document.querySelectorAll('#bet-tbody tr');
    return arr.map(b=>{
      const rowIdx=betsRaw.indexOf(b);
      const amtCell=rows[rowIdx]?.querySelector('.amt-cell');
      const amt=parseInt((amtCell?.textContent||'0').replace(/[¥,]/g,''))||0;
      return{...b,amount:amt};
    });
  };

  const fmtBets=(arr)=>{
    if(withAmount){
      // 金額込みは1点ずつ列挙
      return getRealBets(arr).map(b=>`${b.val}(¥${(b.amount||0).toLocaleString()})`).join('/');
    }
    // 圧縮表示
    return compressBetsSG(arr);
  };

  const lines=[
    `鳴門${racenum}R`,
    ``,
    `${maruStr}の軸で勝負。`,
    `${hyokaOrder}`,
    ``,
    `本線　${fmtBets(honsen)}`,
  ];
  if(osaee.length) lines.push(`抑え　${fmtBets(osaee)}`);
  lines.push(``, `G.`);

  return lines.join('\n');
}

function copyXSummary(withAmount){

    showToast(withAmount?'𝕏 賭け金込みコピー！':'𝕏 サマリーコピー！');
  }).catch(()=>{
    // フォールバック

    document.body.removeChild(ta);

  });
}

  rEl.textContent=totalInvest>0?rate+'%':'—';
  rEl.className='stat-val '+(rate>=100?'green':rate>=50?'gold':'red');
  document.getElementById('rate-bar').style.width=Math.min(rate,100)+'%';
  const byDate={};
  for(const l of logs){
    if(!byDate[l.date]) byDate[l.date]={invest:0,ret:0,hit:0,total:0};
    const dd=byDate[l.date];
    if(l.result!=='skip'){dd.invest+=l.invest||0;dd.total++;}
    if(l.result==='hit'){dd.ret+=l.payout||0;dd.hit++;}
  }
  const dailyEl=document.getElementById('daily-list');
  const dates=Object.keys(byDate).sort().reverse();
  if(!dates.length){dailyEl.innerHTML='<p style="color:var(--muted);font-size:12px;text-align:center;padding:12px;">データなし</p>';return;}
  dailyEl.innerHTML=dates.map(dt=>{
    const dd=byDate[dt],r=dd.invest>0?Math.round(dd.ret/dd.invest*100):0;
    return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;"><span>${dt}</span><span style="color:var(--muted);">${dd.hit}/${dd.total}件</span><span style="color:${r>=100?'var(--green)':'var(--muted)'};">${r}%</span><span style="color:var(--gold);">¥${dd.ret.toLocaleString()}</span></div>`;
  }).join('');
}
function saveSettings(){saveSettingsData({maxrace:parseInt(document.getElementById('set-maxrace').value)||3});showToast('設定保存しました');}
function resetAll(){if(!confirm('全データをリセットしますか？')) return;localStorage.removeItem(STORE_KEY);renderTsudoi();showToast('リセットしました');}

// ============================================================
// ログ
// ============================================================
function renderLog(){
  const logs=getLogs().slice().reverse();
  const el=document.getElementById('log-list'),empty=document.getElementById('log-empty');
  if(!logs.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=logs.map(l=>{
    const bets=(l.bets||[]).map(b=>b.val).join(' ');
    const bc=l.result==='hit'?'badge-hit':l.result==='skip'?'badge-skip':'badge-miss';
    const bt=l.result==='hit'?'的中':l.result==='skip'?'SKIP':'外れ';
    return`<div class="log-item"><div class="log-left"><div class="log-race">${l.date} ${l.racenum}R</div><div class="log-meta">${l.mode==='are'?'⚡荒れ':'🔒通常'} 荒れ${l.areIndex||'?'}点 逃${l.nigeRate||'?'}% ${l.betcount||'?'}点</div><div class="log-bets">${bets}</div></div><div class="log-right">${l.result==='hit'?`<div class="log-payout">¥${(l.payout||0).toLocaleString()}</div>`:''}<div class="log-badge ${bc}">${bt}</div></div></div>`;
  }).join('');
}

// ============================================================
// APIキー・トースト
// ============================================================
function openKeyModal(){document.getElementById('modal-key-inp').value=getApiKey();document.getElementById('key-modal').style.display='flex';}
function closeKeyModal(){document.getElementById('key-modal').style.display='none';}
function saveKey(){const k=document.getElementById('modal-key-inp').value.trim();if(k){localStorage.setItem(GEMINI_KEY,k);showToast('APIキー保存しました');}closeKeyModal();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
(function(){const s=getSettings();document.getElementById('set-maxrace').value=s.maxrace||3;})();
</script>
